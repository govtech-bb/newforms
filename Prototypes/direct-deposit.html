<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
const FORM_NAME = 'Direct Deposit Form';

const BENEFIT_OPTIONS = [
  'Old-Age Pension', 'Sickness Benefit', 'Maternity Benefit',
  'Unemployment Benefit', 'Invalidity Benefit', 'Survivors Benefit', 'Other'
];

const INSTITUTION_OPTIONS = [
  'Barbados National Bank', 'First Citizens Bank', 'RBC Royal Bank',
  'Scotiabank', 'CIBC FirstCaribbean', 'Butterfield Bank',
  'Republic Bank', 'Cave Shepherd Financial Services', 'Other'
];

function getFlow() {
  if (GovBB.D['alt-payee'] === 'Yes') {
    return ['start','claimant-details','benefit-type','alternate-payee','financial-institution','declaration','check','confirmation'];
  }
  return ['start','claimant-details','benefit-type','financial-institution','declaration','check','confirmation'];
}

        <p class="govbb-text-body">You must already be receiving an NIS benefit to use this form.</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you will need</h2>

        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your NIS number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your National Registration Number (NRN)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your bank account details (account number, branch name)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A recent bank statement header showing your name and account number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Details of any alternate payee (if you want someone else to receive payments on your behalf)</li>

      <div style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start</button></div>
    </div>`,

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="district">District</label>
        <p class="govbb-hint">Optional</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="district" name="district" data-field="district" value="${GovBB.D['district']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Your contact details</h2>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">

      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="telephone">Telephone number</label>
        <p class="govbb-hint">Include area code. For example, 246-555-1234</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="tel" id="telephone" name="telephone" data-field="telephone" placeholder="246-555-1234" value="${GovBB.D['telephone']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="cellular">Mobile number</label>
        <p class="govbb-hint">Include area code. For example, 246-555-1234</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="tel" id="cellular" name="cellular" data-field="cellular" placeholder="246-555-1234" value="${GovBB.D['cellular']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>

    </form>`,

  'benefit-type': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">

          <select class="govbb-select" id="benefit-type" name="benefit-type" data-field="benefit-type" data-trigger-render="1">

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Are you legally empowered to act on behalf of this person?</legend>
        <p class="govbb-hint">For example, you have a power of attorney.</p>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="ap-empowered-yes" name="ap-empowered" data-field="ap-empowered" value="Yes"${GovBB.D['ap-empowered']==='Yes'?' checked':''} />
            <label class="govbb-radio-item__label" for="ap-empowered-yes">Yes</label>
          </div>
          <div class="govbb-radio-item__conditional" style="display:${GovBB.D['ap-empowered']==='Yes'?'block':'none'};padding-left:var(--spacing-m);">
            <div>
              <p class="govbb-label" style="margin-bottom:var(--spacing-xs);">Upload proof of empowerment</p>
              <p class="govbb-hint">Upload a JPG, PNG or PDF file under 5MB.</p>
              <input type="file" id="ap-proof-file" accept=".jpg,.jpeg,.png,.pdf" style="display:block;width:100%;font-size:var(--font-size-body);">
            </div>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="ap-empowered-no" name="ap-empowered" data-field="ap-empowered" value="No"${GovBB.D['ap-empowered']==='No'?' checked':''} />
            <label class="govbb-radio-item__label" for="ap-empowered-no">No</label>
          </div>
        </div>
      </fieldset>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  'financial-institution': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your bank account details</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="account-holder-name">Name(s) on the account</label>
        <p class="govbb-hint">Enter the name(s) exactly as they appear on your bank statement.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="account-holder-name" name="account-holder-name" data-field="account-holder-name" value="${GovBB.D['account-holder-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="financial-institution">Financial institution</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="financial-institution" name="financial-institution" data-field="financial-institution" data-trigger-render="1">
            <option value="">Select one</option>
            ${INSTITUTION_OPTIONS.map(o=>`<option value="${o}"${GovBB.D['financial-institution']===o?' selected':''}>` + o + '</option>').join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      ${GovBB.D['financial-institution'] === 'Other' ? `
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="institution-other">Name of financial institution</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="institution-other" name="institution-other" data-field="institution-other" value="${GovBB.D['institution-other']||''}" />
        </div>
      </div>` : ''}

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="account-number">Account number</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="account-number" name="account-number" data-field="account-number" inputmode="numeric" value="${GovBB.D['account-number']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="branch-name">Branch name</label>
        <p class="govbb-hint">For example, Bridgetown Branch</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="branch-name" name="branch-name" data-field="branch-name" value="${GovBB.D['branch-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="branch-transit">Branch or transit number</label>
        <p class="govbb-hint">Optional — you can find this on your bank statement.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="branch-transit" name="branch-transit" data-field="branch-transit" value="${GovBB.D['branch-transit']||''}" />
        </div>
      </div>

      <div style="margin-bottom:var(--spacing-m);">
        <p class="govbb-label" style="margin-bottom:var(--spacing-xs);">Upload bank statement header</p>
        <p class="govbb-hint">Upload a copy of the top section of a recent bank statement showing your name and account number. Accepted formats: JPG, PNG or PDF under 5MB.</p>
        <input type="file" id="bank-statement-file" accept=".jpg,.jpeg,.png,.pdf" style="display:block;width:100%;font-size:var(--font-size-body);">
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  'declaration': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>

      <div style="margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Applicant's name:</strong> ${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['last-name']].filter(Boolean).join(' ') || '—'}</p>
        <p class="govbb-text-body"><strong>Date:</strong> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
      </div>

      <div style="background:var(--color-blue-10);border-left:4px solid var(--color-blue-40);padding:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">I, <strong>${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['last-name']].filter(Boolean).join(' ') || 'the claimant'}</strong>, authorise the National Insurance Office to pay my NIS benefit directly into the bank account stated in this form. I understand that I must notify NIS immediately if my bank details change.</p>
        <p class="govbb-text-body">I declare that the information provided is true and correct to the best of my knowledge.</p>
      </div>

      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
        <input class="govbb-checkbox" type="checkbox" id="declaration-agree" name="declaration-agree" data-field="declaration-agree"${GovBB.D['declaration-agree']?' checked':''} />
        <label class="govbb-checkbox-item__label" for="declaration-agree">I confirm that the information I have given is true and complete to the best of my knowledge.</label>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit authorisation</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  'check': () => {
    const hasAltPayee = GovBB.D['alt-payee'] === 'Yes';
    return `
    <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
    <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers</h1>

    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Your details</h2>
    <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('First name', GovBB.D['first-name'], 'claimant-details')}
      ${GovBB.summaryRow('Middle name(s)', GovBB.D['middle-name'] || 'Not provided', 'claimant-details')}
      ${GovBB.summaryRow('Last name', GovBB.D['last-name'], 'claimant-details')}
      ${GovBB.summaryRow('NIS number', GovBB.D['nis-number'], 'claimant-details')}
      ${GovBB.summaryRow('NRN', GovBB.D['nrn'], 'claimant-details')}
      ${GovBB.summaryRow('Address', [GovBB.D['street-address'], GovBB.D['parish'], GovBB.D['postal-code']].filter(Boolean).join(', '), 'claimant-details')}
      ${GovBB.summaryRow('Email', GovBB.D['contact-email'], 'claimant-details')}
      ${GovBB.summaryRow('Telephone', GovBB.D['telephone'], 'claimant-details')}
    </dl>

    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Benefit details</h2>
    <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Benefit type', GovBB.D['benefit-type'] === 'Other' ? GovBB.D['benefit-type-other'] : GovBB.D['benefit-type'], 'benefit-type')}
      ${GovBB.summaryRow('Alternate payee', GovBB.D['alt-payee'], 'benefit-type')}
    </dl>

    ${hasAltPayee ? `
    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Alternate payee details</h2>
    <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Name', [GovBB.D['ap-first-name'], GovBB.D['ap-last-name']].filter(Boolean).join(' '), 'alternate-payee')}
      ${GovBB.summaryRow('NIS number', GovBB.D['ap-nis-number'], 'alternate-payee')}
      ${GovBB.summaryRow('Address', [GovBB.D['ap-street-address'], GovBB.D['ap-parish']].filter(Boolean).join(', '), 'alternate-payee')}
      ${GovBB.summaryRow('Legally empowered', GovBB.D['ap-empowered'], 'alternate-payee')}
    </dl>` : ''}

    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Bank account details</h2>
    <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Account holder name', GovBB.D['account-holder-name'], 'financial-institution')}
      ${GovBB.summaryRow('Financial institution', GovBB.D['financial-institution'] === 'Other' ? GovBB.D['institution-other'] : GovBB.D['financial-institution'], 'financial-institution')}
      ${GovBB.summaryRow('Account number', GovBB.D['account-number'], 'financial-institution')}
      ${GovBB.summaryRow('Branch name', GovBB.D['branch-name'], 'financial-institution')}
    </dl>

    <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
      <button type="button" class="govbb-btn" onclick="next()">Submit Authorisation</button>
      <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
    </div>`;
  },

  'confirmation': () => `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Direct deposit set up</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference: <strong>${window.__refNumber || 'DD-' + Math.random().toString(36).substring(2,8).toUpperCase()}</strong></p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">We will process your direct deposit request within 10 working days.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your next benefit payment will be paid into your bank account.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If you change your bank account, contact NIS straight away.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Keep your reference number safe in case you need to contact us.</li>
      </ul>
      <p class="govbb-text-body"><a href="#" onclick="GovBB.nav('start')" class="govbb-link">Return to start</a></p>
    </div>`
};

function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  if (pageId === 'claimant-details') {
    if (!D['first-name']) errors.push({ id: 'first-name', msg: 'First name – Enter your first name' });
    if (!D['last-name']) errors.push({ id: 'last-name', msg: 'Last name – Enter your last name' });
    if (!D['nis-number']) errors.push({ id: 'nis-number', msg: 'NIS number – Enter your NIS number' });
    if (!D['nrn']) errors.push({ id: 'nrn', msg: 'National Registration Number – Enter your NRN' });
    if (!D['street-address']) errors.push({ id: 'street-address', msg: 'Street address – Enter your street address' });
    if (!D['parish']) errors.push({ id: 'parish', msg: 'Parish – Select your parish' });
    if (D['postal-code'] && D['postal-code'].trim() && !/^BB\d{5}$/i.test(D['postal-code'].trim())) errors.push({ id: 'postal-code', msg: 'Postal code – Enter a valid postal code, for example BB11000' });
    if (!D['contact-email']) errors.push({ id: 'contact-email', msg: 'Email address – Enter your email address' });
    if (!D['telephone'] && !D['cellular']) errors.push({ id: 'telephone', msg: 'Telephone – Enter at least one phone number' });
  }
  if (pageId === 'benefit-type') {
    if (!D['benefit-type']) errors.push({ id: 'benefit-type', msg: 'Benefit type – Select your benefit type' });
    if (!D['alt-payee']) errors.push({ id: 'alt-payee', msg: 'Alternate payee – Select Yes or No' });
  }
  if (pageId === 'alternate-payee') {
    if (!D['ap-first-name']) errors.push({ id: 'ap-first-name', msg: 'First name – Enter the alternate payee\'s first name' });
    if (!D['ap-last-name']) errors.push({ id: 'ap-last-name', msg: 'Last name – Enter the alternate payee\'s last name' });
    if (!D['ap-nis-number']) errors.push({ id: 'ap-nis-number', msg: 'NIS number – Enter the alternate payee\'s NIS number' });
    if (!D['ap-nrn']) errors.push({ id: 'ap-nrn', msg: 'NRN – Enter the alternate payee\'s NRN' });
    if (!D['ap-street-address']) errors.push({ id: 'ap-street-address', msg: 'Street address – Enter the alternate payee\'s address' });
    if (!D['ap-parish']) errors.push({ id: 'ap-parish', msg: 'Parish – Select the alternate payee\'s parish' });
    if (!D['ap-empowered']) errors.push({ id: 'ap-empowered', msg: 'Legally empowered – Select Yes or No' });
  }
  if (pageId === 'financial-institution') {
    if (!D['account-holder-name']) errors.push({ id: 'account-holder-name', msg: 'Account holder name – Enter the name on the account' });
    if (!D['financial-institution']) errors.push({ id: 'financial-institution', msg: 'Financial institution – Select your bank' });
    if (!D['account-number']) errors.push({ id: 'account-number', msg: 'Account number – Enter your account number' });
    if (!D['branch-name']) errors.push({ id: 'branch-name', msg: 'Branch name – Enter your branch name' });
  }
  if (pageId === 'declaration') {
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: ['start','claimant-details','benefit-type','financial-institution','declaration','check','confirmation'],
  pages: PAGES,
  validate: validate,
  getFlow: getFlow,
  onRadioChange: function(name, value) {
    if (name === 'alt-payee' || name === 'ap-empowered') GovBB.render();
    if (name === 'benefit-type') GovBB.render();
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>National Insurance Contributions Certificate (D.P. 10) – National Insurance Scheme</title>
  <link rel="stylesheet" href="../dist/styles.css">
  <style>
    .earnings-table { width: 100%; border-collapse: collapse; }
    .earnings-table th { text-align: left; padding: var(--spacing-xs) var(--spacing-s); background: var(--color-blue-10); font-size: var(--font-size-body); font-weight: var(--font-weight-bold); border-bottom: 2px solid var(--color-blue-40); }
    .earnings-table td { padding: var(--spacing-xs) var(--spacing-s); vertical-align: top; border-bottom: 1px solid var(--color-grey-00); }
    .earnings-table tfoot td { font-weight: var(--font-weight-bold); border-top: 2px solid var(--color-grey-00); border-bottom: none; }
    .warning-banner { background: var(--color-yellow-10); border-left: 4px solid var(--color-yellow-00); padding: var(--spacing-m); margin-bottom: var(--spacing-m); }
  </style>
</head>
<body class="govbb-page">

<div class="govbb-official-banner">
  <div class="govbb-container govbb-official-banner__inner">
    <div class="govbb-official-banner__crest">
      <img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" />
    </div>
    <div class="govbb-official-banner__text">
      <span>Official government website</span>
    </div>
  </div>
</div>

<header class="govbb-header">
  <div class="govbb-container govbb-header__inner">
    <a href="/" aria-label="Go to the alpha.gov.bb homepage">
      <img class="govbb-header__logo" src="../dist/assets/images/govbb-logo.svg" alt="GovBB" />
    </a>
  </div>
</header>

<main class="govbb-page__main">
  <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-label="alpha status banner" aria-live="polite">
    <div class="govbb-container">
      <p>This page is in <a class="govbb-link govbb-link--secondary" href="#">Alpha</a>. Your feedback helps us improve.</p>
    </div>
  </div>
  <div class="govbb-container" id="app" style="padding-block: var(--spacing-l); max-width: 48rem;"></div>
</main>

<footer class="govbb-footer">
  <div class="govbb-container govbb-footer__inner">
    <nav class="govbb-footer__nav" aria-label="Footer">
      <a class="govbb-footer__link" href="#">Home</a>
      <a class="govbb-footer__link" href="#">Privacy</a>
      <a class="govbb-footer__link" href="#">Terms &amp; Conditions</a>
      <a class="govbb-footer__link" href="#">Accessibility</a>
    </nav>
    <hr class="govbb-footer__divider" aria-hidden="true" />
    <div class="govbb-footer__end">
      <img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" />
      <p class="govbb-footer__copy">© 2025 Government of Barbados</p>
    </div>
  </div>
</footer>

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
const FORM_NAME = 'National Insurance Contributions Certificate (D.P. 10)';

const EARNINGS_TYPES = ['Regular', 'Overtime', 'Commission', 'Bonus', 'Holiday Pay', 'Sick Pay', 'Other'];
const ROLE_OPTIONS = ['Owner', 'Director', 'Payroll Manager', 'Accountant', 'Authorised Agent', 'Other'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function getEarningsRows() {
  return GovBB.D['earnings-rows'] || [{ type: '', employees: '', earnings: '', rate: '11.1', contributions: '0.00' }];
}
function saveEarningsRows(rows) { GovBB.D['earnings-rows'] = rows; }

function calcContributions(earnings, rate) {
  var e = parseFloat(earnings) || 0;
  var r = parseFloat(rate) || 0;
  return (e * r / 100).toFixed(2);
}

function getTotalContributions() {
  return getEarningsRows().reduce(function(sum, row) {
    return sum + (parseFloat(row.contributions) || 0);
  }, 0);
}

function isLate() {
  var year = parseInt(GovBB.D['contrib-year']);
  var month = parseInt(GovBB.D['contrib-month']);
  if (!year || !month) return false;
  var now = new Date();
  var dueDate = new Date(year, month, 15); // 15th of following month
  return now > dueDate;
}

function getDueDate() {
  var year = parseInt(GovBB.D['contrib-year']);
  var month = parseInt(GovBB.D['contrib-month']);
  if (!year || !month) return '';
  var due = new Date(year, month, 15);
  return due.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });
}

function renderEarningsGrid() {
  var rows = getEarningsRows();
  var rowsHtml = rows.map(function(row, i) {
    var typeOpts = EARNINGS_TYPES.map(function(t) {
      return '<option value="' + t + '"' + (row.type === t ? ' selected' : '') + '>' + t + '</option>';
    }).join('');
    return `<tr>
      <td class="p-2">
        <div class="govbb-select-wrapper">
          <select onchange="updateERow(${i},'type',this.value)" class="govbb-select">
            <option value="">Select</option>${typeOpts}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
        ${row.type === 'Other' ? `<div class="govbb-input-wrapper" style="margin-top:var(--spacing-xs);"><input type="text" class="govbb-input" placeholder="Describe..." value="${row.typeOther||''}" oninput="updateERow(${i},'typeOther',this.value)"></div>` : ''}
      </td>
      <td class="p-2"><div class="govbb-input-wrapper"><input type="number" min="0" value="${row.employees||''}" oninput="updateERow(${i},'employees',this.value)" class="govbb-input"></div></td>
      <td class="p-2">
        <div class="govbb-input-wrapper" style="display:flex;align-items:center;">
          <span style="padding-left:var(--spacing-xs);color:var(--color-mid-grey-00);">$</span>
          <input type="number" min="0" step="0.01" value="${row.earnings||''}" oninput="updateERow(${i},'earnings',this.value)" class="govbb-input" style="border:none;box-shadow:none;flex:1;">
        </div>
      </td>
      <td class="p-2" style="color:var(--color-mid-grey-00);white-space:nowrap;">${row.rate||'11.1'}%</td>
      <td class="p-2" style="font-weight:var(--font-weight-bold);color:var(--color-teal-00);">$${row.contributions||'0.00'}</td>
      <td class="p-2">${rows.length > 1 ? `<button type="button" onclick="removeERow(${i})" class="govbb-btn--link">Remove</button>` : ''}</td>
    </tr>`;
  }).join('');
  var total = getTotalContributions();
  return `<div id="earnings-grid">
    <table class="earnings-table" style="margin-bottom:var(--spacing-m);">
      <thead>
        <tr>
          <th>Earnings Type</th><th>No. of Employees</th><th>Insurable Earnings (BDS$)</th><th>Rate</th><th>Contributions Payable</th><th></th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
      <tfoot>
        <tr>
          <td colspan="4" style="font-weight:var(--font-weight-bold);">Total Contributions Payable</td>
          <td style="font-weight:var(--font-weight-bold);color:var(--color-teal-00);">$${total.toFixed(2)}</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
    <button type="button" onclick="addERow()" class="govbb-link" style="display:inline-block;font-size:var(--font-size-body);">+ Add row</button>
  </div>`;
}

function addERow() {
  var rows = getEarningsRows();
  rows.push({ type: '', employees: '', earnings: '', rate: '11.1', contributions: '0.00' });
  saveEarningsRows(rows);
  GovBB.render();
}
function removeERow(i) {
  var rows = getEarningsRows();
  rows.splice(i, 1);
  saveEarningsRows(rows);
  GovBB.render();
}
function updateERow(i, field, value) {
  var rows = getEarningsRows();
  rows[i][field] = value;
  if (field === 'earnings' || field === 'rate') {
    rows[i].contributions = calcContributions(rows[i].earnings, rows[i].rate);
  }
  saveEarningsRows(rows);
  GovBB.render();
}

const PAGES = {
  'start': () => `
    <div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Submit your monthly NIS contributions certificate (D.P. 10)</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Every employer must submit a D.P. 10 certificate each month showing NIS contributions for all employees. You can do this online.</p>
      <div style="background:var(--color-red-10);border-left:4px solid var(--color-red-00);padding:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Payment deadline: 15th of the following month</p>
        <p class="govbb-text-body">If you pay late, interest of 1% per month will be added to the amount you owe.</p>
      </div>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start now</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you will need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-l);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your employer registration number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The contribution month and year</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Insurable earnings for each earnings type</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Number of employees for each earnings type</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-l);">When you submit, your certificate is recorded and you pay the total amount due by the deadline. Payment can be made at any NIS office or by bank transfer.</p>
    </div>`,

  'employer-details': () => `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your business details</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="employer-reg">Employer registration number</label>
        <p class="govbb-hint">Your NIS employer registration number</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="employer-reg" name="employer-reg" data-field="employer-reg" value="${GovBB.D['employer-reg']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="business-name">Business name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="business-name" name="business-name" data-field="business-name" value="${GovBB.D['business-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="employer-street">Street address</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="employer-street" name="employer-street" data-field="employer-street" value="${GovBB.D['employer-street']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="employer-district">District</label>
        <p class="govbb-hint">Optional</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="employer-district" name="employer-district" data-field="employer-district" value="${GovBB.D['employer-district']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="employer-parish">Parish</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="employer-parish" name="employer-parish" data-field="employer-parish">
            <option value="">Select one</option>
            ${GovBB.PARISHES.map(o=>`<option value="${o}"${GovBB.D['employer-parish']===o?' selected':''}>` + o + '</option>').join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="employer-postal">Postal code</label>
        <p class="govbb-hint">For example, BB11000</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="employer-postal" name="employer-postal" data-field="employer-postal" value="${GovBB.D['employer-postal']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'contributions-period': () => {
    var dueDate = getDueDate();
    var late = isLate();
    var monthOpts = MONTHS.map(function(m, i) {
      return { value: String(i + 1), label: m };
    });
    return `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Which month are you submitting for?</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="contrib-year">Contribution year</label>
        <p class="govbb-hint">For example, 2025</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="contrib-year" name="contrib-year" data-field="contrib-year" inputmode="numeric" maxlength="4" value="${GovBB.D['contrib-year']||''}" style="max-width:10rem;" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="contrib-month">Contribution month</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="contrib-month" name="contrib-month" data-field="contrib-month">
            <option value="">Select one</option>
            ${monthOpts.map(o=>`<option value="${o.value}"${GovBB.D['contrib-month']===o.value?' selected':''}>` + o.label + '</option>').join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      ${dueDate ? `<div style="background:var(--color-blue-10);border-left:4px solid var(--color-blue-40);padding:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Payment due date</p>
        <p class="govbb-text-body">${dueDate}</p>
      </div>` : ''}
      ${late ? `<div class="warning-banner"><p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">This submission is late</p><p class="govbb-text-body">Interest of 1% per month will be added to the total amount payable.</p></div>` : ''}

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;
  },

  'earnings-grid': () => `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Enter insurable earnings</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Enter earnings for each type. Contributions are calculated automatically at the standard NIS rate of 11.1%.</p>

      ${renderEarningsGrid()}

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'discrepancies': () => {
    var total = getTotalContributions();
    var overpay = parseFloat(GovBB.D['prev-overpayment']) || 0;
    var shortpay = parseFloat(GovBB.D['prev-shortpayment']) || 0;
    var finalTotal = Math.max(0, total - overpay + shortpay).toFixed(2);
    GovBB.D['final-total'] = finalTotal;
    return `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Adjust for previous payments</h1>

      <div style="background:var(--color-blue-10);padding:var(--spacing-m);border-radius:4px;margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Total contributions from earnings:</strong> <span style="color:var(--color-teal-00);">BDS$ ${total.toFixed(2)}</span></p>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="prev-overpayment">Less: previous overpayment (BDS$)</label>
        <p class="govbb-hint">Enter 0 if there is none</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="prev-overpayment" name="prev-overpayment" data-field="prev-overpayment" inputmode="decimal" value="${GovBB.D['prev-overpayment']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="prev-shortpayment">Add: previous shortpayment (BDS$)</label>
        <p class="govbb-hint">Enter 0 if there is none</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="prev-shortpayment" name="prev-shortpayment" data-field="prev-shortpayment" inputmode="decimal" value="${GovBB.D['prev-shortpayment']||''}" />
        </div>
      </div>

      <div style="background:var(--color-teal-10);border:2px solid var(--color-teal-00);border-radius:4px;padding:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Total amount payable:</strong> <span style="color:var(--color-teal-00);">BDS$ ${finalTotal}</span></p>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;
  },

  'declaration': () => {
    var late = isLate();
    return `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>

      <div style="margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Authorised signatory:</strong> ${GovBB.D['signatory-name'] || GovBB.D['business-name'] || '—'}</p>
        <p class="govbb-text-body"><strong>Date:</strong> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
      </div>

      ${late ? `<div class="warning-banner" style="margin-bottom:var(--spacing-m);"><p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Late submission warning</p><p class="govbb-text-body">This certificate is being submitted after the payment deadline. Interest of 1% per month applies to the outstanding amount.</p></div>` : ''}

      <div style="background:var(--color-blue-10);border-left:4px solid var(--color-blue-40);padding:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body">I declare that the information in this certificate is true and correct. I understand that providing false information may result in prosecution.</p>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="signatory-name">Authorised signatory name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="signatory-name" name="signatory-name" data-field="signatory-name" value="${GovBB.D['signatory-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="signatory-role">Role or title</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="signatory-role" name="signatory-role" data-field="signatory-role" data-trigger-render="1">
            <option value="">Select one</option>
            ${ROLE_OPTIONS.map(o=>`<option value="${o}"${GovBB.D['signatory-role']===o?' selected':''}>` + o + '</option>').join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      ${GovBB.D['signatory-role'] === 'Other' ? `
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="signatory-role-other">Please describe your role</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="signatory-role-other" name="signatory-role-other" data-field="signatory-role-other" value="${GovBB.D['signatory-role-other']||''}" />
        </div>
      </div>` : ''}

      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
        <input class="govbb-checkbox" type="checkbox" id="declaration-agree" name="declaration-agree" data-field="declaration-agree"${GovBB.D['declaration-agree']?' checked':''} />
        <label class="govbb-checkbox-item__label" for="declaration-agree">I declare that the above information is true and correct, and the above amounts accurately represent the Insurable Earnings of ALL employees.</label>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;
  },

  'check': () => {
    var rows = getEarningsRows();
    var earningsHtml = rows.map(function(row) {
      return GovBB.summaryRow(
        row.type || 'Unnamed type',
        (row.employees || 0) + ' employees — $' + (row.earnings || '0') + ' @ ' + (row.rate || '11.1') + '% = $' + (row.contributions || '0.00'),
        'earnings-grid'
      );
    }).join('');
    return `
    <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers</h1>

    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Employer details</h2>
    <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Registration number', GovBB.D['employer-reg'], 'employer-details')}
      ${GovBB.summaryRow('Business name', GovBB.D['business-name'], 'employer-details')}
      ${GovBB.summaryRow('Address', [GovBB.D['employer-street'], GovBB.D['employer-parish'], GovBB.D['employer-postal']].filter(Boolean).join(', '), 'employer-details')}
    </dl>

    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contribution period</h2>
    <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Year', GovBB.D['contrib-year'], 'contributions-period')}
      ${GovBB.summaryRow('Month', MONTHS[(parseInt(GovBB.D['contrib-month']) || 1) - 1], 'contributions-period')}
      ${GovBB.summaryRow('Payment due', getDueDate(), 'contributions-period')}
    </dl>

    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Earnings</h2>
    <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">${earningsHtml}</dl>

    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Adjustments</h2>
    <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Previous overpayment', 'BDS$ ' + (GovBB.D['prev-overpayment'] || '0'), 'discrepancies')}
      ${GovBB.summaryRow('Previous shortpayment', 'BDS$ ' + (GovBB.D['prev-shortpayment'] || '0'), 'discrepancies')}
      ${GovBB.summaryRow('Total amount payable', 'BDS$ ' + (GovBB.D['final-total'] || '0.00'), 'discrepancies')}
    </dl>

    <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
      <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
      <button type="button" class="govbb-btn" onclick="next()">Submit certificate</button>
    </div>`;
  },

  'confirmation': () => `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Certificate submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference: <strong>${window.__refNumber || 'DP10-' + Math.random().toString(36).substring(2, 8).toUpperCase()}</strong></p>
      </div>

      <div style="background:var(--color-blue-10);padding:var(--spacing-m);border-radius:4px;margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Total amount due: BDS$ ${GovBB.D['final-total'] || '0.00'}</p>
        <p class="govbb-text-body">Payment deadline: ${getDueDate()}</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Pay the total amount shown above by the deadline to avoid interest charges.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Payment can be made at any NIS office or via bank transfer.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Keep this reference number for your records.</li>
      </ul>
      <p class="govbb-text-body"><a href="#" onclick="GovBB.nav('start')" class="govbb-link">Return to start</a></p>
    </div>`
};

function validate(pageId) {
  var D = GovBB.D;
  var errors = [];
  if (pageId === 'employer-details') {
    if (!D['employer-reg']) errors.push({ id: 'employer-reg', msg: 'Employer registration number – Enter your registration number' });
    if (!D['business-name']) errors.push({ id: 'business-name', msg: 'Business name – Enter your business name' });
    if (!D['employer-street']) errors.push({ id: 'employer-street', msg: 'Street address – Enter your street address' });
    if (!D['employer-parish']) errors.push({ id: 'employer-parish', msg: 'Parish – Select your parish' });
    if (D['employer-postal'] && D['employer-postal'].trim() && !/^BB\d{5}$/i.test(D['employer-postal'].trim())) errors.push({ id: 'employer-postal', msg: 'Postal code – Enter a valid postal code, for example BB11000' });
  }
  if (pageId === 'contributions-period') {
    if (!D['contrib-year'] || D['contrib-year'].length !== 4) errors.push({ id: 'contrib-year', msg: 'Contribution year – Enter a 4-digit year' });
    if (!D['contrib-month']) errors.push({ id: 'contrib-month', msg: 'Contribution month – Select the contribution month' });
  }
  if (pageId === 'earnings-grid') {
    var rows = getEarningsRows();
    if (!rows.length || !rows[0].type) {
      errors.push({ id: 'earnings-grid', msg: 'Earnings – Add at least one earnings row' });
    } else {
      rows.forEach(function(row, i) {
        if (!row.type) errors.push({ id: 'earnings-grid', msg: 'Row ' + (i + 1) + ' – Select an earnings type' });
        if (!row.earnings || parseFloat(row.earnings) <= 0) errors.push({ id: 'earnings-grid', msg: 'Row ' + (i + 1) + ' – Enter the insurable earnings amount' });
      });
    }
  }
  if (pageId === 'discrepancies') {
    var overpay = parseFloat(D['prev-overpayment']) || 0;
    var total = getTotalContributions();
    if (overpay > total) errors.push({ id: 'prev-overpayment', msg: 'Previous overpayment – Cannot be more than total contributions' });
  }
  if (pageId === 'declaration') {
    if (!D['signatory-name']) errors.push({ id: 'signatory-name', msg: 'Signatory name – Enter the authorised signatory\'s name' });
    if (!D['signatory-role']) errors.push({ id: 'signatory-role', msg: 'Role – Select the signatory\'s role' });
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: ['start', 'employer-details', 'contributions-period', 'earnings-grid', 'discrepancies', 'declaration', 'check', 'confirmation'],
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    if (name === 'signatory-role') GovBB.render();
  }
});
</script>

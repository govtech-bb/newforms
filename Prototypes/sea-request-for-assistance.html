<script src="../assets/govbb-framework.js"></script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = 'Request for Assistance or Transportation – Social Empowerment Agency';
const SEA_CAPTION = 'Social Empowerment Agency';

const BASE_FLOW = [
  'start',
  'request-type',
  'personal-details',
  'contact',
  'next-of-kin',
  'disability-info',
  'household',
  'employment',
  'check',
  'confirmation'
];

/* ───────── Custom styled select (matches design system) ───────── */
function styledSelect(id, label, options, opts) {
  opts = opts || {};
  const val = GovBB.D[id] || '';
  const hint = opts.hint
    ? `<p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">${opts.hint}</p>`
    : '';
  const triggerAttr = opts.triggerRender ? ' data-trigger-render="1"' : '';
  const placeholder = opts.placeholder || 'Select one';
  let ops = `<option value="">${placeholder}</option>`;
  options.forEach(o => {
    const v = typeof o === 'object' ? o.value : o;
    const l = typeof o === 'object' ? o.label : o;
    ops += `<option value="${v}"${val === v ? ' selected' : ''}>${l}</option>`;
  });
  return `
    <div class="field-group flex flex-col gap-xs w-full items-start">
      <label for="${id}" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">${label}</label>
      ${hint}
      <div class="relative flex w-full rounded-sm border-2 border-bb-black-00 bg-bb-white-00 overflow-hidden hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
        <select id="${id}" name="${id}" data-field="${id}"${triggerAttr}
          class="w-full min-w-0 p-s outline-none bg-transparent appearance-none cursor-pointer text-[1.25rem] leading-normal">
          ${ops}
        </select>
        <div class="flex items-center justify-center w-14 shrink-0 bg-[#f0f0f0] border-l-2 border-bb-black-00 pointer-events-none" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>
    </div>`;
}

/* ───────── Previous + Continue button group ───────── */
const PREV_BTN_CLS = 'relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c8cdd4] active:bg-[#b0b5bc] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100 focus-visible:rounded-sm';

function btnGroup(continueLabel) {
  return `<div class="mt-8 flex gap-4 items-center flex-wrap">
    <button type="button" onclick="back()" class="${PREV_BTN_CLS}">Previous</button>
    <button type="button" onclick="next()" class="${GovBB.BTN_CLS}">${continueLabel || 'Continue'}</button>
  </div>`;
}

/* ───────── Helper: format date fields ───────── */
function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

/* ───────── Helper: check if transportation is in scope ───────── */
function needsTransport() {
  const rt = GovBB.D['request-type'];
  return rt === 'Transportation to a medical appointment' || rt === 'Both assistance and transportation';
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div class="space-y-6">
      <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00">${SEA_CAPTION}</p>
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Request for Assistance or Transportation</h1>
      <hr class="border-bb-grey-00">

      <p class="text-[1.25rem] leading-normal">Use this form to request assistance or transportation if you are a person with a disability.</p>
      <p class="text-[1.25rem] leading-normal">Most people finish this form in about <strong>10 minutes</strong>.</p>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">What you'll need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem] leading-normal">
          <li>Your National ID number</li>
          <li>Details of your disability and health condition</li>
          <li>Next of kin contact details</li>
        </ul>
      </div>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">Contact us</h2>
        <p class="text-[1.25rem] leading-normal">Call <strong>+1 (246) 467-5100</strong> if you need help completing this form.</p>
      </div>

      ${GovBB.startBtn('Start request')}
    </div>`,

  /* ── Request type ── */
  'request-type': () => `
    <form novalidate>
      ${GovBB.caption(SEA_CAPTION)}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">What are you applying for?</h1>
      <div class="space-y-8">
        ${GovBB.radioGroup('request-type', 'What type of support are you requesting?', [
          'Assistance only',
          'Transportation to a medical appointment',
          'Both assistance and transportation'
        ])}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Personal details ── */
  'personal-details': () => `
    <form novalidate>
      ${GovBB.caption(SEA_CAPTION)}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">About you</h1>
      <div class="space-y-8">
        ${GovBB.textField('firstname', 'First name')}
        ${GovBB.textField('middlename', 'Middle name (optional)')}
        ${GovBB.textField('surname', 'Surname')}
        ${GovBB.dateField('dob', 'Date of birth')}
        ${GovBB.textField('id-number', 'National ID Number', {
          hint: 'Your national registration number, for example 110915-0048.'
        })}
        ${GovBB.emailField('email', 'Email address (optional)')}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Contact details ── */
  'contact': () => `
    <form novalidate>
      ${GovBB.caption(SEA_CAPTION)}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your contact details</h1>
      <div class="space-y-8">
        ${GovBB.textField('address', 'Home address')}
        ${styledSelect('parish', 'Parish', GovBB.PARISHES)}
        ${GovBB.telField('phone-home', 'Home phone number (optional)', { hint: '246 249-1234.' })}
        ${GovBB.telField('phone-cell', 'Mobile number', { hint: '246 249-1234.' })}
        ${GovBB.telField('phone-work', 'Work phone number (optional)')}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Next of kin ── */
  'next-of-kin': () => `
    <form novalidate>
      ${GovBB.caption(SEA_CAPTION)}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Next of kin</h1>
      <div class="space-y-8">
        ${GovBB.textField('kin-name', 'Full name')}
        ${styledSelect('kin-relationship', 'Relationship to you', [
          'Mother', 'Father', 'Spouse', 'Partner', 'Son', 'Daughter',
          'Sibling', 'Aunt', 'Uncle', 'Friend', 'Carer', 'Other'
        ], { triggerRender: true })}
        <div data-show-when-name="kin-relationship" data-show-when-value="Other" style="display:${GovBB.D['kin-relationship'] === 'Other' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
          ${GovBB.textField('kin-relationship-other', 'Describe your relationship')}
        </div>
        ${GovBB.telField('kin-phone', 'Phone number', { hint: '246 249-1234.' })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Disability and health info ── */
  'disability-info': () => `
    <form novalidate>
      ${GovBB.caption(SEA_CAPTION)}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">About your disability and health</h1>
      <div class="space-y-8">
        ${GovBB.textareaField('assistive-device', 'Do you use an assistive device?', {
          hint: "For example: wheelchair, walking frame, hearing aid, white cane. If none, write 'None'.",
          rows: 2
        })}
        ${GovBB.textareaField('nature-of-disability', 'Nature of disability', {
          hint: 'Describe your disability or disabilities.',
          rows: 3
        })}
        ${GovBB.textareaField('health-condition', 'Health condition', {
          hint: 'Describe any health conditions related to your request.',
          rows: 3
        })}
        ${GovBB.textareaField('nature-of-request', 'What assistance do you need?', {
          hint: 'Describe specifically what you are requesting help with.',
          rows: 3
        })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Household ── */
  'household': () => `
    <form novalidate>
      ${GovBB.caption(SEA_CAPTION)}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your household</h1>
      <div class="space-y-8">
        ${GovBB.textField('household-number', 'How many people live in your household?', {
          hint: 'Include yourself.',
          inputmode: 'numeric'
        })}
        ${GovBB.radioGroup('evacuation-needed', 'In the event of an emergency or natural disaster, would you need evacuation from your home?', ['Yes', 'No'])}
        ${GovBB.radioGroup('vehicle-access', 'Can your home be accessed by vehicle?', ['Yes', 'No'])}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Employment ── */
  'employment': () => `
    <form novalidate>
      ${GovBB.caption(SEA_CAPTION)}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Employment</h1>
      <div class="space-y-8">
        ${styledSelect('employment-status', 'What is your current employment status?', [
          'Employed full-time',
          'Employed part-time',
          'Self-employed',
          'Unemployed',
          'Unable to work due to disability',
          'Retired',
          'Student',
          'Other'
        ], { triggerRender: true })}
        <div data-show-when-name="employment-status" data-show-when-value="Other" style="display:${GovBB.D['employment-status'] === 'Other' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
          ${GovBB.textField('employment-status-other', 'Please describe your employment status')}
        </div>
        ${GovBB.radioGroup('seeking-employment', 'Are you seeking employment?', ['Yes', 'No'])}
        <div data-show-when-name="seeking-employment" data-show-when-value="Yes" style="display:${GovBB.D['seeking-employment'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
          ${GovBB.textareaField('job-interests', 'What are your job interests or skills?', { rows: 3 })}
        </div>
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Transportation details (conditional) ── */
  'transportation': () => `
    <form novalidate>
      ${GovBB.caption(SEA_CAPTION)}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-4">Transportation details</h1>
      <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-8">Complete this section if you need transportation to a medical appointment.</p>
      <div class="space-y-8">
        ${GovBB.dateField('appt-date', 'Appointment date')}
        ${GovBB.textField('pickup-time', 'Pickup time', {
          hint: 'For example: 9:00 AM.'
        })}
        ${GovBB.textField('destination', 'Destination', {
          hint: 'For example: Queen Elizabeth Hospital, Bridgetown.'
        })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Check your answers ── */
  'check': () => {
    const D = GovBB.D;
    const fullName = [D['firstname'], D['middlename'], D['surname']].filter(Boolean).join(' ');

    let transportSection = '';
    if (needsTransport()) {
      transportSection = `
        <div class="space-y-4">
          <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-2">Transportation details</h2>
          ${GovBB.summaryRow('Appointment date', fmtDate('appt-date'), 'transportation')}
          ${GovBB.summaryRow('Pickup time', D['pickup-time'], 'transportation')}
          ${GovBB.summaryRow('Destination', D['destination'], 'transportation')}
        </div>`;
    }

    return `
    <div class="space-y-10">
      ${GovBB.backLink()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Check your answers</h1>

      <div class="space-y-4">
        <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-2">Type of request</h2>
        ${GovBB.summaryRow('Type of support', D['request-type'], 'request-type')}
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-2">About you</h2>
        ${GovBB.summaryRow('Full name', fullName, 'personal-details')}
        ${GovBB.summaryRow('Date of birth', fmtDate('dob'), 'personal-details')}
        ${GovBB.summaryRow('National ID Number', D['id-number'], 'personal-details')}
        ${GovBB.summaryRow('Email address', D['email'], 'personal-details')}
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-2">Contact details</h2>
        ${GovBB.summaryRow('Home address', D['address'], 'contact')}
        ${GovBB.summaryRow('Parish', D['parish'], 'contact')}
        ${GovBB.summaryRow('Home phone', D['phone-home'], 'contact')}
        ${GovBB.summaryRow('Mobile number', D['phone-cell'], 'contact')}
        ${GovBB.summaryRow('Work phone', D['phone-work'], 'contact')}
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-2">Next of kin</h2>
        ${GovBB.summaryRow('Full name', D['kin-name'], 'next-of-kin')}
        ${GovBB.summaryRow('Relationship', D['kin-relationship'] === 'Other' ? D['kin-relationship-other'] : D['kin-relationship'], 'next-of-kin')}
        ${GovBB.summaryRow('Phone number', D['kin-phone'], 'next-of-kin')}
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-2">Disability and health</h2>
        ${GovBB.summaryRow('Assistive device', D['assistive-device'], 'disability-info')}
        ${GovBB.summaryRow('Nature of disability', D['nature-of-disability'], 'disability-info')}
        ${GovBB.summaryRow('Health condition', D['health-condition'], 'disability-info')}
        ${GovBB.summaryRow('Assistance needed', D['nature-of-request'], 'disability-info')}
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-2">Household</h2>
        ${GovBB.summaryRow('Number of people in household', D['household-number'], 'household')}
        ${GovBB.summaryRow('Needs evacuation in emergency', D['evacuation-needed'], 'household')}
        ${GovBB.summaryRow('Home accessible by vehicle', D['vehicle-access'], 'household')}
      </div>

      <div class="space-y-4">
        <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-2">Employment</h2>
        ${GovBB.summaryRow('Employment status', D['employment-status'] === 'Other' ? D['employment-status-other'] : D['employment-status'], 'employment')}
        ${GovBB.summaryRow('Seeking employment', D['seeking-employment'], 'employment')}
        ${D['seeking-employment'] === 'Yes' ? GovBB.summaryRow('Job interests or skills', D['job-interests'], 'employment') : ''}
      </div>

      ${transportSection}

      <div class="mt-8 flex gap-4 items-center flex-wrap">
        <button type="button" onclick="back()" class="${PREV_BTN_CLS}">Previous</button>
        <button type="button" onclick="next()" class="${GovBB.BTN_CLS}">Submit request</button>
      </div>
    </div>`;
  },

  /* ── Confirmation ── */
  'confirmation': () => {
    const refNumber = window.__refNumber || ('SEA-RA-' + Math.random().toString(36).substring(2, 8).toUpperCase());
    window.__refNumber = refNumber;
    return `
    <div class="space-y-8">
      <div style="border-left: 4px solid #00703c; padding-left: 1.5rem;">
        <h1 class="font-bold text-[3.5rem] leading-[1.15]">Request submitted</h1>
      </div>

      <div class="bg-bb-grey-10 p-8 rounded-sm space-y-2">
        <p class="text-[1.25rem]">Your reference number</p>
        <p class="text-[2rem] font-bold">${refNumber}</p>
      </div>

      <p class="text-[1.25rem] leading-normal">We will review your request and contact you within <strong>5 working days</strong>.</p>
      <p class="text-[1.25rem] leading-normal">Call <strong>+1 (246) 467-5100</strong> if you need to speak to someone sooner.</p>

      <div>
        <button type="button" onclick="window.print()" class="${PREV_BTN_CLS}">Print this page</button>
      </div>
    </div>`;
  }

};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'request-type') {
    if (!D['request-type']) errors.push({ id: 'request-type', msg: 'Select the type of support you are requesting' });
  }

  if (pageId === 'personal-details') {
    if (!D['firstname'] || !D['firstname'].trim()) errors.push({ id: 'firstname', msg: 'Enter your first name' });
    if (!D['surname'] || !D['surname'].trim()) errors.push({ id: 'surname', msg: 'Enter your surname' });
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    } else {
      const day = parseInt(D['dob-day'], 10), month = parseInt(D['dob-month'], 10), year = parseInt(D['dob-year'], 10);
      const parsed = new Date(year, month - 1, day);
      if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a real date, for example 15 06 1985' });
      } else if (parsed >= new Date()) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – The date of birth must be in the past' });
      }
    }
    if (!D['id-number'] || !D['id-number'].trim()) errors.push({ id: 'id-number', msg: 'Enter your National ID Number' });
    if (D['email'] && D['email'].trim() && !D['email'].includes('@')) {
      errors.push({ id: 'email', msg: 'Email address – Enter a valid email address' });
    }
  }

  if (pageId === 'contact') {
    if (!D['address'] || !D['address'].trim()) errors.push({ id: 'address', msg: 'Enter your home address' });
    if (!D['parish']) errors.push({ id: 'parish', msg: 'Select your parish' });
    if (!D['phone-cell'] || !D['phone-cell'].trim()) errors.push({ id: 'phone-cell', msg: 'Enter a mobile number' });
  }

  if (pageId === 'next-of-kin') {
    if (!D['kin-name'] || !D['kin-name'].trim()) errors.push({ id: 'kin-name', msg: 'Enter the full name of your next of kin' });
    if (!D['kin-relationship']) errors.push({ id: 'kin-relationship', msg: 'Select the relationship of your next of kin to you' });
    if (D['kin-relationship'] === 'Other' && (!D['kin-relationship-other'] || !D['kin-relationship-other'].trim())) {
      errors.push({ id: 'kin-relationship-other', msg: 'Describe the relationship of your next of kin to you' });
    }
    if (!D['kin-phone'] || !D['kin-phone'].trim()) errors.push({ id: 'kin-phone', msg: 'Enter a phone number for your next of kin' });
  }

  if (pageId === 'disability-info') {
    if (!D['assistive-device'] || !D['assistive-device'].trim()) errors.push({ id: 'assistive-device', msg: 'Enter your assistive device, or write None' });
    if (!D['nature-of-disability'] || !D['nature-of-disability'].trim()) errors.push({ id: 'nature-of-disability', msg: 'Describe the nature of your disability' });
    if (!D['health-condition'] || !D['health-condition'].trim()) errors.push({ id: 'health-condition', msg: 'Describe your health condition' });
    if (!D['nature-of-request'] || !D['nature-of-request'].trim()) errors.push({ id: 'nature-of-request', msg: 'Describe the assistance you need' });
  }

  if (pageId === 'household') {
    if (!D['household-number'] || !D['household-number'].trim()) errors.push({ id: 'household-number', msg: 'Enter the number of people in your household' });
    if (!D['evacuation-needed']) errors.push({ id: 'evacuation-needed', msg: 'Select yes or no – would you need evacuation in an emergency?' });
    if (!D['vehicle-access']) errors.push({ id: 'vehicle-access', msg: 'Select yes or no – can your home be accessed by vehicle?' });
  }

  if (pageId === 'employment') {
    if (!D['employment-status']) errors.push({ id: 'employment-status', msg: 'Select your current employment status' });
    if (D['employment-status'] === 'Other' && (!D['employment-status-other'] || !D['employment-status-other'].trim())) {
      errors.push({ id: 'employment-status-other', msg: 'Describe your employment status' });
    }
    if (!D['seeking-employment']) errors.push({ id: 'seeking-employment', msg: 'Select yes or no – are you seeking employment?' });
    if (D['seeking-employment'] === 'Yes' && (!D['job-interests'] || !D['job-interests'].trim())) {
      errors.push({ id: 'job-interests', msg: 'Enter your job interests or skills' });
    }
  }

  if (pageId === 'transportation') {
    if (!D['appt-date-day'] || !D['appt-date-month'] || !D['appt-date-year']) {
      errors.push({ id: 'appt-date-day', msg: 'Appointment date – Enter a complete appointment date' });
    }
    if (!D['pickup-time'] || !D['pickup-time'].trim()) errors.push({ id: 'pickup-time', msg: 'Enter the pickup time' });
    if (!D['destination'] || !D['destination'].trim()) errors.push({ id: 'destination', msg: 'Enter the destination' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  getFlow: function() {
    if (needsTransport()) {
      // Insert 'transportation' page before 'check'
      const flow = BASE_FLOW.slice();
      const checkIdx = flow.indexOf('check');
      flow.splice(checkIdx, 0, 'transportation');
      return flow;
    }
    return BASE_FLOW;
  },
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    if (name === 'request-type') GovBB.render();
    if (name === 'seeking-employment') GovBB.render();
  }
});
</script>
</body>
</html>

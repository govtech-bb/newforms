<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');event.preventDefault();">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
</script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = 'Request for Assistance or Transportation – Social Empowerment Agency';
const SEA_CAPTION = 'Social Empowerment Agency';

const BASE_FLOW = [
  'start',
  'request-type',
  'personal-details',
  'contact',
  'next-of-kin',
  'disability-info',
  'household',
  'employment',
  'check',
  'confirmation'
];

/* ───────── Helper: format date fields ───────── */
function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

/* ───────── Helper: check if transportation is in scope ───────── */
function needsTransport() {
  const rt = GovBB.D['request-type'];
  return rt === 'Transportation to a medical appointment' || rt === 'Both assistance and transportation';
}

/* ───────── Summary row override ───────── */
GovBB.summaryRow = function(label, value, changeTo) {
  var changeLink = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+changeLink+'</div></div>';
};

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */

          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Disability and accessibility</a></li>
        </ol>
      </nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Request for Assistance or Transportation</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Last updated on November 14th, 2025</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Use this form to request assistance or transportation if you are a person with a disability. A caregiver or family member can also apply on your behalf.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">You can request personal assistance, transportation to a medical appointment, or both.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Apply online. This service is free and takes about <strong>10 minutes</strong>.</p>

      <div style="margin-bottom:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Start request</button>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul class="govbb-text-body" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);list-style:disc;">
        <li style="margin-bottom:var(--spacing-xs);">Your National ID number</li>
        <li style="margin-bottom:var(--spacing-xs);">Details of your disability and health condition</li>
        <li style="margin-bottom:var(--spacing-xs);">Next of kin contact details</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">We will review your request and contact you within <strong>10 working days</strong> to confirm arrangements. For transportation requests, we will agree a date and pick-up details with you.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-l);">Call <strong>+1 (246) 467-5100</strong> if you need help completing this form.</p>

      <div style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Start request</button>
      </div>
    </div>`,

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'request-type') {
    if (!D['request-type']) errors.push({ id: 'request-type', msg: 'Select the type of support you are requesting' });
  }

  if (pageId === 'personal-details') {
    if (!D['firstname'] || !D['firstname'].trim()) errors.push({ id: 'firstname', msg: 'Enter your first name' });
    if (!D['surname'] || !D['surname'].trim()) errors.push({ id: 'surname', msg: 'Enter your surname' });
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    } else {
      const day = parseInt(D['dob-day'], 10), month = parseInt(D['dob-month'], 10), year = parseInt(D['dob-year'], 10);
      const parsed = new Date(year, month - 1, day);
      if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a real date, for example 15 06 1985' });
      } else if (parsed >= new Date()) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – The date of birth must be in the past' });
      }
    }
    const idVal = (D['id-number'] || '').trim();
    if (!idVal) {
      errors.push({ id: 'id-number', msg: 'Enter your National ID Number' });
    } else if (!/^\d{6}-\d{4}$/.test(idVal)) {
      errors.push({ id: 'id-number', msg: 'National ID Number must be in the format 110915-0048' });
    }
    if (D['email'] && D['email'].trim() && !D['email'].includes('@')) {
      errors.push({ id: 'email', msg: 'Email address – Enter a valid email address' });
    }
  }

  function reqPhone(id, missingMsg, label, required) {
    const v = (D[id] || '').trim();
    if (!v) { if (required) errors.push({ id, msg: missingMsg }); return; }
    const digits = v.replace(/[\s\-()+]/g, '');
    if (!/^\d{7,15}$/.test(digits)) {
      errors.push({ id, msg: label + ' must contain 7 to 15 digits — for example, 246 249-1234' });
    }
  }

  if (pageId === 'contact') {
    if (!D['address'] || !D['address'].trim()) errors.push({ id: 'address', msg: 'Enter your home address' });
    if (!D['parish']) errors.push({ id: 'parish', msg: 'Select your parish' });
    reqPhone('phone-cell', 'Enter a mobile number',           'Mobile number', true);
    reqPhone('phone-home', 'Enter a home telephone number',   'Home telephone number', false);
  }

  if (pageId === 'next-of-kin') {
    if (!D['kin-name'] || !D['kin-name'].trim()) errors.push({ id: 'kin-name', msg: 'Enter the full name of your next of kin' });
    if (!D['kin-relationship']) errors.push({ id: 'kin-relationship', msg: 'Select the relationship of your next of kin to you' });
    if (D['kin-relationship'] === 'Other' && (!D['kin-relationship-other'] || !D['kin-relationship-other'].trim())) {
      errors.push({ id: 'kin-relationship-other', msg: 'Describe the relationship of your next of kin to you' });
    }
    reqPhone('kin-phone', 'Enter a phone number for your next of kin', 'Next of kin phone number', true);
  }

  if (pageId === 'disability-info') {
    if (!D['assistive-device'] || !D['assistive-device'].trim()) errors.push({ id: 'assistive-device', msg: "Enter your assistive device, or write None" });
    if (!D['nature-of-disability'] || !D['nature-of-disability'].trim()) errors.push({ id: 'nature-of-disability', msg: 'Describe the nature of your disability' });
    if (!D['health-condition'] || !D['health-condition'].trim()) errors.push({ id: 'health-condition', msg: 'Describe your health condition' });
    if (!D['nature-of-request'] || !D['nature-of-request'].trim()) errors.push({ id: 'nature-of-request', msg: 'Describe the assistance you need' });
  }

  if (pageId === 'household') {
    if (!D['household-number'] || !D['household-number'].trim()) errors.push({ id: 'household-number', msg: 'Enter the number of people in your household' });
    if (!D['evacuation-needed']) errors.push({ id: 'evacuation-needed', msg: 'Select yes or no – would you need evacuation in an emergency?' });
    if (!D['vehicle-access']) errors.push({ id: 'vehicle-access', msg: 'Select yes or no – can your home be accessed by vehicle?' });
  }

  if (pageId === 'employment') {
    if (!D['employment-status']) errors.push({ id: 'employment-status', msg: 'Select your current employment status' });
    if (D['employment-status'] === 'Other' && (!D['employment-status-other'] || !D['employment-status-other'].trim())) {
      errors.push({ id: 'employment-status-other', msg: 'Describe your employment status' });
    }
    if (!D['seeking-employment']) errors.push({ id: 'seeking-employment', msg: 'Select yes or no – are you seeking employment?' });
    if (D['seeking-employment'] === 'Yes' && (!D['job-interests'] || !D['job-interests'].trim())) {
      errors.push({ id: 'job-interests', msg: 'Enter your job interests or skills' });
    }
  }

  if (pageId === 'transportation') {
    if (!D['appt-date-day'] || !D['appt-date-month'] || !D['appt-date-year']) {
      errors.push({ id: 'appt-date-day', msg: 'Appointment date – Enter a complete appointment date' });
    } else {
      const ad = parseInt(D['appt-date-day'], 10), am = parseInt(D['appt-date-month'], 10), ay = parseInt(D['appt-date-year'], 10);
      const ap = new Date(ay, am - 1, ad);
      if (ap.getFullYear() !== ay || ap.getMonth() !== am - 1 || ap.getDate() !== ad) {
        errors.push({ id: 'appt-date-day', msg: 'Appointment date – Enter a real date, for example 15 6 2026' });
      } else {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        if (ap < today) {
          errors.push({ id: 'appt-date-day', msg: 'Appointment date must be today or in the future' });
        }
      }
    }
    if (!D['pickup-time'] || !D['pickup-time'].trim()) errors.push({ id: 'pickup-time', msg: 'Enter the pickup time' });
    if (!D['destination'] || !D['destination'].trim()) errors.push({ id: 'destination', msg: 'Enter the destination' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  getFlow: function() {
    if (needsTransport()) {
      // Insert 'transportation' page before 'check'
      const flow = BASE_FLOW.slice();
      const checkIdx = flow.indexOf('check');
      flow.splice(checkIdx, 0, 'transportation');
      return flow;
    }
    return BASE_FLOW;
  },
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    if (name === 'request-type') GovBB.render();
    if (name === 'seeking-employment') GovBB.render();
  }
});
</script>

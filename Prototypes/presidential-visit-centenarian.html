<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Presidential Visit for a Centenarian – Office of the President</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>
<body class="govbb-page">

<div class="govbb-official-banner">
  <div class="govbb-container govbb-official-banner__inner">
    <div class="govbb-official-banner__crest">
      <img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" />
    </div>
    <div class="govbb-official-banner__text"><span>Official government website</span></div>
  </div>
</div>

<header class="govbb-header">
  <div class="govbb-container govbb-header__inner">
    <a href="/" aria-label="Go to the alpha.gov.bb homepage">
      <img class="govbb-header__logo" src="../dist/assets/images/govbb-logo.svg" alt="GovBB" />
    </a>
  </div>
</header>

<main class="govbb-page__main">
  <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-label="alpha status banner" aria-live="polite">
    <div class="govbb-container">
      <p>This page is in <a class="govbb-link govbb-link--secondary" href="#">Alpha</a>. Your feedback helps us improve.</p>
    </div>
  </div>
  <div class="govbb-container" id="app" style="padding-block: var(--spacing-l); max-width: 48rem;"></div>
</main>

<footer class="govbb-footer">
  <div class="govbb-container govbb-footer__inner">
    <nav class="govbb-footer__nav" aria-label="Footer">
      <a class="govbb-footer__link" href="#">Home</a>
      <a class="govbb-footer__link" href="#">Privacy</a>
      <a class="govbb-footer__link" href="#">Terms &amp; Conditions</a>
      <a class="govbb-footer__link" href="#">Accessibility</a>
    </nav>
    <hr class="govbb-footer__divider" aria-hidden="true" />
    <div class="govbb-footer__end">
      <img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" />
      <p class="govbb-footer__copy">© 2025 Government of Barbados</p>
    </div>
  </div>
</footer>

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary'); if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors(); if (!errors||!errors.length) return;
  var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>';});
  html+='</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin',html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el=document.getElementById(e.id); if(!el)return;
    var errId='err-'+e.id; el.setAttribute('aria-invalid','true'); el.setAttribute('aria-describedby',errId);
    var msg=document.createElement('p'); msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if(group)group.appendChild(msg);
  });
  if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;
};
GovBB.summaryRow = function(label,value,changeTo){
  var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
/* ───────── Form-specific configuration ───────── */
const FORM_NAME = 'Request for a Presidential Visit to a Centenarian';

const FLOW = [
  'start',
  'centenarian-info',
  'addresses',
  'visit-and-contact',
  'upload-documents',
  'check',
  'declaration',
  'confirmation'
];

/* ───────── Parish select using govbb-select pattern ───────── */
function parishSelect(id, label) {
  const value = GovBB.D[id] || '';
  const opts = GovBB.PARISHES.map(p =>
    `<option value="${p}"${value === p ? ' selected' : ''}>${p}</option>`
  ).join('');
  return `
  <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
    <label class="govbb-label" for="${id}">${label}</label>
    <div class="govbb-select-wrapper">
      <select class="govbb-select" id="${id}" name="${id}" data-field="${id}">
        <option value="">Select a parish</option>
        ${opts}
      </select>
      <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
    </div>
  </div>`;
}

/* ───────── Address block (line 1, line 2, parish) ───────── */
function addressBlock(prefix) {
  return `
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="${prefix}-line1">Address line 1</label>
      <div class="govbb-input-wrapper">
        <input class="govbb-input" type="text" id="${prefix}-line1" name="${prefix}-line1" data-field="${prefix}-line1" value="${GovBB.D[prefix+'-line1']||''}" />
      </div>
    </div>
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="${prefix}-line2">Address line 2 (optional)</label>
      <div class="govbb-input-wrapper">
        <input class="govbb-input" type="text" id="${prefix}-line2" name="${prefix}-line2" data-field="${prefix}-line2" value="${GovBB.D[prefix+'-line2']||''}" />
      </div>
    </div>
    ${parishSelect(prefix + '-parish', 'Parish')}`;
}

/* ───────── Display helpers ───────── */
function formatDate(prefix) {
  const d = GovBB.D;
  const day = d[prefix + '-day'], month = d[prefix + '-month'], year = d[prefix + '-year'];
  if (!day || !month || !year) return '—';
  return day + ' / ' + month + ' / ' + year;
}

function centenarianFullName() {
  return GovBB.D['cen-fullname'] || '—';
}

function addressDisplay(prefix) {
  const d = GovBB.D;
  return [d[prefix + '-line1'], d[prefix + '-line2'], d[prefix + '-parish']].filter(Boolean).join(', ') || '—';
}

function visitAddressDisplay() {
  if (GovBB.D['visit-same'] === 'Yes') return 'Same as home address';
  return addressDisplay('visit');
}

function contactFullName() {
  return GovBB.D['contact-fullname'] || '—';
}

function checkTick(checked) {
  return checked
    ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
    : '';
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">Office of the President</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Request a Presidential Visit for a Centenarian</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Use this service to ask the President, Lieutenant Colonel Jeffrey Bostic, to visit a Barbadian who is turning 100 years old.</p>

      <div style="border-left:4px solid var(--color-yellow-00);padding:var(--spacing-s);background:var(--color-yellow-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin:0;">You must submit this request at least 3 months before the birthday.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The centenarian's full name and date of birth</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The centenarian's home address and the address for the visit if different</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Name, address, and phone number of the person to contact about the arrangements</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Scans or photos of the required documents (see below)</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Documents you'll need to upload</h2>
      <ul style="margin-bottom:var(--spacing-s);padding-left:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Original birth certificate with names included <span style="color:var(--color-mid-grey-00);">(required for all centenarians)</span></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Original marriage certificate(s) if she is or has been married <span style="color:var(--color-mid-grey-00);">(female centenarians only)</span></li>
      </ul>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">If there is a discrepancy in the documents, an affidavit may also be required.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">How to apply</h2>
      <h3 class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Apply online</h3>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Most people finish this in about 10 minutes.</p>
      ${GovBB.startBtn('Start now')}

      <div style="display:flex;align-items:center;gap:var(--spacing-m);margin:var(--spacing-m) 0;">
        <hr style="flex:1;border-color:var(--color-grey-00);">
        <span class="govbb-text-body" style="color:var(--color-mid-grey-00);font-weight:var(--font-weight-bold);">OR</span>
        <hr style="flex:1;border-color:var(--color-grey-00);">
      </div>

      <h3 class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Apply by post</h3>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Write a letter with the centenarian's name, date of birth, home address, visit address (if different), and the name, address, and phone number of the contact person. Include the required original documents and send to:</p>
      <address style="font-style:normal;background:var(--color-grey-00);padding:var(--spacing-s);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body">Private Secretary to the President<br>
        Office of the President<br>
        State House<br>
        Government Hill<br>
        St Michael</p>
      </address>
    </div>`,

  /* ── Centenarian info: name + DOB + sex ── */
  'centenarian-info': () => `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">Office of the President</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Tell us about the centenarian</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="cen-fullname">Full name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="cen-fullname" name="cen-fullname" data-field="cen-fullname" value="${GovBB.D['cen-fullname']||''}" />
        </div>
      </div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Date of birth</legend>
        <p class="govbb-hint">For example, 27 03 1925</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="cen-dob-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="cen-dob-day" name="cen-dob-day" data-field="cen-dob-day" inputmode="numeric" value="${GovBB.D['cen-dob-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="cen-dob-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="cen-dob-month" name="cen-dob-month" data-field="cen-dob-month" inputmode="numeric" value="${GovBB.D['cen-dob-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="cen-dob-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="cen-dob-year" name="cen-dob-year" data-field="cen-dob-year" inputmode="numeric" value="${GovBB.D['cen-dob-year']||''}" /></div>
          </div>
        </div>
      </fieldset>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">What is the sex of the centenarian?</legend>
        <p class="govbb-hint">This determines which documents you need to upload.</p>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="centenarian-gender-male" name="centenarian-gender" data-field="centenarian-gender" value="Male"${GovBB.D['centenarian-gender']==='Male'?' checked':''} />
            <label class="govbb-radio-item__label" for="centenarian-gender-male">Male</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="centenarian-gender-female" name="centenarian-gender" data-field="centenarian-gender" value="Female"${GovBB.D['centenarian-gender']==='Female'?' checked':''} />
            <label class="govbb-radio-item__label" for="centenarian-gender-female">Female</label>
          </div>
        </div>
      </fieldset>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Addresses: home + visit (conditional inline) ── */
  'addresses': () => {
    const showVisit = GovBB.D['visit-same'] && GovBB.D['visit-same'] !== 'Yes';
    return `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">Office of the President</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Where does the centenarian live?</h1>

      ${addressBlock('home')}

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Will the visit take place at this address?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="visit-same-yes" name="visit-same" data-field="visit-same" value="Yes"${GovBB.D['visit-same']==='Yes'?' checked':''} />
            <label class="govbb-radio-item__label" for="visit-same-yes">Yes</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="visit-same-no" name="visit-same" data-field="visit-same" value="No – the visit will be at a different address"${GovBB.D['visit-same']==='No – the visit will be at a different address'?' checked':''} />
            <label class="govbb-radio-item__label" for="visit-same-no">No – the visit will be at a different address</label>
          </div>
        </div>
      </fieldset>

      ${showVisit ? `
      <div style="border-left:4px solid var(--color-blue-40);padding-left:var(--spacing-s);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);color:var(--color-mid-grey-00);margin-bottom:var(--spacing-s);">Address for the visit</p>
        ${addressBlock('visit')}
      </div>` : ''}

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`;
  },

  /* ── Contact person + email (merged) ── */
  'visit-and-contact': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">Office of the President</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Who should we contact about the arrangements?</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Give us the details of the person the Office of the President should contact.</p>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="contact-fullname">Full name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="contact-fullname" name="contact-fullname" data-field="contact-fullname" value="${GovBB.D['contact-fullname']||''}" />
        </div>
      </div>

      ${addressBlock('contact')}

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="contact-tel">Phone number</label>
        <p class="govbb-hint">For example, 246-555-1234</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="tel" id="contact-tel" name="contact-tel" data-field="contact-tel" placeholder="246-" value="${GovBB.D['contact-tel']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="contact-email">Email address</label>
        <p class="govbb-hint">We'll send you a confirmation of your request. For example, name@example.com</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="email" id="contact-email" name="contact-email" data-field="contact-email" value="${GovBB.D['contact-email']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  /* ── Upload documents ── */
  'upload-documents': () => {
    const isFemale = GovBB.D['centenarian-gender'] === 'Female';
    const birthFile = GovBB.D['birth-cert-file'] || '';
    const marriageFile = GovBB.D['marriage-cert-file'] || '';
    return `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">Office of the President</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Upload your documents</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Upload a scan or clear photo. Accepted formats: PDF, JPG, PNG. Max 5MB per file.</p>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="birth-cert-input">Birth certificate</label>
        <p class="govbb-hint">Original birth certificate with names included. Required for all centenarians.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="file" id="birth-cert-input" name="birth-cert" accept=".pdf,.jpg,.jpeg,.png"
            onchange="handleFileUpload('birth-cert-input','birth-cert-file')" />
        </div>
        ${birthFile ? `<p style="color:var(--color-green-00);font-weight:var(--font-weight-bold);margin-top:var(--spacing-xs);">✓ ${birthFile}</p>` : ''}
      </div>

      ${isFemale ? `
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="marriage-cert-input">Marriage certificate(s) <span style="font-weight:normal;color:var(--color-mid-grey-00);">(if she is or has been married)</span></label>
        <p class="govbb-hint">Upload if applicable. Add files one at a time.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="file" id="marriage-cert-input" name="marriage-cert" accept=".pdf,.jpg,.jpeg,.png"
            onchange="handleFileUpload('marriage-cert-input','marriage-cert-file')" />
        </div>
        ${marriageFile ? `<p style="color:var(--color-green-00);font-weight:var(--font-weight-bold);margin-top:var(--spacing-xs);">✓ ${marriageFile}</p>` : ''}
      </div>` : ''}

      <div style="background:var(--color-blue-10);padding:var(--spacing-s);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">If any names differ across documents</p>
        <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin:0;">An affidavit may be required. The Office of the President will contact you if this is needed.</p>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`;
  },

  /* ── Check your answers ── */
  'check': () => `
    <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
    <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before sending</h1>

    <section style="margin-bottom:var(--spacing-m);">
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About the centenarian</h2>
      <dl>
        ${GovBB.summaryRow('Full name', centenarianFullName(), 'centenarian-info')}
        ${GovBB.summaryRow('Date of birth', formatDate('cen-dob'), 'centenarian-info')}
        ${GovBB.summaryRow('Sex', GovBB.D['centenarian-gender'] || '—', 'centenarian-info')}
      </dl>
    </section>

    <section style="margin-bottom:var(--spacing-m);">
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Addresses</h2>
      <dl>
        ${GovBB.summaryRow('Home address', addressDisplay('home'), 'addresses')}
        ${GovBB.summaryRow('Visit address', visitAddressDisplay(), 'addresses')}
      </dl>
    </section>

    <section style="margin-bottom:var(--spacing-m);">
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact person</h2>
      <dl>
        ${GovBB.summaryRow('Name', contactFullName(), 'visit-and-contact')}
        ${GovBB.summaryRow('Address', addressDisplay('contact'), 'visit-and-contact')}
        ${GovBB.summaryRow('Phone', GovBB.D['contact-tel'] || '—', 'visit-and-contact')}
        ${GovBB.summaryRow('Email', GovBB.D['contact-email'] || '—', 'visit-and-contact')}
      </dl>
    </section>

    <section style="margin-bottom:var(--spacing-m);">
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Documents uploaded</h2>
      <dl>
        ${GovBB.summaryRow('Birth certificate', GovBB.D['birth-cert-file'] || '—', 'upload-documents')}
        ${GovBB.D['centenarian-gender'] === 'Female' ? GovBB.summaryRow('Marriage certificate(s)', GovBB.D['marriage-cert-file'] || 'Not uploaded', 'upload-documents') : ''}
      </dl>
    </section>

    <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
      <button type="button" class="govbb-btn" onclick="next()">Continue to declaration</button>
      <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
    </div>`,

  /* ── Declaration ── */
  'declaration': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">Office of the President</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>

      <div style="background:var(--color-grey-00);padding:var(--spacing-s);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">By submitting this request, I confirm that:</p>
        <ul style="padding-left:var(--spacing-m);">
          <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The information I have given is correct to the best of my knowledge</li>
          <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">I understand the request must be received at least 3 months before the birthday</li>
          <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The documents I have uploaded are true copies of the originals</li>
        </ul>
      </div>

      <div style="margin-bottom:var(--spacing-m);">
        <div id="declaration-error" style="display:none;color:var(--color-red-00);font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-s);" role="alert"></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
          <input class="govbb-checkbox" type="checkbox" id="declaration-confirm-btn" name="declaration-confirm-btn" data-field="declaration-confirmed"${GovBB.D['declaration-confirmed']==='yes'?' checked':''}
            onchange="GovBB.D['declaration-confirmed']=this.checked?'yes':'';GovBB.render();" />
          <label class="govbb-checkbox-item__label" for="declaration-confirm-btn">I confirm this is true and I agree to the declaration above</label>
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit request</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  /* ── Confirmation ── */
  'confirmation': () => {
    const ref = window.__refNumber || ('PVC-' + Math.random().toString(36).substring(2,8).toUpperCase());
    window.__refNumber = ref;
    return `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Request submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number: <strong>${ref}</strong></p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">The Office of the President will review your request and contact the person you named to discuss the arrangements.</p>
      <p class="govbb-text-body">If you don't hear back within 4 weeks, contact the Office of the President directly.</p>
    </div>`;
  }
};

/* ───────── File upload helper ───────── */
function handleFileUpload(inputId, dataKey) {
  const input = document.getElementById(inputId);
  if (input && input.files && input.files.length > 0) {
    GovBB.D[dataKey] = input.files[0].name;
    GovBB.render();
  }
}

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'centenarian-info') {
    if (!D['cen-fullname']) errors.push({ id: 'cen-fullname', msg: 'Full name – Enter the centenarian\'s full name' });
    const day = parseInt(D['cen-dob-day'], 10), month = parseInt(D['cen-dob-month'], 10), year = parseInt(D['cen-dob-year'], 10);
    if (!D['cen-dob-day'] || !D['cen-dob-month'] || !D['cen-dob-year']) {
      errors.push({ id: 'cen-dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    } else if (isNaN(day) || isNaN(month) || isNaN(year) || day < 1 || day > 31 || month < 1 || month > 12 || year < 1900) {
      errors.push({ id: 'cen-dob-day', msg: 'Date of birth – Enter a valid date of birth' });
    } else {
      const parsed = new Date(year, month - 1, day);
      if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
        errors.push({ id: 'cen-dob-day', msg: 'Date of birth – Enter a real date, for example 27 03 1925' });
      } else if (parsed >= new Date()) {
        errors.push({ id: 'cen-dob-day', msg: 'Date of birth – The date of birth must be in the past' });
      } else {
        const today = new Date();
        let age = today.getFullYear() - year;
        if (today.getMonth() < month - 1 || (today.getMonth() === month - 1 && today.getDate() < day)) age--;
        if (age < 99 || age > 100) {
          errors.push({ id: 'cen-dob-day', msg: 'Date of birth – The centenarian must be turning or have turned 100. Check the date of birth is correct.' });
        }
      }
    }
    if (!D['centenarian-gender']) errors.push({ id: 'centenarian-gender-male', msg: 'Sex – Choose male or female' });
  }

  if (pageId === 'addresses') {
    if (!D['home-line1'])  errors.push({ id: 'home-line1',  msg: 'Address line 1 – Enter the first line of the home address' });
    if (!D['home-parish']) errors.push({ id: 'home-parish', msg: 'Parish – Choose a parish' });
    if (!D['visit-same'])  errors.push({ id: 'visit-same-yes',  msg: 'Visit location – Choose where the visit will take place' });
    if (D['visit-same'] && D['visit-same'] !== 'Yes') {
      if (!D['visit-line1'])  errors.push({ id: 'visit-line1',  msg: 'Address line 1 – Enter the first line of the visit address' });
      if (!D['visit-parish']) errors.push({ id: 'visit-parish', msg: 'Parish – Choose a parish for the visit address' });
    }
  }

  if (pageId === 'visit-and-contact') {
    if (!D['contact-fullname']) errors.push({ id: 'contact-fullname', msg: 'Full name – Enter the contact person\'s full name' });
    if (!D['contact-line1'])  errors.push({ id: 'contact-line1',  msg: 'Address line 1 – Enter the contact person\'s address' });
    if (!D['contact-parish']) errors.push({ id: 'contact-parish', msg: 'Parish – Choose a parish' });
    if (!D['contact-tel'])    errors.push({ id: 'contact-tel',    msg: 'Phone number – Enter a phone number' });
    if (!D['contact-email']) {
      errors.push({ id: 'contact-email', msg: 'Email address – Enter your email address' });
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(D['contact-email'])) {
      errors.push({ id: 'contact-email', msg: 'Email address – Enter a valid email address, like name@example.com' });
    }
  }

  if (pageId === 'upload-documents') {
    if (!D['birth-cert-file']) errors.push({ id: 'birth-cert-input', msg: 'Birth certificate – Upload the birth certificate' });
  }

  if (pageId === 'declaration') {
    if (D['declaration-confirmed'] !== 'yes') {
      const errEl = document.getElementById('declaration-error');
      if (errEl) { errEl.textContent = 'You must confirm the declaration before submitting'; errEl.style.display = ''; }
      errors.push({ id: 'declaration-confirm-btn', msg: 'Declaration – Tick the box to confirm the declaration' });
    }
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    if (name === 'visit-same') GovBB.render();
  },
});
</script>
</body>
</html>

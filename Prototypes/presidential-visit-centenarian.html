<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Presidential visit for a centenarian – Office of the President</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>
<body class="govbb-page">

<div class="govbb-official-banner">
  <div class="govbb-container govbb-official-banner__inner">
    <div class="govbb-official-banner__crest">
      <img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" />
    </div>
    <div class="govbb-official-banner__text"><span>Official government website</span></div>
  </div>
</div>

<header class="govbb-header">
  <div class="govbb-container govbb-header__inner">
    <a href="/" aria-label="Go to the alpha.gov.bb homepage">
      <img class="govbb-header__logo" src="../dist/assets/images/govbb-logo.svg" alt="GovBB" />
    </a>
  </div>
</header>

<main class="govbb-page__main">
  <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-label="alpha status banner" aria-live="polite">
    <div class="govbb-container">
      <p>This page is in <a class="govbb-link govbb-link--secondary" href="#">Alpha</a>. Your feedback helps us improve.</p>

<footer class="govbb-footer">
  <div class="govbb-container govbb-footer__inner">
    <nav class="govbb-footer__nav" aria-label="Footer">
      <a class="govbb-footer__link" href="#">Home</a>
      <a class="govbb-footer__link" href="#">Privacy</a>

    <hr class="govbb-footer__divider" aria-hidden="true" />
    <div class="govbb-footer__end">
      <img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" />
      <p class="govbb-footer__copy">© 2025 Government of Barbados</p>
    </div>
  </div>
</footer>

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary'); if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors(); if (!errors||!errors.length) return;
  var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>';});
  html+='</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin',html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el=document.getElementById(e.id); if(!el)return;
    var errId='err-'+e.id; el.setAttribute('aria-invalid','true'); el.setAttribute('aria-describedby',errId);
    var msg=document.createElement('p'); msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if(group)group.appendChild(msg);
  });
  if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;
};
GovBB.summaryRow = function(label,value,changeTo){
  var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
/* ───────── Form-specific configuration ───────── */
const FORM_NAME = 'Request a Presidential visit for a centenarian';

const FLOW = [
  'start',
  'centenarian-info',
  'addresses',
  'visit-and-contact',
  'documents',
  'check',
  'declaration',
  'confirmation'
];

/* ───────── Previous + Continue button pair ───────── */
function btnGroup(continueLabel) {
  return `<div class="govbb-btn-group" data-keep-previous="1" style="margin-top:var(--spacing-l);display:flex;gap:var(--spacing-s);align-items:center;flex-wrap:wrap;">
    <button type="button" class="govbb-btn--secondary" onclick="back()" style="display:inline-flex;">Previous</button>
    <button type="button" class="govbb-btn" onclick="next()">${continueLabel || 'Continue'}</button>
  </div>`;
}

/* ───────── Parish select using govbb-select pattern ───────── */
function parishSelect(id, label) {
  const value = GovBB.D[id] || '';
  const opts = GovBB.PARISHES.map(p =>
    `<option value="${p}"${value === p ? ' selected' : ''}>${p}</option>`
  ).join('');
  return `
  <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
    <label class="govbb-label" for="${id}">${label}</label>
    <div class="govbb-select-wrapper">
      <select class="govbb-select" id="${id}" name="${id}" data-field="${id}">
        <option value="">Select a parish</option>
        ${opts}
      </select>
      <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
    </div>
  </div>`;
}

/* ───────── Address block (facility, line 1, line 2, parish) ───────── */
function addressBlock(prefix) {
  return `
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="${prefix}-building">Name of building, facility, or care home (optional)</label>
      <p class="govbb-hint">For example, "Geriatric Hospital" or "St James Care Home". Leave blank if not applicable.</p>
      <div class="govbb-input-wrapper">
        <input class="govbb-input" type="text" id="${prefix}-building" name="${prefix}-building" data-field="${prefix}-building" value="${GovBB.D[prefix+'-building']||''}" />
      </div>
    </div>
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="${prefix}-line1">Address line 1</label>
      <p class="govbb-hint">For example, "12 Highland Avenue" or "PO Box 274, Bridgetown".</p>
      <div class="govbb-input-wrapper">
        <input class="govbb-input" type="text" id="${prefix}-line1" name="${prefix}-line1" data-field="${prefix}-line1" value="${GovBB.D[prefix+'-line1']||''}" />
      </div>
    </div>
    <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
      <label class="govbb-label" for="${prefix}-line2">Address line 2 (optional)</label>
      <div class="govbb-input-wrapper">
        <input class="govbb-input" type="text" id="${prefix}-line2" name="${prefix}-line2" data-field="${prefix}-line2" value="${GovBB.D[prefix+'-line2']||''}" />
      </div>
    </div>
    ${parishSelect(prefix + '-parish', 'Parish')}`;
}

/* ───────── Display helpers ───────── */
function formatDate(prefix) {
  const d = GovBB.D;
  const day = d[prefix + '-day'], month = d[prefix + '-month'], year = d[prefix + '-year'];
  if (!day || !month || !year) return '—';
  return day + ' / ' + month + ' / ' + year;
}

function centenarianFullName() {
  const parts = [GovBB.D['cen-first'], GovBB.D['cen-other'], GovBB.D['cen-surname']].filter(Boolean);
  return parts.length ? parts.join(' ') : '—';
}

function addressDisplay(prefix) {
  const d = GovBB.D;
  return [d[prefix + '-building'], d[prefix + '-line1'], d[prefix + '-line2'], d[prefix + '-parish']].filter(Boolean).join(', ') || '—';
}

/* Months between today and next birthday for given DOB y/m/d */
function monthsToNextBirthday(year, month, day) {
  const today = new Date(); today.setHours(0,0,0,0);
  let next = new Date(today.getFullYear(), month - 1, day);
  if (next < today) next = new Date(today.getFullYear() + 1, month - 1, day);
  const msPerDay = 86400000;
  return Math.round((next - today) / msPerDay / 30.44);
}
function daysToNextBirthday(year, month, day) {
  const today = new Date(); today.setHours(0,0,0,0);
  let next = new Date(today.getFullYear(), month - 1, day);
  if (next < today) next = new Date(today.getFullYear() + 1, month - 1, day);
  const msPerDay = 86400000;
  return Math.round((next - today) / msPerDay);
}

function visitAddressDisplay() {
  if (GovBB.D['visit-same'] === 'Yes') return 'Same as home address';
  return addressDisplay('visit');
}

function contactFullName() {
  return GovBB.D['contact-fullname'] || '—';
}

function checkTick(checked) {
  return checked
    ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
    : '';
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);">
        <ol class="govbb-breadcrumbs__list">
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li>
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Public life and ceremonial</a></li>
        </ol>
      </nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Request a Presidential visit for a centenarian</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 29 May 2026</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Ask the President to visit a Barbadian who is turning 100, or who has recently turned 100.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Submit online. No fee. Takes about <strong>10 minutes</strong>. After you submit, send the original supporting documents to the Office of the President by post or in person.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start request</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin:0;"><strong>Submit this online request — and post the original documents — at least 3 months before the birthday.</strong> The 3-month lead time is counted from when the Office has both the request <em>and</em> the documents in hand. Allow extra time for post.</p>
      </div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin:0;"><strong>A Presidential visit is at the President's discretion.</strong> The Office of the President will do its best to arrange a visit, but the President's diary, health, and other commitments may mean a visit can't be made for every request.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The centenarian's full name and date of birth</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The centenarian's home address and the address where the visit will take place (if different)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The name, address, and phone number of the person the Office should contact about arrangements</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Documents you'll need to provide</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Original birth certificate with names included <span style="color:var(--color-mid-grey-00);">(required for all centenarians)</span></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Original marriage certificate(s), if she is or has been married <span style="color:var(--color-mid-grey-00);">(female centenarians only)</span></li>
      </ul>
      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin:0;"><strong>Originals only — photocopies, scans, and emailed copies cannot be accepted.</strong> You'll get the full instructions and the address before you finish the online request.</p>
      </div>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">If there is a discrepancy in the names across documents, an affidavit may also be required. The Office of the President will contact you if this is needed.</p>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Prefer to send everything by post, or don't have internet access?</strong></p>
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">You can post a letter instead. Write the centenarian's name, date of birth, home address, visit address (if different), and the name, address, and phone number of the contact person. Include the original documents and send to:</p>
        <p class="govbb-text-body" style="margin:0;">Private Secretary to the President · Office of the President · State House · Government Hill · St Michael</p>
        <p class="govbb-text-body" style="margin:var(--spacing-s) 0 0;color:var(--color-mid-grey-00);font-size:var(--font-size-caption);">Apply online if you can — it's faster and you'll get a reference number immediately.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">After you submit this request and the Office of the President has received your original documents:</p>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Office reviews the request and confirms the centenarian's details against the documents.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A member of staff phones the contact person you named to discuss possible dates.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">You will hear from the Office within <strong>4 weeks</strong> of them receiving the documents.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If a visit can be arranged, the Office will agree a date and time with the family. The President's diary is confirmed close to the visit.</li>
      </ul>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start request</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">If you need help completing this request, get in touch with the Office of the President:</p>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Email: <a class="govbb-link" href="mailto:PrivateSecretary@barbados.gov.bb">PrivateSecretary@barbados.gov.bb</a></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Phone: <strong>536-0456</strong> (Private Secretary, direct)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Main office: <strong>536-0450</strong></li>
      </ul>
    </div>`,

  /* ── Centenarian info: name + DOB + sex ── */
  'centenarian-info': () => `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">Office of the President</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Tell us about the centenarian</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="cen-first">First name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="cen-first" name="cen-first" data-field="cen-first" value="${GovBB.D['cen-first']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="cen-other">Other names (optional)</label>
        <p class="govbb-hint">Middle names, maiden name, or any other given names on the birth certificate.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="cen-other" name="cen-other" data-field="cen-other" value="${GovBB.D['cen-other']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="cen-surname">Surname</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="cen-surname" name="cen-surname" data-field="cen-surname" value="${GovBB.D['cen-surname']||''}" />
        </div>
      </div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Date of birth</legend>
        <p class="govbb-hint">For example, 15 06 1926</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="cen-dob-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="cen-dob-day" name="cen-dob-day" data-field="cen-dob-day" inputmode="numeric" value="${GovBB.D['cen-dob-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="cen-dob-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="cen-dob-month" name="cen-dob-month" data-field="cen-dob-month" inputmode="numeric" value="${GovBB.D['cen-dob-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="cen-dob-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="cen-dob-year" name="cen-dob-year" data-field="cen-dob-year" inputmode="numeric" value="${GovBB.D['cen-dob-year']||''}" /></div>
          </div>
        </div>
      </fieldset>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">What is the sex of the centenarian?</legend>
        <p class="govbb-hint">This determines which documents you need to provide.</p>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="centenarian-gender-male" name="centenarian-gender" data-field="centenarian-gender" value="Male"${GovBB.D['centenarian-gender']==='Male'?' checked':''} />
            <label class="govbb-radio-item__label" for="centenarian-gender-male">Male</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="centenarian-gender-female" name="centenarian-gender" data-field="centenarian-gender" value="Female"${GovBB.D['centenarian-gender']==='Female'?' checked':''} />
            <label class="govbb-radio-item__label" for="centenarian-gender-female">Female</label>
          </div>
        </div>
      </fieldset>

      ${btnGroup()}
    </form>`,

  /* ── Addresses: home + visit (conditional inline) ── */
  'addresses': () => {
    const showVisit = GovBB.D['visit-same'] === 'No';
    return `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">Office of the President</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Where does the centenarian live?</h1>

      ${addressBlock('home')}

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Will the visit take place at this address?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="visit-same-yes" name="visit-same" data-field="visit-same" value="Yes"${GovBB.D['visit-same']==='Yes'?' checked':''} />
            <label class="govbb-radio-item__label" for="visit-same-yes">Yes</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="visit-same-no" name="visit-same" data-field="visit-same" value="No"${GovBB.D['visit-same']==='No'?' checked':''} />
            <label class="govbb-radio-item__label" for="visit-same-no">No, the visit will be at a different address</label>
          </div>
        </div>
      </fieldset>

      ${showVisit ? `
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);border-top:2px solid var(--color-grey-00);padding-top:var(--spacing-m);">
        <legend class="govbb-fieldset__legend govbb-text-h2" style="padding:0 var(--spacing-s);">Address for the visit</legend>
        ${addressBlock('visit')}
      </fieldset>` : ''}

      ${btnGroup()}
    </form>`;
  },

  /* ── Visit arrangements (contact person + visit preferences + notes) ── */
  'visit-and-contact': () => `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">Office of the President</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Visit arrangements</h1>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Who to contact</h2>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">The person the Office of the President will phone to discuss dates and arrangements.</p>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'centenarian-info') {
    if (!D['cen-first']) errors.push({ id: 'cen-first', msg: 'First name – Enter the centenarian\'s first name' });
    if (!D['cen-surname']) errors.push({ id: 'cen-surname', msg: 'Surname – Enter the centenarian\'s surname' });
    const day = parseInt(D['cen-dob-day'], 10), month = parseInt(D['cen-dob-month'], 10), year = parseInt(D['cen-dob-year'], 10);
    if (!D['cen-dob-day'] || !D['cen-dob-month'] || !D['cen-dob-year']) {
      errors.push({ id: 'cen-dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    } else if (isNaN(day) || isNaN(month) || isNaN(year) || day < 1 || day > 31 || month < 1 || month > 12 || year < 1900) {
      errors.push({ id: 'cen-dob-day', msg: 'Date of birth – Enter a valid date of birth' });
    } else {
      const parsed = new Date(year, month - 1, day);
      if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
        errors.push({ id: 'cen-dob-day', msg: 'Date of birth – Enter a real date, for example 15 06 1926' });
      } else if (parsed >= new Date()) {
        errors.push({ id: 'cen-dob-day', msg: 'Date of birth – The date of birth must be in the past' });
      } else {
        const today = new Date();
        let age = today.getFullYear() - year;
        if (today.getMonth() < month - 1 || (today.getMonth() === month - 1 && today.getDate() < day)) age--;
        if (age < 99) {
          errors.push({ id: 'cen-dob-day', msg: 'Date of birth – This form is for centenarians turning 100, or who have recently turned 100. Your person would be ' + age + '. Check the date of birth.' });
        } else if (age > 105) {
          errors.push({ id: 'cen-dob-day', msg: 'Date of birth – Your person would be ' + age + ', which looks unusually high. Check the date of birth, or call the Office of the President on 536-0456 to discuss.' });
        }
      }
    }
    if (!D['centenarian-gender']) errors.push({ id: 'centenarian-gender-male', msg: 'Sex – Choose male or female' });
  }

  if (pageId === 'addresses') {
    if (!D['home-line1'])  errors.push({ id: 'home-line1',  msg: 'Address line 1 – Enter the first line of the home address' });
    if (!D['home-parish']) errors.push({ id: 'home-parish', msg: 'Parish – Choose a parish' });
    if (!D['visit-same'])  errors.push({ id: 'visit-same-yes',  msg: 'Visit location – Choose where the visit will take place' });
    if (D['visit-same'] === 'No') {
      if (!D['visit-line1'])  errors.push({ id: 'visit-line1',  msg: 'Address line 1 – Enter the first line of the visit address' });
      if (!D['visit-parish']) errors.push({ id: 'visit-parish', msg: 'Parish – Choose a parish for the visit address' });
    } else if (D['visit-same'] === 'Yes') {
      /* Ghost-data cleanup: clear any visit-address fields if user toggled back to Yes */
      ['building','line1','line2','parish'].forEach(function(k){ delete D['visit-' + k]; });
    }
  }

  if (pageId === 'visit-and-contact') {
    if (!D['contact-fullname']) errors.push({ id: 'contact-fullname', msg: 'Full name – Enter the contact person\'s full name' });
    if (!D['contact-relationship']) errors.push({ id: 'contact-relationship', msg: 'Relationship – Enter the contact person\'s relationship to the centenarian' });
    if (!D['contact-line1'])  errors.push({ id: 'contact-line1',  msg: 'Address line 1 – Enter the contact person\'s address' });
    if (!D['contact-parish']) errors.push({ id: 'contact-parish', msg: 'Parish – Choose a parish' });
    var tel = (D['contact-tel'] || '').trim();
    if (!tel) {
      errors.push({ id: 'contact-tel', msg: 'Phone number – Enter a phone number' });
    } else {
      var telDigits = tel.replace(/[\s\-()+]/g, '');
      if (!/^\d{7,15}$/.test(telDigits)) {
        errors.push({ id: 'contact-tel', msg: 'Phone number – Must contain 7 to 15 digits, for example (246) 249 1234' });
      }
    }
    if (!D['contact-email']) {
      errors.push({ id: 'contact-email', msg: 'Email address – Enter your email address' });
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(D['contact-email'])) {
      errors.push({ id: 'contact-email', msg: 'Email address – Enter a valid email address, like name@example.com' });
    }
  }

  if (pageId === 'declaration') {
    ['accurate','lead-time','originals','discretion'].forEach(function(k){
      if (!D['decl-' + k]) errors.push({ id: 'decl-' + k, msg: 'Tick the box to confirm' });
    });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    if (name === 'visit-same') GovBB.render();
  },
});

/* Ensure the Previous button is never hidden by the framework — we want the
   user to be able to go back to the entry page from step 1 if they need to
   re-read the eligibility rules or the 3-month-lead-time advice. */
(function(){
  var _origRender = GovBB.render;
  GovBB.render = function(){
    _origRender.apply(this, arguments);
    document.querySelectorAll('[data-keep-previous="1"] .govbb-btn--secondary').forEach(function(b){
      b.style.display = 'inline-flex';
    });
  };
})();
</script>

<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
/* ───────── Form-specific configuration ───────── */
const FORM_NAME = 'NIS Online Social Security Service Registration Form';

/* ───────── Dynamic flow ───────── */
function getFlow() {
  if (GovBB.D['residency'] === 'Overseas') {
    return ['start', 'residency-gate', 'applicant-details', 'overseas-notarial', 'declaration', 'check', 'confirmation'];
  }
  return ['start', 'residency-gate', 'applicant-details', 'declaration', 'check', 'confirmation'];
}

/* ───────── Mailing address fields helper ───────── */

        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="mailing-city">City or district</label>
        <p class="govbb-hint">Optional</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="mailing-city" name="mailing-city" data-field="mailing-city" value="${GovBB.D['mailing-city']||''}" />
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="mailing-parish">Parish</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="mailing-parish" name="mailing-parish" data-field="mailing-parish">
            <option value="">Select one</option>
            ${GovBB.PARISHES.map(o=>`<option value="${o}"${GovBB.D['mailing-parish']===o?' selected':''}>` + o + '</option>').join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>

        <label class="govbb-label" for="mailing-postal">Postal code</label>
        <p class="govbb-hint">For example, BB11000</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="mailing-postal" name="mailing-postal" data-field="mailing-postal" placeholder="BB11000" value="${GovBB.D['mailing-postal']||''}" />
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="mailing-country">Country</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="mailing-country" name="mailing-country" data-field="mailing-country" value="${GovBB.D['mailing-country']||''}" />
        </div>
      </div>
    </div>`;
}

/* ───────── ID-specific fields helper ───────── */
function idFields() {
  const idType = GovBB.D['id-type'];
  if (idType === 'Barbados National ID Card') {
    return `
      <div style="border-left:4px solid var(--color-blue-40);padding-left:var(--spacing-s);">
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="nrn">National Registration Number (NRN)</label>
          <p class="govbb-hint">Your National Registration Number. For example, 870315-1234</p>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="nrn" name="nrn" data-field="nrn" placeholder="870315-1234" value="${GovBB.D['nrn']||''}" />
          </div>
        </div>
      </div>`;
  }
  if (idType === 'Passport') {
    return `
      <div style="border-left:4px solid var(--color-blue-40);padding-left:var(--spacing-s);">
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="passport-number">Passport number</label>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="passport-number" name="passport-number" data-field="passport-number" value="${GovBB.D['passport-number']||''}" />
          </div>
        </div>
        <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
          <legend class="govbb-fieldset__legend">Date issued</legend>
          <p class="govbb-hint">For example, 27 03 2007</p>
          <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-issued-day">Day</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="passport-issued-day" name="passport-issued-day" data-field="passport-issued-day" inputmode="numeric" value="${GovBB.D['passport-issued-day']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-issued-month">Month</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="passport-issued-month" name="passport-issued-month" data-field="passport-issued-month" inputmode="numeric" value="${GovBB.D['passport-issued-month']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-issued-year">Year</label>
              <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="passport-issued-year" name="passport-issued-year" data-field="passport-issued-year" inputmode="numeric" value="${GovBB.D['passport-issued-year']||''}" /></div>
            </div>
          </div>
        </fieldset>
        <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
          <legend class="govbb-fieldset__legend">Date expires</legend>
          <p class="govbb-hint">For example, 27 03 2030</p>
          <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-expired-day">Day</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="passport-expired-day" name="passport-expired-day" data-field="passport-expired-day" inputmode="numeric" value="${GovBB.D['passport-expired-day']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-expired-month">Month</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="passport-expired-month" name="passport-expired-month" data-field="passport-expired-month" inputmode="numeric" value="${GovBB.D['passport-expired-month']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-expired-year">Year</label>
              <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="passport-expired-year" name="passport-expired-year" data-field="passport-expired-year" inputmode="numeric" value="${GovBB.D['passport-expired-year']||''}" /></div>
            </div>
          </div>
        </fieldset>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="passport-country">Country of issue</label>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="passport-country" name="passport-country" data-field="passport-country" value="${GovBB.D['passport-country']||''}" />
          </div>
        </div>
      </div>`;
  }
  return '';
}

/* ───────── Today's date helper ───────── */
function todayFormatted() {
  const d = new Date();
  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

/* ───────── Summary helpers ───────── */
function formatDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '—';
  return [d, m, y].filter(Boolean).join(' / ');
}

function summarySection(title, rows) {
  const visibleRows = rows.filter(r => r !== null);
  if (!visibleRows.length) return '';
  return `
    <div style="margin-bottom:var(--spacing-m);">
      <h2 class="govbb-text-h2" style="margin-top:var(--spacing-m);margin-bottom:var(--spacing-s);">${title}</h2>
      <dl style="border-top:1px solid var(--color-grey-00);border-bottom:1px solid var(--color-grey-00);">
        ${visibleRows.join('')}
      </dl>
    </div>`;
}

  /* ── Overseas notarial ── */
  'overseas-notarial': () => `
    <form novalidate>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">

        <legend class="govbb-fieldset__legend">Date of notarisation</legend>
        <p class="govbb-hint">For example, 27 03 2026</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="notarial-date-day">Day</label>

      <div style="margin-bottom:var(--spacing-m);">

      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">

        <label class="govbb-checkbox-item__label" for="notarial-certified">I certify that the applicant's identity and signature have been verified</label>

      <p id="notarial-certified-error" class="govbb-error-message" style="display:none;">Certification – You must certify that the applicant's identity has been verified</p>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">

        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>

  /* ── Declaration ── */
  'declaration': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>

      <div style="margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Applicant's name:</strong> ${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['last-name']].filter(Boolean).join(' ') || '—'}</p>
        <p class="govbb-text-body"><strong>Date:</strong> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>

      <div style="background:var(--color-blue-10);border-left:4px solid var(--color-blue-40);padding:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">
          I declare that the information I have given in this form is true and correct to the best of my knowledge and belief.
        </p>
        <p class="govbb-text-body">
          I give NIS permission to use my email address to send me notifications about my NIS account.
        </p>
      </div>

      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
        <input class="govbb-checkbox" type="checkbox" id="email-consent" name="email-consent" data-field="email-consent"${GovBB.D['email-consent']?' checked':''} onclick="GovBB.toggleCheckbox('email-consent'); GovBB.render();" />
        <label class="govbb-checkbox-item__label" for="email-consent">I agree to receive email notifications from NIS</label>
      </div>
      <p id="email-consent-error" class="govbb-error-message" style="display:none;">Email consent – You must agree to receive email notifications to continue</p>

      <div style="background:var(--color-red-10);border-left:4px solid var(--color-red-00);padding:var(--spacing-m);margin-top:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="color:var(--color-red-00);font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Warning</p>
        <p class="govbb-text-body">Giving false information may result in prosecution.</p>
      </div>

      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
        <input class="govbb-checkbox" type="checkbox" id="declaration-agree" name="declaration-agree" data-field="declaration-agree"${GovBB.D['declaration-agree']?' checked':''} />
        <label class="govbb-checkbox-item__label" for="declaration-agree">I confirm that the information I have given is true and complete to the best of my knowledge.</label>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit registration</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  /* ── Check your answers ── */
  'check': () => {
    const D = GovBB.D;
    const idType = D['id-type'] || '';
    const isOverSeas = D['residency'] === 'Overseas';
    const mailingSame = D['mailing-same'];

    function row(label, val, page) {
      const display = val || '<span style="color:var(--color-mid-grey-00);">Not provided</span>';
      return GovBB.summaryRow(label, display, page);
    }

    const registrationRows = [
      row('Where you live', D['residency'], 'residency-gate'),
      row('Type of ID', D['id-type'], 'residency-gate'),
    ];

    const personalRows = [
      row('Last name', D['last-name'], 'applicant-details'),
      row('First name', D['first-name'], 'applicant-details'),
      D['middle-name'] ? row('Middle name(s)', D['middle-name'], 'applicant-details') : null,
      row('NIS number', D['nis-number'], 'applicant-details'),
      idType === 'Barbados National ID Card' ? row('National Registration Number', D['nrn'], 'applicant-details') : null,
      idType === 'Passport' ? row('Passport number', D['passport-number'], 'applicant-details') : null,
      idType === 'Passport' ? row('Passport date issued', formatDate('passport-issued'), 'applicant-details') : null,
      idType === 'Passport' ? row('Passport expiry date', formatDate('passport-expired'), 'applicant-details') : null,
      idType === 'Passport' ? row('Country of issue', D['passport-country'], 'applicant-details') : null,
    ].filter(Boolean);

    const homeAddressRows = [
      row('Street address', D['street-address'], 'applicant-details'),
      D['city-district'] ? row('City or district', D['city-district'], 'applicant-details') : null,
      row('Parish', D['parish'], 'applicant-details'),
      row('Postal code', D['postal-code'], 'applicant-details'),
      row('Country', D['country'], 'applicant-details'),
    ].filter(Boolean);

    const mailingRows = mailingSame
      ? [row('Mailing address', 'Same as home address', 'applicant-details')]
      : [
          row('Mailing street address', D['mailing-street'], 'applicant-details'),
          D['mailing-city'] ? row('Mailing city or district', D['mailing-city'], 'applicant-details') : null,
          row('Mailing parish', D['mailing-parish'], 'applicant-details'),
          row('Mailing postal code', D['mailing-postal'], 'applicant-details'),
          row('Mailing country', D['mailing-country'], 'applicant-details'),
        ].filter(Boolean);

    const contactRows = [
      D['phone-home'] ? row('Home phone', D['phone-home'], 'applicant-details') : null,
      row('Mobile number', D['phone-mobile'], 'applicant-details'),
      D['phone-work'] ? row('Work phone', D['phone-work'], 'applicant-details') : null,
      row('Email address', D['email'], 'applicant-details'),
    ].filter(Boolean);

    const notarialRows = isOverSeas ? [
      row('Notary Public name', D['notary-name'], 'overseas-notarial'),
      row('Jurisdiction', D['jurisdiction'], 'overseas-notarial'),
      row('Date of notarisation', formatDate('notarial-date'), 'overseas-notarial'),
      row('Identity certified', D['notarial-certified'] ? 'Yes' : 'No', 'overseas-notarial'),
    ] : [];

    return `
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before sending your registration</h1>

      ${summarySection('Registration details', registrationRows)}
      ${summarySection('Personal details', personalRows)}
      ${summarySection('Home address', homeAddressRows)}
      ${summarySection('Mailing address', mailingRows)}
      ${summarySection('Contact details', contactRows)}
      ${isOverSeas ? summarySection('Overseas notarial details', notarialRows) : ''}

      <div style="padding-top:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">By sending this registration you confirm that the information you have given is correct and complete.</p>
        <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
          <button type="button" class="govbb-btn" onclick="next()">Submit registration</button>
          <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
        </div>
      </div>`;
  },

  /* ── Confirmation ── */
  'confirmation': () => `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Registration submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference: <strong>${window.__refNumber || 'OSS-' + Math.random().toString(36).substring(2, 8).toUpperCase()}</strong></p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">We will review your registration and set up your online account.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">We will send your login details to <strong>${GovBB.D['email'] || 'your email address'}</strong> within 5 working days.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">If we need more information, we will contact you by email or phone.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Save your reference number</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Keep your reference number safe. You will need it if you contact us about your registration.</p>

      <p class="govbb-text-body"><a href="#" onclick="GovBB.nav('start'); return false;" class="govbb-link">Go back to the start</a></p>
    </div>`
};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'residency-gate') {
    if (!D['residency']) errors.push({ id: 'residency', msg: 'Where you live – Select where you currently live' });
    if (!D['id-type']) errors.push({ id: 'id-type', msg: 'Type of ID – Select what type of ID you have' });
  }

  if (pageId === 'applicant-details') {
    if (!D['last-name']) errors.push({ id: 'last-name', msg: 'Last name – Enter your last name' });
    if (!D['first-name']) errors.push({ id: 'first-name', msg: 'First name – Enter your first name' });
    if (!D['nis-number']) errors.push({ id: 'nis-number', msg: 'NIS number – Enter your NIS number' });
    else if (!/^\d{6}$/.test(D['nis-number'].trim())) errors.push({ id: 'nis-number', msg: 'NIS number – Enter a valid 6-digit NIS number' });

    if (D['id-type'] === 'Barbados National ID Card') {
      if (!D['nrn']) errors.push({ id: 'nrn', msg: 'National Registration Number – Enter your NRN' });
      else if (!/^\d{6}-\d{4}$/.test(D['nrn'].trim())) errors.push({ id: 'nrn', msg: 'National Registration Number – Enter a valid NRN in the format 870315-1234' });
    }

    if (D['id-type'] === 'Passport') {
      if (!D['passport-number']) errors.push({ id: 'passport-number', msg: 'Passport number – Enter your passport number' });
      if (!D['passport-issued-day'] || !D['passport-issued-month'] || !D['passport-issued-year']) {
        errors.push({ id: 'passport-issued-day', msg: 'Date issued – Enter the date your passport was issued' });
      }
      if (!D['passport-expired-day'] || !D['passport-expired-month'] || !D['passport-expired-year']) {
        errors.push({ id: 'passport-expired-day', msg: 'Date expires – Enter the date your passport expires' });
      }
      if (!D['passport-country']) errors.push({ id: 'passport-country', msg: 'Country of issue – Enter the country that issued your passport' });
    }

    if (!D['street-address']) errors.push({ id: 'street-address', msg: 'Street address – Enter your street address' });
    if (!D['parish']) errors.push({ id: 'parish', msg: 'Parish – Select your parish' });
    if (D['postal-code'] && D['postal-code'].trim() && !/^BB\d{5}$/i.test(D['postal-code'].trim())) errors.push({ id: 'postal-code', msg: 'Postal code – Enter a valid Barbados postal code, for example BB11000' });
    if (!D['country']) errors.push({ id: 'country', msg: 'Country – Enter your country' });

    if (!D['mailing-same']) {
      if (!D['mailing-street']) errors.push({ id: 'mailing-street', msg: 'Mailing street address – Enter your mailing street address' });
      if (!D['mailing-parish']) errors.push({ id: 'mailing-parish', msg: 'Mailing parish – Select your mailing parish' });
      if (D['mailing-postal'] && D['mailing-postal'].trim() && !/^BB\d{5}$/i.test(D['mailing-postal'].trim())) errors.push({ id: 'mailing-postal', msg: 'Mailing postal code – Enter a valid postal code, for example BB11000' });
      if (!D['mailing-country']) errors.push({ id: 'mailing-country', msg: 'Mailing country – Enter your mailing country' });
    }

    if (!D['phone-mobile']) errors.push({ id: 'phone-mobile', msg: 'Mobile number – Enter your mobile number' });
    if (!D['email']) errors.push({ id: 'email', msg: 'Email address – Enter your email address' });
    if (!D['email-confirm']) errors.push({ id: 'email-confirm', msg: 'Confirm email address – Re-enter your email address' });
    if (D['email'] && D['email-confirm'] && D['email'].trim().toLowerCase() !== D['email-confirm'].trim().toLowerCase()) {
      errors.push({ id: 'email-confirm', msg: 'Confirm email address – Email addresses do not match' });
    }
  }

  if (pageId === 'overseas-notarial') {
    if (!D['notary-name']) errors.push({ id: 'notary-name', msg: 'Notary Public name – Enter the name of the Notary Public' });
    if (!D['jurisdiction']) errors.push({ id: 'jurisdiction', msg: 'Jurisdiction – Enter the jurisdiction' });
    if (!D['notarial-date-day'] || !D['notarial-date-month'] || !D['notarial-date-year']) {
      errors.push({ id: 'notarial-date-day', msg: 'Date of notarisation – Enter the date of notarisation' });
    }
    if (!D['notarial-certified']) {
      errors.push({ id: 'notarial-certified-error', msg: 'Certification – You must certify that the applicant\'s identity has been verified' });
      // Show the inline error too
      setTimeout(() => {
        const el = document.getElementById('notarial-certified-error');
        if (el) el.style.display = '';
      }, 50);
    }
  }

  if (pageId === 'declaration') {
    if (!D['email-consent']) {
      errors.push({ id: 'email-consent-error', msg: 'Email consent – You must agree to receive email notifications to continue' });
      setTimeout(() => {
        const el = document.getElementById('email-consent-error');
        if (el) el.style.display = '';
      }, 50);
    }
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: ['start', 'residency-gate', 'applicant-details', 'declaration', 'check', 'confirmation'],
  pages: PAGES,
  validate: validate,
  getFlow: getFlow,
  onRadioChange: function(name, value) {
    if (name === 'residency' || name === 'id-type') {
      setTimeout(() => {
        const currentPage = GovBB._currentPage || 'residency-gate';
        if (currentPage === 'applicant-details') {
          GovBB.render();
        }
      }, 10);
    }
  }
});
</script>

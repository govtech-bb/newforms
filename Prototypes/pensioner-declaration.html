<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>

/* ───────── Today's date helper ───────── */
function getTodayFormatted() {
  const d = new Date();
  const day = String(d.getDate()).padStart(2, '0');
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const year = d.getFullYear();
  return day + ' / ' + month + ' / ' + year;
}

/* ───────── Check if a person is 60+ from DOB fields ───────── */
function isAgeValid(day, month, year) {
  if (!day || !month || !year || year.length < 4) return false;
  const dob = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
  const today = new Date();
  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
    age--;
  }
  return age >= 60;
}

      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">Central Bank of Barbados</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>

      <div style="margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Applicant's name:</strong> ${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['last-name']].filter(Boolean).join(' ') || '—'}</p>
        <p class="govbb-text-body"><strong>Date:</strong> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
      </div>

      <div style="background:var(--color-blue-10);border-left:4px solid var(--color-blue-40);padding:var(--spacing-m);border-radius:4px;margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-style:italic;">"I declare that I am 60 years of age or over and that I reside in Barbados, and that the information provided is true and correct to the best of my knowledge."</p>
      </div>

      <hr style="border-color:var(--color-grey-00);margin-bottom:var(--spacing-m);" />

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Witness details</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Your witness must sign this form to confirm they have seen you sign it.</p>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="witness-name">Witness full name (print clearly)</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="witness-name" name="witness-name" data-field="witness-name" value="${GovBB.D['witness-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="witness-occupation">Witness occupation</label>
        <p class="govbb-hint">Choose the role that best describes your witness.</p>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="witness-occupation" name="witness-occupation" data-field="witness-occupation" data-trigger-render="1">
            <option value="">Choose an option</option>
            ${witnessOccupations.map(o=>`<option value="${o}"${GovBB.D['witness-occupation']===o?' selected':''}>${o}</option>`).join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      ${showOtherField ? `
      <div style="padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);margin-bottom:var(--spacing-m);">
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="witness-occupation-other">Describe the witness's occupation</label>
          <p class="govbb-hint">Tell us what the witness does for work.</p>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="witness-occupation-other" name="witness-occupation-other" data-field="witness-occupation-other" value="${GovBB.D['witness-occupation-other']||''}" />
          </div>
        </div>
      </div>` : ''}

      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-m);">
        <input class="govbb-checkbox" type="checkbox" id="declaration-agree" name="declaration-agree" data-field="declaration-agree"${GovBB.D['declaration-agree']?' checked':''} />
        <label class="govbb-checkbox-item__label" for="declaration-agree">I confirm that the information I have given is true and complete to the best of my knowledge.</label>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="application-date">Date of application</label>
        <p class="govbb-hint">This is today's date. It is filled in for you.</p>
        <div class="govbb-input-wrapper" style="max-width:280px;">
          <input class="govbb-input" type="text" id="application-date" name="application-date" value="${GovBB.D['application-date'] || today}" readonly style="background:var(--color-light-grey-00);color:var(--color-mid-grey-00);" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit declaration</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`;
  },

  /* ── Check your answers page ── */
  'check': () => {
    const D = GovBB.D;
    const dobVal = [D['dob-day'], D['dob-month'], D['dob-year']].filter(Boolean).join(' / ');
    const addressParts = [D['street-address'], D['district'], D['parish'], D['postal-code']].filter(Boolean);
    const witnessOccDisplay = D['witness-occupation'] === 'Other' && D['witness-occupation-other']
      ? 'Other – ' + D['witness-occupation-other']
      : (D['witness-occupation'] || '');
    return `
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before sending your declaration</h1>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Eligibility</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Aged 60 or older', D['age-eligible'] || '', 'eligibility')}
        ${GovBB.summaryRow('Resident in Barbados', D['residency-eligible'] || '', 'eligibility')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Personal details</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('First name', D['first-name'] || '', 'applicant-details')}
        ${D['middle-name'] ? GovBB.summaryRow('Middle name(s)', D['middle-name'], 'applicant-details') : ''}
        ${GovBB.summaryRow('Last name', D['last-name'] || '', 'applicant-details')}
        ${GovBB.summaryRow('Date of birth', dobVal, 'applicant-details')}
        ${GovBB.summaryRow('National Registration Number', D['nrn'] || '', 'applicant-details')}
        ${GovBB.summaryRow('National Insurance Number', D['nis-number'] || '', 'applicant-details')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Address</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Address', addressParts.join(', '), 'applicant-details')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact details</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Landline', D['phone-landline'] || '', 'applicant-details')}
        ${D['phone-mobile'] ? GovBB.summaryRow('Mobile', D['phone-mobile'], 'applicant-details') : ''}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Pension details</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Source of pension', D['source-of-pension'] || '', 'pension-details')}
        ${GovBB.summaryRow('Pension reference number', D['pension-ref'] || '', 'pension-details')}
        ${GovBB.summaryRow('Central Bank account reference', D['cb-account-ref'] || '', 'pension-details')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Declaration and witness</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Witness name', D['witness-name'] || '', 'declaration')}
        ${GovBB.summaryRow('Witness occupation', witnessOccDisplay, 'declaration')}
        ${GovBB.summaryRow('Date of application', D['application-date'] || '', 'declaration')}
      </dl>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">By submitting this declaration, you confirm that the information you have given is true and correct to the best of your knowledge.</p>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit declaration</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>`;
  },

  /* ── Confirmation page ── */
  'confirmation': () => `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Declaration submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${window.__refNumber || 'PD-' + Math.random().toString(36).substring(2, 8).toUpperCase()}</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">We will review your declaration and contact you within 10 working days.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Keep your reference number safe. You will need it if you contact us about your declaration.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">You will need to renew this declaration every 2 years. We will remind you when it is time.</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">If you have questions</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Contact the Central Bank of Barbados if you have questions about your declaration.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">
        <strong>Phone:</strong> (246) 436-6870<br>
        <strong>Address:</strong> Tom Adams Financial Centre, Spry Street, Bridgetown, Barbados
      </p>

      <a href="#" onclick="GovBB.nav('start'); return false;" class="govbb-link">Return to the start page</a>
    </div>`
};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'eligibility') {
    if (!D['age-eligible']) {
      errors.push({ id: 'age-eligible-yes', msg: 'Age eligibility – Tell us if you are 60 years old or older' });
    }
    if (!D['residency-eligible']) {
      errors.push({ id: 'residency-eligible-yes', msg: 'Residency eligibility – Tell us if you currently live in Barbados' });
    }
    return errors;
  }

  if (pageId === 'applicant-details') {
    if (!D['first-name'] || D['first-name'].trim() === '') {
      errors.push({ id: 'first-name', msg: 'First name – Enter your first name' });
    }
    if (!D['last-name'] || D['last-name'].trim() === '') {
      errors.push({ id: 'last-name', msg: 'Last name – Enter your last name' });
    }
    if (!D['dob-day'] || D['dob-day'].trim() === '') {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter the day you were born' });
    }
    if (!D['dob-month'] || D['dob-month'].trim() === '') {
      errors.push({ id: 'dob-month', msg: 'Date of birth – Enter the month you were born' });
    }
    if (!D['dob-year'] || D['dob-year'].trim() === '') {
      errors.push({ id: 'dob-year', msg: 'Date of birth – Enter the year you were born' });
    }
    if (D['dob-day'] && D['dob-month'] && D['dob-year'] && D['dob-year'].length >= 4) {
      if (!isAgeValid(D['dob-day'], D['dob-month'], D['dob-year'])) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – You must be 60 years old or older to use this form' });
      }
    }
    if (!D['nrn'] || D['nrn'].trim() === '') {
      errors.push({ id: 'nrn', msg: 'National Registration Number – Enter your National Registration Number' });
    }
    if (!D['nis-number'] || D['nis-number'].trim() === '') {
      errors.push({ id: 'nis-number', msg: 'National Insurance Number – Enter your National Insurance Number' });
    }
    if (D['nis-number'] && !/^\d{6}$/.test(D['nis-number'].trim())) {
      errors.push({ id: 'nis-number', msg: 'National Insurance Number – Enter a 6-digit number, for example 123456' });
    }
    if (!D['street-address'] || D['street-address'].trim() === '') {
      errors.push({ id: 'street-address', msg: 'Street address – Enter your street address' });
    }
    if (!D['parish'] || D['parish'].trim() === '') {
      errors.push({ id: 'parish', msg: 'Parish – Choose your parish' });
    }
    if (!D['phone-landline'] || D['phone-landline'].trim() === '') {
      errors.push({ id: 'phone-landline', msg: 'Landline phone number – Enter your landline phone number' });
    }
    return errors;
  }

  if (pageId === 'pension-details') {
    if (!D['source-of-pension'] || D['source-of-pension'].trim() === '') {
      errors.push({ id: 'source-of-pension', msg: 'Source of pension – Tell us where your pension comes from' });
    }
    if (!D['pension-ref'] || D['pension-ref'].trim() === '') {
      errors.push({ id: 'pension-ref', msg: 'Pension reference number – Enter your pension reference number' });
    }
    if (!D['cb-account-ref'] || D['cb-account-ref'].trim() === '') {
      errors.push({ id: 'cb-account-ref', msg: 'Central Bank account reference – Enter your account reference number' });
    }
    return errors;
  }

  if (pageId === 'declaration') {
    if (!D['witness-name'] || D['witness-name'].trim() === '') {
      errors.push({ id: 'witness-name', msg: 'Witness name – Enter the witness\'s full name' });
    }
    if (!D['witness-occupation'] || D['witness-occupation'].trim() === '') {
      errors.push({ id: 'witness-occupation', msg: 'Witness occupation – Choose the witness\'s occupation' });
    }
    if (D['witness-occupation'] === 'Other' && (!D['witness-occupation-other'] || D['witness-occupation-other'].trim() === '')) {
      errors.push({ id: 'witness-occupation-other', msg: 'Witness occupation – Describe the witness\'s occupation' });
    }
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
    return errors;
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name, value) {
    if (name === 'age-eligible' || name === 'residency-eligible') {
      GovBB.render();
    }
  }
});
</script>
</body>
</html>

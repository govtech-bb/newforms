<script>
GovBB.clearErrors=function(){var s=document.getElementById('error-summary');if(s)s.remove();document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});};
GovBB.showErrors=function(errors){GovBB.clearErrors();if(!errors||!errors.length)return;var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>';});html+='</ul></div>';var app=document.getElementById('app');var h1=app.querySelector('h1');if(h1)h1.insertAdjacentHTML('afterend',html);else app.insertAdjacentHTML('afterbegin',html);document.getElementById('error-summary').focus();errors.forEach(function(e){var el=document.getElementById(e.id);if(!el)return;var errId='err-'+e.id;el.setAttribute('aria-invalid','true');el.setAttribute('aria-describedby',errId);var msg=document.createElement('p');msg.className='govbb-error-message';msg.id=errId;msg.textContent=e.msg;var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;if(group)group.appendChild(msg);});if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;};
GovBB.summaryRow=function(label,value,changeTo){var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';};

<script>
function next(){GovBB.next();}function back(){GovBB.back();}function nav(p){GovBB.nav(p);}

const SECONDARY_SCHOOLS=['Alexandra Secondary School','Alleyne School','Christ Church Foundation','Coleridge and Parry','Combermere','Daryl Jordan Secondary','Deighton Griffith Secondary','Ellerslie Secondary','Frederick Smith','Grantley Adams Memorial','Graydon Sealy Secondary','Harrison College','Parkinson Secondary','Princess Margaret Secondary','Queen\'s College','Springer Memorial','St George Secondary','St Leonard\'s Boys\' Secondary','The Lester Vaughan School','The Lodge School','The St Michael School'];
const CURRENT_PLACEMENT=SECONDARY_SCHOOLS.concat(['Bursary (placement deferred)']);

const FLOW=['start','guardian-details','child-details','current-placement','reallocation-choices','reason','evidence','declaration','check','confirmation'];

function caption(){return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+CAPTION+'</p>';}
function maskNid(nid){if(!nid)return '';var m=String(nid).trim().match(/^(\d{6})-(\d{4})$/);return m?'••••••-'+m[2]:String(nid).trim();}
function formatPhone(p){if(!p)return '';var digits=String(p).replace(/[^\d]/g,'');if(digits.length===10&&digits.indexOf('246')===0)return '(246) '+digits.substring(3,6)+' '+digits.substring(6);return String(p).trim();}
function fmtDate(prefix){const d=GovBB.D[prefix+'-day'],m=GovBB.D[prefix+'-month'],y=GovBB.D[prefix+'-year'];if(!d&&!m&&!y)return '';return [d,m,y].filter(Boolean).join(' / ');}
function parseDate(prefix){const d=parseInt(GovBB.D[prefix+'-day'],10),m=parseInt(GovBB.D[prefix+'-month'],10),y=parseInt(GovBB.D[prefix+'-year'],10);if(!d||!m||!y)return null;if(d<1||d>31||m<1||m>12||y<2000||y>2100)return false;const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return false;return dt;}
function guardianName(){return [GovBB.D['guardian-title'],GovBB.D['guardian-first'],GovBB.D['guardian-surname']].filter(Boolean).join(' ');}
function childName(){return [GovBB.D['child-first'],GovBB.D['child-other'],GovBB.D['child-surname']].filter(Boolean).join(' ');}

function handleUpload(key,input){const file=input.files&&input.files[0];if(!file)return;if(file.size>10*1024*1024){alert('File is larger than 10 MB.');input.value='';return;}GovBB.D['upload-'+key]={name:file.name,size:file.size,type:file.type};GovBB.render();}
function removeUpload(key){delete GovBB.D['upload-'+key];GovBB.render();}
function formatBytes(n){if(n<1024)return n+' B';if(n<1024*1024)return (n/1024).toFixed(1)+' KB';return (n/(1024*1024)).toFixed(1)+' MB';}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uploadRow(key,label,hint){var file=GovBB.D['upload-'+key];if(file){return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);border-left:4px solid var(--color-green-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}<p class="govbb-text-body" style="margin:0;font-size:var(--font-size-caption);color:var(--color-mid-grey-00);word-break:break-all;"><span aria-hidden="true">✓ </span>${escapeHtml(file.name)} (${formatBytes(file.size)})</p></div><button type="button" class="govbb-btn--link" style="flex-shrink:0;" onclick="removeUpload('${key}')">Remove<span class="govbb-visually-hidden"> ${label}</span></button></div>`;}return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;flex:1;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}</div><label for="upload-${key}" class="govbb-btn--secondary" style="flex-shrink:0;cursor:pointer;margin:0;">Upload file</label><input type="file" id="upload-${key}" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleUpload('${key}', this)" /></div>`;}

function dateField(prefix,legend,hint){return `<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">${legend}</legend>${hint?`<p class="govbb-hint">${hint}</p>`:''}<div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;"><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-day">Day</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-month">Month</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-year">Year</label><div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div></div></div></fieldset>`;}

const PAGES = {
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);"><ol class="govbb-breadcrumbs__list"><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Education and schooling</a></li></ol></nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Request a BSSEE reallocation</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 29 May 2026</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">If your child has been allocated to a secondary school you would like to change after the BSSEE results have been published, you can ask the Ministry to reallocate them.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Apply online. No fee. Takes about <strong>10 minutes</strong>.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start request</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Reallocation is not guaranteed.</strong> It depends on whether there is space at the schools you request. The Ministry will do its best but cannot promise a particular school.</p>
      </div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Reallocation requests are time-limited.</strong> Submit within the window the Ministry announces after BSSEE results — usually a few weeks. Late requests will not be considered for the September intake.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your name, National ID Number, and contact details</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your child's name, date of birth, and primary school</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your child's BSSEE composite score and candidate number (helpful but not required)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The school your child is currently allocated to</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Up to 2 schools you would like your child to be reallocated to, in order of preference</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A clear explanation of why you are requesting the reallocation</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A scan or photo of your child's BSSEE results slip and birth certificate</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Ministry reviews your request alongside the available places at the schools you've chosen.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">You will be told the outcome by letter and email before the September intake.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If your request is approved, the new allocation replaces the original.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If your request is declined, the original allocation stands.</li>
      </ul>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body">Other BSSEE forms: <a class="govbb-link" href="bssee-choice.html">choose secondary schools</a>, <a class="govbb-link" href="bssee-defer.html">defer for a year (Form B)</a>, <a class="govbb-link" href="bssee-early-sitter.html">sit early (Form A)</a>, <a class="govbb-link" href="bssee-special-request.html">special accommodation (Form C)</a>.</p>
      </div>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start request</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call the Ministry on <strong>(246) 535-1284</strong> or email <a class="govbb-link" href="mailto:mist.forms@barbados.gov.bb">mist.forms@barbados.gov.bb</a>.</p>
    </div>`,

  'guardian-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you (parent or guardian)</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-title">Title</label><div class="govbb-select-wrapper"><select class="govbb-select" id="guardian-title" name="guardian-title" data-field="guardian-title"><option value="">Select a title</option>${TITLES.map(t=>`<option value="${t}"${GovBB.D['guardian-title']===t?' selected':''}>${t}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-first">First name</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="guardian-first" name="guardian-first" data-field="guardian-first" autocomplete="given-name" value="${GovBB.D['guardian-first']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-surname">Surname</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="guardian-surname" name="guardian-surname" data-field="guardian-surname" autocomplete="family-name" value="${GovBB.D['guardian-surname']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-nid">National ID Number</label><p class="govbb-hint">For example, 110915-0048.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="guardian-nid" name="guardian-nid" data-field="guardian-nid" value="${GovBB.D['guardian-nid']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-rel">Relationship to the child</label><div class="govbb-select-wrapper"><select class="govbb-select" id="guardian-rel" name="guardian-rel" data-field="guardian-rel"><option value="">Select one</option>${RELATIONSHIPS.map(r=>`<option value="${r}"${GovBB.D['guardian-rel']===r?' selected':''}>${r}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-address">Home address</label><textarea class="govbb-textarea" id="guardian-address" name="guardian-address" data-field="guardian-address" rows="3">${GovBB.D['guardian-address']||''}</textarea></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-parish">Parish</label><div class="govbb-select-wrapper"><select class="govbb-select" id="guardian-parish" name="guardian-parish" data-field="guardian-parish"><option value="">Select a parish</option>${PARISHES.map(p=>`<option value="${p}"${GovBB.D['guardian-parish']===p?' selected':''}>${p}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-phone">Mobile number</label><p class="govbb-hint">For example, (246) 249 1234.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="tel" id="guardian-phone" name="guardian-phone" data-field="guardian-phone" inputmode="tel" autocomplete="tel" value="${GovBB.D['guardian-phone']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-email">Email address</label><div class="govbb-input-wrapper"><input class="govbb-input" type="email" id="guardian-email" name="guardian-email" data-field="guardian-email" inputmode="email" autocomplete="email" value="${GovBB.D['guardian-email']||''}" /></div></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'child-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About your child</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="child-first">First name</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-first" name="child-first" data-field="child-first" value="${GovBB.D['child-first']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="child-other">Other names (optional)</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-other" name="child-other" data-field="child-other" value="${GovBB.D['child-other']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="child-surname">Surname</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-surname" name="child-surname" data-field="child-surname" value="${GovBB.D['child-surname']||''}" /></div></div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">Sex</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-xs);"><div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="child-sex-m" name="child-sex" data-field="child-sex" value="Male"${GovBB.D['child-sex']==='Male'?' checked':''} /><label class="govbb-radio-item__label" for="child-sex-m">Male</label></div><div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="child-sex-f" name="child-sex" data-field="child-sex" value="Female"${GovBB.D['child-sex']==='Female'?' checked':''} /><label class="govbb-radio-item__label" for="child-sex-f">Female</label></div></div></fieldset>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="child-primary">Primary school attended</label><div class="govbb-select-wrapper"><select class="govbb-select" id="child-primary" name="child-primary" data-field="child-primary"><option value="">Select a primary school</option>${PRIMARY_SCHOOLS.map(s=>`<option value="${s}"${GovBB.D['child-primary']===s?' selected':''}>${s}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="bssee-score">BSSEE composite score (optional)</label><p class="govbb-hint">From the results slip.</p><div class="govbb-input-wrapper" style="max-width:8rem;"><input class="govbb-input" type="text" id="bssee-score" name="bssee-score" data-field="bssee-score" inputmode="decimal" value="${GovBB.D['bssee-score']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="candidate-no">Candidate number (optional)</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="candidate-no" name="candidate-no" data-field="candidate-no" value="${GovBB.D['candidate-no']||''}" /></div></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'current-placement': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Current placement</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="current-school">School currently allocated to</label><p class="govbb-hint">The school the Ministry assigned your child to in the BSSEE results.</p><div class="govbb-select-wrapper"><select class="govbb-select" id="current-school" name="current-school" data-field="current-school"><option value="">Select a school</option>${CURRENT_PLACEMENT.map(s=>`<option value="${s}"${GovBB.D['current-school']===s?' selected':''}>${s}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'reallocation-choices': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Schools you'd like to be reallocated to</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Pick up to two schools, in order of preference. The Ministry will look at availability at the first choice; if no place, the second.</p>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="choice-1">First choice</label><div class="govbb-select-wrapper"><select class="govbb-select" id="choice-1" name="choice-1" data-field="choice-1"><option value="">Select a school</option>${SECONDARY_SCHOOLS.map(s=>`<option value="${s}"${GovBB.D['choice-1']===s?' selected':''}>${s}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="choice-2">Second choice (optional)</label><div class="govbb-select-wrapper"><select class="govbb-select" id="choice-2" name="choice-2" data-field="choice-2"><option value="">Select a school (or leave blank)</option>${SECONDARY_SCHOOLS.map(s=>`<option value="${s}"${GovBB.D['choice-2']===s?' selected':''}>${s}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'reason': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Why are you requesting this reallocation?</h1>
      <div style="border-left:4px solid var(--color-blue-40);padding:var(--spacing-s) var(--spacing-m);background:var(--color-blue-10);margin-bottom:var(--spacing-m);"><p class="govbb-text-body"><strong>Be specific.</strong> The Ministry assesses requests on the merits of the reason. Common valid reasons include transportation, family circumstances, a sibling at the requested school, a specific programme offering, or medical need.</p></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="reason-detail">Detailed reason</label><textarea class="govbb-textarea" id="reason-detail" name="reason-detail" data-field="reason-detail" rows="6">${GovBB.D['reason-detail']||''}</textarea></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="supporting-notes">Supporting evidence — notes (optional)</label><p class="govbb-hint">Summarise any documents you're uploading on the next page (medical letters, sibling enrolment confirmation, etc.).</p><textarea class="govbb-textarea" id="supporting-notes" name="supporting-notes" data-field="supporting-notes" rows="3">${GovBB.D['supporting-notes']||''}</textarea></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'evidence': () => `${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Upload supporting documents</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Accepted formats: PDF, JPG, PNG, DOC. Maximum size: 10 MB per file.</p>
      ${uploadRow('results', 'BSSEE results slip (required)', 'A scan or clear photo.')}
      ${uploadRow('birth-cert', 'Child\'s birth certificate (required)', '')}
      ${uploadRow('supporting', 'Supporting document (optional)', 'Medical letter, sibling enrolment confirmation, etc.')}
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>`,

  'declaration': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Before you submit, please confirm the following.</p>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-visually-hidden">Declaration</legend>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-accurate" name="decl-accurate" data-field="decl-accurate"${GovBB.D['decl-accurate']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-accurate">The information I have given is true and correct to the best of my knowledge.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-not-guaranteed" name="decl-not-guaranteed" data-field="decl-not-guaranteed"${GovBB.D['decl-not-guaranteed']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-not-guaranteed">I understand that reallocation is subject to the availability of places at the schools requested and is not guaranteed.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-original" name="decl-original" data-field="decl-original"${GovBB.D['decl-original']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-original">If my request is declined, I accept that the original allocation will stand.</label></div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue to review</button></div>
    </form>`,

  'check': () => `<div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before submitting</h1>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Parent or guardian</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Name', guardianName(), 'guardian-details')}
        ${GovBB.summaryRow('National ID', maskNid(GovBB.D['guardian-nid']), 'guardian-details')}
        ${GovBB.summaryRow('Relationship to child', GovBB.D['guardian-rel'], 'guardian-details')}
        ${GovBB.summaryRow('Address', GovBB.D['guardian-address'], 'guardian-details')}
        ${GovBB.summaryRow('Parish', GovBB.D['guardian-parish'], 'guardian-details')}
        ${GovBB.summaryRow('Mobile', formatPhone(GovBB.D['guardian-phone']), 'guardian-details')}
        ${GovBB.summaryRow('Email', GovBB.D['guardian-email'], 'guardian-details')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Child</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Name', childName(), 'child-details')}
        ${GovBB.summaryRow('Date of birth', fmtDate('child-dob'), 'child-details')}
        ${GovBB.summaryRow('Sex', GovBB.D['child-sex'], 'child-details')}
        ${GovBB.summaryRow('Primary school', GovBB.D['child-primary'], 'child-details')}
        ${GovBB.summaryRow('BSSEE composite score', GovBB.D['bssee-score'] || 'Not provided', 'child-details')}
        ${GovBB.summaryRow('Candidate number', GovBB.D['candidate-no'] || 'Not provided', 'child-details')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Placement</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Currently allocated to', GovBB.D['current-school'], 'current-placement')}
        ${GovBB.summaryRow('First choice', GovBB.D['choice-1'], 'reallocation-choices')}
        ${GovBB.summaryRow('Second choice', GovBB.D['choice-2'] || 'None', 'reallocation-choices')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Reason</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Detailed reason', GovBB.D['reason-detail'], 'reason')}
        ${GovBB.summaryRow('Supporting notes', GovBB.D['supporting-notes'] || 'Not provided', 'reason')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Documents</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${[{key:'results',label:'BSSEE results slip'},{key:'birth-cert',label:'Birth certificate'},{key:'supporting',label:'Supporting document'}].map(function(d){var f=GovBB.D['upload-'+d.key];return GovBB.summaryRow(d.label, f?escapeHtml(f.name)+' ('+formatBytes(f.size)+')':'Not uploaded', 'evidence');}).join('')}
      </dl>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="if(this.disabled)return;this.disabled=true;this.textContent='Submitting…';next();">Submit request</button></div>
    </div>`,

  'confirmation': () => {
    if (!window.__refNumber) {
      const refYear = new Date().getFullYear();
      const refNum = String(Math.floor(Math.random() * 1000000)).padStart(6, '0');
      window.__refNumber = `REL-${refYear}-${refNum}`;
    }
    const ref = window.__refNumber;
    if(document.title.indexOf('Error: ')===0)document.title=document.title.substring('Error: '.length);
    document.title='Request submitted — '+FORM_NAME;
    return `<div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Request submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${ref}</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Ministry reviews your request alongside the available places at the schools you've chosen.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">You will be told the outcome by letter and email before the September intake.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If your request is approved, the new allocation replaces the original. If declined, the original allocation stands.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">We've sent a copy of your request to ${GovBB.D['guardian-email']||'the address you provided'}.</li>
      </ul>
      <div style="display:flex;gap:var(--spacing-m);flex-wrap:wrap;margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="window.print()">Print this page</button>
        <a class="govbb-btn--link" href="../forms.html">Return to all forms</a>
      </div>
    </div>`;
  }
};

function validate(pageId){
  const D=GovBB.D,errors=[];
  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/,NID_RE=/^\d{6}-\d{4}$/;
  function req(id,msg){if(!D[id]||String(D[id]).trim()==='')errors.push({id:id,msg:msg});}
  function reqNid(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!NID_RE.test(v))errors.push({id:id,msg:label+' must be in the format 110915-0048'});}
  function reqPhone(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}var digits=v.replace(/[\s\-()+]/g,'');if(!/^\d{7,15}$/.test(digits))errors.push({id:id,msg:label+' must contain 7 to 15 digits'});}
  function reqEmail(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!EMAIL_RE.test(v))errors.push({id:id,msg:label+' must be in the format you@example.com'});}
  function reqDate(prefix,label){const d=D[prefix+'-day'],m=D[prefix+'-month'],y=D[prefix+'-year'];if(!d||!m||!y){errors.push({id:prefix+'-day',msg:label+' — enter a complete date.'});return null;}const dt=parseDate(prefix);if(dt===false){errors.push({id:prefix+'-day',msg:label+' — enter a real date.'});return null;}return dt;}

  if(pageId==='guardian-details'){
    req('guardian-title','Select a title');
    req('guardian-first','Enter your first name');
    req('guardian-surname','Enter your surname');
    reqNid('guardian-nid','National ID Number','Enter your National ID Number');
    req('guardian-rel','Select your relationship to the child');
    req('guardian-address','Enter your home address');
    req('guardian-parish','Select your parish');
    reqPhone('guardian-phone','Mobile number','Enter your mobile number');
    reqEmail('guardian-email','Email address','Enter your email address');
  }
  if(pageId==='child-details'){
    req('child-first','Enter your child\'s first name');
    req('child-surname','Enter your child\'s surname');
    const dob=reqDate('child-dob','Date of birth');
    if(dob){const today=new Date();today.setHours(0,0,0,0);const age=today.getFullYear()-dob.getFullYear();if(dob>=today)errors.push({id:'child-dob-day',msg:'Date of birth must be in the past.'});else if(age<10||age>13)errors.push({id:'child-dob-day',msg:'Date of birth — BSSEE candidates are usually 10 to 12. Check the date.'});}
    if(!D['child-sex'])errors.push({id:'child-sex-m',msg:'Select your child\'s sex'});
    req('child-primary','Select your child\'s primary school');
  }
  if(pageId==='current-placement'){
    req('current-school','Select the school your child is currently allocated to');
  }
  if(pageId==='reallocation-choices'){
    req('choice-1','Select your first-choice school');
    if(D['choice-1']&&D['choice-1']===D['current-school'])errors.push({id:'choice-1',msg:'First choice — cannot be the same as the school currently allocated. Choose a different school or leave the request.'});
    if(D['choice-2']&&D['choice-1']&&D['choice-2']===D['choice-1'])errors.push({id:'choice-2',msg:'Second choice — must be different from your first choice'});
    if(D['choice-2']&&D['choice-2']===D['current-school'])errors.push({id:'choice-2',msg:'Second choice — cannot be the same as the school currently allocated'});
  }
  if(pageId==='reason'){
    var rd=(D['reason-detail']||'').trim();
    if(!rd)errors.push({id:'reason-detail',msg:'Describe why you are requesting the reallocation'});
    else if(rd.length<60)errors.push({id:'reason-detail',msg:'Add more detail — the Ministry needs enough context to make a fair decision. At least 60 characters.'});
  }
  if(pageId==='evidence'){
    if(!D['upload-results'])errors.push({id:'upload-results',msg:'Upload your child\'s BSSEE results slip'});
    if(!D['upload-birth-cert'])errors.push({id:'upload-birth-cert',msg:'Upload your child\'s birth certificate'});
  }
  if(pageId==='declaration'){
    ['accurate','not-guaranteed','original'].forEach(function(k){if(!D['decl-'+k])errors.push({id:'decl-'+k,msg:'Tick the box to confirm'});});
  }
  return errors;
}

GovBB.init({formName:FORM_NAME,flow:FLOW,pages:PAGES,validate:validate});
</script>

<script>
GovBB.clearErrors=function(){var s=document.getElementById('error-summary');if(s)s.remove();document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});};
GovBB.showErrors=function(errors){GovBB.clearErrors();if(!errors||!errors.length)return;var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>';});html+='</ul></div>';var app=document.getElementById('app');var h1=app.querySelector('h1');if(h1)h1.insertAdjacentHTML('afterend',html);else app.insertAdjacentHTML('afterbegin',html);document.getElementById('error-summary').focus();errors.forEach(function(e){var el=document.getElementById(e.id);if(!el)return;var errId='err-'+e.id;el.setAttribute('aria-invalid','true');el.setAttribute('aria-describedby',errId);var msg=document.createElement('p');msg.className='govbb-error-message';msg.id=errId;msg.textContent=e.msg;var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;if(group)group.appendChild(msg);});if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;};
GovBB.summaryRow=function(label,value,changeTo){var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';};

<script>
function next(){GovBB.next();}function back(){GovBB.back();}function nav(p){GovBB.nav(p);}

const FORM_NAME='Apply for placement in a 6th Form school';
const CAPTION='Ministry of Educational Transformation';
const PARISHES=['Christ Church','St. Andrew','St. George','St. James','St. John','St. Joseph','St. Lucy','St. Michael','St. Peter','St. Philip','St. Thomas'];
const RELATIONSHIPS=['Mother','Father','Legal guardian','Grandparent','Other'];
const SECONDARY_SCHOOLS=['Alexandra Secondary School','Alleyne','Christ Church Foundation','Coleridge and Parry','Combermere','Daryl Jordan Secondary','Deighton Griffith Secondary','Ellerslie Secondary','Frederick Smith','Grantley Adams Memorial','Graydon Sealy Secondary','Harrison College','Parkinson Secondary','Princess Margaret Secondary','Queen\'s College','Springer Memorial','St George Secondary','St Leonard\'s Boys\' Secondary','The Lester Vaughan School','The Lodge School','The St Michael School'];
const SIXTH_FORM_SCHOOLS=['Alexandra School','Alleyne School','Christ Church Foundation','Combermere','Ellerslie School','Harrison College','Queen\'s College','Springer Memorial','St. Leonard\'s Boys\' Secondary School','The Lodge School','The St. Michael School'];
const CAPE_SUBJECTS=['Accounting','Applied Mathematics','Art & Design','Biology','Building & Mechanical Engineering Drawing','Caribbean Studies','Chemistry','Communication Studies','Computer Science','Design & Technology','Economics','Entrepreneurship','Environmental Science','Food & Nutrition','French','Geography','Green Engineering','History','Information Technology','Law','Literatures in English','Management of Business','Performing Arts','Physical Education & Sport','Physics','Pure Mathematics','Sociology','Spanish','Technical Drawing','Tourism','Animation & Game Design','Electrical & Electronic Engineering Technology','Musical Performance','Agricultural Science'];

const FLOW=['start','student-info','current-school','csec-results','parent-details','school-choices','cape-subjects','evidence','declaration','check','confirmation'];

function caption(){return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+CAPTION+'</p>';}
function maskNid(nid){if(!nid)return '';var m=String(nid).trim().match(/^(\d{6})-(\d{4})$/);return m?'••••••-'+m[2]:String(nid).trim();}
function formatPhone(p){if(!p)return '';var digits=String(p).replace(/[^\d]/g,'');if(digits.length===10&&digits.indexOf('246')===0)return '(246) '+digits.substring(3,6)+' '+digits.substring(6);return String(p).trim();}
function fmtDate(prefix){const d=GovBB.D[prefix+'-day'],m=GovBB.D[prefix+'-month'],y=GovBB.D[prefix+'-year'];if(!d&&!m&&!y)return '';return [d,m,y].filter(Boolean).join(' / ');}
function parseDate(prefix){const d=parseInt(GovBB.D[prefix+'-day'],10),m=parseInt(GovBB.D[prefix+'-month'],10),y=parseInt(GovBB.D[prefix+'-year'],10);if(!d||!m||!y)return null;if(d<1||d>31||m<1||m>12||y<1990||y>2100)return false;const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return false;return dt;}
function studentName(){return [GovBB.D['first-name'],GovBB.D['surname']].filter(Boolean).join(' ');}

function handleUpload(key,input){const file=input.files&&input.files[0];if(!file)return;if(file.size>10*1024*1024){alert('File is larger than 10 MB.');input.value='';return;}GovBB.D['upload-'+key]={name:file.name,size:file.size,type:file.type};GovBB.render();}
function removeUpload(key){delete GovBB.D['upload-'+key];GovBB.render();}
function formatBytes(n){if(n<1024)return n+' B';if(n<1024*1024)return (n/1024).toFixed(1)+' KB';return (n/(1024*1024)).toFixed(1)+' MB';}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uploadRow(key,label,hint){var file=GovBB.D['upload-'+key];if(file){return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);border-left:4px solid var(--color-green-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}<p class="govbb-text-body" style="margin:0;font-size:var(--font-size-caption);color:var(--color-mid-grey-00);word-break:break-all;"><span aria-hidden="true">✓ </span>${escapeHtml(file.name)} (${formatBytes(file.size)})</p></div><button type="button" class="govbb-btn--link" style="flex-shrink:0;" onclick="removeUpload('${key}')">Remove<span class="govbb-visually-hidden"> ${label}</span></button></div>`;}return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;flex:1;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}</div><label for="upload-${key}" class="govbb-btn--secondary" style="flex-shrink:0;cursor:pointer;margin:0;">Upload file</label><input type="file" id="upload-${key}" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleUpload('${key}', this)" /></div>`;}

function dateField(prefix,legend,hint){return `<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">${legend}</legend>${hint?`<p class="govbb-hint">${hint}</p>`:''}<div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;"><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-day">Day</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-month">Month</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-year">Year</label><div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div></div></div></fieldset>`;}

const PAGES = {
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);"><ol class="govbb-breadcrumbs__list"><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Education and schooling</a></li></ol></nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Apply for placement in a 6th Form school</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 29 May 2026</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">If you've completed CSEC and want to continue your studies at a public secondary school that offers Sixth Form (CAPE), use this form to apply.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Apply online. No fee. Takes about <strong>15 minutes</strong>.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Placement is not guaranteed.</strong> It depends on the availability of spaces and the entry requirements of each school. Each school sets its own minimum grades for each subject.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your name, National ID Number, date of birth, sex, and contact details</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your current or previous secondary school</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your CSEC subjects and grades (the form accepts Grades I, II, and III as passes)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A parent or guardian's name and contact details (if you're under 18)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Up to 4 Sixth Form school choices, in order of preference</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The CAPE subjects you want to study (typically 3 to 5)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A scan or photo of: your CSEC results slip, your birth certificate, and your national ID (if 16 or over)</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Ministry reviews your application against each chosen school's entry requirements.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Each school confirms which students it can take.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">You'll be told your placement by letter and email before the September intake.</li>
      </ul>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call the Ministry on <strong>(246) 535-1284</strong> or email <a class="govbb-link" href="mailto:mist.forms@barbados.gov.bb">mist.forms@barbados.gov.bb</a>.</p>
    </div>`,

  'student-info': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="surname">Surname</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="surname" name="surname" data-field="surname" autocomplete="family-name" value="${GovBB.D['surname']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="first-name">First name(s)</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="first-name" name="first-name" data-field="first-name" autocomplete="given-name" value="${GovBB.D['first-name']||''}" /></div></div>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">Sex</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-xs);"><div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="sex-m" name="sex" data-field="sex" value="Male"${GovBB.D['sex']==='Male'?' checked':''} /><label class="govbb-radio-item__label" for="sex-m">Male</label></div><div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="sex-f" name="sex" data-field="sex" value="Female"${GovBB.D['sex']==='Female'?' checked':''} /><label class="govbb-radio-item__label" for="sex-f">Female</label></div></div></fieldset>
      ${dateField('dob','Date of birth','For example, 15 6 2007.')}
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="nid">National ID Number</label><p class="govbb-hint">For example, 070615-0048.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="nid" name="nid" data-field="nid" value="${GovBB.D['nid']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="address">Home address</label><textarea class="govbb-textarea" id="address" name="address" data-field="address" rows="3">${GovBB.D['address']||''}</textarea></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parish">Parish</label><div class="govbb-select-wrapper"><select class="govbb-select" id="parish" name="parish" data-field="parish"><option value="">Select a parish</option>${PARISHES.map(p=>`<option value="${p}"${GovBB.D['parish']===p?' selected':''}>${p}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="phone">Mobile number</label><p class="govbb-hint">For example, (246) 249 1234.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="tel" id="phone" name="phone" data-field="phone" inputmode="tel" autocomplete="tel" value="${GovBB.D['phone']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="email">Email address</label><div class="govbb-input-wrapper"><input class="govbb-input" type="email" id="email" name="email" data-field="email" inputmode="email" autocomplete="email" value="${GovBB.D['email']||''}" /></div></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'current-school': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Current or previous secondary school</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="prev-school">Where did you study for CSEC?</label><div class="govbb-select-wrapper"><select class="govbb-select" id="prev-school" name="prev-school" data-field="prev-school"><option value="">Select your school</option>${SECONDARY_SCHOOLS.map(s=>`<option value="${s}"${GovBB.D['prev-school']===s?' selected':''}>${s}</option>`).join('')}<option value="Other"${GovBB.D['prev-school']==='Other'?' selected':''}>Other (specify)</option></select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      ${GovBB.D['prev-school']==='Other'?`<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);"><label class="govbb-label" for="prev-school-other">Type the school name</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="prev-school-other" name="prev-school-other" data-field="prev-school-other" value="${GovBB.D['prev-school-other']||''}" /></div></div>`:''}
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'csec-results': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your CSEC results</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">List your CSEC subjects and grades. Grades I, II, and III count as passes. List one subject per line — for example: "Mathematics — Grade I", "English A — Grade II".</p>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="csec-results">CSEC subjects and grades</label><textarea class="govbb-textarea" id="csec-results" name="csec-results" data-field="csec-results" rows="8">${GovBB.D['csec-results']||''}</textarea></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'parent-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Parent or guardian</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Even if you're 18 or over, please give a parent or guardian as a secondary contact.</p>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parent-rel">Relationship</label><div class="govbb-select-wrapper"><select class="govbb-select" id="parent-rel" name="parent-rel" data-field="parent-rel"><option value="">Select one</option>${RELATIONSHIPS.map(r=>`<option value="${r}"${GovBB.D['parent-rel']===r?' selected':''}>${r}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parent-name">Full name</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="parent-name" name="parent-name" data-field="parent-name" autocomplete="name" value="${GovBB.D['parent-name']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parent-phone">Mobile number</label><p class="govbb-hint">For example, (246) 249 1234.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="tel" id="parent-phone" name="parent-phone" data-field="parent-phone" inputmode="tel" value="${GovBB.D['parent-phone']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parent-email">Email address</label><div class="govbb-input-wrapper"><input class="govbb-input" type="email" id="parent-email" name="parent-email" data-field="parent-email" inputmode="email" value="${GovBB.D['parent-email']||''}" /></div></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'school-choices': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Choose your 6th Form schools</h1>

  'declaration': () => `

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Before you submit, please confirm the following.</p>

        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-subjects" name="decl-subjects" data-field="decl-subjects"${GovBB.D['decl-subjects']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-subjects">I understand that the CAPE subjects I can actually study depend on the option blocks offered by the school I'm placed at.</label></div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue to review</button></div>
    </form>`,

  'check': () => `<div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before submitting</h1>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About you</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Name', studentName(), 'student-info')}
        ${GovBB.summaryRow('Sex', GovBB.D['sex'], 'student-info')}
        ${GovBB.summaryRow('Date of birth', fmtDate('dob'), 'student-info')}
        ${GovBB.summaryRow('National ID', maskNid(GovBB.D['nid']), 'student-info')}
        ${GovBB.summaryRow('Address', GovBB.D['address'], 'student-info')}
        ${GovBB.summaryRow('Parish', GovBB.D['parish'], 'student-info')}
        ${GovBB.summaryRow('Mobile', formatPhone(GovBB.D['phone']), 'student-info')}
        ${GovBB.summaryRow('Email', GovBB.D['email'], 'student-info')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Previous secondary school</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('School', GovBB.D['prev-school']==='Other'?(GovBB.D['prev-school-other']||'Other'):GovBB.D['prev-school'], 'current-school')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">CSEC results</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">${GovBB.summaryRow('Subjects and grades', GovBB.D['csec-results'], 'csec-results')}</dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Parent or guardian</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Relationship', GovBB.D['parent-rel'], 'parent-details')}
        ${GovBB.summaryRow('Name', GovBB.D['parent-name'], 'parent-details')}
        ${GovBB.summaryRow('Mobile', formatPhone(GovBB.D['parent-phone']), 'parent-details')}
        ${GovBB.summaryRow('Email', GovBB.D['parent-email'], 'parent-details')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">School choices</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${[1,2,3,4].map(function(n){return GovBB.summaryRow('Choice '+n, GovBB.D['choice-'+n] || (n===1?'Not selected':'None'), 'school-choices');}).join('')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">CAPE subjects</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${[1,2,3,4,5].map(function(n){return GovBB.summaryRow('Subject '+n, GovBB.D['cape-'+n] || (n<=3?'Not selected':'None'), 'cape-subjects');}).join('')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Documents</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${[{key:'csec',label:'CSEC results slip'},{key:'birth-cert',label:'Birth certificate'},{key:'national-id',label:'National ID'}].map(function(d){var f=GovBB.D['upload-'+d.key];return GovBB.summaryRow(d.label, f?escapeHtml(f.name)+' ('+formatBytes(f.size)+')':'Not uploaded', 'evidence');}).join('')}
      </dl>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="if(this.disabled)return;this.disabled=true;this.textContent='Submitting…';next();">Submit application</button></div>
    </div>`,

  'confirmation': () => {
    if (!window.__refNumber) {
      const refYear = new Date().getFullYear();
      const refNum = String(Math.floor(Math.random() * 1000000)).padStart(6, '0');
      window.__refNumber = `SF-${refYear}-${refNum}`;
    }
    const ref = window.__refNumber;
    if(document.title.indexOf('Error: ')===0)document.title=document.title.substring('Error: '.length);
    document.title='Application submitted — '+FORM_NAME;
    return `<div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Application submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${ref}</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Ministry reviews your application against each chosen school's entry requirements.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Each school confirms which students it can take.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">You'll be told your placement by letter and email before the September intake.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Once placed, the school will confirm which CAPE subjects you can actually take based on its option blocks.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">We've sent a copy of your application to ${GovBB.D['email']||'the address you provided'}.</li>
      </ul>
      <div style="display:flex;gap:var(--spacing-m);flex-wrap:wrap;margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="window.print()">Print this page</button>
        <a class="govbb-btn--link" href="../forms.html">Return to all forms</a>
      </div>
    </div>`;
  }
};

function validate(pageId){
  const D=GovBB.D,errors=[];
  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/,NID_RE=/^\d{6}-\d{4}$/;
  function req(id,msg){if(!D[id]||String(D[id]).trim()==='')errors.push({id:id,msg:msg});}
  function reqNid(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!NID_RE.test(v))errors.push({id:id,msg:label+' must be in the format 110915-0048'});}
  function reqPhone(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}var digits=v.replace(/[\s\-()+]/g,'');if(!/^\d{7,15}$/.test(digits))errors.push({id:id,msg:label+' must contain 7 to 15 digits'});}
  function reqEmail(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!EMAIL_RE.test(v))errors.push({id:id,msg:label+' must be in the format you@example.com'});}
  function reqDate(prefix,label){const d=D[prefix+'-day'],m=D[prefix+'-month'],y=D[prefix+'-year'];if(!d||!m||!y){errors.push({id:prefix+'-day',msg:label+' — enter a complete date.'});return null;}const dt=parseDate(prefix);if(dt===false){errors.push({id:prefix+'-day',msg:label+' — enter a real date.'});return null;}return dt;}

  if(pageId==='student-info'){
    req('surname','Enter your surname');
    req('first-name','Enter your first name');
    if(!D['sex'])errors.push({id:'sex-m',msg:'Select your sex'});
    const dob=reqDate('dob','Date of birth');
    if(dob){const today=new Date();today.setHours(0,0,0,0);const age=today.getFullYear()-dob.getFullYear();if(dob>=today)errors.push({id:'dob-day',msg:'Date of birth must be in the past.'});else if(age<15||age>25)errors.push({id:'dob-day',msg:'Date of birth — 6th Form candidates are usually 15 to 19. Check the year.'});}
    reqNid('nid','National ID Number','Enter your National ID Number');
    req('address','Enter your home address');
    req('parish','Select your parish');
    reqPhone('phone','Mobile number','Enter your mobile number');
    reqEmail('email','Email address','Enter your email address');
  }
  if(pageId==='current-school'){
    req('prev-school','Select your school');
    if(D['prev-school']==='Other')req('prev-school-other','Type the name of the school');
  }
  if(pageId==='csec-results'){
    var r=(D['csec-results']||'').trim();
    if(!r)errors.push({id:'csec-results',msg:'List your CSEC subjects and grades'});
    else if(r.length<20)errors.push({id:'csec-results',msg:'Add more detail — list each subject on a separate line with the grade.'});
  }
  if(pageId==='parent-details'){
    req('parent-rel','Select the parent or guardian\'s relationship');
    req('parent-name','Enter the parent or guardian\'s name');
    reqPhone('parent-phone','Mobile number','Enter a mobile number for the parent or guardian');
    reqEmail('parent-email','Email address','Enter an email address for the parent or guardian');
  }
  if(pageId==='school-choices'){
    req('choice-1','Select your top-choice school');
    /* All chosen schools must be different */
    const choices=[D['choice-1'],D['choice-2'],D['choice-3'],D['choice-4']].filter(Boolean);
    const seen={};
    for(let i=0;i<choices.length;i++){
      if(seen[choices[i]]){errors.push({id:'choice-'+(i+1),msg:'Choice '+(i+1)+' — must be different from your other choices'});break;}
      seen[choices[i]]=true;
    }
  }
  if(pageId==='cape-subjects'){
    for(let i=1;i<=3;i++){if(!D['cape-'+i])errors.push({id:'cape-'+i,msg:'Subject '+i+' — select a subject (at least 3 required)'});}
    /* All chosen subjects must be different */
    const subs=[1,2,3,4,5].map(function(i){return D['cape-'+i];}).filter(Boolean);
    const seen={};
    for(let i=0;i<subs.length;i++){
      if(seen[subs[i]]){errors.push({id:'cape-'+(i+1),msg:'Subject '+(i+1)+' — must be different from your other choices'});break;}
      seen[subs[i]]=true;
    }
  }
  if(pageId==='evidence'){
    if(!D['upload-csec'])errors.push({id:'upload-csec',msg:'Upload your CSEC results slip or certificate'});
    if(!D['upload-birth-cert'])errors.push({id:'upload-birth-cert',msg:'Upload your birth certificate'});
    /* If applicant is 16+, require national ID */
    const dob=parseDate('dob');
    if(dob){const today=new Date();today.setHours(0,0,0,0);const age=today.getFullYear()-dob.getFullYear();if(age>=16&&!D['upload-national-id'])errors.push({id:'upload-national-id',msg:'Upload your national ID (required because you are 16 or over)'});}
  }
  if(pageId==='declaration'){
    ['accurate','availability','subjects'].forEach(function(k){if(!D['decl-'+k])errors.push({id:'decl-'+k,msg:'Tick the box to confirm'});});
  }
  return errors;
}

GovBB.init({formName:FORM_NAME,flow:FLOW,pages:PAGES,validate:validate,onRadioChange:function(name){if(name==='prev-school')GovBB.render();}});
</script>

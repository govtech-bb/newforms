<footer class="govbb-footer">

    <nav class="govbb-footer__nav" aria-label="Footer">
      <a class="govbb-footer__link" href="#">Home</a>

      <a class="govbb-footer__link" href="#">Terms &amp; Conditions</a>

    <hr class="govbb-footer__divider" aria-hidden="true" />

      <img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" />
      <p class="govbb-footer__copy">© 2025 Government of Barbados</p>
    </div>
  </div>
</footer>

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary'); if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors(); if (!errors||!errors.length) return;
  var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>';});
  html+='</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin',html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el=document.getElementById(e.id); if(!el)return;
    var errId='err-'+e.id; el.setAttribute('aria-invalid','true'); el.setAttribute('aria-describedby',errId);
    var msg=document.createElement('p'); msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if(group)group.appendChild(msg);
  });
  if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;
};
GovBB.summaryRow = function(label,value,changeTo){
  var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
const FORM_NAME = 'Contributions Payment Certificate — Self-employed Persons';
const DEADLINE_MONTH = 0; // January
const DEADLINE_DAY = 15;

// Rows stored as array in GovBB.D['contribution-rows']
function getRows() {
  return GovBB.D['contribution-rows'] || [{ year: '', amount: '' }];
}

function saveRows(rows) {
  GovBB.D['contribution-rows'] = rows;
}

function calcLateInterest(year, amount) {
  if (!year || !amount) return 0;
  const yearNum = parseInt(year);
  const now = new Date();
  const deadline = new Date(yearNum + 1, DEADLINE_MONTH, DEADLINE_DAY);
  if (now <= deadline) return 0;
  const yearsLate = (now - deadline) / (1000 * 60 * 60 * 24 * 365.25);
  return parseFloat((parseFloat(amount) * 0.05 * Math.max(1, Math.ceil(yearsLate))).toFixed(2));
}

function isRowLate(year) {
  if (!year) return false;
  const yearNum = parseInt(year);
  const now = new Date();
  const deadline = new Date(yearNum + 1, DEADLINE_MONTH, DEADLINE_DAY);
  return now > deadline;
}

function renderContribGrid() {
  const rows = getRows();
  let total = 0;
  let totalInterest = 0;
  let anyLate = false;

  const rowsHtml = rows.map((row, i) => {
    const interest = calcLateInterest(row.year, row.amount);
    const late = isRowLate(row.year);
    if (late) anyLate = true;
    const amt = parseFloat(row.amount) || 0;
    total += amt;
    totalInterest += interest;
    return `
      <tr style="${late ? 'background:var(--color-red-10);' : ''}">
        <td style="padding:var(--spacing-xs);">
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" inputmode="numeric" maxlength="4" placeholder="YYYY"
              value="${row.year || ''}"
              oninput="updateRow(${i}, 'year', this.value)">
          </div>
        </td>
        <td style="padding:var(--spacing-xs);">
          <div class="govbb-input-wrapper" style="display:flex;align-items:center;">
            <span style="padding-left:var(--spacing-xs);color:var(--color-mid-grey-00);">$</span>
            <input class="govbb-input" type="number" min="0" step="0.01" placeholder="0.00"
              style="border:none;flex:1;"
              value="${row.amount || ''}"
              oninput="updateRow(${i}, 'amount', this.value)">
          </div>
        </td>
        ${late ? `<td style="padding:var(--spacing-xs);color:var(--color-red-00);font-weight:var(--font-weight-bold);">$${interest.toFixed(2)}<br><span style="font-size:var(--font-size-caption);font-weight:normal;">Late fee</span></td>` : '<td style="padding:var(--spacing-xs);color:var(--color-mid-grey-00);">—</td>'}
        <td style="padding:var(--spacing-xs);">
          ${rows.length > 1 ? `<button type="button" onclick="removeRow(${i})" class="govbb-btn--link" style="color:var(--color-red-00);">Remove</button>` : ''}
        </td>
      </tr>`;
  }).join('');

  const grandTotal = total + totalInterest;

  return `
    <div>
      <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-s);">Contribution years</p>
      ${anyLate ? `<div style="border-left:4px solid var(--color-yellow-00);padding:var(--spacing-s);background:var(--color-yellow-10);margin-bottom:var(--spacing-m);"><p style="font-weight:var(--font-weight-bold);">Some years are past the payment deadline</p><p>A late interest fee of 5% per year applies to contributions paid after 15 January following the contribution year.</p></div>` : ''}
      <table style="width:100%;border-collapse:collapse;margin-bottom:var(--spacing-m);">
        <thead>
          <tr style="border-bottom:2px solid var(--color-grey-00);">
            <th style="text-align:left;padding:var(--spacing-xs);">Year</th>
            <th style="text-align:left;padding:var(--spacing-xs);">Contributions Payable (BDS$)</th>
            <th style="text-align:left;padding:var(--spacing-xs);">Late Interest</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="contrib-rows">${rowsHtml}</tbody>
        <tfoot>
          <tr style="border-top:2px solid var(--color-grey-00);font-weight:var(--font-weight-bold);">
            <td style="padding:var(--spacing-xs);" colspan="1">Total</td>
            <td style="padding:var(--spacing-xs);">$${total.toFixed(2)}</td>
            <td style="padding:var(--spacing-xs);color:var(--color-red-00);">${anyLate ? '$' + totalInterest.toFixed(2) : '—'}</td>
            <td></td>
          </tr>
          ${anyLate ? `<tr style="background:var(--color-teal-10);"><td style="padding:var(--spacing-xs);font-weight:var(--font-weight-bold);" colspan="2">Total Amount Payable (incl. interest)</td><td style="padding:var(--spacing-xs);font-weight:var(--font-weight-bold);color:var(--color-teal-00);">$${grandTotal.toFixed(2)}</td><td></td></tr>` : ''}
        </tfoot>
      </table>
      <button type="button" onclick="addRow()" class="govbb-link" style="display:inline-block;">+ Add another year</button>
    </div>`;
}

function addRow() {
  const rows = getRows();
  rows.push({ year: '', amount: '' });
  saveRows(rows);
  GovBB.render();
}

function removeRow(i) {
  const rows = getRows();
  rows.splice(i, 1);
  saveRows(rows);
  GovBB.render();
}

function updateRow(i, field, value) {
  const rows = getRows();
  rows[i][field] = value;
  saveRows(rows);
}

function getTotalPayable() {
  const rows = getRows();
  let total = 0;
  rows.forEach(row => {
    total += parseFloat(row.amount) || 0;
    total += calcLateInterest(row.year, row.amount);
  });
  return total;
}

function hasAnyLate() {
  return getRows().some(row => isRowLate(row.year));
}

const PAGES = {
  'start': () => `
    <div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Pay your annual NIS contributions as a self-employed person</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">If you are self-employed, you must pay your NIS contributions every year. Use this form to submit your payment certificate.</p>
      <div style="border-left:4px solid var(--color-red-00);padding:var(--spacing-s);background:var(--color-red-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Payment deadline: 15 January each year</p>
        <p class="govbb-text-body" style="margin:0;">If you pay after 15 January, a late interest fee of 5% per year will be added to your contributions.</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you will need</h2>
      <ul style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your self-employed NIS number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The contribution years you are paying for</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The amount of contributions payable for each year</li>
      </ul>
      ${GovBB.startBtn()}
    </div>`,

  'identity': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your NIS details</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="se-nis-number">Self-employed NIS number</label>
        <p class="govbb-hint">Your 6-digit NIS number as registered under self-employment</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="se-nis-number" name="se-nis-number" data-field="se-nis-number" inputmode="numeric" maxlength="6" value="${GovBB.D['se-nis-number']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="se-name">Your name as registered with NIS</label>
        <p class="govbb-hint">Enter your name exactly as it appears on your NIS records.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="se-name" name="se-name" data-field="se-name" value="${GovBB.D['se-name']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'contributions-grid': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your contributions</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Enter the year and the amount of contributions you owe for each year. You can add multiple years.</p>
      ${renderContribGrid()}
      <div style="border:2px solid var(--color-teal-00);padding:var(--spacing-m);background:var(--color-teal-10);margin-top:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin:0;">Total amount payable: <span style="color:var(--color-teal-00);">BDS$ ${getTotalPayable().toFixed(2)}</span></p>
      </div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'declaration': () => {
    const anyLate = hasAnyLate();
    return `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>

      <div style="margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><span style="font-weight:var(--font-weight-bold);">Applicant's name:</span> ${GovBB.D['se-name'] || '—'}</p>
        <p class="govbb-text-body"><span style="font-weight:var(--font-weight-bold);">Date:</span> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
      </div>

      <div style="border-left:4px solid var(--color-blue-40);padding:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body">I declare that the contributions stated in this certificate are due and payable by me as a self-employed person registered with the National Insurance Scheme. I understand that providing false information may result in prosecution.</p>
      </div>

      ${anyLate ? `
      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
        <input class="govbb-checkbox" type="checkbox" id="late-interest-consent" name="late-interest-consent" data-field="late-interest-consent"${GovBB.D['late-interest-consent']?' checked':''} />
        <label class="govbb-checkbox-item__label" for="late-interest-consent">I understand that late interest fees apply to contributions paid after the 15 January deadline and I agree to pay the total amount including interest.</label>
      </div>` : ''}

      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
        <input class="govbb-checkbox" type="checkbox" id="declaration-agree" name="declaration-agree" data-field="declaration-agree"${GovBB.D['declaration-agree']?' checked':''} />
        <label class="govbb-checkbox-item__label" for="declaration-agree">I confirm that the information I have given is true and complete to the best of my knowledge.</label>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit certificate and pay</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`;
  },

  'check': () => {
    const rows = getRows();
    const rowsHtml = rows.map(row => {
      const interest = calcLateInterest(row.year, row.amount);
      const late = isRowLate(row.year);
      return GovBB.summaryRow(row.year || 'Year not set', 'BDS$ ' + parseFloat(row.amount || 0).toFixed(2) + (late ? ` + $${interest.toFixed(2)} interest` : ''), 'contributions-grid');
    }).join('');
    return `
    <div>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers</h1>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Your NIS details</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('NIS number', GovBB.D['se-nis-number'], 'identity')}
        ${GovBB.summaryRow('Name', GovBB.D['se-name'], 'identity')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contributions</h2>
      <dl style="margin-bottom:var(--spacing-m);">${rowsHtml}</dl>

      <div style="border:2px solid var(--color-teal-00);padding:var(--spacing-m);background:var(--color-teal-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin:0;">Total amount payable: <span style="color:var(--color-teal-00);">BDS$ ${getTotalPayable().toFixed(2)}</span></p>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit Certificate and Pay</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </div>`;
  },

  'confirmation': () => `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Certificate submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Reference: <strong>${window.__refNumber || 'SECP-' + Math.random().toString(36).substring(2,8).toUpperCase()}</strong></p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your contributions payment certificate has been recorded.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">You will receive a receipt at your registered email address.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your next contribution deadline is 15 January ${new Date().getFullYear() + 1}.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Keep your reference number safe.</li>
      </ul>
      <p class="govbb-text-body"><a href="#" onclick="GovBB.nav('start')" class="govbb-link">Return to start</a></p>
    </div>`
};

function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  if (pageId === 'identity') {
    if (!D['se-nis-number']) errors.push({ id: 'se-nis-number', msg: 'NIS number – Enter your self-employed NIS number' });
    if (!D['se-name']) errors.push({ id: 'se-name', msg: 'Name – Enter your name as registered with NIS' });
  }
  if (pageId === 'contributions-grid') {
    const rows = getRows();
    const currentYear = new Date().getFullYear();
    rows.forEach((row, i) => {
      if (!row.year) { errors.push({ id: 'contrib-rows', msg: `Row ${i+1} – Enter the contribution year` }); }
      else if (parseInt(row.year) > currentYear) { errors.push({ id: 'contrib-rows', msg: `Row ${i+1} – Year cannot be in the future` }); }
      if (!row.amount || parseFloat(row.amount) <= 0) { errors.push({ id: 'contrib-rows', msg: `Row ${i+1} – Enter a valid contribution amount` }); }
    });
  }
  if (pageId === 'declaration') {
    if (hasAnyLate() && !D['late-interest-consent']) errors.push({ id: 'late-interest-consent', msg: 'Late interest consent – You must agree to pay the late interest fees' });
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: ['start', 'identity', 'contributions-grid', 'declaration', 'check', 'confirmation'],
  pages: PAGES,
  validate: validate
});
</script>
</body>
</html>

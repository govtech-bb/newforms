<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary'); if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors(); if (!errors||!errors.length) return;
  var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>';});
  html+='</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin',html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el=document.getElementById(e.id); if(!el)return;
    var errId='err-'+e.id; el.setAttribute('aria-invalid','true'); el.setAttribute('aria-describedby',errId);
    var msg=document.createElement('p'); msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if(group)group.appendChild(msg);
  });
  if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;
};
GovBB.summaryRow = function(label,value,changeTo){
  var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
const FORM_NAME = 'Self-Employment Registration';
const COUNTRIES = ['Afghanistan','Albania','Algeria','Andorra','Angola','Antigua and Barbuda','Argentina','Armenia','Australia','Austria','Azerbaijan','Bahamas','Bahrain','Bangladesh','Barbados','Belarus','Belgium','Belize','Benin','Bhutan','Bolivia','Bosnia and Herzegovina','Botswana','Brazil','Brunei','Bulgaria','Burkina Faso','Burundi','Cabo Verde','Cambodia','Cameroon','Canada','Central African Republic','Chad','Chile','China','Colombia','Comoros','Congo','Costa Rica','Croatia','Cuba','Cyprus','Czech Republic','Denmark','Djibouti','Dominica','Dominican Republic','Ecuador','Egypt','El Salvador','Equatorial Guinea','Eritrea','Estonia','Eswatini','Ethiopia','Fiji','Finland','France','Gabon','Gambia','Georgia','Germany','Ghana','Greece','Grenada','Guatemala','Guinea','Guinea-Bissau','Guyana','Haiti','Honduras','Hungary','Iceland','India','Indonesia','Iran','Iraq','Ireland','Israel','Italy','Jamaica','Japan','Jordan','Kazakhstan','Kenya','Kiribati','Kuwait','Kyrgyzstan','Laos','Latvia','Lebanon','Lesotho','Liberia','Libya','Liechtenstein','Lithuania','Luxembourg','Madagascar','Malawi','Malaysia','Maldives','Mali','Malta','Marshall Islands','Mauritania','Mauritius','Mexico','Micronesia','Moldova','Monaco','Mongolia','Montenegro','Morocco','Mozambique','Myanmar','Namibia','Nauru','Nepal','Netherlands','New Zealand','Nicaragua','Niger','Nigeria','North Korea','North Macedonia','Norway','Oman','Pakistan','Palau','Panama','Papua New Guinea','Paraguay','Peru','Philippines','Poland','Portugal','Qatar','Romania','Russia','Rwanda','Saint Kitts and Nevis','Saint Lucia','Saint Vincent and the Grenadines','Samoa','San Marino','Sao Tome and Principe','Saudi Arabia','Senegal','Serbia','Seychelles','Sierra Leone','Singapore','Slovakia','Slovenia','Solomon Islands','Somalia','South Africa','South Korea','South Sudan','Spain','Sri Lanka','Sudan','Suriname','Sweden','Switzerland','Syria','Taiwan','Tajikistan','Tanzania','Thailand','Timor-Leste','Togo','Tonga','Trinidad and Tobago','Tunisia','Turkey','Turkmenistan','Tuvalu','Uganda','Ukraine','United Arab Emirates','United Kingdom','United States','Uruguay','Uzbekistan','Vanuatu','Vatican City','Venezuela','Vietnam','Yemen','Zambia','Zimbabwe'];

const FLOW = ['start','personal-details','business-details','declaration','check','confirmation'];

const PAGES = {
  'start': () => `
    <div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Register as a Self-Employed Person with NIS</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">If you work for yourself in Barbados, use this service to register with the National Insurance and Social Security (NIS). Once registered, you can make contributions and access NIS benefits.</p>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you will need</h2>
      <ul style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your National Registration Number or Passport</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your National Insurance Number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your business name and what your business does</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The date your business started</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your email address and mobile number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your estimated monthly income</li>
      </ul>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">It should take no longer than 10 minutes to complete this form.</p>
      ${GovBB.startBtn()}
    </div>`,

  'personal-details': () => {
    const idType = GovBB.D['id-type'] || '';
    const marital = GovBB.D['marital-status'] || '';

    const passportFields = idType === 'Passport' ? `
      <div style="border-left:4px solid var(--color-blue-40);padding-left:var(--spacing-s);margin-bottom:var(--spacing-m);">
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="passport-number">Passport Number</label>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="passport-number" name="passport-number" data-field="passport-number" value="${GovBB.D['passport-number']||''}" />
          </div>
        </div>
        <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
          <legend class="govbb-fieldset__legend">Date Issued</legend>
          <p class="govbb-hint">For example, 01 06 2015</p>
          <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-issued-day">Day</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="passport-issued-day" name="passport-issued-day" data-field="passport-issued-day" inputmode="numeric" value="${GovBB.D['passport-issued-day']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-issued-month">Month</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="passport-issued-month" name="passport-issued-month" data-field="passport-issued-month" inputmode="numeric" value="${GovBB.D['passport-issued-month']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-issued-year">Year</label>
              <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="passport-issued-year" name="passport-issued-year" data-field="passport-issued-year" inputmode="numeric" value="${GovBB.D['passport-issued-year']||''}" /></div>
            </div>
          </div>
        </fieldset>
        <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
          <legend class="govbb-fieldset__legend">Date Expired</legend>
          <p class="govbb-hint">For example, 01 06 2025</p>
          <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-expiry-day">Day</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="passport-expiry-day" name="passport-expiry-day" data-field="passport-expiry-day" inputmode="numeric" value="${GovBB.D['passport-expiry-day']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-expiry-month">Month</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="passport-expiry-month" name="passport-expiry-month" data-field="passport-expiry-month" inputmode="numeric" value="${GovBB.D['passport-expiry-month']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="passport-expiry-year">Year</label>
              <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="passport-expiry-year" name="passport-expiry-year" data-field="passport-expiry-year" inputmode="numeric" value="${GovBB.D['passport-expiry-year']||''}" /></div>
            </div>
          </div>
        </fieldset>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="passport-country">Country Issued</label>
          <div class="govbb-select-wrapper">
            <select class="govbb-select" id="passport-country" name="passport-country" data-field="passport-country">
              <option value="">Select one</option>
              ${COUNTRIES.map(c=>`<option value="${c}"${GovBB.D['passport-country']===c?' selected':''}>` + c + '</option>').join('')}
            </select>
            <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
          </div>
        </div>
      </div>` : '';

    const nrnField = (idType === '' || idType === 'National Registration Number') ? `
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="nrn">National Registration Number</label>
        <p class="govbb-hint">Find this on your National ID card. Format: YYMMDD-XXXX</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="nrn" name="nrn" data-field="nrn" placeholder="870315-1234" value="${GovBB.D['nrn']||''}" />
        </div>
      </div>` : '';

    const maidenField = marital === 'Married' ? `
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="maiden-name">Maiden Name</label>
        <p class="govbb-hint">If your surname changed when you got married, enter your name before the change.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="maiden-name" name="maiden-name" data-field="maiden-name" value="${GovBB.D['maiden-name']||''}" />
        </div>
      </div>` : '';

    return `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your personal details</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="title">Title (optional)</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="title" name="title" data-field="title">
            <option value="">Select one</option>
            ${['Mr','Mrs','Miss','Ms','Professor','Doctor','Sir','Dame'].map(o=>`<option value="${o}"${GovBB.D['title']===o?' selected':''}>` + o + '</option>').join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="first-name">First name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="first-name" name="first-name" data-field="first-name" value="${GovBB.D['first-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="middle-name">Middle name(s)</label>
        <p class="govbb-hint">Optional. Include all middle names.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="middle-name" name="middle-name" data-field="middle-name" value="${GovBB.D['middle-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="last-name">Last name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="last-name" name="last-name" data-field="last-name" value="${GovBB.D['last-name']||''}" />
        </div>
      </div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">What is your marital status?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          ${['Single','Married','Divorced','Separated','Widowed'].map(o=>`
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="marital-status-${o.toLowerCase()}" name="marital-status" data-field="marital-status" value="${o}"${GovBB.D['marital-status']===o?' checked':''} />
            <label class="govbb-radio-item__label" for="marital-status-${o.toLowerCase()}">${o}</label>
          </div>`).join('')}
        </div>
      </fieldset>

      ${maidenField}

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">What is your gender?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="gender-male" name="gender" data-field="gender" value="Male"${GovBB.D['gender']==='Male'?' checked':''} />
            <label class="govbb-radio-item__label" for="gender-male">Male</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="gender-female" name="gender" data-field="gender" value="Female"${GovBB.D['gender']==='Female'?' checked':''} />
            <label class="govbb-radio-item__label" for="gender-female">Female</label>
          </div>
        </div>
      </fieldset>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Date of birth</legend>
        <p class="govbb-hint">For example, 27 03 1985</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="dob-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="dob-day" name="dob-day" data-field="dob-day" inputmode="numeric" value="${GovBB.D['dob-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="dob-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="dob-month" name="dob-month" data-field="dob-month" inputmode="numeric" value="${GovBB.D['dob-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="dob-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="dob-year" name="dob-year" data-field="dob-year" inputmode="numeric" value="${GovBB.D['dob-year']||''}" /></div>
          </div>
        </div>
      </fieldset>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="nis-number">National Insurance Number</label>
        <p class="govbb-hint">Find this on your NIS card or payslip.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="nis-number" name="nis-number" data-field="nis-number" value="${GovBB.D['nis-number']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="id-type">What identification do you have?</label>
        <p class="govbb-hint">Select the document you will use to prove your identity.</p>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="id-type" name="id-type" data-field="id-type" data-trigger-render>
            <option value="">Select one</option>
            ${['National Registration Number','Passport'].map(o=>`<option value="${o}"${GovBB.D['id-type']===o?' selected':''}>` + o + '</option>').join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      ${nrnField}
      ${passportFields}

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="street-address">Street address</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="street-address" name="street-address" data-field="street-address" value="${GovBB.D['street-address']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="district">District</label>
        <p class="govbb-hint">Village or district name. For example, Brittons Hill.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="district" name="district" data-field="district" value="${GovBB.D['district']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="parish">Parish</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="parish" name="parish" data-field="parish">
            <option value="">Select one</option>
            ${GovBB.PARISHES.map(o=>`<option value="${o}"${GovBB.D['parish']===o?' selected':''}>` + o + '</option>').join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="email">Email address</label>
        <p class="govbb-hint">We will use this to contact you about your registration.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="email" id="email" name="email" data-field="email" value="${GovBB.D['email']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="mobile">Mobile number</label>
        <p class="govbb-hint">For example, 246-555-1234</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="tel" id="mobile" name="mobile" data-field="mobile" placeholder="246-555-1234" value="${GovBB.D['mobile']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;
  },

  'business-details': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your business details</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="business-name">Name of your business</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="business-name" name="business-name" data-field="business-name" value="${GovBB.D['business-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="business-nature">What does your business do?</label>
        <p class="govbb-hint">Describe the main activity or service your business provides. For example, plumbing repairs, catering, freelance design.</p>
        <textarea class="govbb-textarea" id="business-nature" name="business-nature" data-field="business-nature" rows="4" style="width:100%;">${GovBB.D['business-nature']||''}</textarea>
      </div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Date your business started</legend>
        <p class="govbb-hint">For example, 01 01 2020</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="business-start-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="business-start-day" name="business-start-day" data-field="business-start-day" inputmode="numeric" value="${GovBB.D['business-start-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="business-start-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="business-start-month" name="business-start-month" data-field="business-start-month" inputmode="numeric" value="${GovBB.D['business-start-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="business-start-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="business-start-year" name="business-start-year" data-field="business-start-year" inputmode="numeric" value="${GovBB.D['business-start-year']||''}" /></div>
          </div>
        </div>
      </fieldset>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="monthly-salary">Estimated monthly income (BDS$)</label>
        <p class="govbb-hint">NIS uses this to work out your contribution amount. Enter the amount you expect to earn each month.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="monthly-salary" name="monthly-salary" data-field="monthly-salary" inputmode="numeric" placeholder="2000" value="${GovBB.D['monthly-salary']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  'declaration': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>

      <div style="margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><span style="font-weight:var(--font-weight-bold);">Applicant's name:</span> ${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['last-name']].filter(Boolean).join(' ') || '—'}</p>
        <p class="govbb-text-body"><span style="font-weight:var(--font-weight-bold);">Date:</span> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
      </div>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">I declare that the information I have given is true to the best of my knowledge and belief.</p>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Did an NIS Field Officer help you fill in this form?</legend>
        <p class="govbb-hint">If a Field Officer helped you, we need to record their code.</p>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="field-officer-no" name="field-officer" data-field="field-officer" value="No"${GovBB.D['field-officer']==='No'?' checked':''} />
            <label class="govbb-radio-item__label" for="field-officer-no">No</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="field-officer-yes" name="field-officer" data-field="field-officer" value="Yes"${GovBB.D['field-officer']==='Yes'?' checked':''} />
            <label class="govbb-radio-item__label" for="field-officer-yes">Yes</label>
          </div>
        </div>
      </fieldset>

      <div id="officer-code-wrap" style="display:${GovBB.D['field-officer']==='Yes'?'block':'none'};">
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="officer-code">Field Officer code number</label>
          <p class="govbb-hint">Enter the code number of the NIS Field Officer (up to 2 digits).</p>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="officer-code" name="officer-code" data-field="officer-code" inputmode="numeric" maxlength="2" style="width:8rem;" value="${GovBB.D['officer-code']||''}" />
          </div>
        </div>
      </div>

      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
        <input class="govbb-checkbox" type="checkbox" id="declaration-agree" name="declaration-agree" data-field="declaration-agree"${GovBB.D['declaration-agree']?' checked':''} />
        <label class="govbb-checkbox-item__label" for="declaration-agree">I confirm that the information I have given is true and complete to the best of my knowledge.</label>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit application</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  'check': () => {
    const idType = GovBB.D['id-type'] || '';
    const idValue = idType === 'Passport'
      ? GovBB.D['passport-number']
      : GovBB.D['nrn'];
    return `
    <div>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before sending your application</h1>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Personal details</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Title', GovBB.D['title'], 'personal-details')}
        ${GovBB.summaryRow('First name', GovBB.D['first-name'], 'personal-details')}
        ${GovBB.summaryRow('Middle name(s)', GovBB.D['middle-name'], 'personal-details')}
        ${GovBB.summaryRow('Last name', GovBB.D['last-name'], 'personal-details')}
        ${GovBB.summaryRow('Marital status', GovBB.D['marital-status'], 'personal-details')}
        ${GovBB.D['marital-status']==='Married' ? GovBB.summaryRow('Maiden name', GovBB.D['maiden-name'], 'personal-details') : ''}
        ${GovBB.summaryRow('Gender', GovBB.D['gender'], 'personal-details')}
        ${GovBB.summaryRow('Date of birth', [GovBB.D['dob-day'],GovBB.D['dob-month'],GovBB.D['dob-year']].filter(Boolean).join(' / '), 'personal-details')}
        ${GovBB.summaryRow('National Insurance Number', GovBB.D['nis-number'], 'personal-details')}
        ${GovBB.summaryRow('Identification type', idType, 'personal-details')}
        ${GovBB.summaryRow(idType === 'Passport' ? 'Passport number' : 'National Registration Number', idValue, 'personal-details')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Address and contact</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Street address', GovBB.D['street-address'], 'personal-details')}
        ${GovBB.summaryRow('District', GovBB.D['district'], 'personal-details')}
        ${GovBB.summaryRow('Parish', GovBB.D['parish'], 'personal-details')}
        ${GovBB.summaryRow('Email address', GovBB.D['email'], 'personal-details')}
        ${GovBB.summaryRow('Mobile number', GovBB.D['mobile'], 'personal-details')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Business details</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Business name', GovBB.D['business-name'], 'business-details')}
        ${GovBB.summaryRow('Nature of business', GovBB.D['business-nature'], 'business-details')}
        ${GovBB.summaryRow('Date business started', [GovBB.D['business-start-day'],GovBB.D['business-start-month'],GovBB.D['business-start-year']].filter(Boolean).join(' / '), 'business-details')}
        ${GovBB.summaryRow('Estimated monthly income', GovBB.D['monthly-salary'] ? 'BDS$ ' + GovBB.D['monthly-salary'] : '', 'business-details')}
      </dl>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit application</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </div>`;
  },

  'confirmation': () => `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Application submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Reference: <strong>${window.__refNumber || 'SE-' + Math.random().toString(36).substring(2,8).toUpperCase()}</strong></p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">We got your application. NIS will review it and may contact you for more information.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Once your registration is confirmed, you will receive details about your contribution schedule and how to pay.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact NIS</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Phone: (246) 431-7400 or (246) 467-4647</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Email: customer.service@bginis.gov.bb</p>
      <p class="govbb-text-body">Address: Frank Walcott Building, Culloden Road, St. Michael, Barbados</p>
    </div>`
};

function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  if (pageId === 'personal-details') {
    if (!D['first-name']) errors.push({id:'first-name', msg:'Enter your first name'});
    if (!D['last-name'])  errors.push({id:'last-name',  msg:'Enter your last name'});
    if (!D['nis-number']) errors.push({id:'nis-number', msg:'Enter your National Insurance Number'});
    if (!D['id-type'])    errors.push({id:'id-type',    msg:'Select your identification type'});
    if (D['id-type'] === 'National Registration Number' && !D['nrn'])
      errors.push({id:'nrn', msg:'Enter your National Registration Number'});
    if (D['id-type'] === 'Passport' && !D['passport-number'])
      errors.push({id:'passport-number', msg:'Enter your passport number'});
    if (!D['parish'])     errors.push({id:'parish',     msg:'Select your parish'});
    if (!D['email'])      errors.push({id:'email',      msg:'Enter your email address'});
  }
  if (pageId === 'business-details') {
    if (!D['business-name'])   errors.push({id:'business-name',   msg:'Enter your business name'});
    if (!D['business-nature']) errors.push({id:'business-nature', msg:'Describe what your business does'});
  }
  if (pageId === 'declaration') {
    if (!D['declaration-agree']) errors.push({id:'declaration-agree', msg:'Declaration – You must confirm the declaration to continue'});
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name, value) {
    if (name === 'marital-status' || name === 'id-type') {
      GovBB.render();
    }
    if (name === 'field-officer') {
      const wrap = document.getElementById('officer-code-wrap');
      if (wrap) wrap.style.display = value === 'Yes' ? '' : 'none';
    }
  }
});
</script>
</body>
</html>

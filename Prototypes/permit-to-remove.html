<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
/* ───────── Form-specific configuration ───────── */
const FORM_NAME = 'Application for a Permit to Remove a Building/House or Boat';

const FLOW = ['start', 'what-moving', 'applicant-details', 'journey-details', 'declaration', 'check', 'confirmation'];

/* ───────── Helpers ───────── */
function getTodayString() {
  const now = new Date();
  const dd = String(now.getDate()).padStart(2, '0');
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const yyyy = now.getFullYear();
  return dd + ' ' + mm + ' ' + yyyy;
}

function isMoveWithin4Weeks() {
  const d = GovBB.D;
  if (!d['move-day'] || !d['move-month'] || !d['move-year']) return false;
  const day = parseInt(d['move-day'], 10);
  const month = parseInt(d['move-month'], 10);
  const year = parseInt(d['move-year'], 10);
  if (isNaN(day) || isNaN(month) || isNaN(year)) return false;
  const moveDate = new Date(year, month - 1, day);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const fourWeeks = new Date(today);
  fourWeeks.setDate(fourWeeks.getDate() + 28);
  return moveDate > today && moveDate < fourWeeks;
}

function formatMoveDateDisplay() {
  const d = GovBB.D;
  if (!d['move-day'] || !d['move-month'] || !d['move-year']) return '—';
  return d['move-day'] + ' ' + d['move-month'] + ' ' + d['move-year'];
}

function getItemDescriptionHint() {
  const variant = GovBB.D['variant'];
  if (variant === 'Building or House') {
    return 'For example, wooden chattel house, concrete block building';
  }
  return 'For example, sailing boat, motorboat, fibreglass vessel';
}

/* ───────── Pages ───────── */

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">You need a permit from the Barbados Licensing Authority (BLA) before you move any large structure &mdash; such as a building, house or boat &mdash; along public roads in Barbados. Apply here before you plan your move.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Before you start</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">You can only move a structure on public roads if the BLA approves your application first. Plan your move <strong>at least 4 weeks</strong> in advance to give us time to review your application.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">How to apply</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Fill in the online form below. It takes about 10 minutes.</p>

      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A description of the item you are moving (for example, its size and type)</li>

        <button type="button" class="govbb-btn" onclick="next()">Submit application</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>

    </form>`,

      ${GovBB.D['second-contact-number'] ? GovBB.summaryRow('Second contact number', GovBB.D['second-contact-number'], 'applicant-details') : ''}

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'what-moving') {
    if (!D['variant']) {
      errors.push({ id: 'variant-building', msg: 'What you are moving – choose an option' });
    }
  }

  if (pageId === 'applicant-details') {
    if (!D['first-name'] || !D['first-name'].trim()) {
      errors.push({ id: 'first-name', msg: 'First name – enter your first name' });
    }
    if (!D['last-name'] || !D['last-name'].trim()) {
      errors.push({ id: 'last-name', msg: 'Last name – enter your last name' });
    }
    if (!D['street-address'] || !D['street-address'].trim()) {
      errors.push({ id: 'street-address', msg: 'Street address – enter your street address' });
    }
    if (!D['parish'] || !D['parish'].trim()) {
      errors.push({ id: 'parish', msg: 'Parish – choose your parish' });
    }
    if (D['postal-code'] && D['postal-code'].trim() && !/^BB\d{5}$/i.test(D['postal-code'].trim())) {
      errors.push({ id: 'postal-code', msg: 'Postal code – enter a valid postal code, for example BB11000' });
    }
    if (!D['contact-number'] || !D['contact-number'].trim()) {
      errors.push({ id: 'contact-number', msg: 'Contact number – enter your contact number' });
    }
    if (!D['contact-email'] || !D['contact-email'].trim()) {
      errors.push({ id: 'contact-email', msg: 'Email address – enter your email address' });
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(D['contact-email'].trim())) {
      errors.push({ id: 'contact-email', msg: 'Email address – enter a valid email address, for example name@example.com' });
    }
  }

  if (pageId === 'journey-details') {
    if (!D['item-description'] || !D['item-description'].trim()) {
      errors.push({ id: 'item-description', msg: 'Item description – describe what you are moving' });
    }
    if (!D['vehicle-reg'] || !D['vehicle-reg'].trim()) {
      errors.push({ id: 'vehicle-reg', msg: 'Vehicle registration number – enter the vehicle registration number' });
    }
    if (!D['from-street'] || !D['from-street'].trim()) {
      errors.push({ id: 'from-street', msg: 'Moving from street address – enter the street address you are moving from' });
    }
    if (!D['from-parish'] || !D['from-parish'].trim()) {
      errors.push({ id: 'from-parish', msg: 'Moving from parish – choose the parish you are moving from' });
    }
    if (!D['to-street'] || !D['to-street'].trim()) {
      errors.push({ id: 'to-street', msg: 'Moving to street address – enter the street address you are moving to' });
    }
    if (!D['to-parish'] || !D['to-parish'].trim()) {
      errors.push({ id: 'to-parish', msg: 'Moving to parish – choose the parish you are moving to' });
    }
    if (!D['route'] || !D['route'].trim()) {
      errors.push({ id: 'route', msg: 'Planned route – describe the route you will take' });
    }
    if (!D['move-day'] || !D['move-day'].trim()) {
      errors.push({ id: 'move-day', msg: 'Date of move – enter the day' });
    }
    if (!D['move-month'] || !D['move-month'].trim()) {
      errors.push({ id: 'move-month', msg: 'Date of move – enter the month' });
    }
    if (!D['move-year'] || !D['move-year'].trim()) {
      errors.push({ id: 'move-year', msg: 'Date of move – enter the year' });
    }

    if (errors.filter(e => e.id.startsWith('move-')).length === 0) {
      const day = parseInt(D['move-day'], 10);
      const month = parseInt(D['move-month'], 10);
      const year = parseInt(D['move-year'], 10);
      const moveDate = new Date(year, month - 1, day);
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      if (
        isNaN(moveDate.getTime()) ||
        moveDate.getDate() !== day ||
        moveDate.getMonth() !== month - 1 ||
        moveDate.getFullYear() !== year
      ) {
        errors.push({ id: 'move-day', msg: 'Date of move – enter a valid date' });
      } else if (moveDate <= today) {
        errors.push({ id: 'move-day', msg: 'Date of move – the date must be in the future' });
      }
    }
  }

  if (pageId === 'declaration') {
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
    D['application-date'] = getTodayString();
  }

  return errors;
}

function onRadioChange(name, value) {
  // No immediate re-render needed; hint is computed at render time
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
  onRadioChange: onRadioChange
});
</script>

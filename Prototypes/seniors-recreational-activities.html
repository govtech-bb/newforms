<script src="../assets/govbb-framework.js"></script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = "Seniors' Recreational Activities Programme";

const FLOW = [
  'start',
  'personal-details',
  'contact',
  'health',
  'activities',
  'transport',
  'emergency-contact',
  'check',
  'confirmation'
];

/* ───────── Emergency contact relationships ───────── */
const EMERG_RELATIONSHIPS = [
  'Spouse', 'Partner', 'Son', 'Daughter', 'Sibling', 'Friend', 'Carer', 'Other'
];

/* ───────── Activities list ───────── */
const ACTIVITIES = [
  ['act-fitness',    'Exercise and fitness classes'],
  ['act-dance',      'Dance and movement'],
  ['act-arts',       'Arts and crafts'],
  ['act-music',      'Music and singing'],
  ['act-gardening',  'Gardening'],
  ['act-cooking',    'Cooking and nutrition'],
  ['act-games',      'Board games and card games (dominoes, bridge)'],
  ['act-technology', 'Technology and digital skills'],
  ['act-trips',      'Day trips and excursions'],
  ['act-social',     'Social gatherings and events']
];

/* ───────── Days list ───────── */
const DAYS = [
  ['day-mon', 'Mondays'],
  ['day-tue', 'Tuesdays'],
  ['day-wed', 'Wednesdays'],
  ['day-thu', 'Thursdays'],
  ['day-fri', 'Fridays']
];

/* ───────── Custom styled select ───────── */
function styledSelect(id, label, options, opts) {
  opts = opts || {};
  const val = GovBB.D[id] || '';
  const hint = opts.hint
    ? `<p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">${opts.hint}</p>`
    : '';
  const triggerAttr = opts.triggerRender ? ' data-trigger-render="1"' : '';
  const placeholder = opts.placeholder || 'Select one';
  let ops = `<option value="">${placeholder}</option>`;
  options.forEach(o => {
    const v = typeof o === 'object' ? o.value : o;
    const l = typeof o === 'object' ? o.label : o;
    ops += `<option value="${v}"${val === v ? ' selected' : ''}>${l}</option>`;
  });
  return `
    <div class="field-group flex flex-col gap-xs w-full items-start">
      <label for="${id}" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">${label}</label>
      ${hint}
      <div class="relative flex w-full rounded-sm border-2 border-bb-black-00 bg-bb-white-00 overflow-hidden hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
        <select id="${id}" name="${id}" data-field="${id}"${triggerAttr}
          class="w-full min-w-0 p-s outline-none bg-transparent appearance-none cursor-pointer text-[1.25rem] leading-normal">
          ${ops}
        </select>
        <div class="flex items-center justify-center w-14 shrink-0 bg-[#f0f0f0] border-l-2 border-bb-black-00 pointer-events-none" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>
    </div>`;
}

/* ───────── Helpers ───────── */
function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function activitiesSummary() {
  const selected = ACTIVITIES.filter(a => GovBB.D[a[0]]).map(a => a[1]);
  return selected.length ? selected.join(', ') : '';
}

function daysSummary() {
  const selected = DAYS.filter(d => GovBB.D[d[0]]).map(d => d[1]);
  return selected.length ? selected.join(', ') : '';
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div class="space-y-6">
      <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00">Ministry of People Empowerment and Elder Affairs</p>
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Seniors' Recreational Activities Programme</h1>
      <hr class="border-bb-grey-00">

      <p class="text-[1.25rem] leading-normal">Register to take part in recreational activities organised for seniors aged <strong>60 and over</strong> across Barbados.</p>
      <p class="text-[1.25rem] leading-normal">Most people finish this form in about <strong>5 minutes</strong>.</p>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">What you'll need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem] leading-normal">
          <li>Your National Registration Number (NRN)</li>
          <li>Your contact details</li>
          <li>Details of an emergency contact</li>
        </ul>
      </div>

      <p class="text-[1.25rem] leading-normal">Note any physical limitations so activities can be adapted for you.</p>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">Contact us</h2>
        <p class="text-[1.25rem] leading-normal">Call <strong>+1 (246) 467-4900</strong> if you need help completing this form.</p>
      </div>

      ${GovBB.startBtn('Register now')}
    </div>`,

  /* ── Personal details ── */
  'personal-details': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">About you</h1>
      <div class="space-y-8">
        ${GovBB.textField('fullname', 'Full name')}
        ${GovBB.dateField('dob', 'Date of birth')}
        ${GovBB.textField('nrn', 'National Registration Number', {
          hint: 'Your 11-digit NRN, for example 110915-0048.',
          placeholder: '110915-0048'
        })}
        ${styledSelect('gender', 'Gender', ['Male', 'Female', 'Prefer not to say'])}
        ${styledSelect('parish', 'Parish you live in', GovBB.PARISHES, { placeholder: 'Select a parish' })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Contact details ── */
  'contact': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your contact details</h1>
      <div class="space-y-8">
        ${GovBB.textField('address-line1', 'Address line 1')}
        ${GovBB.textField('address-line2', 'Address line 2 (optional)')}
        ${GovBB.textField('address-postal', 'Postal code (optional)', {
          hint: 'For example, BB11000.',
          placeholder: 'BB11000'
        })}
        ${GovBB.telField('phone-cell', 'Mobile number', {
          hint: '246 249-1234.',
          placeholder: '246 249-1234'
        })}
        ${GovBB.telField('phone-home', 'Home phone number (optional)', {
          placeholder: '246 433-1234'
        })}
        ${GovBB.emailField('email', 'Email address (optional)')}
        ${btnGroup()}
      </div>
    </form>`,

  /* ── Health and wellbeing ── */
  'health': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-4">Health and physical wellbeing</h1>
      <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-8">This helps us make sure activities are suitable and safe for you.</p>
      <div class="space-y-8">

        <div class="space-y-4">
          ${GovBB.radioGroup('mobility', 'How would you describe your mobility?', [
            'Fully mobile',
            'Mobile with aid (e.g. walking stick or walker)',
            'Wheelchair user',
            'Other'
          ])}
          <div data-show-when-name="mobility" data-show-when-value="Other" style="display:${GovBB.D['mobility'] === 'Other' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textField('mobility-other', 'Please describe')}
          </div>
        </div>

        <div class="space-y-4">
          ${GovBB.radioGroup('health-conditions', 'Do you have any health conditions we should know about?', ['Yes', 'No'])}
          <div data-show-when-name="health-conditions" data-show-when-value="Yes" style="display:${GovBB.D['health-conditions'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('health-conditions-details', 'Please describe', {
              hint: 'For example: heart condition, diabetes, asthma.',
              rows: 3
            })}
          </div>
        </div>

        ${GovBB.radioGroup('hearing', 'Do you have any hearing difficulties?', ['Yes', 'No'])}
        ${GovBB.radioGroup('vision', 'Do you have any vision difficulties?', ['Yes', 'No'])}

        ${btnGroup()}
      </div>
    </form>`,

  /* ── Activities ── */
  'activities': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-4">Activities you are interested in</h1>
      <p class="text-[1.25rem] leading-normal mb-8">Select all the activities you would like to take part in.</p>
      <div class="space-y-8">

        <div class="space-y-4">
          ${ACTIVITIES.map(a => GovBB.checkboxItem(a[0], a[1])).join('\n')}
        </div>

        ${GovBB.textareaField('activities-other', 'Are there any other activities you would enjoy? (optional)', { rows: 3 })}

        <div class="space-y-4">
          <fieldset>
            <legend class="block text-[1.25rem] leading-normal font-bold text-bb-black-00 mb-4">Which days are you generally available?</legend>
            ${DAYS.map(d => GovBB.checkboxItem(d[0], d[1])).join('\n')}
          </fieldset>
        </div>

        ${btnGroup()}
      </div>
    </form>`,

  /* ── Transport ── */
  'transport': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Getting to activities</h1>
      <div class="space-y-8">

        <div class="space-y-4">
          ${GovBB.radioGroup('transport-own', 'How will you usually get to activities?', [
            'I have my own transport',
            'A family member or carer will bring me',
            'I use public transport',
            'I will need transport assistance'
          ])}
          <div data-show-when-name="transport-own" data-show-when-value="I will need transport assistance" style="display:${GovBB.D['transport-own'] === 'I will need transport assistance' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-4">We will try to arrange transport where possible. This is not guaranteed.</p>
            ${GovBB.textField('transport-address', 'Your pick-up address', {
              hint: 'If different from your home address above.'
            })}
          </div>
        </div>

        ${GovBB.radioGroup('transport-wheelchair', 'Do you need a wheelchair-accessible vehicle?', ['Yes', 'No'])}

        ${btnGroup()}
      </div>
    </form>`,

  /* ── Emergency contact ── */
  'emergency-contact': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Emergency contact</h1>
      <div class="space-y-8">
        ${GovBB.textField('emerg-fullname', 'Full name')}
        ${styledSelect('emerg-relationship', 'Relationship to you', EMERG_RELATIONSHIPS, {
          placeholder: 'Select a relationship', triggerRender: true
        })}
        <div data-show-when-name="emerg-relationship" data-show-when-value="Other" style="display:${GovBB.D['emerg-relationship'] === 'Other' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
          ${GovBB.textField('emerg-relationship-other', 'Please describe their relationship to you')}
        </div>
        ${GovBB.telField('emerg-phone', 'Phone number', {
          hint: '246 249-1234.',
          placeholder: '246 249-1234'
        })}
        ${GovBB.telField('emerg-phone-alt', 'Alternative phone number (optional)', {
          placeholder: '246 249-1234'
        })}
        ${btnGroup()}
      </div>
    </form>`,

  /* ── Check your answers ── */
  'check': () => `
    <div>
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers</h1>

      <div class="space-y-10">

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">About you</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Full name', GovBB.D['fullname'] || '', 'personal-details')}
            ${GovBB.summaryRow('Date of birth', fmtDate('dob'), 'personal-details')}
            ${GovBB.summaryRow('National Registration Number', GovBB.D['nrn'] || '', 'personal-details')}
            ${GovBB.summaryRow('Gender', GovBB.D['gender'] || '', 'personal-details')}
            ${GovBB.summaryRow('Parish', GovBB.D['parish'] || '', 'personal-details')}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Contact details</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Address', [GovBB.D['address-line1'], GovBB.D['address-line2'], GovBB.D['address-postal']].filter(Boolean).join(', ') || '', 'contact')}
            ${GovBB.summaryRow('Mobile number', GovBB.D['phone-cell'] || '', 'contact')}
            ${GovBB.summaryRow('Home phone', GovBB.D['phone-home'] || '', 'contact')}
            ${GovBB.summaryRow('Email address', GovBB.D['email'] || '', 'contact')}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Health and wellbeing</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Mobility', GovBB.D['mobility'] === 'Other' ? (GovBB.D['mobility-other'] || 'Other') : (GovBB.D['mobility'] || ''), 'health')}
            ${GovBB.summaryRow('Health conditions', GovBB.D['health-conditions'] || '', 'health')}
            ${GovBB.D['health-conditions'] === 'Yes' ? GovBB.summaryRow('Health condition details', GovBB.D['health-conditions-details'] || '', 'health') : ''}
            ${GovBB.summaryRow('Hearing difficulties', GovBB.D['hearing'] || '', 'health')}
            ${GovBB.summaryRow('Vision difficulties', GovBB.D['vision'] || '', 'health')}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Activities</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Activities of interest', activitiesSummary(), 'activities')}
            ${GovBB.D['activities-other'] ? GovBB.summaryRow('Other activities', GovBB.D['activities-other'] || '', 'activities') : ''}
            ${GovBB.summaryRow('Days available', daysSummary(), 'activities')}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Getting to activities</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Transport', GovBB.D['transport-own'] || '', 'transport')}
            ${GovBB.D['transport-own'] === 'I will need transport assistance' && GovBB.D['transport-address']
              ? GovBB.summaryRow('Pick-up address', GovBB.D['transport-address'] || '', 'transport')
              : ''}
            ${GovBB.summaryRow('Wheelchair-accessible vehicle needed', GovBB.D['transport-wheelchair'] || '', 'transport')}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Emergency contact</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Full name', GovBB.D['emerg-fullname'] || '', 'emergency-contact')}
            ${GovBB.summaryRow('Relationship', GovBB.D['emerg-relationship'] === 'Other' ? (GovBB.D['emerg-relationship-other'] || 'Other') : (GovBB.D['emerg-relationship'] || ''), 'emergency-contact')}
            ${GovBB.summaryRow('Phone number', GovBB.D['emerg-phone'] || '', 'emergency-contact')}
            ${GovBB.D['emerg-phone-alt'] ? GovBB.summaryRow('Alternative phone', GovBB.D['emerg-phone-alt'] || '', 'emergency-contact') : ''}
          </dl>
        </div>

      </div>

      <div class="mt-10">
        <p class="text-[1.25rem] leading-normal mb-6">By submitting this form you confirm that the information you have provided is correct.</p>
        ${btnGroup('Submit registration')}
      </div>
    </div>`,

  /* ── Confirmation ── */
  'confirmation': () => {
    const refNum = window.__refNumber || ('SRAP-' + Math.random().toString(36).substring(2,8).toUpperCase());
    const parish = GovBB.D['parish'] || 'your parish';
    return `
    <div class="space-y-8">
      <div class="bg-bb-teal-00 text-bb-white-00 p-8 rounded-sm space-y-4">
        <h1 class="font-bold text-[3.5rem] leading-[1.15]">Registration received</h1>
        <p class="text-[1.25rem]">Your reference number</p>
        <p class="text-[2rem] font-bold">${refNum}</p>
      </div>

      <p class="text-[1.25rem] leading-normal">We will contact you within <strong>5 working days</strong> to let you know about activities near you in <strong>${parish}</strong>.</p>
      <p class="text-[1.25rem] leading-normal">If you need to contact us call <strong>+1 (246) 467-4900</strong>.</p>
    </div>`;
  }

};

/* ───────── Previous + Continue button group ───────── */
const PREV_BTN_CLS = 'relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c8cdd4] active:bg-[#b0b5bc] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100 focus-visible:rounded-sm';

function btnGroup(continueLabel) {
  return `<div class="mt-8 flex gap-4 items-center flex-wrap">
    <button type="button" onclick="back()" class="${PREV_BTN_CLS}">Previous</button>
    <button type="button" onclick="next()" class="${GovBB.BTN_CLS}">${continueLabel || 'Continue'}</button>
  </div>`;
}

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'personal-details') {
    if (!D['fullname'] || !D['fullname'].trim())
      errors.push({ id: 'fullname', msg: 'Enter your full name' });
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    } else {
      const day = parseInt(D['dob-day'], 10);
      const month = parseInt(D['dob-month'], 10);
      const year = parseInt(D['dob-year'], 10);
      const parsed = new Date(year, month - 1, day);
      if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a real date, for example 15 06 1960' });
      } else if (parsed >= new Date()) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – The date of birth must be in the past' });
      } else {
        const today = new Date();
        let age = today.getFullYear() - year;
        if (today.getMonth() < month - 1 || (today.getMonth() === month - 1 && today.getDate() < day)) age--;
        if (age < 60) {
          errors.push({ id: 'dob-day', msg: 'Date of birth – You must be 60 or over to register for this programme' });
        }
      }
    }
    if (!D['nrn'] || !D['nrn'].trim())
      errors.push({ id: 'nrn', msg: 'Enter your National Registration Number' });
    if (!D['gender'])
      errors.push({ id: 'gender', msg: 'Select your gender' });
    if (!D['parish'])
      errors.push({ id: 'parish', msg: 'Select the parish you live in' });
  }

  if (pageId === 'contact') {
    if (!D['address-line1'] || !D['address-line1'].trim())
      errors.push({ id: 'address-line1', msg: 'Enter your address' });
    if (!D['phone-cell'] || !D['phone-cell'].trim())
      errors.push({ id: 'phone-cell', msg: 'Enter a mobile number' });
  }

  if (pageId === 'health') {
    if (!D['mobility'])
      errors.push({ id: 'mobility', msg: 'Select how you would describe your mobility' });
    if (D['mobility'] === 'Other' && (!D['mobility-other'] || !D['mobility-other'].trim()))
      errors.push({ id: 'mobility-other', msg: 'Mobility – Describe your mobility' });
    if (!D['health-conditions'])
      errors.push({ id: 'health-conditions', msg: 'Select yes or no – Do you have any health conditions?' });
    if (D['health-conditions'] === 'Yes' && (!D['health-conditions-details'] || !D['health-conditions-details'].trim()))
      errors.push({ id: 'health-conditions-details', msg: 'Health conditions – Describe your health conditions' });
    if (!D['hearing'])
      errors.push({ id: 'hearing', msg: 'Select yes or no – Do you have any hearing difficulties?' });
    if (!D['vision'])
      errors.push({ id: 'vision', msg: 'Select yes or no – Do you have any vision difficulties?' });
  }

  if (pageId === 'activities') {
    const anyActivity = ACTIVITIES.some(a => D[a[0]]);
    if (!anyActivity)
      errors.push({ id: 'act-fitness', msg: 'Select at least one activity you are interested in' });
    const anyDay = DAYS.some(d => D[d[0]]);
    if (!anyDay)
      errors.push({ id: 'day-mon', msg: 'Select at least one day you are generally available' });
  }

  if (pageId === 'transport') {
    if (!D['transport-own'])
      errors.push({ id: 'transport-own', msg: 'Select how you will usually get to activities' });
    if (!D['transport-wheelchair'])
      errors.push({ id: 'transport-wheelchair', msg: 'Select yes or no – Do you need a wheelchair-accessible vehicle?' });
  }

  if (pageId === 'emergency-contact') {
    if (!D['emerg-fullname'] || !D['emerg-fullname'].trim())
      errors.push({ id: 'emerg-fullname', msg: "Enter the emergency contact's full name" });
    if (!D['emerg-relationship'])
      errors.push({ id: 'emerg-relationship', msg: "Select the emergency contact's relationship to you" });
    if (D['emerg-relationship'] === 'Other' && (!D['emerg-relationship-other'] || !D['emerg-relationship-other'].trim()))
      errors.push({ id: 'emerg-relationship-other', msg: 'Describe their relationship to you' });
    if (!D['emerg-phone'] || !D['emerg-phone'].trim())
      errors.push({ id: 'emerg-phone', msg: 'Enter a phone number for the emergency contact' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  getFlow: function() { return FLOW; },
  pages: PAGES,
  validate: validate
});
</script>
</body>
</html>

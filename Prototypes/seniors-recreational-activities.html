<script src="../assets/govbb-framework.js"></script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = "Seniors' Recreational Activities Programme";

const FLOW = [
  'start',
  'personal-details',
  'contact',
  'health',
  'activities',
  'transport',
  'emergency-contact',
  'check',
  'confirmation'
];

/* ───────── Emergency contact relationships ───────── */
const EMERG_RELATIONSHIPS = [
  'Spouse', 'Partner', 'Son', 'Daughter', 'Sibling', 'Friend', 'Carer', 'Other'
];

/* ───────── Activities list ───────── */
const ACTIVITIES = [
  ['act-fitness',    'Exercise and fitness classes'],
  ['act-dance',      'Dance and movement'],
  ['act-arts',       'Arts and crafts'],
  ['act-music',      'Music and singing'],
  ['act-gardening',  'Gardening'],
  ['act-cooking',    'Cooking and nutrition'],
  ['act-games',      'Board games and card games (dominoes, bridge)'],
  ['act-technology', 'Technology and digital skills'],
  ['act-trips',      'Day trips and excursions'],
  ['act-social',     'Social gatherings and events']
];

/* ───────── Days list ───────── */
const DAYS = [
  ['day-mon', 'Mondays'],
  ['day-tue', 'Tuesdays'],
  ['day-wed', 'Wednesdays'],
  ['day-thu', 'Thursdays'],
  ['day-fri', 'Fridays']
];

/* ───────── Helpers ───────── */
function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function activitiesSummary() {
  const selected = ACTIVITIES.filter(a => GovBB.D[a[0]]).map(a => a[1]);
  return selected.length ? selected.join(', ') : '';
}

function daysSummary() {
  const selected = DAYS.filter(d => GovBB.D[d[0]]).map(d => d[1]);
  return selected.length ? selected.join(', ') : '';
}

/* ───────── Override error display ───────── */
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors || !errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  var app = document.getElementById('app');
  app.insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    el.setAttribute('aria-invalid','true');
    var errId = 'err-'+e.id;
    var msg = document.createElement('p');
    msg.className = 'govbb-error-message';
    msg.id = errId;
    msg.textContent = e.msg;
    el.setAttribute('aria-describedby', errId);
    var group = el.closest('.govbb-form-group') || el.closest('fieldset') || el.parentElement;
    if (group) group.insertBefore(msg, el.previousElementSibling ? el : group.firstChild);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};

/* ───────── Override summaryRow ───────── */
GovBB.summaryRow = function(label, value, pageId) {
  return `<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);">
    <dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">${label}</dt>
    <dd style="font-size:var(--font-size-body);">${value}</dd>
    <div><a href="#" onclick="nav('${pageId}');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change</a></div>
  </div>`;
};

      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">&#8592; Back</a>
      <h1 class="govbb-text-h1" style="margin-bottom: var(--spacing-m);">Getting to activities</h1>

      <fieldset class="govbb-fieldset" style="margin-bottom: var(--spacing-m);">
        <legend class="govbb-fieldset__legend">How will you usually get to activities?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          ${['I have my own transport', 'A family member or carer will bring me', 'I use public transport', 'I will need transport assistance'].map(opt => `
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="transport-own-${opt.replace(/\W+/g,'-').toLowerCase()}" name="transport-own" data-field="transport-own" value="${opt}"${GovBB.D['transport-own']===opt?' checked':''} />
            <label class="govbb-radio-item__label" for="transport-own-${opt.replace(/\W+/g,'-').toLowerCase()}">${opt}</label>
          </div>`).join('')}
          <div class="govbb-radio-item__conditional" style="display:${GovBB.D['transport-own']==='I will need transport assistance'?'block':'none'};padding-left:1rem;border-left:4px solid var(--color-blue-40);">
            <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">We will try to arrange transport where possible. This is not guaranteed.</p>
            <div class="govbb-form-group" style="margin-bottom: var(--spacing-m);">
              <label class="govbb-label" for="transport-address">Your pick-up address</label>
              <p class="govbb-hint">If different from your home address above.</p>
              <div class="govbb-input-wrapper">
                <input class="govbb-input" type="text" id="transport-address" name="transport-address" data-field="transport-address" value="${GovBB.D['transport-address'] || ''}" />
              </div>
            </div>
          </div>
        </div>
      </fieldset>

      <fieldset class="govbb-fieldset" style="margin-bottom: var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Do you need a wheelchair-accessible vehicle?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="transport-wheelchair-yes" name="transport-wheelchair" data-field="transport-wheelchair" value="Yes"${GovBB.D['transport-wheelchair']==='Yes'?' checked':''} />
            <label class="govbb-radio-item__label" for="transport-wheelchair-yes">Yes</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="transport-wheelchair-no" name="transport-wheelchair" data-field="transport-wheelchair" value="No"${GovBB.D['transport-wheelchair']==='No'?' checked':''} />
            <label class="govbb-radio-item__label" for="transport-wheelchair-no">No</label>
          </div>
        </div>
      </fieldset>

      <div class="govbb-btn-group" style="margin-top: var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  /* ── Emergency contact ── */
  'emergency-contact': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">&#8592; Back</a>
      <h1 class="govbb-text-h1" style="margin-bottom: var(--spacing-m);">Emergency contact</h1>

      <div class="govbb-form-group" style="margin-bottom: var(--spacing-m);">
        <label class="govbb-label" for="emerg-fullname">Full name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="emerg-fullname" name="emerg-fullname" data-field="emerg-fullname" value="${GovBB.D['emerg-fullname'] || ''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom: var(--spacing-m);">
        <label class="govbb-label" for="emerg-relationship">Relationship to you</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="emerg-relationship" name="emerg-relationship" data-field="emerg-relationship" data-trigger-render="1">
            <option value="">Select a relationship</option>
            ${EMERG_RELATIONSHIPS.map(o => `<option value="${o}"${GovBB.D['emerg-relationship']===o?' selected':''}>${o}</option>`).join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
          </span>
        </div>
      </div>

      <div style="display:${GovBB.D['emerg-relationship']==='Other'?'block':'none'};padding-left:1rem;border-left:4px solid var(--color-blue-40);margin-bottom:var(--spacing-m);">
        <div class="govbb-form-group" style="margin-bottom: var(--spacing-m);">
          <label class="govbb-label" for="emerg-relationship-other">Please describe their relationship to you</label>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="emerg-relationship-other" name="emerg-relationship-other" data-field="emerg-relationship-other" value="${GovBB.D['emerg-relationship-other'] || ''}" />
          </div>
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom: var(--spacing-m);">
        <label class="govbb-label" for="emerg-phone">Phone number</label>
        <p class="govbb-hint">246 249-1234.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="tel" id="emerg-phone" name="emerg-phone" data-field="emerg-phone" placeholder="246 249-1234" value="${GovBB.D['emerg-phone'] || ''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom: var(--spacing-m);">
        <label class="govbb-label" for="emerg-phone-alt">Alternative phone number (optional)</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="tel" id="emerg-phone-alt" name="emerg-phone-alt" data-field="emerg-phone-alt" placeholder="246 249-1234" value="${GovBB.D['emerg-phone-alt'] || ''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top: var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  /* ── Check your answers ── */
  'check': () => `
    <div>
      <h1 class="govbb-text-h1" style="margin-bottom: var(--spacing-m);">Check your answers</h1>

      <h2 class="govbb-text-h2" style="margin-bottom: var(--spacing-s); padding-bottom: var(--spacing-xs); border-bottom: 2px solid var(--color-grey-00);">About you</h2>
      <dl style="margin-bottom: var(--spacing-l);">
        ${GovBB.summaryRow('Full name', GovBB.D['fullname'] || '', 'personal-details')}
        ${GovBB.summaryRow('Date of birth', fmtDate('dob'), 'personal-details')}
        ${GovBB.summaryRow('National Registration Number', GovBB.D['nrn'] || '', 'personal-details')}
        ${GovBB.summaryRow('Gender', GovBB.D['gender'] || '', 'personal-details')}
        ${GovBB.summaryRow('Parish', GovBB.D['parish'] || '', 'personal-details')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom: var(--spacing-s); padding-bottom: var(--spacing-xs); border-bottom: 2px solid var(--color-grey-00);">Contact details</h2>
      <dl style="margin-bottom: var(--spacing-l);">
        ${GovBB.summaryRow('Address', [GovBB.D['address-line1'], GovBB.D['address-line2'], GovBB.D['address-postal']].filter(Boolean).join(', ') || '', 'contact')}
        ${GovBB.summaryRow('Mobile number', GovBB.D['phone-cell'] || '', 'contact')}
        ${GovBB.summaryRow('Home phone', GovBB.D['phone-home'] || '', 'contact')}
        ${GovBB.summaryRow('Email address', GovBB.D['email'] || '', 'contact')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom: var(--spacing-s); padding-bottom: var(--spacing-xs); border-bottom: 2px solid var(--color-grey-00);">Health and wellbeing</h2>
      <dl style="margin-bottom: var(--spacing-l);">
        ${GovBB.summaryRow('Mobility', GovBB.D['mobility'] === 'Other' ? (GovBB.D['mobility-other'] || 'Other') : (GovBB.D['mobility'] || ''), 'health')}
        ${GovBB.summaryRow('Health conditions', GovBB.D['health-conditions'] || '', 'health')}
        ${GovBB.D['health-conditions'] === 'Yes' ? GovBB.summaryRow('Health condition details', GovBB.D['health-conditions-details'] || '', 'health') : ''}
        ${GovBB.summaryRow('Hearing difficulties', GovBB.D['hearing'] || '', 'health')}
        ${GovBB.summaryRow('Vision difficulties', GovBB.D['vision'] || '', 'health')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom: var(--spacing-s); padding-bottom: var(--spacing-xs); border-bottom: 2px solid var(--color-grey-00);">Activities</h2>
      <dl style="margin-bottom: var(--spacing-l);">
        ${GovBB.summaryRow('Activities of interest', activitiesSummary(), 'activities')}
        ${GovBB.D['activities-other'] ? GovBB.summaryRow('Other activities', GovBB.D['activities-other'] || '', 'activities') : ''}
        ${GovBB.summaryRow('Days available', daysSummary(), 'activities')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom: var(--spacing-s); padding-bottom: var(--spacing-xs); border-bottom: 2px solid var(--color-grey-00);">Getting to activities</h2>
      <dl style="margin-bottom: var(--spacing-l);">
        ${GovBB.summaryRow('Transport', GovBB.D['transport-own'] || '', 'transport')}
        ${GovBB.D['transport-own'] === 'I will need transport assistance' && GovBB.D['transport-address']
          ? GovBB.summaryRow('Pick-up address', GovBB.D['transport-address'] || '', 'transport')
          : ''}
        ${GovBB.summaryRow('Wheelchair-accessible vehicle needed', GovBB.D['transport-wheelchair'] || '', 'transport')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom: var(--spacing-s); padding-bottom: var(--spacing-xs); border-bottom: 2px solid var(--color-grey-00);">Emergency contact</h2>
      <dl style="margin-bottom: var(--spacing-l);">
        ${GovBB.summaryRow('Full name', GovBB.D['emerg-fullname'] || '', 'emergency-contact')}
        ${GovBB.summaryRow('Relationship', GovBB.D['emerg-relationship'] === 'Other' ? (GovBB.D['emerg-relationship-other'] || 'Other') : (GovBB.D['emerg-relationship'] || ''), 'emergency-contact')}
        ${GovBB.summaryRow('Phone number', GovBB.D['emerg-phone'] || '', 'emergency-contact')}
        ${GovBB.D['emerg-phone-alt'] ? GovBB.summaryRow('Alternative phone', GovBB.D['emerg-phone-alt'] || '', 'emergency-contact') : ''}
      </dl>

      <p class="govbb-text-body" style="margin-bottom: var(--spacing-m);">By submitting this form you confirm that the information you have provided is correct.</p>

      <div class="govbb-btn-group" style="margin-top: var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit registration</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </div>`,

  /* ── Confirmation ── */
  'confirmation': () => {
    const refNum = window.__refNumber || ('SRAP-' + Math.random().toString(36).substring(2,8).toUpperCase());
    window.__refNumber = refNum;
    const parish = GovBB.D['parish'] || 'your parish';
    return `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Registration received</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number is <strong>${refNum}</strong></p>
      </div>

      <p class="govbb-text-body" style="margin-bottom: var(--spacing-s);">We will contact you within <strong>5 working days</strong> to let you know about activities near you in <strong>${parish}</strong>.</p>
      <p class="govbb-text-body">If you need to contact us call <strong>+1 (246) 467-4900</strong>.</p>
    </div>`;
  }

};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'personal-details') {
    if (!D['fullname'] || !D['fullname'].trim())
      errors.push({ id: 'fullname', msg: 'Enter your full name' });
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    } else {
      const day = parseInt(D['dob-day'], 10);
      const month = parseInt(D['dob-month'], 10);
      const year = parseInt(D['dob-year'], 10);
      const parsed = new Date(year, month - 1, day);
      if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a real date, for example 15 06 1960' });
      } else if (parsed >= new Date()) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – The date of birth must be in the past' });
      } else {
        const today = new Date();
        let age = today.getFullYear() - year;
        if (today.getMonth() < month - 1 || (today.getMonth() === month - 1 && today.getDate() < day)) age--;
        if (age < 60) {
          errors.push({ id: 'dob-day', msg: 'Date of birth – You must be 60 or over to register for this programme' });
        }
      }
    }
    if (!D['nrn'] || !D['nrn'].trim())
      errors.push({ id: 'nrn', msg: 'Enter your National Registration Number' });
    if (!D['gender'])
      errors.push({ id: 'gender', msg: 'Select your gender' });
    if (!D['parish'])
      errors.push({ id: 'parish', msg: 'Select the parish you live in' });
  }

  if (pageId === 'contact') {
    if (!D['address-line1'] || !D['address-line1'].trim())
      errors.push({ id: 'address-line1', msg: 'Enter your address' });
    if (!D['phone-cell'] || !D['phone-cell'].trim())
      errors.push({ id: 'phone-cell', msg: 'Enter a mobile number' });
  }

  if (pageId === 'health') {
    if (!D['mobility'])
      errors.push({ id: 'mobility-fully-mobile', msg: 'Select how you would describe your mobility' });
    if (D['mobility'] === 'Other' && (!D['mobility-other'] || !D['mobility-other'].trim()))
      errors.push({ id: 'mobility-other', msg: 'Mobility – Describe your mobility' });
    if (!D['health-conditions'])
      errors.push({ id: 'health-conditions-yes', msg: 'Select yes or no – Do you have any health conditions?' });
    if (D['health-conditions'] === 'Yes' && (!D['health-conditions-details'] || !D['health-conditions-details'].trim()))
      errors.push({ id: 'health-conditions-details', msg: 'Health conditions – Describe your health conditions' });
    if (!D['hearing'])
      errors.push({ id: 'hearing-yes', msg: 'Select yes or no – Do you have any hearing difficulties?' });
    if (!D['vision'])
      errors.push({ id: 'vision-yes', msg: 'Select yes or no – Do you have any vision difficulties?' });
  }

  if (pageId === 'activities') {
    const anyActivity = ACTIVITIES.some(a => D[a[0]]);
    if (!anyActivity)
      errors.push({ id: 'act-fitness', msg: 'Select at least one activity you are interested in' });
    const anyDay = DAYS.some(d => D[d[0]]);
    if (!anyDay)
      errors.push({ id: 'day-mon', msg: 'Select at least one day you are generally available' });
  }

  if (pageId === 'transport') {
    if (!D['transport-own'])
      errors.push({ id: 'transport-own-i-have-my-own-transport', msg: 'Select how you will usually get to activities' });
    if (!D['transport-wheelchair'])
      errors.push({ id: 'transport-wheelchair-yes', msg: 'Select yes or no – Do you need a wheelchair-accessible vehicle?' });
  }

  if (pageId === 'emergency-contact') {
    if (!D['emerg-fullname'] || !D['emerg-fullname'].trim())
      errors.push({ id: 'emerg-fullname', msg: "Enter the emergency contact's full name" });
    if (!D['emerg-relationship'])
      errors.push({ id: 'emerg-relationship', msg: "Select the emergency contact's relationship to you" });
    if (D['emerg-relationship'] === 'Other' && (!D['emerg-relationship-other'] || !D['emerg-relationship-other'].trim()))
      errors.push({ id: 'emerg-relationship-other', msg: 'Describe their relationship to you' });
    if (!D['emerg-phone'] || !D['emerg-phone'].trim())
      errors.push({ id: 'emerg-phone', msg: 'Enter a phone number for the emergency contact' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  getFlow: function() { return FLOW; },
  pages: PAGES,
  validate: validate
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register for NIS Online Services (combined concept) – National Insurance and Social Security Service</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>
<body class="govbb-page">

<div class="govbb-official-banner">
  <div class="govbb-container govbb-official-banner__inner">
    <div class="govbb-official-banner__crest"><img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" /></div>
    <div class="govbb-official-banner__text"><span>Official government website</span></div>
  </div>
</div>

<header class="govbb-header">
  <div class="govbb-container govbb-header__inner">
    <a href="/" aria-label="Go to the alpha.gov.bb homepage"><img class="govbb-header__logo" src="../dist/assets/images/govbb-logo.svg" alt="GovBB" /></a>
  </div>
</header>

<main class="govbb-page__main">
  <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-label="alpha status banner" aria-live="polite">
    <div class="govbb-container">
      <p>This page is in <a class="govbb-link govbb-link--secondary" href="#">Alpha</a>. Your feedback helps us improve.</p>
    </div>
  </div>
  <div class="govbb-container">
    <div id="app" style="padding-block: var(--spacing-l); max-width: 48rem;"></div>
  </div>
</main>

<footer class="govbb-footer">
  <div class="govbb-container govbb-footer__inner">
    <nav class="govbb-footer__nav" aria-label="Footer">
      <a class="govbb-footer__link" href="#">Home</a>
      <a class="govbb-footer__link" href="#">Privacy</a>
      <a class="govbb-footer__link" href="#">Terms &amp; Conditions</a>
      <a class="govbb-footer__link" href="#">Accessibility</a>
    </nav>
    <hr class="govbb-footer__divider" aria-hidden="true" />
    <div class="govbb-footer__end">
      <img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" />
      <p class="govbb-footer__copy">© 2025 Government of Barbados</p>
    </div>
  </div>
</footer>

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary'); if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
  if (document.title.indexOf('Error: ') === 0) document.title = document.title.slice(7);
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors(); if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  var app = document.getElementById('app'); var h1 = app.querySelector('h1');
  if (h1) h1.insertAdjacentHTML('afterend', html); else app.insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id); if (!el) return;
    var errId = 'err-'+e.id; el.setAttribute('aria-invalid','true'); el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p'); msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) { var anchor = group.querySelector('.govbb-hint')||group.querySelector('.govbb-label')||group.querySelector('legend'); if (anchor) anchor.insertAdjacentElement('afterend', msg); else group.insertBefore(msg, group.firstChild); }
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
/* ───────── Combined "Register for NIS Online Services" concept ─────────
   One service, a router, then the Individual or Employer branch. */
const FORM_NAME = 'Register for NIS Online Services';
const SERVICE_NAME = 'Register for NIS Online Services';

function getFlow() {
  var who = GovBB.D['register-as'];
  if (who === 'Employer') {
    return ['start', 'who', 'employer-gate', 'employer-details', 'employer-contact', 'check', 'declaration', 'confirmation'];
  }
  if (who === 'Individual') {
    return GovBB.D['residency'] === 'Overseas'
      ? ['start', 'who', 'ind-gate', 'ind-eligibility', 'ind-details', 'ind-contact', 'ind-notary', 'check', 'declaration', 'confirmation']
      : ['start', 'who', 'ind-gate', 'ind-eligibility', 'ind-details', 'ind-contact', 'check', 'declaration', 'confirmation'];
  }
  return ['start', 'who'];
}

/* ───────── Helpers ───────── */
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function val(id){ return escapeHtml(GovBB.D[id]||''); }
function caption(){ return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+SERVICE_NAME+'</p>'; }
function isOverseas(){ return GovBB.D['residency']==='Overseas'; }

function textField(id,label,opts){ opts=opts||{}; var hint=opts.hint?'<p class="govbb-hint">'+opts.hint+'</p>':''; var type=opts.type||'text'; var im=opts.inputmode?' inputmode="'+opts.inputmode+'"':''; var ml=opts.maxlength?' maxlength="'+opts.maxlength+'"':'';
  return '<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="'+id+'">'+label+'</label>'+hint+'<div class="govbb-input-wrapper"><input class="govbb-input" type="'+type+'" id="'+id+'" name="'+id+'" data-field="'+id+'"'+im+ml+' value="'+val(id)+'" /></div></div>'; }

function selectField(id,label,options,opts){ opts=opts||{}; var hint=opts.hint?'<p class="govbb-hint">'+opts.hint+'</p>':''; var ops='<option value="">'+(opts.placeholder||'Select an option')+'</option>'+options.map(function(o){return '<option value="'+escapeHtml(o)+'"'+(GovBB.D[id]===o?' selected':'')+'>'+escapeHtml(o)+'</option>';}).join('');
  return '<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="'+id+'">'+label+'</label>'+hint+'<div class="govbb-select-wrapper"><select class="govbb-select" id="'+id+'" name="'+id+'" data-field="'+id+'">'+ops+'</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>'; }

const COUNTRIES = ['Barbados','Antigua and Barbuda','Australia','Bahamas','Belize','Canada','China','Cuba','Dominica','France','Germany','Ghana','Grenada','Guyana','India','Ireland','Italy','Jamaica','Netherlands','Nigeria','Saint Kitts and Nevis','Saint Lucia','Saint Vincent and the Grenadines','South Africa','Spain','Trinidad and Tobago','United Kingdom','United States','Other'];
function countryField(id,label,opts){ opts=opts||{}; var cur=GovBB.D[id]||opts.preselect||''; var ops='<option value="">'+(opts.placeholder||'Select a country')+'</option>'+COUNTRIES.map(function(c){return '<option value="'+escapeHtml(c)+'"'+(cur===c?' selected':'')+'>'+escapeHtml(c)+'</option>';}).join('');
  return '<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="'+id+'">'+label+'</label><div class="govbb-select-wrapper"><select class="govbb-select" id="'+id+'" name="'+id+'" data-field="'+id+'">'+ops+'</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>'; }

function radioBlock(id,options){ /* options: [{value,label}] */
  return '<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-visually-hidden">'+id+'</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-s);">'+
    options.map(function(o,i){ var rid=i===0?id:id+'-'+i; return '<div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="'+rid+'" name="'+id+'" value="'+escapeHtml(o.value)+'" data-field="'+id+'"'+(GovBB.D[id]===o.value?' checked':'')+' /><label class="govbb-radio-item__label" for="'+rid+'">'+o.label+'</label></div>'; }).join('')+
    '</div></fieldset>'; }

function btns(label,handler){ return '<div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="'+(handler||'next()')+'">'+(label||'Continue')+'</button></div>'; }

function fmtDate(iso){ if(!iso) return ''; var p=String(iso).split('-'); if(p.length!==3) return iso; var m=['January','February','March','April','May','June','July','August','September','October','November','December']; var d=parseInt(p[2],10),mm=parseInt(p[1],10); if(!d||!mm) return iso; return d+' '+(m[mm-1]||'')+' '+p[0]; }

/* gate handlers (No is a dead end, rendered directly so it stays out of the step count) */
function indGateNext(){ if(GovBB.D['has-nis']==='No'){ document.getElementById('app').innerHTML=PAGES['no-ind-nis'](); window.scrollTo(0,0); return; } next(); }
function employerGateNext(){ if(GovBB.D['employer-registered']==='No'){ document.getElementById('app').innerHTML=PAGES['no-employer-reg'](); window.scrollTo(0,0); return; } next(); }

/* individual ID + address (branch on residency) */
function idFields(){
  if(GovBB.D['id-type']==='Barbados National ID Card') return textField('nrn','National Registration Number (NRN)',{hint:'The number on your National ID card. For example, 870315-1234.',placeholder:'870315-1234'});
  if(GovBB.D['id-type']==='Passport') return textField('passport-number','Passport number')+textField('passport-issued','Passport issue date',{type:'date'})+textField('passport-expired','Passport expiry date',{type:'date'})+countryField('passport-country','Country that issued the passport');
  return '<p class="govbb-hint">Select your ID type above to continue.</p>';
}
function homeAddressFields(){
  if(isOverseas()){ delete GovBB.D['parish']; if(GovBB.D['country']==='Barbados') delete GovBB.D['country'];
    return textField('street-address','Street address')+textField('city-district','City, town or district (optional)')+textField('region','State, province or region (optional)')+textField('postal-code','Postal or ZIP code (optional)')+countryField('country','Country'); }
  delete GovBB.D['region']; if(!GovBB.D['country']) GovBB.D['country']='Barbados';
  return textField('street-address','Street address')+textField('city-district','City or district (optional)')+selectField('parish','Parish',GovBB.PARISHES,{placeholder:'Select a parish'})+textField('postal-code','Postal code (optional)',{hint:'For example, BB11000.'})+countryField('country','Country',{preselect:'Barbados'});
}
function fmtHome(){ if(isOverseas()) return [GovBB.D['street-address'],GovBB.D['city-district'],GovBB.D['region'],GovBB.D['postal-code'],GovBB.D['country']].filter(Boolean).join(', ');
  return [GovBB.D['street-address'],GovBB.D['city-district'],GovBB.D['parish'],GovBB.D['postal-code'],GovBB.D['country']||'Barbados'].filter(Boolean).join(', '); }
function fmtBusiness(){ return [GovBB.D['business-address-1'],GovBB.D['business-address-2'],GovBB.D['business-district'],GovBB.D['business-parish'],GovBB.D['business-postal-code']].filter(Boolean).join(', '); }

/* ───────── Pages ───────── */
const PAGES = {

  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);">
        <ol class="govbb-breadcrumbs__list">
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li>
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Money, tax and benefits</a></li>
        </ol>
      </nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Register for NIS Online Services</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Last updated on June 2026</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Use this service to register for online access to the National Insurance Online Social Security Service — whether you are registering as an individual or as a business.</p>

      <div style="background:var(--color-blue-10);border-left:4px solid var(--color-blue-40);padding:var(--spacing-s);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Concept prototype.</strong> This shows the two existing registration forms (individual and employer) combined into one service with a branch.</p>
      </div>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start now</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Who can use this service</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Individuals with a valid National Insurance number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Businesses already registered as an employer with the NIS</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">NIS reviews and verifies your registration.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A link to set your password is emailed to you. Allow up to <strong>5 working days</strong>.</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <ul style="list-style:none;padding:0;margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Telephone: <a href="tel:+12464317400" class="govbb-link">1 (246) 431-7400</a></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Frank Walcott Building, Culloden Road, St. Michael</li>
      </ul>
    </div>`,

  'who': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Who are you registering?</h1>
      ${radioBlock('register-as', [
        { value: 'Individual', label: 'Myself — I am an individual (employee or self-employed)' },
        { value: 'Employer', label: 'A business — registering as an employer' }
      ])}
      ${btns()}
    </form>`,

  /* ── Individual branch ── */
  'ind-gate': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Do you have a National Insurance number?</h1>
      <p class="govbb-hint" style="margin-bottom:var(--spacing-m);">Your number is on your NIS card or on letters from the NIS.</p>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-visually-hidden">Do you have a National Insurance number?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-s);">
          <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="has-nis" name="has-nis" value="Yes" data-field="has-nis"${GovBB.D['has-nis']==='Yes'?' checked':''} /><label class="govbb-radio-item__label" for="has-nis">Yes</label></div>
          <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="has-nis-1" name="has-nis" value="No" data-field="has-nis"${GovBB.D['has-nis']==='No'?' checked':''} /><label class="govbb-radio-item__label" for="has-nis-1">No</label></div>
        </div>
      </fieldset>
      ${btns('Continue','indGateNext()')}
    </form>`,

  'no-ind-nis': () => `
    <div>
      <span data-progress-indicator style="display:none"></span>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">You need a National Insurance number to use this service</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">You can only register for NIS Online Services if you already have a National Insurance number.</p>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you can do</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">If you have never had a National Insurance number, contact the National Insurance Office to register as a member first. Once you have your number, come back to register for online services.</p>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <ul style="list-style:none;padding:0;margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Telephone: <a href="tel:+12464317400" class="govbb-link">1 (246) 431-7400</a></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Frank Walcott Building, Culloden Road, St. Michael</li>
      </ul>
      <p><a class="govbb-link" href="#" onclick="event.preventDefault();GovBB.render();">Go back to the previous question</a></p>
    </div>`,

  'ind-eligibility': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Before you start</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <fieldset class="govbb-fieldset"><legend class="govbb-fieldset__legend govbb-label">Where do you currently live?</legend>
          <p class="govbb-hint">If you live overseas, your application must be witnessed by a Notary Public.</p>
          <div style="display:flex;flex-direction:column;gap:var(--spacing-s);">
            <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="residency" name="residency" value="In Barbados" data-field="residency"${GovBB.D['residency']==='In Barbados'?' checked':''} /><label class="govbb-radio-item__label" for="residency">In Barbados</label></div>
            <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="residency-1" name="residency" value="Overseas" data-field="residency"${GovBB.D['residency']==='Overseas'?' checked':''} /><label class="govbb-radio-item__label" for="residency-1">Overseas</label></div>
          </div>
        </fieldset>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <fieldset class="govbb-fieldset"><legend class="govbb-fieldset__legend govbb-label">What type of ID will you use?</legend>
          <div style="display:flex;flex-direction:column;gap:var(--spacing-s);">
            <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="id-type" name="id-type" value="Barbados National ID Card" data-field="id-type"${GovBB.D['id-type']==='Barbados National ID Card'?' checked':''} /><label class="govbb-radio-item__label" for="id-type">Barbados National ID Card</label></div>
            <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="id-type-1" name="id-type" value="Passport" data-field="id-type"${GovBB.D['id-type']==='Passport'?' checked':''} /><label class="govbb-radio-item__label" for="id-type-1">Passport</label></div>
          </div>
        </fieldset>
      </div>
      ${btns()}
    </form>`,

  'ind-details': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your details</h1>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Your name</h2>
      ${textField('first-name','First name')}
      ${textField('middle-name','Middle name (optional)')}
      ${textField('last-name','Last name')}
      ${textField('nis-number','National Insurance number',{inputmode:'numeric',maxlength:'6',hint:'Your 6-digit number, found on your NIS card or correspondence.'})}
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Your ID</h2>
      ${idFields()}
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Home address</h2>
      ${homeAddressFields()}
      ${btns()}
    </form>`,

  'ind-contact': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Contact and login details</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Give us at least one phone number and the email address where we should send your login details.</p>
      ${textField('phone-home','Home phone number (optional)',{type:'tel',inputmode:'tel'})}
      ${textField('phone-mobile','Mobile number (optional)',{type:'tel',inputmode:'tel'})}
      ${textField('contact-email','Email address',{type:'email',inputmode:'email',hint:'Your login details will be sent to this email address.'})}
      ${textField('confirm-email','Confirm email address',{type:'email',inputmode:'email'})}
      ${btns()}
    </form>`,

  'ind-notary': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Notary Public details</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Because you live overseas, your application must be witnessed by a Notary Public.</p>
      ${textField('notary-name','Notary Public name')}
      ${textField('jurisdiction','Jurisdiction',{hint:'The country or state where the Notary Public is registered.'})}
      ${textField('notarial-date','Date of notarisation',{type:'date'})}
      ${btns()}
    </form>`,

  /* ── Employer branch ── */
  'employer-gate': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Is your business registered as an employer with the NIS?</h1>
      <p class="govbb-hint" style="margin-bottom:var(--spacing-m);">Your business is registered as an employer if it already pays National Insurance contributions for its employees.</p>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-visually-hidden">Is your business registered as an employer with the NIS?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-s);">
          <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="employer-registered" name="employer-registered" value="Yes" data-field="employer-registered"${GovBB.D['employer-registered']==='Yes'?' checked':''} /><label class="govbb-radio-item__label" for="employer-registered">Yes</label></div>

      : `${GovBB.summaryRow('National Registration Number', GovBB.D['nrn'], 'ind-details')}`;
    return `
      <div>
        <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers</h1>
        <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About you</h2>
        <dl style="margin-bottom:var(--spacing-m);">
          ${GovBB.summaryRow('Registering as', 'An individual', 'who')}
          ${GovBB.summaryRow('Where you live', GovBB.D['residency'], 'ind-eligibility')}
          ${GovBB.summaryRow('Name', [GovBB.D['first-name'],GovBB.D['middle-name'],GovBB.D['last-name']].filter(Boolean).join(' '), 'ind-details')}
          ${GovBB.summaryRow('National Insurance number', GovBB.D['nis-number'], 'ind-details')}

        </dl>
        ${isOverseas() ? `<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Overseas notarisation</h2><dl style="margin-bottom:var(--spacing-l);">${GovBB.summaryRow('Notary Public name', GovBB.D['notary-name'], 'ind-notary')}${GovBB.summaryRow('Jurisdiction', GovBB.D['jurisdiction'], 'ind-notary')}${GovBB.summaryRow('Date of notarisation', fmtDate(GovBB.D['notarial-date']), 'ind-notary')}</dl>` : ''}

  'declaration': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Declaration</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Please read and confirm the declaration before you submit.</p>
      <div style="background:var(--color-yellow-10);border-left:4px solid var(--color-yellow-00);padding:var(--spacing-s);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body">Any person who knowingly makes a false statement or false representation in connection with this registration commits a criminal offence punishable by a fine or imprisonment, or both.</p>
      </div>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-visually-hidden">Declaration</legend>
        <div class="govbb-checkbox-item" style="align-items:flex-start;gap:var(--spacing-s);">
          <input class="govbb-checkbox" type="checkbox" id="declaration-consent" name="declaration-consent" data-field="declaration-consent"${GovBB.D['declaration-consent']?' checked':''} />
          <label class="govbb-checkbox-item__label" for="declaration-consent">I confirm that the information given is true to the best of my knowledge and belief, and I agree to my login details being sent to the email address above.</label>
        </div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Submit registration</button>
      </div>

  'confirmation': () => {
    window.__refNumber = window.__refNumber || ('NIS-ONL-' + Math.random().toString(36).substring(2,8).toUpperCase());
    if (document.title.indexOf('Error: ') === 0) document.title = document.title.substring('Error: '.length);
    const overseas = GovBB.D['register-as'] === 'Individual' && isOverseas();
    return `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Registration submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>

        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A link to set your password will be sent to <strong>${escapeHtml(GovBB.D['contact-email']||'your email address')}</strong>. Allow up to 5 working days.</li>

function checkButtons(){ return '<div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue to declaration</button></div>'; }

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D; const errors = []; const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  function req(id,msg){ if(!D[id]||!String(D[id]).trim()) errors.push({id:id,msg:msg}); }
  function phoneOk(v){ return /^\d{7,15}$/.test(String(v).replace(/[\s\-()+]/g,'')); }
  function todayISO(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

  if (pageId === 'who') { if(!D['register-as']) errors.push({id:'register-as',msg:'Select who you are registering'}); }
  if (pageId === 'ind-gate') { if(!D['has-nis']) errors.push({id:'has-nis',msg:'Select yes if you have a National Insurance number'}); }
  if (pageId === 'employer-gate') { if(!D['employer-registered']) errors.push({id:'employer-registered',msg:'Select yes if your business is registered as an employer'}); }

  if (pageId === 'ind-eligibility') {
    if(!D['residency']) errors.push({id:'residency',msg:'Select where you currently live'});
    if(!D['id-type']) errors.push({id:'id-type',msg:'Select the type of ID you will use'});
  }
  if (pageId === 'ind-details') {
    req('first-name','Enter your first name'); req('last-name','Enter your last name');
    var nis=(D['nis-number']||'').trim();
    if(!nis) errors.push({id:'nis-number',msg:'Enter your National Insurance number'});
    else if(!/^\d{6}$/.test(nis)) errors.push({id:'nis-number',msg:'Enter a 6-digit number, for example 123456'});
    if(D['id-type']==='Barbados National ID Card'){ var nrn=(D['nrn']||'').trim(); if(!nrn) errors.push({id:'nrn',msg:'Enter your National Registration Number'}); else if(!/^\d{6}-\d{4}$/.test(nrn)) errors.push({id:'nrn',msg:'Enter a valid number in the format 870315-1234'}); }
    else if(D['id-type']==='Passport'){ req('passport-number','Enter your passport number');
      if(!D['passport-issued']) errors.push({id:'passport-issued',msg:'Enter the passport issue date'}); else if(D['passport-issued']>todayISO()) errors.push({id:'passport-issued',msg:'The issue date cannot be in the future'});
      if(!D['passport-expired']) errors.push({id:'passport-expired',msg:'Enter the passport expiry date'}); else if(D['passport-expired']<todayISO()) errors.push({id:'passport-expired',msg:'This passport has expired — use a valid passport'});
      req('passport-country','Select the country that issued the passport'); }
    req('street-address','Enter your street address'); req('country','Select your country');
    if(D['residency']!=='Overseas'){ req('parish','Select your parish'); var pc=(D['postal-code']||'').trim(); if(pc&&!/^BB\d{5}$/i.test(pc.replace(/\s/g,''))) errors.push({id:'postal-code',msg:'Enter a valid postal code, for example BB11000'}); }
  }
  if (pageId === 'ind-contact') {
    var h=(D['phone-home']||'').trim(), m=(D['phone-mobile']||'').trim();
    if(!h&&!m) errors.push({id:'phone-mobile',msg:'Enter at least one phone number'});
    else { if(h&&!phoneOk(h)) errors.push({id:'phone-home',msg:'Enter a phone number using 7 to 15 digits'}); if(m&&!phoneOk(m)) errors.push({id:'phone-mobile',msg:'Enter a phone number using 7 to 15 digits'}); }
    var e=(D['contact-email']||'').trim(); if(!e) errors.push({id:'contact-email',msg:'Enter an email address'}); else if(!EMAIL_RE.test(e)) errors.push({id:'contact-email',msg:'Enter an email address in the format you@example.com'});
    var c=(D['confirm-email']||'').trim(); if(!c) errors.push({id:'confirm-email',msg:'Re-enter the email address to confirm it'}); else if(e&&c.toLowerCase()!==e.toLowerCase()) errors.push({id:'confirm-email',msg:'This does not match the email address you entered above'});
  }
  if (pageId === 'ind-notary') { req('notary-name','Enter the Notary Public name'); req('jurisdiction','Enter the jurisdiction'); if(!D['notarial-date']) errors.push({id:'notarial-date',msg:'Enter the date of notarisation'}); }

  if (pageId === 'employer-details') {
    req('business-name','Enter the name of the business');
    var en=(D['employer-nis-number']||'').trim(); if(!en) errors.push({id:'employer-nis-number',msg:"Enter the employer's National Insurance Number"}); else if(!/^\d{7}$/.test(en)) errors.push({id:'employer-nis-number',msg:'Enter a 7-digit number, for example 1234567'});
    var rg=(D['business-reg-number']||'').trim(); if(!rg) errors.push({id:'business-reg-number',msg:'Enter your Business Registration Number'}); else if(!/^[A-Za-z0-9]{6}$/.test(rg)) errors.push({id:'business-reg-number',msg:'Enter a 6-character registration number, for example AB1234'});
    req('business-address-1','Enter the street address of the business'); req('business-parish','Select the parish where the business is located');
    var bpc=(D['business-postal-code']||'').trim(); if(bpc&&!/^BB\d{5}$/i.test(bpc.replace(/\s/g,''))) errors.push({id:'business-postal-code',msg:'Enter a valid postal code, for example BB11000'});
  }
  if (pageId === 'employer-contact') {
    req('contact-name','Enter the name of the contact person');
    var p=(D['contact-phone']||'').trim(); if(!p) errors.push({id:'contact-phone',msg:'Enter a contact phone number'}); else if(!phoneOk(p)) errors.push({id:'contact-phone',msg:'Enter a phone number using 7 to 15 digits'});
    var e2=(D['contact-email']||'').trim(); if(!e2) errors.push({id:'contact-email',msg:'Enter an email address'}); else if(!EMAIL_RE.test(e2)) errors.push({id:'contact-email',msg:'Enter an email address in the format you@example.com'});
    var c2=(D['confirm-email']||'').trim(); if(!c2) errors.push({id:'confirm-email',msg:'Re-enter the email address to confirm it'}); else if(e2&&c2.toLowerCase()!==e2.toLowerCase()) errors.push({id:'confirm-email',msg:'This does not match the email address you entered above'});
    req('authorised-person-name','Enter the full name of the authorised person');
  }
  if (pageId === 'declaration') { if(!D['declaration-consent']) errors.push({id:'declaration-consent',msg:'Tick the box to confirm the declaration'}); }
  return errors;
}

GovBB.init({ formName: FORM_NAME, getFlow: getFlow, pages: PAGES, validate: validate });

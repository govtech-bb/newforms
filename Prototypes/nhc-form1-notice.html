<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenant's Notice of Intention to Purchase Freehold – National Housing Corporation</title>
  <link rel="stylesheet" href="../dist/styles.css">
  <style>
    /* Formal Form 1 legal notice — styled to match the prescribed paper form. */
    .form1-notice {
      font-family: 'Times New Roman', Georgia, serif;
      color: #000;
      background: #fff;
      border: 1px solid var(--color-grey-00);
      padding: 2.5rem;
      line-height: 1.7;
      font-size: 1.0625rem;
    }
    .form1-notice__section { text-align: right; font-style: italic; margin: 0 0 1.5rem; }
    .form1-notice__formno  { text-align: center; font-weight: 700; letter-spacing: 0.12em; margin: 0 0 0.75rem; }
    .form1-notice__act     { text-align: center; font-weight: 700; margin: 0 0 1.5rem; }
    .form1-notice__title   { text-align: center; text-transform: uppercase; margin: 0 0 2rem; }
    .form1-notice__body p  { margin: 0 0 1.25rem; }
    .form1-notice__fill    { font-weight: 700; text-decoration: underline; }
    .form1-notice__sign    { margin-top: 2.5rem; }
    .form1-notice__sigline { border-bottom: 1px solid #000; width: 60%; height: 1.5rem; margin-bottom: 0.25rem; }

    /* When printing, hide everything except the formal notice document. */
    @media print {
      body * { visibility: hidden !important; }
      #form1-notice, #form1-notice * { visibility: visible !important; }
      #form1-notice { position: absolute; left: 0; top: 0; width: 100%; }
      #form1-notice .form1-notice { border: none; padding: 0; }
    }
  </style>
</head>

<main class="govbb-page__main">

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
  if (document.title.indexOf('Error: ') === 0) document.title = document.title.slice(7);
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  var app = document.getElementById('app');
  var h1 = app.querySelector('h1');
  if (h1) { h1.insertAdjacentHTML('afterend', html); } else { app.insertAdjacentHTML('afterbegin', html); }
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) {
      var anchor = group.querySelector('.govbb-hint') || group.querySelector('.govbb-label') || group.querySelector('legend');
      if (anchor) anchor.insertAdjacentElement('afterend', msg);
      else group.insertBefore(msg, group.firstChild);
    }
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = 'Tenant\'s Notice of Intention to Purchase Freehold';

const FLOW = [
  'start',
  'tenant-details',
  'landlord-details',
  'property-details',
  'check',
  'declaration',
  'confirmation'
];

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* The prescribed Form 1 legal notice, populated with the tenant's answers.
   Wording matches the official form (Tenantries Freehold Purchase Act,
   Cap. 239B, Section 12(1)). The date and signature are left blank to be
   completed by hand when the notice is served. */
function formalNotice() {
  const fill = (v) => v ? '<span class="form1-notice__fill">' + escapeHtml(v) + '</span>' : '<span class="form1-notice__fill">&nbsp;&hellip;&nbsp;</span>';
  return `
    <div class="form1-notice">
      <p class="form1-notice__section">(Section 12(1))</p>
      <p class="form1-notice__formno">FORM 1</p>
      <p class="form1-notice__act">Tenantries Freehold Purchase Act, Cap. 239B</p>
      <p class="form1-notice__title">Tenant's Notice to Landlord of Intention to Purchase the Freehold of his Lot</p>
      <div class="form1-notice__body">
        <p>To: ${fill(GovBB.D['landlord-name'])}</p>
        <p>TAKE NOTICE THAT: I, the undersigned, being a tenant of a lot comprised in: ${fill(GovBB.D['tenantry-name'])} in the parish of: ${fill(GovBB.D['parish'])} hereby give notice of my intention to purchase the freehold of that lot in accordance with the above-mentioned law.</p>
        <p>Given under my hand this ________ day of ________, 20____ .</p>
      </div>
      <div class="form1-notice__sign">
        <div class="form1-notice__sigline"></div>
        <p>Tenant${GovBB.D['tenant-name'] ? ' (' + escapeHtml(GovBB.D['tenant-name']) + ')' : '.'}</p>
      </div>
    </div>`;
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);">
        <ol class="govbb-breadcrumbs__list">
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li>
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Housing and property</a></li>
        </ol>
      </nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Serve a notice to purchase the freehold of your lot</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Last updated on May 2025</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Use this service to give your landlord formal notice that you intend to purchase the freehold of the lot you rent in a tenantry. This is known as a <strong>Form 1 notice</strong> under the Tenantries Freehold Purchase Act (Cap. 239B).</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">The service creates your notice. You then print it, sign it, and serve it on your landlord.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start now</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Who can use this service</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Tenants of a lot within a tenantry in Barbados</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Those who want to purchase the freehold of the lot they rent</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your full name</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your landlord's full name (a person or an organisation)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The name of the tenantry where your lot is located</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The parish where the tenantry is located</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your email address, so we can send you a copy of the notice</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens after you serve the notice</h2>
      <ol style="list-style:decimal;padding-left:var(--spacing-m);margin-bottom:var(--spacing-s);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Serve the signed notice on your landlord and keep a copy for your records.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If your landlord agrees to sell, you arrange the transfer of the freehold (the conveyance) with them.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If your landlord refuses to sell, cannot be found, or has not appointed an attorney, you can ask the Registrar of Titles to act on your behalf by completing a separate <strong>Form II</strong> notice at the Land Registry Department.</li>
      </ol>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">You must be a qualified tenant of the lot. The National Housing Corporation can guide you through the next steps, including the purchase price.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start now</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Contact the National Housing Corporation if you need help completing this notice.</p>
      <ul style="list-style:none;padding:0;margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Telephone: <a href="tel:+12465365300" class="govbb-link">1 (246) 536-5300</a></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Email: <a href="mailto:NHC.CustomerService@barbados.gov.bb" class="govbb-link">NHC.CustomerService@barbados.gov.bb</a></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">"The Garden", Country Road, St. Michael</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Monday to Friday, 8:15am to 4:30pm</li>
      </ul>
    </div>`,

  /* ── Tenant details ── */
  'tenant-details': () => `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Housing Corporation</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your name</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="tenant-name">Full name</label>
        <p class="govbb-hint">Enter your name exactly as you want it to appear on the notice.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="tenant-name" name="tenant-name" data-field="tenant-name" value="${GovBB.D['tenant-name']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Landlord details ── */
  'landlord-details': () => `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Housing Corporation</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Landlord details</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);color:var(--color-mid-grey-00);">Enter the name of the person or organisation who owns the tenantry.</p>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="landlord-name">Landlord's full name</label>
        <p class="govbb-hint">For example, John Public or Ministry of Finance.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="landlord-name" name="landlord-name" data-field="landlord-name" value="${GovBB.D['landlord-name']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Property details ── */
  'property-details': () => `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Housing Corporation</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Property details</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="tenantry-name">Tenantry name</label>
        <p class="govbb-hint">The name of the tenantry where your lot is located.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="tenantry-name" name="tenantry-name" data-field="tenantry-name" value="${GovBB.D['tenantry-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="parish">Parish</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="parish" name="parish" data-field="parish">
            <option value="">Select a parish</option>
            ${GovBB.PARISHES.map(o=>`<option value="${o}"${GovBB.D['parish']===o?' selected':''}>${o}</option>`).join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Check your answers ── */
  'check': () => `
    <div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers</h1>
      <dl style="margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Your name', GovBB.D['tenant-name'] || '', 'tenant-details')}
        ${GovBB.summaryRow('Landlord name', GovBB.D['landlord-name'] || '', 'landlord-details')}
        ${GovBB.summaryRow('Tenantry name', GovBB.D['tenantry-name'] || '', 'property-details')}
        ${GovBB.summaryRow('Parish', GovBB.D['parish'] || '', 'property-details')}
      </dl>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue to your notice</button>
      </div>
    </div>`,

  /* ── Declaration ── */
  'declaration': () => {
    return `
    <form novalidate>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Housing Corporation</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Your notice</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);color:var(--color-mid-grey-00);">This is the notice that will be created. Check it carefully before you create it.</p>

      ${formalNotice()}
      <p class="govbb-text-body" style="margin-top:var(--spacing-s);margin-bottom:var(--spacing-m);color:var(--color-mid-grey-00);">You will date and sign the notice by hand when you serve it on your landlord.</p>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="contact-email">Your email address (optional)</label>
        <p class="govbb-hint">If you want a copy emailed to you. You do not need an email — you can print or save the notice on the next page. For example, you@example.com.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="email" id="contact-email" name="contact-email" data-field="contact-email" inputmode="email" value="${GovBB.D['contact-email']||''}" />
        </div>
      </div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-visually-hidden">Confirmation</legend>
        <div class="govbb-checkbox-item" style="align-items:flex-start;gap:var(--spacing-s);">
          <input class="govbb-checkbox" type="checkbox" id="decl-agree" name="decl-agree" data-field="decl-agree"${GovBB.D['decl-agree']?' checked':''} />
          <label class="govbb-checkbox-item__label" for="decl-agree">I confirm that the information in this notice is correct and that I will serve it on my landlord.</label>
        </div>
      </fieldset>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Create my notice</button>
      </div>
    </form>`;
  },

  /* ── Confirmation ── */
  'confirmation': () => {
    window.__refNumber = window.__refNumber || ('NHC-NOTICE-' + Math.random().toString(36).substring(2, 8).toUpperCase());
    if (document.title.indexOf('Error: ') === 0) document.title = document.title.substring('Error: '.length);
    return `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Notice created</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${window.__refNumber}</p>
      </div>

      ${GovBB.D['contact-email'] ? `<p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">We have sent a copy of your notice to <strong>${escapeHtml(GovBB.D['contact-email'])}</strong>.</p>` : ''}

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Your notice</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);color:var(--color-mid-grey-00);">This is your notice. Print it, then sign and date it by hand before serving it.</p>

      <div id="form1-notice" style="margin-bottom:var(--spacing-m);">${formalNotice()}</div>

      <p style="margin-bottom:var(--spacing-s);"><button type="button" class="govbb-btn--secondary" onclick="window.print()">Print or save this notice</button></p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What to do next</h2>
      <ol style="list-style:decimal;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Print your notice.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Sign and date it by hand.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Serve it on your landlord. Keep a copy for your records.</li>
      </ol>

      <p style="margin-bottom:var(--spacing-l);"><a class="govbb-link" href="#" onclick="event.preventDefault();GovBB.D={};window.__refNumber=null;GovBB.nav('start');">Create another notice</a></p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Contact the National Housing Corporation if you need help.</p>
      <ul style="list-style:none;padding:0;margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Telephone: <a href="tel:+12465365300" class="govbb-link">1 (246) 536-5300</a></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Email: <a href="mailto:NHC.CustomerService@barbados.gov.bb" class="govbb-link">NHC.CustomerService@barbados.gov.bb</a></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">"The Garden", Country Road, St. Michael</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Monday to Friday, 8:15am to 4:30pm</li>
      </ul>
    </div>`;
  }

};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (pageId === 'tenant-details') {
    if (!D['tenant-name'] || !D['tenant-name'].trim()) errors.push({ id: 'tenant-name', msg: 'Enter your full name' });
  }

  if (pageId === 'landlord-details') {
    if (!D['landlord-name'] || !D['landlord-name'].trim()) errors.push({ id: 'landlord-name', msg: 'Enter your landlord\'s full name' });
  }

  if (pageId === 'property-details') {
    if (!D['tenantry-name'] || !D['tenantry-name'].trim()) errors.push({ id: 'tenantry-name', msg: 'Enter the name of the tenantry' });
    if (!D['parish']) errors.push({ id: 'parish', msg: 'Select a parish' });
  }

  if (pageId === 'declaration') {
    const email = (D['contact-email'] || '').trim();
    /* Email is optional. Only validate the format when one is given. */
    if (email && !EMAIL_RE.test(email)) errors.push({ id: 'contact-email', msg: 'Enter an email address in the format you@example.com' });
    if (!D['decl-agree']) errors.push({ id: 'decl-agree', msg: 'Tick the box to confirm the notice is correct' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  getFlow: function() { return FLOW; },
  pages: PAGES,
  validate: validate
});
</script>

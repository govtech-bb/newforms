<script>
GovBB.clearErrors=function(){var s=document.getElementById('error-summary');if(s)s.remove();document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});};
GovBB.showErrors=function(errors){GovBB.clearErrors();if(!errors||!errors.length)return;var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>';});html+='</ul></div>';var app=document.getElementById('app');var h1=app.querySelector('h1');if(h1)h1.insertAdjacentHTML('afterend',html);else app.insertAdjacentHTML('afterbegin',html);document.getElementById('error-summary').focus();errors.forEach(function(e){var el=document.getElementById(e.id);if(!el)return;var errId='err-'+e.id;el.setAttribute('aria-invalid','true');el.setAttribute('aria-describedby',errId);var msg=document.createElement('p');msg.className='govbb-error-message';msg.id=errId;msg.textContent=e.msg;var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;if(group)group.appendChild(msg);});if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;};
GovBB.summaryRow=function(label,value,changeTo){var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';};
</script>
<script>
function next(){GovBB.next();}function back(){GovBB.back();}function nav(p){GovBB.nav(p);}

const FORM_NAME='Claim a refund of examination fees (private candidates)';
const CAPTION='Ministry of Educational Transformation';
const TITLES=['Mr','Mrs','Miss','Dr','Rev','Pastor','Hon','Prof'];
const PARISHES=['Christ Church','St. Andrew','St. George','St. James','St. John','St. Joseph','St. Lucy','St. Michael','St. Peter','St. Philip','St. Thomas'];
const RELATIONSHIPS=['Mother','Father','Grandmother','Grandfather','Aunt','Uncle','Legal guardian','Sibling','Other'];
const CANDIDATE_STATUS=['Part-time','Full-time','Other'];
const EXAM_SERIES=['2025 January','2025 May/June','2026 January','2026 May/June'];
const BANKS=['Bank of Nova Scotia','Royal Bank of Canada','Republic Bank Barbados Ltd','First Citizens Bank','CIBC FirstCaribbean International','Sagicor Bank (Barbados) Ltd','City of Bridgetown Co-operative Credit Union','Barbados Public Workers\' Co-op Credit Union','Barbados Workers\' Union Co-op Credit Union','Barbados Teachers\' Co-op Credit Union','Other'];
const ACCOUNT_TYPES=['Savings','Chequing'];
const MAX_SUBJECTS=8;

const FLOW=['start','claimant-details','guardian-details','subjects-count','subjects-data','reason','banking','evidence','declaration','check','confirmation'];

function caption(){return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+CAPTION+'</p>';}
function maskNid(nid){if(!nid)return '';var m=String(nid).trim().match(/^(\d{6})-(\d{4})$/);return m?'••••••-'+m[2]:String(nid).trim();}
function maskAccount(num){if(!num)return '';const digits=String(num).replace(/[\s\-]/g,'');if(digits.length<=4)return digits;return '••••••'+digits.slice(-4);}
function formatPhone(p){if(!p)return '';var digits=String(p).replace(/[^\d]/g,'');if(digits.length===10&&digits.indexOf('246')===0)return '(246) '+digits.substring(3,6)+' '+digits.substring(6);return String(p).trim();}
function fmtDate(prefix){const d=GovBB.D[prefix+'-day'],m=GovBB.D[prefix+'-month'],y=GovBB.D[prefix+'-year'];if(!d&&!m&&!y)return '';return [d,m,y].filter(Boolean).join(' / ');}
function parseDate(prefix){const d=parseInt(GovBB.D[prefix+'-day'],10),m=parseInt(GovBB.D[prefix+'-month'],10),y=parseInt(GovBB.D[prefix+'-year'],10);if(!d||!m||!y)return null;if(d<1||d>31||m<1||m>12||y<1900||y>2100)return false;const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return false;return dt;}
function claimantName(){return [GovBB.D['title'],GovBB.D['first-name'],GovBB.D['surname']].filter(Boolean).join(' ');}
function isMinor(){const dob=parseDate('dob');if(!dob||dob===false)return false;const today=new Date();today.setHours(0,0,0,0);let age=today.getFullYear()-dob.getFullYear();if(today.getMonth()<dob.getMonth()||(today.getMonth()===dob.getMonth()&&today.getDate()<dob.getDate()))age--;return age<18;}
function subjectCount(){const n=parseInt(GovBB.D['subject-count'],10);if(isNaN(n)||n<1)return 1;if(n>MAX_SUBJECTS)return MAX_SUBJECTS;return n;}
function totalCents(){var sum=0;for(let i=1;i<=subjectCount();i++){var raw=String(GovBB.D['subj-'+i+'-amount']||'').replace(/,/g,'').trim();if(!raw)continue;var m=raw.match(/^(\d+)(?:\.(\d{1,2}))?$/);if(!m)continue;var dollars=parseInt(m[1],10);var cents=m[2]?parseInt((m[2]+'00').slice(0,2),10):0;sum+=dollars*100+cents;}return sum;}
function totalDisplay(){var c=totalCents();return '$'+Math.floor(c/100).toLocaleString()+'.'+String(c%100).padStart(2,'0');}

function handleUpload(key,input){const file=input.files&&input.files[0];if(!file)return;if(file.size>10*1024*1024){alert('File is larger than 10 MB.');input.value='';return;}GovBB.D['upload-'+key]={name:file.name,size:file.size,type:file.type};GovBB.render();}
function removeUpload(key){delete GovBB.D['upload-'+key];GovBB.render();}
function formatBytes(n){if(n<1024)return n+' B';if(n<1024*1024)return (n/1024).toFixed(1)+' KB';return (n/(1024*1024)).toFixed(1)+' MB';}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uploadRow(key,label,hint){var file=GovBB.D['upload-'+key];if(file){return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);border-left:4px solid var(--color-green-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}<p class="govbb-text-body" style="margin:0;font-size:var(--font-size-caption);color:var(--color-mid-grey-00);word-break:break-all;"><span aria-hidden="true">✓ </span>${escapeHtml(file.name)} (${formatBytes(file.size)})</p></div><button type="button" class="govbb-btn--link" style="flex-shrink:0;" onclick="removeUpload('${key}')">Remove<span class="govbb-visually-hidden"> ${label}</span></button></div>`;}return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;flex:1;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}</div><label for="upload-${key}" class="govbb-btn--secondary" style="flex-shrink:0;cursor:pointer;margin:0;">Upload file</label><input type="file" id="upload-${key}" accept=".pdf,.jpg,.jpeg,.png" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleUpload('${key}', this)" /></div>`;}

function dateField(prefix,legend,hint){return `<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">${legend}</legend>${hint?`<p class="govbb-hint">${hint}</p>`:''}<div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;"><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-day">Day</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-month">Month</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-year">Year</label><div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div></div></div></fieldset>`;}

const PAGES = {
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);"><ol class="govbb-breadcrumbs__list"><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Examinations</a></li></ol></nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Claim a refund of examination fees</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 29 May 2026 · Private candidates</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">If you paid CSEC or CAPE examination fees as a private candidate and the exam did not happen, or you were unable to sit it, you may be eligible to claim a refund.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Apply online. No fee. Takes about <strong>15 to 20 minutes</strong>.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start claim</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Refunds are not automatic.</strong> Each claim is reviewed by the Examinations Unit against CXC's refund rules. Some fees — for example, administrative or late-registration fees — are non-refundable.</p>
      </div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Claim deadlines apply.</strong> Refund claims must be submitted within 6 months of the original payment. Late claims will not be considered.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The candidate's name, NID, date of birth, sex, and contact details</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A parent or guardian's name and contact details (if the candidate is under 18)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">For each subject being claimed: name, sitting (e.g. May/June 2025), and amount paid in $BBD</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Bank or credit union details for the refund deposit</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A scan or photo of: the original payment receipt(s), your photo ID, and the candidate's birth certificate (if a minor)</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Examinations Unit verifies the payment and checks the claim against CXC's refund rules.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Senior Officer (Exams) and Deputy Permanent Secretary approve the refund.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Approved refunds are paid into the bank account you provided within <strong>8 weeks</strong>.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If any part of the claim is declined, you will be told why in writing.</li>
      </ul>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start claim</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call the Examinations Unit on <strong>(246) 535-0600</strong> or email <a class="govbb-link" href="mailto:exams@mes.gov.bb">exams@mes.gov.bb</a>.</p>
    </div>`,

  'claimant-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About the candidate</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">The person who paid the examination fees and is claiming the refund.</p>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="title">Title</label><div class="govbb-select-wrapper"><select class="govbb-select" id="title" name="title" data-field="title"><option value="">Select a title</option>${TITLES.map(t=>`<option value="${t}"${GovBB.D['title']===t?' selected':''}>${t}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="surname">Surname</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="surname" name="surname" data-field="surname" autocomplete="family-name" value="${GovBB.D['surname']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="first-name">First name(s)</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="first-name" name="first-name" data-field="first-name" autocomplete="given-name" value="${GovBB.D['first-name']||''}" /></div></div>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">Sex</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-xs);"><div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="sex-m" name="sex" data-field="sex" value="Male"${GovBB.D['sex']==='Male'?' checked':''} /><label class="govbb-radio-item__label" for="sex-m">Male</label></div><div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="sex-f" name="sex" data-field="sex" value="Female"${GovBB.D['sex']==='Female'?' checked':''} /><label class="govbb-radio-item__label" for="sex-f">Female</label></div></div></fieldset>
      ${dateField('dob','Date of birth','For example, 15 6 2005.')}
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="nid">National ID Number</label><p class="govbb-hint">For example, 050615-0048.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="nid" name="nid" data-field="nid" value="${GovBB.D['nid']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="address">Home address</label><textarea class="govbb-textarea" id="address" name="address" data-field="address" rows="3">${GovBB.D['address']||''}</textarea></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parish">Parish</label><div class="govbb-select-wrapper"><select class="govbb-select" id="parish" name="parish" data-field="parish"><option value="">Select a parish</option>${PARISHES.map(p=>`<option value="${p}"${GovBB.D['parish']===p?' selected':''}>${p}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="phone">Mobile number</label><p class="govbb-hint">For example, (246) 249 1234.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="tel" id="phone" name="phone" data-field="phone" inputmode="tel" autocomplete="tel" value="${GovBB.D['phone']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="email">Email address</label><div class="govbb-input-wrapper"><input class="govbb-input" type="email" id="email" name="email" data-field="email" inputmode="email" autocomplete="email" value="${GovBB.D['email']||''}" /></div></div>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">Candidate status</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
        ${CANDIDATE_STATUS.map((s,i)=>`<div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="status-${i}" name="candidate-status" data-field="candidate-status" value="${s}"${GovBB.D['candidate-status']===s?' checked':''} /><label class="govbb-radio-item__label" for="status-${i}">${s}</label></div>`).join('')}
      </div></fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'guardian-details': () => {
    if (!isMinor()) {
      /* Skip this page if not a minor — auto-advance */
      setTimeout(function(){ GovBB.next(); }, 0);
      return `<p class="govbb-text-body" style="text-align:center;color:var(--color-mid-grey-00);padding:var(--spacing-l);">Loading next step…</p>`;
    }
    return `<form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Parent or guardian details</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">The candidate is under 18. Please give a parent or guardian as the primary contact, and a secondary contact.</p>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Primary contact</h2>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-name">Full name</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="guardian-name" name="guardian-name" data-field="guardian-name" autocomplete="name" value="${GovBB.D['guardian-name']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-rel">Relationship</label><div class="govbb-select-wrapper"><select class="govbb-select" id="guardian-rel" name="guardian-rel" data-field="guardian-rel"><option value="">Select one</option>${RELATIONSHIPS.map(r=>`<option value="${r}"${GovBB.D['guardian-rel']===r?' selected':''}>${r}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-phone">Mobile number</label><div class="govbb-input-wrapper"><input class="govbb-input" type="tel" id="guardian-phone" name="guardian-phone" data-field="guardian-phone" inputmode="tel" value="${GovBB.D['guardian-phone']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="guardian-email">Email address</label><div class="govbb-input-wrapper"><input class="govbb-input" type="email" id="guardian-email" name="guardian-email" data-field="guardian-email" inputmode="email" value="${GovBB.D['guardian-email']||''}" /></div></div>

function validate(pageId){
  const D=GovBB.D,errors=[];
  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/,NID_RE=/^\d{6}-\d{4}$/;
  function req(id,msg){if(!D[id]||String(D[id]).trim()==='')errors.push({id:id,msg:msg});}
  function reqNid(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!NID_RE.test(v))errors.push({id:id,msg:label+' must be in the format 110915-0048'});}
  function reqPhone(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}var digits=v.replace(/[\s\-()+]/g,'');if(!/^\d{7,15}$/.test(digits))errors.push({id:id,msg:label+' must contain 7 to 15 digits'});}
  function reqEmail(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!EMAIL_RE.test(v))errors.push({id:id,msg:label+' must be in the format you@example.com'});}
  function reqDate(prefix,label){const d=D[prefix+'-day'],m=D[prefix+'-month'],y=D[prefix+'-year'];if(!d||!m||!y){errors.push({id:prefix+'-day',msg:label+' — enter a complete date.'});return null;}const dt=parseDate(prefix);if(dt===false){errors.push({id:prefix+'-day',msg:label+' — enter a real date.'});return null;}return dt;}

  if(pageId==='claimant-details'){
    req('title','Select a title');
    req('surname','Enter your surname');
    req('first-name','Enter your first name');
    if(!D['sex'])errors.push({id:'sex-m',msg:'Select the candidate\'s sex'});
    const dob=reqDate('dob','Date of birth');
    if(dob){const today=new Date();today.setHours(0,0,0,0);if(dob>=today)errors.push({id:'dob-day',msg:'Date of birth must be in the past.'});}
    reqNid('nid','National ID Number','Enter the National ID Number');
    req('address','Enter the home address');
    req('parish','Select a parish');
    reqPhone('phone','Mobile number','Enter a mobile number');
    reqEmail('email','Email address','Enter an email address');
    if(!D['candidate-status'])errors.push({id:'status-0',msg:'Select the candidate\'s status'});
  }
  if(pageId==='guardian-details'){
    if(!isMinor())return errors; /* skip — auto-advances */
    req('guardian-name','Enter the parent or guardian\'s name');
    req('guardian-rel','Select the relationship');
    reqPhone('guardian-phone','Mobile number','Enter the parent or guardian\'s mobile number');
    reqEmail('guardian-email','Email address','Enter the parent or guardian\'s email address');
  }
  if(pageId==='subjects-count'){
    if(!D['subject-count'])errors.push({id:'subject-count-1',msg:'Choose how many subjects you are claiming for'});
  }
  if(pageId==='subjects-data'){
    for(let i=1;i<=subjectCount();i++){
      req('subj-'+i+'-name','Subject '+i+' — enter the subject name');
      req('subj-'+i+'-series','Subject '+i+' — select the examination series');
      var amt=(D['subj-'+i+'-amount']||'').trim();
      if(!amt){errors.push({id:'subj-'+i+'-amount',msg:'Subject '+i+' — enter the amount paid'});}
      else if(!/^\d+(\.\d{1,2})?$/.test(amt.replace(/,/g,''))){errors.push({id:'subj-'+i+'-amount',msg:'Subject '+i+' — amount must be a number, for example 250 or 250.50'});}
      else{var n=parseFloat(amt.replace(/,/g,''));if(n<=0)errors.push({id:'subj-'+i+'-amount',msg:'Subject '+i+' — amount must be more than $0'});else if(n>5000)errors.push({id:'subj-'+i+'-amount',msg:'Subject '+i+' — amount over $5,000 is unusual. Check the value.'});}
    }
  }
  if(pageId==='reason'){
    var r=(D['refund-reason']||'').trim();
    if(!r)errors.push({id:'refund-reason',msg:'Explain why you are claiming the refund'});
    else if(r.length<40)errors.push({id:'refund-reason',msg:'Add more detail — the Unit needs enough context to assess the claim. At least 40 characters.'});
  }
  if(pageId==='banking'){
    req('bank-name','Select your bank or credit union');
    if(D['bank-name']==='Other')req('bank-name-other','Enter the name of your bank');
    req('bank-branch','Enter the branch');
    if(!D['account-type'])errors.push({id:'account-type-0',msg:'Select an account type'});
    var acct=(D['account-no']||'').trim(),acct2=(D['account-no-confirm']||'').trim();
    if(!acct){errors.push({id:'account-no',msg:'Enter your account number'});}else if(!/^\d{6,16}$/.test(acct.replace(/[\s\-]/g,''))){errors.push({id:'account-no',msg:'Account number must be 6 to 16 digits'});}
    if(!acct2){errors.push({id:'account-no-confirm',msg:'Re-enter your account number to confirm'});}else if(acct&&acct.replace(/[\s\-]/g,'')!==acct2.replace(/[\s\-]/g,''))errors.push({id:'account-no-confirm',msg:'Account numbers do not match — check the digits and try again'});
    req('account-holder','Enter the name on the account');
  }
  if(pageId==='evidence'){
    if(!D['upload-receipts'])errors.push({id:'upload-receipts',msg:'Upload your original payment receipt(s)'});
    if(!D['upload-photo-id'])errors.push({id:'upload-photo-id',msg:'Upload your government-issued photo ID'});
    if(isMinor()&&!D['upload-birth-cert'])errors.push({id:'upload-birth-cert',msg:'Upload the candidate\'s birth certificate (candidate is under 18)'});
  }
  if(pageId==='declaration'){
    ['accurate','paid','rules','false'].forEach(function(k){if(!D['decl-'+k])errors.push({id:'decl-'+k,msg:'Tick the box to confirm'});});
  }
  return errors;
}

GovBB.init({formName:FORM_NAME,flow:FLOW,pages:PAGES,validate:validate});
</script>

<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');event.preventDefault();">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = 'National Assistance Grant Application';
const CAPTION_TEXT = 'Social Empowerment Agency';

const FLOW = [
  'start',
  'personal-details',
  'contact',
  'household',
  'employment',
  'assistance-type',
  'reason',
  'declaration',
  'check',
  'confirmation'
];

/* ───────── Global nav shortcuts ───────── */
function next() { GovBB.next(); }
function back() { GovBB.back(); }
function nav(p)  { GovBB.nav(p); }

/* ───────── Caption helper ───────── */
function seaCaption() {
  return `<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">${CAPTION_TEXT}</p>`;
}

/* ───────── Reveal helper ───────── */
function revealWrap(triggerName, triggerValue, inner) {
  const show = GovBB.D[triggerName] === triggerValue;
  return `<div data-show-when-name="${triggerName}" data-show-when-value="${triggerValue}" style="display:${show ? '' : 'none'}; padding-left: var(--spacing-m); border-left: 4px solid var(--color-blue-40);">
    ${inner}
  </div>`;
}

/* ───────── Date formatter ───────── */
function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

/* ───────── Assistance type summary ───────── */
function assistanceSummary() {
  const types = [
    ['asst-food',      'Food and groceries'],
    ['asst-utilities', 'Utility bills'],
    ['asst-medical',   'Medical expenses or medication'],
    ['asst-education', 'Educational costs'],
    ['asst-household', 'Household items'],
    ['asst-funeral',   'Funeral expenses'],
    ['asst-housing',   'Emergency housing or rent'],
    ['asst-other',     'Other']
  ];
  const selected = types.filter(t => GovBB.D[t[0]]).map(t => t[1]);
  if (GovBB.D['asst-other'] && GovBB.D['asst-other-details']) {
    const idx = selected.indexOf('Other');
    if (idx !== -1) selected[idx] = 'Other: ' + GovBB.D['asst-other-details'];
  }
  return selected.length ? selected.join('<br>') : '';
}

/* ───────── Declaration check ───────── */
function allDeclChecked() {
  return GovBB.D['decl-accurate'] && GovBB.D['decl-consent'] && GovBB.D['decl-understand'];
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);">
        <ol class="govbb-breadcrumbs__list">
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li>
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Benefits and financial support</a></li>
        </ol>
      </nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Apply for a National Assistance Grant</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Last updated on November 14th, 2025</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Apply for a grant if you are facing financial hardship and need help with essential costs.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Apply online. This service is free and takes about <strong>10 minutes</strong>.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">This is a one-time or short-term grant. A caseworker will assess your application.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your National ID number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your contact details</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Details of your household and current circumstances</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Details of what you need help with</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">A caseworker will review your application and contact you within <strong>10 working days</strong>. They may ask for more information or arrange a meeting. If approved, you may receive a one-time grant or short-term support.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call <strong>+1 (246) 467-5100</strong> if you need help completing this form or if your situation is urgent.</p>

      <div style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>
    </div>`,

  /* ── Personal details ── */
  'personal-details': () => `
    <form novalidate>
      ${seaCaption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you</h1>

        </div>
      </div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Date of birth</legend>
        <p class="govbb-hint">For example, 27 3 1985</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="dob-day">Day</label>

          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="dob-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="dob-year" name="dob-year" data-field="dob-year" inputmode="numeric" value="${GovBB.D['dob-year']||''}" /></div>
          </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="sex">Sex</label>
        <p class="govbb-hint">As recorded on your National Registration Card.</p>

      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="id-number">National Identification Number</label>
        <p class="govbb-hint">Your national registration number, for example 110915-0048.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="id-number" name="id-number" data-field="id-number" value="${GovBB.D['id-number']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Contact details ── */

  /* ── Household ── */
  'household': () => `

      ${seaCaption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your household</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">

      ${seaCaption()}

        </div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
          <input class="govbb-checkbox" type="checkbox" id="asst-other" name="asst-other" data-field="asst-other"${GovBB.D['asst-other']?' checked':''} />

      ${GovBB.D['asst-other'] ? `
      <div style="padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);margin-bottom:var(--spacing-m);">
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="asst-other-details">Please describe what you need help with</label>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="asst-other-details" name="asst-other-details" data-field="asst-other-details" value="${GovBB.D['asst-other-details']||''}" />
          </div>
        </div>
      </div>` : ''}

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Reason ── */
  'reason': () => `
    <form novalidate>
      ${seaCaption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your reason for applying</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="reason">Tell us about your situation and why you need assistance</label>
        <p class="govbb-hint">Include anything that has contributed to your current financial hardship, for example: job loss, illness, bereavement, natural disaster damage.</p>
        <textarea class="govbb-textarea" id="reason" name="reason" data-field="reason" rows="6" style="width:100%;">${GovBB.D['reason']||''}</textarea>

        <label class="govbb-label" for="amount-needed">If you know, how much do you estimate you need?</label>
        <p class="govbb-hint">For example: $500 for an electricity bill. This is an estimate — the amount granted will be assessed.</p>
        <textarea class="govbb-textarea" id="amount-needed" name="amount-needed" data-field="amount-needed" rows="2" style="width:100%;">${GovBB.D['amount-needed']||''}</textarea>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Declaration ── */
  'declaration': () => `
    <form novalidate>
      ${seaCaption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Declaration</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">By submitting this form, you confirm the following.</p>

      <div style="margin-bottom:var(--spacing-m);">
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
          <input class="govbb-checkbox" type="checkbox" id="decl-accurate" name="decl-accurate" data-field="decl-accurate"${GovBB.D['decl-accurate']?' checked':''} />
          <label class="govbb-checkbox-item__label" for="decl-accurate">The information I have provided is true and correct to the best of my knowledge.</label>
        </div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
          <input class="govbb-checkbox" type="checkbox" id="decl-consent" name="decl-consent" data-field="decl-consent"${GovBB.D['decl-consent']?' checked':''} />
          <label class="govbb-checkbox-item__label" for="decl-consent">I consent to my information being used to assess my application and for the Social Empowerment Agency to contact me.</label>
        </div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
          <input class="govbb-checkbox" type="checkbox" id="decl-understand" name="decl-understand" data-field="decl-understand"${GovBB.D['decl-understand']?' checked':''} />
          <label class="govbb-checkbox-item__label" for="decl-understand">I understand that providing false information may result in my application being refused and possible legal action.</label>
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Submit application</button>
      </div>
    </form>`,

  /* ── Check your answers ── */
  'check': () => `
    <div>
      ${seaCaption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers</h1>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About you</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Full name',                   GovBB.D['fullname'],         'personal-details')}
        ${GovBB.summaryRow('Date of birth',               fmtDate('dob'),              'personal-details')}
        ${GovBB.summaryRow('Sex',                         GovBB.D['sex'],              'personal-details')}
        ${GovBB.summaryRow('National Identification No.', GovBB.D['id-number'],        'personal-details')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact details</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Address', [GovBB.D['address-line1'], GovBB.D['address-line2']].filter(Boolean).join(', '), 'contact')}
        ${GovBB.summaryRow('Parish',       GovBB.D['parish'],      'contact')}
        ${GovBB.summaryRow('Postal code',  GovBB.D['postal-code'], 'contact')}
        ${GovBB.summaryRow('Telephone',    GovBB.D['phone'],       'contact')}
        ${GovBB.summaryRow('Alt. telephone', GovBB.D['phone-alt'], 'contact')}
        ${GovBB.summaryRow('Email',        GovBB.D['email'],       'contact')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Your household</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('People in household',    GovBB.D['household-size'],    'household')}
        ${GovBB.summaryRow('Has dependants',         GovBB.D['dependants'],        'household')}
        ${GovBB.D['dependants'] === 'Yes' ? GovBB.summaryRow('Number of dependants', GovBB.D['dependants-number'], 'household') : ''}
        ${GovBB.summaryRow('Household situation',    GovBB.D['household-situation'], 'household')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Employment and income</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Employment status', GovBB.D['employment-status'] === 'Other' ? (GovBB.D['employment-other'] || 'Other') : GovBB.D['employment-status'], 'employment')}
        ${GovBB.summaryRow('Receiving benefits', GovBB.D['receiving-benefits'], 'employment')}
        ${GovBB.D['receiving-benefits'] === 'Yes' ? GovBB.summaryRow('Benefits details', GovBB.D['benefits-details'], 'employment') : ''}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you need help with</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Type of assistance', assistanceSummary(), 'assistance-type')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Your reason for applying</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Reason',          GovBB.D['reason'],        'reason')}
        ${GovBB.summaryRow('Estimated amount needed', GovBB.D['amount-needed'], 'reason')}

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Submit application</button>
      </div>
    </div>`,

  /* ── Confirmation ── */
  'confirmation': () => {
    const ref = window.__refNumber || ('SEA-NAG-' + Math.random().toString(36).substring(2, 8).toUpperCase());
    window.__refNumber = ref;
    return `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Application submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number is <strong>${ref}</strong></p>
      </div>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">We will review your application and contact you within <strong>10 working days</strong>.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">If your situation is urgent, call <strong>+1 (246) 467-5100</strong> and ask to speak to a caseworker.</p>

      <div style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="window.print()">Print this page</button>
      </div>
    </div>`;
  }

};

/* ───────── Validation ───────── */
function parseDate(prefix) {
  const d = parseInt(GovBB.D[prefix + '-day'], 10);
  const m = parseInt(GovBB.D[prefix + '-month'], 10);
  const y = parseInt(GovBB.D[prefix + '-year'], 10);
  if (!d || !m || !y) return null;
  if (d < 1 || d > 31 || m < 1 || m > 12 || y < 1900 || y > 2100) return false;
  const dt = new Date(y, m - 1, d);
  if (dt.getFullYear() !== y || dt.getMonth() !== m - 1 || dt.getDate() !== d) return false;
  return dt;
}

function validate(pageId) {
  const errs = [];
  function reqDate(prefix, label, opts) {
    opts = opts || {};
    const dayV = GovBB.D[prefix + '-day'];
    const monV = GovBB.D[prefix + '-month'];
    const yrV  = GovBB.D[prefix + '-year'];
    const dayId = prefix + '-day';
    if (!dayV || !monV || !yrV) {
      errs.push({ id: dayId, msg: label + ' must be a complete date.' });
      return;
    }
    const dt = parseDate(prefix);
    if (dt === false) {
      errs.push({ id: dayId, msg: label + ' must be a real date — for example, 27 3 1985.' });
      return;
    }
    if (opts.notFuture && dt > new Date()) {
      errs.push({ id: dayId, msg: label + ' must be in the past.' });
    }
  }
  function reqIdNumber(id, label) {
    const v = (GovBB.D[id] || '').trim();
    if (!v) { errs.push({ id, msg: 'Enter your ' + label }); return; }
    if (!/^\d{6}-\d{4}$/.test(v)) {
      errs.push({ id, msg: label + ' must be in the format 110915-0048.' });
    }
  }
  function reqPhone(id, label, required) {
    const v = (GovBB.D[id] || '').trim();
    if (!v) { if (required) errs.push({ id, msg: 'Enter your ' + label }); return; }
    const digits = v.replace(/[\s\-()+]/g, '');
    if (!/^\d{7,15}$/.test(digits)) {
      errs.push({ id, msg: label + ' must contain 7 to 15 digits — for example, 246 249-1234.' });
    }
  }

  if (pageId === 'personal-details') {
    if (!GovBB.D['fullname'])   errs.push({ id: 'fullname',   msg: 'Enter your full name' });
    reqDate('dob', 'Date of birth', { notFuture: true });
    reqIdNumber('id-number', 'National Identification Number');
  }
  if (pageId === 'contact') {
    if (!GovBB.D['address-line1']) errs.push({ id: 'address-line1', msg: 'Enter your address' });
    if (!GovBB.D['parish'])        errs.push({ id: 'parish',        msg: 'Select your parish' });
    reqPhone('phone', 'telephone number', true);
    reqPhone('phone-alt', 'alternative telephone number', false);
  }
  if (pageId === 'household') {
    if (!GovBB.D['household-size']) errs.push({ id: 'household-size', msg: 'Enter the number of people in your household' });
    if (!GovBB.D['dependants'])     errs.push({ id: 'dependants-yes', msg: 'Select whether you have dependants' });
  }
  if (pageId === 'employment') {
    if (!GovBB.D['employment-status']) errs.push({ id: 'employment-status', msg: 'Select your employment status' });
    if (!GovBB.D['receiving-benefits']) errs.push({ id: 'receiving-benefits-yes', msg: 'Select whether you are receiving benefits' });
  }
  if (pageId === 'reason') {
    if (!GovBB.D['reason']) errs.push({ id: 'reason', msg: 'Tell us about your situation' });
  }
  if (pageId === 'declaration') {
    if (!allDeclChecked()) errs.push({ id: 'decl-accurate', msg: 'You must agree to all declarations before submitting' });
  }
  return errs;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
  appElementId: 'app'
});
</script>

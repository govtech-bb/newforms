<script src="../assets/govbb-framework.js"></script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = 'National Assistance Grant Application';
const CAPTION_TEXT = 'Social Empowerment Agency';

const FLOW = [
  'start',
  'personal-details',
  'contact',
  'household',
  'employment',
  'assistance-type',
  'reason',
  'declaration',
  'check',
  'confirmation'
];

/* ───────── Custom styled select ───────── */
function styledSelect(id, label, options, opts) {
  opts = opts || {};
  const val = GovBB.D[id] || '';
  const hint = opts.hint
    ? `<p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">${opts.hint}</p>`
    : '';
  const triggerAttr = opts.triggerRender ? ' data-trigger-render="1"' : '';
  const placeholder = opts.placeholder || 'Select one';
  let ops = `<option value="">${placeholder}</option>`;
  options.forEach(o => {
    const v = typeof o === 'object' ? o.value : o;
    const l = typeof o === 'object' ? o.label : o;
    ops += `<option value="${v}"${val === v ? ' selected' : ''}>${l}</option>`;
  });
  return `
    <div class="field-group flex flex-col gap-xs w-full items-start">
      <label for="${id}" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">${label}</label>
      ${hint}
      <div class="relative flex w-full rounded-sm border-2 border-bb-black-00 bg-bb-white-00 overflow-hidden hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
        <select id="${id}" name="${id}" data-field="${id}"${triggerAttr}
          class="w-full min-w-0 p-s outline-none bg-transparent appearance-none cursor-pointer text-[1.25rem] leading-normal">
          ${ops}
        </select>
        <div class="flex items-center justify-center w-14 shrink-0 bg-[#f0f0f0] border-l-2 border-bb-black-00 pointer-events-none" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>
    </div>`;
}

/* ───────── Button group helper ───────── */
function btnGroup(primaryLabel, showBack) {
  const back = showBack !== false
    ? `<div class="mt-2">${GovBB.backLink()}</div>`
    : '';
  return `
    <div class="space-y-4 pt-2">
      <button type="button" onclick="GovBB.advance()" class="${GovBB.BTN_CLS}">${primaryLabel || 'Continue'}</button>
      ${back}
    </div>`;
}

/* ───────── Caption helper (SEA override) ───────── */
function seaCaption() {
  return `<p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00 mb-6">${CAPTION_TEXT}</p>`;
}

/* ───────── Reveal helper ───────── */
function revealWrap(triggerName, triggerValue, inner) {
  const show = GovBB.D[triggerName] === triggerValue;
  return `<div data-show-when-name="${triggerName}" data-show-when-value="${triggerValue}" style="display:${show ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
    ${inner}
  </div>`;
}

/* ───────── Date formatter ───────── */
function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

/* ───────── Assistance type summary ───────── */
function assistanceSummary() {
  const types = [
    ['asst-food',      'Food and groceries'],
    ['asst-utilities', 'Utility bills'],
    ['asst-medical',   'Medical expenses or medication'],
    ['asst-education', 'Educational costs'],
    ['asst-household', 'Household items'],
    ['asst-funeral',   'Funeral expenses'],
    ['asst-housing',   'Emergency housing or rent'],
    ['asst-other',     'Other']
  ];
  const selected = types.filter(t => GovBB.D[t[0]]).map(t => t[1]);
  if (GovBB.D['asst-other'] && GovBB.D['asst-other-details']) {
    const idx = selected.indexOf('Other');
    if (idx !== -1) selected[idx] = 'Other: ' + GovBB.D['asst-other-details'];
  }
  return selected.length ? selected.join('<br>') : '';
}

/* ───────── Declaration check ───────── */
function allDeclChecked() {
  return GovBB.D['decl-accurate'] && GovBB.D['decl-consent'] && GovBB.D['decl-understand'];
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div class="space-y-6">
      ${seaCaption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Apply for a National Assistance Grant</h1>
      <hr class="border-bb-grey-00">

      <p class="text-[1.25rem] leading-normal">Apply for a grant if you are facing financial hardship and need help with essential costs.</p>
      <p class="text-[1.25rem] leading-normal">This is a one-time or short-term grant. A caseworker will assess your application.</p>
      <p class="text-[1.25rem] leading-normal">Most people finish this form in about <strong>10 minutes</strong>.</p>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">What you'll need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem] leading-normal">
          <li>Your National ID number</li>
          <li>Your contact details</li>
          <li>Details of your household and current circumstances</li>
          <li>Details of what you need help with</li>
        </ul>
      </div>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">Contact us</h2>
        <p class="text-[1.25rem] leading-normal">Call <strong>+1 (246) 467-5100</strong> if you need help completing this form or if your situation is urgent.</p>
      </div>

      ${GovBB.startBtn('Start application')}
    </div>`,

  /* ── Personal details ── */
  'personal-details': () => `
    <form novalidate>
      ${seaCaption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">About you</h1>
      <div class="space-y-8">
        ${GovBB.textField('fullname', 'Full name')}
        ${GovBB.dateField('dob', 'Date of birth')}
        ${styledSelect('sex', 'Sex', ['Male', 'Female'])}
        ${GovBB.textField('id-number', 'National Identification Number', {
          hint: 'Your national registration number, for example 110915-0048.'
        })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Contact details ── */
  'contact': () => `
    <form novalidate>
      ${seaCaption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your contact details</h1>
      <div class="space-y-8">
        ${GovBB.textField('address-line1', 'Address')}
        ${GovBB.textField('address-line2', 'Address line 2 (optional)')}
        ${styledSelect('parish', 'Parish', GovBB.PARISHES)}
        ${GovBB.textField('postal-code', 'Postal code (optional)', {
          hint: 'For example, BB11000.'
        })}
        ${GovBB.telField('phone', 'Telephone number', {
          hint: '246 249-1234.'
        })}
        ${GovBB.telField('phone-alt', 'Alternative telephone number (optional)')}
        ${GovBB.emailField('email', 'Email address (optional)')}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Household ── */
  'household': () => `
    <form novalidate>
      ${seaCaption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your household</h1>
      <div class="space-y-8">
        ${GovBB.textField('household-size', 'How many people live in your household?', {
          hint: 'Include yourself.',
          inputmode: 'numeric'
        })}

        <div class="space-y-4">
          ${GovBB.radioGroup('dependants', 'Do you have dependants (children or other family members in your care)?', ['Yes', 'No'])}
          ${revealWrap('dependants', 'Yes',
            GovBB.textField('dependants-number', 'How many dependants do you have?', { inputmode: 'numeric' })
          )}
        </div>

        ${GovBB.textareaField('household-situation', 'Briefly describe your household situation', {
          hint: 'For example: single parent with 2 children, living with elderly parent.',
          rows: 3
        })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Employment and income ── */
  'employment': () => `
    <form novalidate>
      ${seaCaption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Employment and income</h1>
      <div class="space-y-8">
        ${styledSelect('employment-status', 'What is your current employment status?', [
          'Employed full-time',
          'Employed part-time',
          'Self-employed',
          'Unemployed',
          'Unable to work — illness or disability',
          'Retired',
          'Student',
          'Other'
        ], { triggerRender: true })}
        ${revealWrap('employment-status', 'Other',
          GovBB.textField('employment-other', 'Please describe your employment status')
        )}

        <div class="space-y-4">
          ${GovBB.radioGroup('receiving-benefits', 'Are you currently receiving any government benefits or assistance?', ['Yes', 'No'])}
          ${revealWrap('receiving-benefits', 'Yes',
            GovBB.textareaField('benefits-details', 'Please describe', {
              hint: 'For example: NIS unemployment benefit, disability allowance.',
              rows: 2
            })
          )}
        </div>

        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Assistance type ── */
  'assistance-type': () => `
    <form novalidate>
      ${seaCaption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-4">What do you need help with?</h1>
      <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-8">Select all that apply.</p>
      <div class="space-y-8">
        <div class="space-y-3">
          ${GovBB.checkboxItem('asst-food',      'Food and groceries')}
          ${GovBB.checkboxItem('asst-utilities',  'Utility bills — electricity, water')}
          ${GovBB.checkboxItem('asst-medical',    'Medical expenses or medication')}
          ${GovBB.checkboxItem('asst-education',  'Educational costs — school fees, uniforms, books')}
          ${GovBB.checkboxItem('asst-household',  'Household items — furniture, appliances')}
          ${GovBB.checkboxItem('asst-funeral',    'Funeral expenses')}
          ${GovBB.checkboxItem('asst-housing',    'Emergency housing or rent')}
          ${GovBB.checkboxItem('asst-other',      'Other')}
        </div>
        ${revealWrap('asst-other', 'true',
          GovBB.textField('asst-other-details', 'Please describe what you need help with')
        )}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Reason ── */
  'reason': () => `
    <form novalidate>
      ${seaCaption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your reason for applying</h1>
      <div class="space-y-8">
        ${GovBB.textareaField('reason', 'Tell us about your situation and why you need assistance', {
          hint: 'Include anything that has contributed to your current financial hardship, for example: job loss, illness, bereavement, natural disaster damage.',
          rows: 6
        })}
        ${GovBB.textareaField('amount-needed', 'If you know, how much do you estimate you need?', {
          hint: 'For example: $500 for an electricity bill. This is an estimate — the amount granted will be assessed.',
          rows: 2
        })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Declaration ── */
  'declaration': () => `
    <form novalidate>
      ${seaCaption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-4">Declaration</h1>
      <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-8">By submitting this form, you confirm the following.</p>
      <div class="space-y-8">
        <div class="space-y-4">
          ${GovBB.checkboxItem('decl-accurate',    'The information I have provided is true and correct to the best of my knowledge.')}
          ${GovBB.checkboxItem('decl-consent',     'I consent to my information being used to assess my application and for the Social Empowerment Agency to contact me.')}
          ${GovBB.checkboxItem('decl-understand',  'I understand that providing false information may result in my application being refused and possible legal action.')}
        </div>
        <div class="space-y-4 pt-2">
          <button type="button" onclick="GovBB.advance()" class="${GovBB.BTN_CLS}">Submit application</button>
          <div class="mt-2">${GovBB.backLink()}</div>
        </div>
      </div>
    </form>`,

  /* ── Check your answers ── */
  'check': () => `
    <div>
      ${seaCaption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers</h1>

      <h2 class="font-bold text-[1.5rem] mb-4">About you</h2>
      <dl class="border-t border-bb-grey-00 mb-8">
        ${GovBB.summaryRow('Full name',                   GovBB.D['fullname'],         'personal-details')}
        ${GovBB.summaryRow('Date of birth',               fmtDate('dob'),              'personal-details')}
        ${GovBB.summaryRow('Sex',                         GovBB.D['sex'],              'personal-details')}
        ${GovBB.summaryRow('National Identification No.', GovBB.D['id-number'],        'personal-details')}
      </dl>

      <h2 class="font-bold text-[1.5rem] mb-4">Contact details</h2>
      <dl class="border-t border-bb-grey-00 mb-8">
        ${GovBB.summaryRow('Address', [GovBB.D['address-line1'], GovBB.D['address-line2']].filter(Boolean).join(', '), 'contact')}
        ${GovBB.summaryRow('Parish',       GovBB.D['parish'],      'contact')}
        ${GovBB.summaryRow('Postal code',  GovBB.D['postal-code'], 'contact')}
        ${GovBB.summaryRow('Telephone',    GovBB.D['phone'],       'contact')}
        ${GovBB.summaryRow('Alt. telephone', GovBB.D['phone-alt'], 'contact')}
        ${GovBB.summaryRow('Email',        GovBB.D['email'],       'contact')}
      </dl>

      <h2 class="font-bold text-[1.5rem] mb-4">Your household</h2>
      <dl class="border-t border-bb-grey-00 mb-8">
        ${GovBB.summaryRow('People in household',    GovBB.D['household-size'],    'household')}
        ${GovBB.summaryRow('Has dependants',         GovBB.D['dependants'],        'household')}
        ${GovBB.D['dependants'] === 'Yes' ? GovBB.summaryRow('Number of dependants', GovBB.D['dependants-number'], 'household') : ''}
        ${GovBB.summaryRow('Household situation',    GovBB.D['household-situation'], 'household')}
      </dl>

      <h2 class="font-bold text-[1.5rem] mb-4">Employment and income</h2>
      <dl class="border-t border-bb-grey-00 mb-8">
        ${GovBB.summaryRow('Employment status', GovBB.D['employment-status'] === 'Other' ? (GovBB.D['employment-other'] || 'Other') : GovBB.D['employment-status'], 'employment')}
        ${GovBB.summaryRow('Receiving benefits', GovBB.D['receiving-benefits'], 'employment')}
        ${GovBB.D['receiving-benefits'] === 'Yes' ? GovBB.summaryRow('Benefits details', GovBB.D['benefits-details'], 'employment') : ''}
      </dl>

      <h2 class="font-bold text-[1.5rem] mb-4">What you need help with</h2>
      <dl class="border-t border-bb-grey-00 mb-8">
        ${GovBB.summaryRow('Type of assistance', assistanceSummary(), 'assistance-type')}
      </dl>

      <h2 class="font-bold text-[1.5rem] mb-4">Your reason for applying</h2>
      <dl class="border-t border-bb-grey-00 mb-8">
        ${GovBB.summaryRow('Reason',          GovBB.D['reason'],        'reason')}
        ${GovBB.summaryRow('Estimated amount needed', GovBB.D['amount-needed'], 'reason')}
      </dl>

      <div class="space-y-4 pt-2">
        <button type="button" onclick="GovBB.advance()" class="${GovBB.BTN_CLS}">Submit application</button>
        <div class="mt-2">${GovBB.backLink()}</div>
      </div>
    </div>`,

  /* ── Confirmation ── */
  'confirmation': () => {
    const ref = window.__refNumber || ('SEA-NAG-' + Math.random().toString(36).substring(2, 8).toUpperCase());
    window.__refNumber = ref;
    return `
    <div class="space-y-6">
      <h1 class="font-bold text-[3.5rem] leading-[1.15]" style="border-left: 4px solid #00703c; padding-left: 1rem; color: #00703c;">Application submitted</h1>

      <div class="bg-bb-blue-10 rounded-sm p-6 space-y-2">
        <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">Your reference number</p>
        <p class="font-bold text-[1.5rem]">${ref}</p>
        <p class="text-[1rem] text-bb-mid-grey-00">Save this for your records.</p>
      </div>

      <p class="text-[1.25rem] leading-normal">We will review your application and contact you within <strong>10 working days</strong>.</p>
      <p class="text-[1.25rem] leading-normal">If your situation is urgent, call <strong>+1 (246) 467-5100</strong> and ask to speak to a caseworker.</p>

      <div class="pt-2">
        <button type="button" onclick="window.print()" class="${GovBB.BTN_CLS}">Print this page</button>
      </div>
    </div>`;
  }

};

/* ───────── Validation ───────── */
function validate(pageId) {
  const errs = [];
  if (pageId === 'personal-details') {
    if (!GovBB.D['fullname'])   errs.push({ id: 'fullname',   msg: 'Enter your full name' });
    if (!GovBB.D['id-number'])  errs.push({ id: 'id-number',  msg: 'Enter your National Identification Number' });
  }
  if (pageId === 'contact') {
    if (!GovBB.D['address-line1']) errs.push({ id: 'address-line1', msg: 'Enter your address' });
    if (!GovBB.D['parish'])        errs.push({ id: 'parish',        msg: 'Select your parish' });
    if (!GovBB.D['phone'])         errs.push({ id: 'phone',         msg: 'Enter your telephone number' });
  }
  if (pageId === 'household') {
    if (!GovBB.D['household-size']) errs.push({ id: 'household-size', msg: 'Enter the number of people in your household' });
    if (!GovBB.D['dependants'])     errs.push({ id: 'dependants-yes', msg: 'Select whether you have dependants' });
  }
  if (pageId === 'employment') {
    if (!GovBB.D['employment-status']) errs.push({ id: 'employment-status', msg: 'Select your employment status' });
    if (!GovBB.D['receiving-benefits']) errs.push({ id: 'receiving-benefits-yes', msg: 'Select whether you are receiving benefits' });
  }
  if (pageId === 'reason') {
    if (!GovBB.D['reason']) errs.push({ id: 'reason', msg: 'Tell us about your situation' });
  }
  if (pageId === 'declaration') {
    if (!allDeclChecked()) errs.push({ id: 'decl-accurate', msg: 'You must agree to all declarations before submitting' });
  }
  return errs;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
  appElementId: 'app'
});
</script>
</body>
</html>

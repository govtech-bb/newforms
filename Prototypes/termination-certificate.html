<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary'); if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors(); if (!errors||!errors.length) return;
  var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>';});
  html+='</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin',html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el=document.getElementById(e.id); if(!el)return;
    var errId='err-'+e.id; el.setAttribute('aria-invalid','true'); el.setAttribute('aria-describedby',errId);
    var msg=document.createElement('p'); msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if(group)group.appendChild(msg);
  });
  if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;
};
GovBB.summaryRow = function(label,value,changeTo){
  var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">By law, you must give your employee a Termination of Services Certificate when their employment ends. You must also send a copy to NIS within one week.</p>
      <div style="border:2px solid var(--color-error);border-radius:4px;padding:var(--spacing-m);background:var(--color-red-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);color:var(--color-error);margin-bottom:var(--spacing-xs);">Legal requirement</p>
        <p class="govbb-text-body">Failure to issue this certificate is an offence. The fine is up to <strong>$1,000</strong>.</p>
      </div>
      <div style="border-left:4px solid var(--color-blue-40);padding:var(--spacing-m);background:var(--color-blue-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Three copies are required</p>
        <p class="govbb-text-body">One copy for the employee, one copy sent to NIS, and one copy for your own records.</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you will need</h2>
      <ul style="padding-left:var(--spacing-m);margin-bottom:var(--spacing-l);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The employee's NIS number and National Registration Number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The employee's address and contact details</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your employer registration number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Employment start and end dates</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Reason for termination</li>
      </ul>
      ${GovBB.startBtn()}
    </div>`,

  'termination-type': () => {
    var D = GovBB.D;
    var isLabourDispute = D['labour-dispute'] === 'Yes';
    return `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">How did the employment end?</h1>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">

        <p class="govbb-hint">For example, they resigned or retired.</p>

            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="date-commenced-year" name="date-commenced-year" data-field="date-commenced-year" inputmode="numeric" value="${GovBB.D['date-commenced-year']||''}" /></div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Last day at work</legend>
        <p class="govbb-hint">For example, 27 03 2007</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-work-day">Day</label>

          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-work-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="last-day-work-month" name="last-day-work-month" data-field="last-day-work-month" inputmode="numeric" value="${GovBB.D['last-day-work-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-work-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="last-day-work-year" name="last-day-work-year" data-field="last-day-work-year" inputmode="numeric" value="${GovBB.D['last-day-work-year']||''}" /></div>
          </div>
        </div>
      </fieldset>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Date of termination</legend>
        <p class="govbb-hint">For example, 27 03 2007</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="date-termination-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="date-termination-day" name="date-termination-day" data-field="date-termination-day" inputmode="numeric" value="${GovBB.D['date-termination-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="date-termination-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="date-termination-month" name="date-termination-month" data-field="date-termination-month" inputmode="numeric" value="${GovBB.D['date-termination-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="date-termination-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="date-termination-year" name="date-termination-year" data-field="date-termination-year" inputmode="numeric" value="${GovBB.D['date-termination-year']||''}" /></div>
          </div>
        </div>
      </fieldset>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Last day for which employee will be paid</legend>
        <p class="govbb-hint">For example, 27 03 2007</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-paid-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="last-day-paid-day" name="last-day-paid-day" data-field="last-day-paid-day" inputmode="numeric" value="${GovBB.D['last-day-paid-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-paid-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="last-day-paid-month" name="last-day-paid-month" data-field="last-day-paid-month" inputmode="numeric" value="${GovBB.D['last-day-paid-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-paid-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="last-day-paid-year" name="last-day-paid-year" data-field="last-day-paid-year" inputmode="numeric" value="${GovBB.D['last-day-paid-year']||''}" /></div>
          </div>
        </div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'evidence-questions': () => {
    var D = GovBB.D;
    var isVoluntary = D['voluntary'] === 'Yes';
    var isLabourDispute = D['labour-dispute'] === 'Yes';
    var isLayoff = D['layoff'] === 'Yes';
    var isHolidayPay = D['holiday-pay'] === 'Yes';
    var isPension = D['employer-pension'] === 'Yes';
    var isMisconduct = D['misconduct'] === 'Yes';

    return `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Additional details</h1>

      ${!isVoluntary && !isLabourDispute ? `
        <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
          <legend class="govbb-fieldset__legend">Was the employee laid off (temporary)?</legend>
          <p class="govbb-hint">A layoff is when you expect the employee to return to work.</p>
          <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
            <div class="govbb-radio-item">
              <input class="govbb-radio" type="radio" id="layoff-yes" name="layoff" data-field="layoff" value="Yes"${D['layoff']==='Yes'?' checked':''} />
              <label class="govbb-radio-item__label" for="layoff-yes">Yes</label>
            </div>
            <div class="govbb-radio-item">
              <input class="govbb-radio" type="radio" id="layoff-no" name="layoff" data-field="layoff" value="No"${D['layoff']==='No'?' checked':''} />
              <label class="govbb-radio-item__label" for="layoff-no">No</label>
            </div>
          </div>
        </fieldset>
        ${isLayoff ? `
        <div style="border-left:4px solid var(--color-blue-40);padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
          <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-s);">Layoff details</p>
          <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
            <legend class="govbb-fieldset__legend">Date of layoff</legend>
            <p class="govbb-hint">For example, 27 03 2007</p>
            <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="layoff-date-day">Day</label>
                <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="layoff-date-day" name="layoff-date-day" data-field="layoff-date-day" inputmode="numeric" value="${D['layoff-date-day']||''}" /></div>
              </div>
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="layoff-date-month">Month</label>
                <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="layoff-date-month" name="layoff-date-month" data-field="layoff-date-month" inputmode="numeric" value="${D['layoff-date-month']||''}" /></div>
              </div>
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="layoff-date-year">Year</label>
                <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="layoff-date-year" name="layoff-date-year" data-field="layoff-date-year" inputmode="numeric" value="${D['layoff-date-year']||''}" /></div>
              </div>
            </div>
          </fieldset>
          <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
            <legend class="govbb-fieldset__legend">Expected date of re-employment</legend>
            <p class="govbb-hint">Optional — leave blank if unknown. For example, 27 03 2026</p>
            <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="reemployment-date-day">Day</label>
                <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="reemployment-date-day" name="reemployment-date-day" data-field="reemployment-date-day" inputmode="numeric" value="${D['reemployment-date-day']||''}" /></div>
              </div>
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="reemployment-date-month">Month</label>
                <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="reemployment-date-month" name="reemployment-date-month" data-field="reemployment-date-month" inputmode="numeric" value="${D['reemployment-date-month']||''}" /></div>
              </div>
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="reemployment-date-year">Year</label>
                <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="reemployment-date-year" name="reemployment-date-year" data-field="reemployment-date-year" inputmode="numeric" value="${D['reemployment-date-year']||''}" /></div>
              </div>
            </div>
          </fieldset>
        </div>` : ''}
      ` : ''}

      ${!isVoluntary ? `
        <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
          <legend class="govbb-fieldset__legend">Was the employee dismissed for misconduct?</legend>
          <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
            <div class="govbb-radio-item">
              <input class="govbb-radio" type="radio" id="misconduct-yes" name="misconduct" data-field="misconduct" value="Yes"${D['misconduct']==='Yes'?' checked':''} />
              <label class="govbb-radio-item__label" for="misconduct-yes">Yes</label>
            </div>
            <div class="govbb-radio-item">
              <input class="govbb-radio" type="radio" id="misconduct-no" name="misconduct" data-field="misconduct" value="No"${D['misconduct']==='No'?' checked':''} />
              <label class="govbb-radio-item__label" for="misconduct-no">No</label>
            </div>
          </div>
        </fieldset>
        ${isMisconduct ? `
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="misconduct-details">Describe the misconduct</label>
          <p class="govbb-hint">Give details of the reason for dismissal.</p>
          <textarea class="govbb-textarea" id="misconduct-details" name="misconduct-details" data-field="misconduct-details" rows="4" style="width:100%;">${D['misconduct-details']||''}</textarea>
        </div>` : ''}
      ` : ''}

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Is the employee receiving a pension from you (the employer)?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="employer-pension-yes" name="employer-pension" data-field="employer-pension" value="Yes"${D['employer-pension']==='Yes'?' checked':''} />
            <label class="govbb-radio-item__label" for="employer-pension-yes">Yes</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="employer-pension-no" name="employer-pension" data-field="employer-pension" value="No"${D['employer-pension']==='No'?' checked':''} />
            <label class="govbb-radio-item__label" for="employer-pension-no">No</label>
          </div>
        </div>
      </fieldset>
      ${isPension ? `
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Pension start date</legend>
        <p class="govbb-hint">For example, 27 03 2007</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="pension-start-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="pension-start-day" name="pension-start-day" data-field="pension-start-day" inputmode="numeric" value="${D['pension-start-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="pension-start-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="pension-start-month" name="pension-start-month" data-field="pension-start-month" inputmode="numeric" value="${D['pension-start-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="pension-start-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="pension-start-year" name="pension-start-year" data-field="pension-start-year" inputmode="numeric" value="${D['pension-start-year']||''}" /></div>
          </div>
        </div>
      </fieldset>` : ''}

      ${isLayoff || (!isVoluntary && !isLabourDispute) ? `
        <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
          <legend class="govbb-fieldset__legend">Is the employee receiving payment for outstanding holiday?</legend>
          <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
            <div class="govbb-radio-item">
              <input class="govbb-radio" type="radio" id="holiday-pay-yes" name="holiday-pay" data-field="holiday-pay" value="Yes"${D['holiday-pay']==='Yes'?' checked':''} />
              <label class="govbb-radio-item__label" for="holiday-pay-yes">Yes</label>
            </div>
            <div class="govbb-radio-item">
              <input class="govbb-radio" type="radio" id="holiday-pay-no" name="holiday-pay" data-field="holiday-pay" value="No"${D['holiday-pay']==='No'?' checked':''} />
              <label class="govbb-radio-item__label" for="holiday-pay-no">No</label>
            </div>
          </div>
        </fieldset>
        ${isHolidayPay ? `
        <div style="border-left:4px solid var(--color-blue-40);padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
          <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-s);">Holiday pay details</p>
          <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
            <legend class="govbb-fieldset__legend">Holiday pay — from date</legend>
            <p class="govbb-hint">For example, 27 03 2007</p>
            <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="holiday-from-day">Day</label>
                <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="holiday-from-day" name="holiday-from-day" data-field="holiday-from-day" inputmode="numeric" value="${D['holiday-from-day']||''}" /></div>
              </div>
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="holiday-from-month">Month</label>
                <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="holiday-from-month" name="holiday-from-month" data-field="holiday-from-month" inputmode="numeric" value="${D['holiday-from-month']||''}" /></div>
              </div>
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="holiday-from-year">Year</label>
                <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="holiday-from-year" name="holiday-from-year" data-field="holiday-from-year" inputmode="numeric" value="${D['holiday-from-year']||''}" /></div>
              </div>
            </div>
          </fieldset>
          <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
            <legend class="govbb-fieldset__legend">Holiday pay — to date</legend>
            <p class="govbb-hint">For example, 27 03 2007</p>
            <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="holiday-to-day">Day</label>
                <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="holiday-to-day" name="holiday-to-day" data-field="holiday-to-day" inputmode="numeric" value="${D['holiday-to-day']||''}" /></div>
              </div>
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="holiday-to-month">Month</label>
                <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="holiday-to-month" name="holiday-to-month" data-field="holiday-to-month" inputmode="numeric" value="${D['holiday-to-month']||''}" /></div>
              </div>
              <div class="govbb-date-input__part">
                <label class="govbb-date-input__label" for="holiday-to-year">Year</label>
                <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="holiday-to-year" name="holiday-to-year" data-field="holiday-to-year" inputmode="numeric" value="${D['holiday-to-year']||''}" /></div>
              </div>
            </div>
          </fieldset>
          <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
            <label class="govbb-label" for="holiday-amount">Holiday pay amount (BDS$)</label>
            <div class="govbb-input-wrapper">
              <input class="govbb-input" type="text" id="holiday-amount" name="holiday-amount" data-field="holiday-amount" inputmode="decimal" value="${D['holiday-amount']||''}" />
            </div>
          </div>
        </div>` : ''}
      ` : ''}

      ${isLabourDispute ? `
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="labour-dispute-details">Describe the labour dispute</label>
        <p class="govbb-hint">Give relevant details about the dispute.</p>
        <textarea class="govbb-textarea" id="labour-dispute-details" name="labour-dispute-details" data-field="labour-dispute-details" rows="4" style="width:100%;">${D['labour-dispute-details']||''}</textarea>
      </div>` : ''}

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="other-details">Any other relevant details</label>
        <p class="govbb-hint">Optional — add any other information that may be relevant.</p>
        <textarea class="govbb-textarea" id="other-details" name="other-details" data-field="other-details" rows="3" style="width:100%;">${D['other-details']||''}</textarea>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;
  },

  'declaration': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Authorised signatory:</strong> ${GovBB.D['signatory-name'] || '—'}</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);"><strong>Date:</strong> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
      <div style="border-left:4px solid var(--color-blue-40);padding:var(--spacing-m);background:var(--color-blue-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body">I declare that the information given in this certificate is true and correct to the best of my knowledge and belief.</p>
      </div>
      <div style="border:2px solid var(--color-error);border-radius:4px;padding:var(--spacing-m);background:var(--color-red-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);color:var(--color-error);margin-bottom:var(--spacing-xs);">WARNING</p>
        <p class="govbb-text-body">Giving false information may result in prosecution.</p>
      </div>
      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
        <input class="govbb-checkbox" type="checkbox" id="declaration-agree" name="declaration-agree" data-field="declaration-agree"${GovBB.D['declaration-agree']?' checked':''} />
        <label class="govbb-checkbox-item__label" for="declaration-agree">I confirm that the information I have given is true and complete to the best of my knowledge.</label>
      </div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit certificate</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  'check': () => {
    var D = GovBB.D;
    var empName = [D['emp-first-name'], D['emp-middle-name'], D['emp-last-name']].filter(Boolean).join(' ');
    var isVoluntary = D['voluntary'] === 'Yes';
    var isLayoff = D['layoff'] === 'Yes';
    var isMisconduct = D['misconduct'] === 'Yes';
    var isPension = D['employer-pension'] === 'Yes';
    var isHolidayPay = D['holiday-pay'] === 'Yes';
    var isLabourDispute = D['labour-dispute'] === 'Yes';
    return `
    <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
    <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers</h1>
    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Employee details</h2>
    <dl style="margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Name', empName, 'employee-details')}
      ${GovBB.summaryRow('NIS number', D['emp-nis-number'], 'employee-details')}
      ${GovBB.summaryRow('NRN', D['emp-nrn'], 'employee-details')}
      ${GovBB.summaryRow('Address', [D['emp-street'], D['emp-parish'], D['emp-postal']].filter(Boolean).join(', '), 'employee-details')}
    </dl>
    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Employer details</h2>
    <dl style="margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Employer name', D['employer-name'], 'employer-details')}
      ${GovBB.summaryRow('Registration number', D['employer-reg'], 'employer-details')}
      ${GovBB.summaryRow('Address', [D['employer-street'], D['employer-parish']].filter(Boolean).join(', '), 'employer-details')}
    </dl>
    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Termination type</h2>
    <dl style="margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Voluntary leaving', D['voluntary'], 'termination-type')}
      ${GovBB.summaryRow('Labour dispute', D['labour-dispute'], 'termination-type')}
      ${isLabourDispute ? GovBB.summaryRow('On strike', D['on-strike'], 'termination-type') : ''}
    </dl>
    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Employment dates</h2>
    <dl style="margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Occupation', D['occupation'], 'employment-details')}
      ${GovBB.summaryRow('Date employment started', [D['date-commenced-day'],D['date-commenced-month'],D['date-commenced-year']].filter(Boolean).join('/'), 'employment-details')}
      ${GovBB.summaryRow('Last day at work', [D['last-day-work-day'],D['last-day-work-month'],D['last-day-work-year']].filter(Boolean).join('/'), 'employment-details')}
      ${GovBB.summaryRow('Date of termination', [D['date-termination-day'],D['date-termination-month'],D['date-termination-year']].filter(Boolean).join('/'), 'employment-details')}
    </dl>
    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Additional details</h2>
    <dl style="margin-bottom:var(--spacing-m);">
      ${!isVoluntary && !isLabourDispute ? GovBB.summaryRow('Layoff', D['layoff'], 'evidence-questions') : ''}
      ${!isVoluntary ? GovBB.summaryRow('Misconduct', D['misconduct'], 'evidence-questions') : ''}
      ${isMisconduct ? GovBB.summaryRow('Misconduct details', D['misconduct-details'], 'evidence-questions') : ''}
      ${GovBB.summaryRow('Employer pension', D['employer-pension'], 'evidence-questions')}
      ${isLayoff ? GovBB.summaryRow('Holiday pay', D['holiday-pay'], 'evidence-questions') : ''}
      ${D['other-details'] ? GovBB.summaryRow('Other details', D['other-details'], 'evidence-questions') : ''}
    </dl>
    <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
      <button type="button" class="govbb-btn" onclick="next()">Submit Certificate</button>
    </div>`;
  },

  'confirmation': () => `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Certificate submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Reference: <strong>${window.__refNumber || 'TC-' + Math.random().toString(36).substring(2, 8).toUpperCase()}</strong></p>
      </div>
      <div style="border-left:4px solid var(--color-yellow-00);padding:var(--spacing-m);background:var(--color-yellow-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Action required — three copies needed</p>
        <ul style="padding-left:var(--spacing-m);">
          <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Copy 1:</strong> Give to the employee immediately</li>
          <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Copy 2:</strong> Send to NIS within one week</li>
          <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Copy 3:</strong> Keep for your own records</li>
        </ul>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="padding-left:var(--spacing-m);margin-bottom:var(--spacing-l);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Download and print the certificate below.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Give a copy to your employee so they can claim unemployment benefit if eligible.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Send a copy to NIS within one week of the termination date.</li>
      </ul>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="alert('In the live service, a PDF would download here.')">Download certificate (PDF)</button>
      </div>
      <p class="govbb-text-body" style="margin-top:var(--spacing-m);"><a href="#" onclick="GovBB.nav('start')" class="govbb-link">Return to start</a></p>
    </div>`
};

function validate(pageId) {
  var D = GovBB.D;
  var errors = [];
  if (pageId === 'employee-details') {
    if (!D['emp-last-name']) errors.push({ id: 'emp-last-name', msg: 'Last name – Enter the employee\'s last name' });
    if (!D['emp-first-name']) errors.push({ id: 'emp-first-name', msg: 'First name – Enter the employee\'s first name' });
    if (!D['emp-nrn']) errors.push({ id: 'emp-nrn', msg: 'NRN – Enter the employee\'s National Registration Number' });
    if (!D['emp-nis-number']) errors.push({ id: 'emp-nis-number', msg: 'NIS number – Enter the employee\'s NIS number' });
    if (!D['emp-street']) errors.push({ id: 'emp-street', msg: 'Street address – Enter the employee\'s address' });
    if (!D['emp-parish']) errors.push({ id: 'emp-parish', msg: 'Parish – Select the employee\'s parish' });
  }
  if (pageId === 'employer-details') {
    if (!D['employer-name']) errors.push({ id: 'employer-name', msg: 'Employer name – Enter your business name' });
    if (!D['employer-reg']) errors.push({ id: 'employer-reg', msg: 'Registration number – Enter your employer registration number' });
    if (!D['employer-street']) errors.push({ id: 'employer-street', msg: 'Street address – Enter your street address' });
    if (!D['employer-parish']) errors.push({ id: 'employer-parish', msg: 'Parish – Select your parish' });
  }
  if (pageId === 'termination-type') {
    if (!D['voluntary']) errors.push({ id: 'voluntary-yes', msg: 'Voluntary leaving – Select Yes or No' });
    if (!D['labour-dispute']) errors.push({ id: 'labour-dispute-yes', msg: 'Labour dispute – Select Yes or No' });
  }
  if (pageId === 'employment-details') {
    if (!D['occupation']) errors.push({ id: 'occupation', msg: 'Occupation – Enter the employee\'s occupation' });
    if (!D['date-commenced-day'] || !D['date-commenced-month'] || !D['date-commenced-year']) errors.push({ id: 'date-commenced-day', msg: 'Date employment started – Enter a complete date' });
    if (!D['last-day-work-day'] || !D['last-day-work-month'] || !D['last-day-work-year']) errors.push({ id: 'last-day-work-day', msg: 'Last day at work – Enter a complete date' });
    if (!D['date-termination-day'] || !D['date-termination-month'] || !D['date-termination-year']) errors.push({ id: 'date-termination-day', msg: 'Date of termination – Enter a complete date' });
  }
  if (pageId === 'evidence-questions') {
    if (!D['employer-pension']) errors.push({ id: 'employer-pension-yes', msg: 'Employer pension – Select Yes or No' });
  }
  if (pageId === 'declaration') {
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: ['start','employee-details','employer-details','termination-type','employment-details','evidence-questions','declaration','check','confirmation'],
  pages: PAGES,
  validate: validate,
  getFlow: getFlow,
  onRadioChange: function(name) {
    var rerenderOn = ['voluntary','labour-dispute','on-strike','layoff','misconduct','employer-pension','holiday-pay'];
    if (rerenderOn.indexOf(name) !== -1) GovBB.render();
  }
});
</script>
</body>
</html>

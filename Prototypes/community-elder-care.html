  <style>
    .email-wrapper { background:#fff; overflow:hidden; max-width:900px; margin:0 auto; }

    .email-content { background:#fff; padding:32px 40px; display:flex; flex-direction:column; gap:16px; }
    .email-h1 { font-size:40px; font-weight:700; line-height:1.2; color:#000; margin:0; }

    .email-body { font-size:20px; color:#000; line-height:1.5; margin:0; }
    .ref-box { background:#ace6e9; padding:24px 16px; display:flex; flex-direction:column; gap:16px; }

    .mda-content { background:#fff; padding:64px 32px 32px; display:flex; flex-direction:column; gap:32px; }

    .mda-footer-right { display:flex; flex-direction:column; align-items:flex-end; gap:12px; flex-shrink:0; }

function formatDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '—';
  return [d, m, y].filter(Boolean).join(' / ');
}
/* The application date is always today (not asked of the applicant). */
function todayApplicationDate() {
  const d = new Date();
  return d.getDate() + ' / ' + (d.getMonth() + 1) + ' / ' + d.getFullYear();
}

function checkboxSummary(keys) {
  const checked = keys.filter(([k]) => GovBB.D[k]).map(([, label]) => label);
  return checked.length ? checked.join(', ') : '—';
}

/* ───────── Form-specific configuration ───────── */
const FORM_NAME = 'Community Elder Care Programme';

const FLOW = [
  'start',
  'recipient-name',
  'recipient-details',
  'contact-person',
  'income',
  'household',
  'physical-condition',
  'mental-status',
  'assistance',
  'declaration',
  'check',
  'confirmation',
  'applicant-email',
  'mda-email'
];

/* ───────── Household members state ───────── */
let householdMembers = [];

var HH_RELATIONSHIPS = ['Spouse', 'Son', 'Daughter', 'Grandchild', 'Grandparent', 'Sibling', 'Parent', 'Other relative', 'Friend', 'Neighbour', 'Carer / helper', 'Other'];

function syncHouseholdMembers() {
  GovBB.D['household-members'] = householdMembers.map(function (m) {
    var name = [m.first, m.middle, m.last].filter(Boolean).join(' ');
    var dob = [m.dobDay, m.dobMonth, m.dobYear].filter(Boolean).join('/');
    var rel = (m.rel === 'Other') ? (m.relOther || 'Other') : m.rel;
    return [name, dob, rel].filter(Boolean).join(' — ');
  }).filter(function (s) { return s && s.trim(); }).join(' | ');
}

function addHouseholdMember() {
  householdMembers.push({ first: '', middle: '', last: '', dobDay: '', dobMonth: '', dobYear: '', rel: '', relOther: '' });
  syncHouseholdMembers();
  GovBB.render();
  var cards = document.querySelectorAll('[data-hh-card]');
  var lastCard = cards[cards.length - 1];
  var firstOfNew = lastCard && lastCard.querySelector('input');
  if (firstOfNew) { try { firstOfNew.focus({ preventScroll: true }); } catch (e) { firstOfNew.focus(); } }
}

function removeHouseholdMember(idx) {
  householdMembers.splice(idx, 1);
  syncHouseholdMembers();
  GovBB.render();
}

function updateHouseholdMember(idx, field, val) {
  if (!householdMembers[idx]) return;
  householdMembers[idx][field] = val;
  syncHouseholdMembers();
}

function hhInput(i, field, label, hint) {
  var v = String((householdMembers[i] && householdMembers[i][field]) || '').replace(/"/g, '&quot;');
  return `
    <div class="flex flex-col gap-xs w-full">
      <label class="block text-[1.25rem] font-bold text-bb-black-00">${label}</label>
      ${hint ? `<p class="text-[1.25rem] text-bb-mid-grey-00">${hint}</p>` : ''}
      <div class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
        <input type="text" data-household-input value="${v}"
          oninput="updateHouseholdMember(${i}, '${field}', this.value)"
          class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
      </div>
    </div>`;
}

function hhDobPart(i, field, lbl, w) {
  var v = String((householdMembers[i] && householdMembers[i][field]) || '').replace(/"/g, '&quot;');
  return `
    <div class="flex flex-col gap-xs">
      <label class="text-[1.25rem] leading-normal font-bold text-bb-black-00">${lbl}</label>
      <div class="input-wrap relative inline-flex rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100" style="width:${w}">
        <input type="text" data-household-input inputmode="numeric" value="${v}"
          oninput="this.value=this.value.replace(/[^0-9]/g,'');updateHouseholdMember(${i}, '${field}', this.value)"
          class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
      </div>
    </div>`;
}

function hhDob(i) {
  return `
    <div class="flex flex-col gap-xs w-full">
      <p class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Date of birth</p>
      <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">For example, 27 03 1950</p>
      <div class="flex gap-s items-end flex-wrap">
        ${hhDobPart(i, 'dobDay', 'Day', '5rem')}
        ${hhDobPart(i, 'dobMonth', 'Month', '5rem')}
        ${hhDobPart(i, 'dobYear', 'Year', '7rem')}
      </div>
    </div>`;
}

function hhRelSelect(i) {
  var m = householdMembers[i] || {};
  var val = m.rel || '';
  var other = String(m.relOther || '').replace(/"/g, '&quot;');
  var opts = HH_RELATIONSHIPS.map(function (o) {
    return `<option value="${o}"${val === o ? ' selected' : ''}>${o}</option>`;
  }).join('');
  return `
    <div class="flex flex-col gap-xs w-full">
      <label class="block text-[1.25rem] font-bold text-bb-black-00">Relationship to recipient</label>
      <div class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
        <select onchange="updateHouseholdMember(${i}, 'rel', this.value); GovBB.render();"
          class="w-full min-w-0 p-s outline-none rounded-[inherit] cursor-pointer bg-bb-white-00">
          <option value="">Select one</option>
          ${opts}
        </select>
      </div>
      ${val === 'Other' ? `
        <div class="flex flex-col gap-xs w-full mt-2">
          <label class="block text-[1.25rem] font-bold text-bb-black-00">Please specify the relationship</label>
          <div class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
            <input type="text" data-household-input value="${other}"
              oninput="updateHouseholdMember(${i}, 'relOther', this.value)"
              class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
          </div>
        </div>` : ''}
    </div>`;
}

function renderHouseholdMembers() {
  if (householdMembers.length === 0) {
    return `<p class="text-[1.25rem] text-bb-mid-grey-00">No one else added yet.</p>`;
  }
  return householdMembers.map(function (m, i) {
    return `
    <div data-hh-card class="border-2 border-bb-grey-00 rounded-sm p-5 flex flex-col gap-4">
      <div class="flex justify-between items-center">
        <p class="text-[1.25rem] font-bold text-bb-black-00">Person ${i + 1}</p>
        <button type="button" onclick="removeHouseholdMember(${i})"
          class="text-bb-teal-00 underline underline-offset-2 hover:no-underline text-[1.25rem] whitespace-nowrap">Remove</button>
      </div>
      ${hhInput(i, 'first', 'First name')}
      ${hhInput(i, 'middle', 'Middle name (optional)')}
      ${hhInput(i, 'last', 'Last name')}
      ${hhDob(i)}
      ${hhRelSelect(i)}
    </div>`;
  }).join('');
}

/* ───────── Recipient address (composite) ───────── */
function recipientAddress() {
  var D = GovBB.D;
  return [D['address-line-1'], D['address-line-2'], D['parish']]
    .filter(function (s) { return s && String(s).trim(); })
    .join(', ');
}

/* ───────── Money input (numbers only) ───────── */
function sanitizeMoney(s) {
  s = String(s).replace(/[^0-9.]/g, '');
  var firstDot = s.indexOf('.');
  if (firstDot !== -1) {
    s = s.slice(0, firstDot + 1) + s.slice(firstDot + 1).replace(/\./g, '');
  }
  var m = s.match(/^(\d*)(\.\d{0,2})?/);
  return m ? (m[1] + (m[2] || '')) : s;
}

function moneyField(id, label, hint) {
  var v = String(GovBB.D[id] || '').replace(/"/g, '&quot;');
  return `
    <div class="field-group flex flex-col gap-xs w-full items-start">
      <label for="${id}" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">${label}</label>
      ${hint ? `<p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mt-xs">${hint}</p>` : ''}
      <div class="input-wrap ${GovBB.INPUT_WRAP_CLS}">
        <input type="text" id="${id}" name="${id}" inputmode="decimal" value="${v}"
          oninput="this.value=sanitizeMoney(this.value);GovBB.D['${id}']=this.value"
          class="${GovBB.INPUT_CLS}" />
      </div>
    </div>`;
}

/* ───────── Income rows state ───────── */
let otherIncomeRows = GovBB.D['other-income-rows'] ? JSON.parse(GovBB.D['other-income-rows']) : [{ source: '', amount: '' }];

function addIncomeRow() {
  otherIncomeRows.push({ source: '', amount: '' });
  GovBB.render();
}

function removeIncomeRow(idx) {
  if (otherIncomeRows.length > 1) {
    otherIncomeRows.splice(idx, 1);
    syncIncomeRows();
    GovBB.render();
  }
}

function updateIncomeRow(idx, field, val) {
  otherIncomeRows[idx][field] = val;
  syncIncomeRows();
}

function syncIncomeRows() {
  GovBB.D['other-income-rows'] = JSON.stringify(otherIncomeRows);
  GovBB.D['other-income-summary'] = otherIncomeRows
    .filter(r => r.source || r.amount)
    .map(r => `${r.source}: BDS$${r.amount}`)
    .join(', ');
}

function renderIncomeRows() {
  return otherIncomeRows.map((row, i) => `
    <div class="flex gap-4 items-end flex-wrap">
      <div class="flex flex-col gap-xs flex-1 min-w-[180px]">
        <label class="block text-[1.25rem] font-bold text-bb-black-00">Source</label>
        <div class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
          <input type="text" value="${row.source.replace(/"/g,'&quot;')}" oninput="updateIncomeRow(${i},'source',this.value)"
            class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
        </div>
      </div>
      <div class="flex flex-col gap-xs" style="width:12rem">
        <label class="block text-[1.25rem] font-bold text-bb-black-00">Amount (BDS$)</label>
        <div class="relative inline-flex w-full rounded-sm border-2 border-bb-black-00 items-center transition-all bg-bb-white-00 hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
          <input type="text" inputmode="decimal" value="${row.amount.replace(/"/g,'&quot;')}" oninput="this.value=sanitizeMoney(this.value);updateIncomeRow(${i},'amount',this.value)"
            class="w-full min-w-0 p-s outline-none rounded-[inherit]" />
        </div>
      </div>
      ${otherIncomeRows.length > 1 ? `<button type="button" onclick="removeIncomeRow(${i})" class="mb-2 text-bb-teal-00 underline underline-offset-2 hover:no-underline text-[1.25rem]">Remove</button>` : ''}
    </div>
  `).join('');
}

              oninput="GovBB.D['${otherFieldId}']=this.value"

          </div>
        </div>
      ` : ''}

}

/* ───────── Multi-checkbox group helper ───────── */
function checkboxGroup(groupLabel, name, options, hint, onToggle) {
  const handler = onToggle || 'GovBB.toggleCheckbox';
  return `
    <div id="${name}" class="flex flex-col gap-s items-start w-full">
      <p class="text-[1.25rem] leading-normal font-bold text-bb-black-00">${groupLabel}</p>
      ${hint ? `<p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">${hint}</p>` : ''}
      ${options.map(opt => {
        const key = name + '-' + opt.toLowerCase().replace(/[^a-z0-9]/g, '-');
        const checked = !!GovBB.D[key];
        return `
          <div class="flex gap-5 items-center">
            <button type="button" role="checkbox" aria-checked="${checked}"
              onclick="${handler}('${key}')"
              class="relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-sm transition-all outline-none hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100">
              ${checked ? '<svg class="w-6 h-6 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : ''}
            </button>
            <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">${opt}</label>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function getCheckedOptions(name, options) {
  return options.filter(opt => {
    const key = name + '-' + opt.toLowerCase().replace(/[^a-z0-9]/g, '-');
    return !!GovBB.D[key];
  });
}

/* Illness checkboxes: "No known conditions" is an exclusive option —
   ticking it clears the conditions, and ticking any condition clears it. */
const ILLNESS_KEYS = ['illness-hypertension', 'illness-diabetes', 'illness-arthritis', 'illness-heart-condition', 'illness-other', 'illness-no-known-conditions'];
const ILLNESS_NONE = 'illness-no-known-conditions';
function toggleIllness(key) {
  var willBe = !GovBB.D[key];
  if (key === ILLNESS_NONE) {
    ILLNESS_KEYS.forEach(function (k) { GovBB.D[k] = false; });
    GovBB.D[ILLNESS_NONE] = willBe;
  } else {
    GovBB.D[key] = willBe;
    if (willBe) GovBB.D[ILLNESS_NONE] = false;
  }
  GovBB.render();
}

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'recipient-name') {
    if (!D['first-name'] || !D['first-name'].trim()) errors.push({ id: 'first-name', msg: 'First name – Enter the recipient\'s first name' });
    if (!D['last-name'] || !D['last-name'].trim()) errors.push({ id: 'last-name', msg: 'Last name – Enter the recipient\'s last name' });
  }

  if (pageId === 'recipient-details') {
    if (!D['address-line-1'] || !D['address-line-1'].trim()) errors.push({ id: 'address-line-1', msg: 'Address line 1 – Enter the house number or name and street' });
    if (!D['parish']) errors.push({ id: 'parish', msg: 'Parish – Select the parish' });
    const day = parseInt(D['dob-day']), month = parseInt(D['dob-month']), year = parseInt(D['dob-year']);
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter the recipient\'s date of birth' });
    } else if (isNaN(day) || isNaN(month) || isNaN(year) || day < 1 || day > 31 || month < 1 || month > 12 || year < 1900 || year > new Date().getFullYear()) {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a valid date of birth' });
    }
    if (!D['gender']) errors.push({ id: 'gender', msg: 'Gender – Select the recipient\'s gender' });
    if (!D['marital-status']) errors.push({ id: 'marital-status', msg: 'Marital status – Select the recipient\'s marital status' });
  }

  if (pageId === 'contact-person') {
    if (!D['contact-name'] || !D['contact-name'].trim()) errors.push({ id: 'contact-name', msg: 'Contact person – Enter the name of the contact person' });
    if (!D['tel-home'] && !D['tel-mobile']) errors.push({ id: 'tel-home', msg: 'Telephone – Enter at least a home or mobile telephone number' });
  }

  if (pageId === 'physical-condition') {
    if (!D['sight']) errors.push({ id: 'sight', msg: 'Sight – Select the recipient\'s sight condition' });
    if (!D['hearing']) errors.push({ id: 'hearing', msg: 'Hearing – Select the recipient\'s hearing condition' });
    if (!D['height']) errors.push({ id: 'height', msg: 'Height – Select the recipient\'s height' });
    if (!D['size']) errors.push({ id: 'size', msg: 'Build – Select the recipient\'s build' });
    if (!D['mobility']) errors.push({ id: 'mobility', msg: 'Mobility – Select the recipient\'s mobility' });
    if (getCheckedOptions('illness', ['Hypertension', 'Diabetes', 'Arthritis', 'Heart Condition', 'Other', 'No known conditions']).length === 0) {
      errors.push({ id: 'illness', msg: 'Illnesses or conditions – Select at least one option (tick \'No known conditions\' if none apply)' });
    }
  }

  if (pageId === 'mental-status') {
    if (!D['behaviour']) errors.push({ id: 'behaviour', msg: 'Behaviour – Select the recipient\'s behaviour' });
    if (!D['memory']) errors.push({ id: 'memory', msg: 'Memory – Select the recipient\'s memory' });
  }

  if (pageId === 'declaration') {
    if (!D['decl-email'] || !D['decl-email'].trim()) errors.push({ id: 'decl-email', msg: 'Email address – Enter your email address' });
    if (!D['decl-agree']) errors.push({ id: 'decl-agree', msg: 'Declaration – You must agree to the declaration before submitting' });
  }

  return errors;
}

/* ───────── Init ───────── */
/* Keep the page from jumping to the top when a radio/checkbox/repeating row
   re-renders. GovBB.render() scrolls to (0,0); preserve the scroll position on
   in-place re-renders, and only scroll to top on real navigation. */
(function () {
  var _render = GovBB.render;
  GovBB.render = function () {
    var y = window.scrollY || window.pageYOffset || 0;
    _render.call(GovBB);
    window.scrollTo(0, y);
  };
  ['nav', 'next', 'back'].forEach(function (m) {
    var orig = GovBB[m];
    if (typeof orig === 'function') {
      GovBB[m] = function () { var r = orig.apply(GovBB, arguments); window.scrollTo(0, 0); return r; };
    }
  });
})();

GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate
});

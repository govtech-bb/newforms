<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request an examination results statement – Ministry of Educational Transformation</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>
<body class="govbb-page">
<div class="govbb-official-banner"><div class="govbb-container govbb-official-banner__inner"><div class="govbb-official-banner__crest"><img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" /></div><div class="govbb-official-banner__text"><span>Official government website</span></div></div></div>
<header class="govbb-header"><div class="govbb-container govbb-header__inner"><a href="/" aria-label="Go to the alpha.gov.bb homepage"><img class="govbb-header__logo" src="../dist/assets/images/govbb-logo.svg" alt="GovBB" /></a></div></header>
<main class="govbb-page__main">
  <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-label="alpha status banner" aria-live="polite"><div class="govbb-container"><p>This page is in <a class="govbb-link govbb-link--secondary" href="#">Alpha</a>. Your feedback helps us improve.</p></div></div>
  <div class="govbb-container"><div id="app" style="padding-block: var(--spacing-l); max-width: 48rem;"></div></div>
</main>
<footer class="govbb-footer"><div class="govbb-container govbb-footer__inner"><nav class="govbb-footer__nav" aria-label="Footer"><a class="govbb-footer__link" href="#">Home</a><a class="govbb-footer__link" href="#">Privacy</a><a class="govbb-footer__link" href="#">Terms &amp; Conditions</a><a class="govbb-footer__link" href="#">Accessibility</a></nav><hr class="govbb-footer__divider" aria-hidden="true" /><div class="govbb-footer__end"><img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" /><p class="govbb-footer__copy">© 2025 Government of Barbados</p></div></div></footer>

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors=function(){var s=document.getElementById('error-summary');if(s)s.remove();document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});};
GovBB.showErrors=function(errors){GovBB.clearErrors();if(!errors||!errors.length)return;var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>';});html+='</ul></div>';var app=document.getElementById('app');var h1=app.querySelector('h1');if(h1)h1.insertAdjacentHTML('afterend',html);else app.insertAdjacentHTML('afterbegin',html);document.getElementById('error-summary').focus();errors.forEach(function(e){var el=document.getElementById(e.id);if(!el)return;var errId='err-'+e.id;el.setAttribute('aria-invalid','true');el.setAttribute('aria-describedby',errId);var msg=document.createElement('p');msg.className='govbb-error-message';msg.id=errId;msg.textContent=e.msg;var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;if(group)group.appendChild(msg);});if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;};
GovBB.summaryRow=function(label,value,changeTo){var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';};
</script>
<script>
function next(){GovBB.next();}function back(){GovBB.back();}function nav(p){GovBB.nav(p);}

const FORM_NAME='Request an examination results statement';
const CAPTION='Ministry of Educational Transformation';
const TITLES=['Mr','Mrs','Miss','Dr','Rev','Pastor','Hon','Prof'];
const EXAM_BODIES=['CXC — CSEC','CXC — CAPE','BSSEE','City and Guilds','Cambridge','GCE','Other'];
const DELIVERY_METHODS=['Collect in person at the Examinations Unit','Postal mail','Courier'];

const FLOW=['start','applicant-details','exam-details','delivery','declaration','check','confirmation'];

function caption(){return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+CAPTION+'</p>';}
function maskNid(nid){if(!nid)return '';var m=String(nid).trim().match(/^(\d{6})-(\d{4})$/);return m?'••••••-'+m[2]:String(nid).trim();}
function formatPhone(p){if(!p)return '';var digits=String(p).replace(/[^\d]/g,'');if(digits.length===10&&digits.indexOf('246')===0)return '(246) '+digits.substring(3,6)+' '+digits.substring(6);return String(p).trim();}
function fmtDate(prefix){const d=GovBB.D[prefix+'-day'],m=GovBB.D[prefix+'-month'],y=GovBB.D[prefix+'-year'];if(!d&&!m&&!y)return '';return [d,m,y].filter(Boolean).join(' / ');}
function parseDate(prefix){const d=parseInt(GovBB.D[prefix+'-day'],10),m=parseInt(GovBB.D[prefix+'-month'],10),y=parseInt(GovBB.D[prefix+'-year'],10);if(!d||!m||!y)return null;if(d<1||d>31||m<1||m>12||y<1900||y>2100)return false;const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return false;return dt;}
function applicantName(){return [GovBB.D['title'],GovBB.D['first-name'],GovBB.D['surname']].filter(Boolean).join(' ');}

function handleUpload(key,input){const file=input.files&&input.files[0];if(!file)return;if(file.size>10*1024*1024){alert('File is larger than 10 MB.');input.value='';return;}GovBB.D['upload-'+key]={name:file.name,size:file.size,type:file.type};GovBB.render();}
function removeUpload(key){delete GovBB.D['upload-'+key];GovBB.render();}
function formatBytes(n){if(n<1024)return n+' B';if(n<1024*1024)return (n/1024).toFixed(1)+' KB';return (n/(1024*1024)).toFixed(1)+' MB';}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uploadRow(key,label,hint){var file=GovBB.D['upload-'+key];if(file){return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);border-left:4px solid var(--color-green-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}<p class="govbb-text-body" style="margin:0;font-size:var(--font-size-caption);color:var(--color-mid-grey-00);word-break:break-all;"><span aria-hidden="true">✓ </span>${escapeHtml(file.name)} (${formatBytes(file.size)})</p></div><button type="button" class="govbb-btn--link" style="flex-shrink:0;" onclick="removeUpload('${key}')">Remove<span class="govbb-visually-hidden"> ${label}</span></button></div>`;}return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;flex:1;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}</div><label for="upload-${key}" class="govbb-btn--secondary" style="flex-shrink:0;cursor:pointer;margin:0;">Upload file</label><input type="file" id="upload-${key}" accept=".pdf,.jpg,.jpeg,.png" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleUpload('${key}', this)" /></div>`;}

function dateField(prefix,legend,hint){return `<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">${legend}</legend>${hint?`<p class="govbb-hint">${hint}</p>`:''}<div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;"><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-day">Day</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-month">Month</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-year">Year</label><div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div></div></div></fieldset>`;}

const PAGES = {
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);"><ol class="govbb-breadcrumbs__list"><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Examinations</a></li></ol></nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Request an examination results statement</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 29 May 2026</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Ask the Examinations Unit for an official statement of your past examination results — CSEC, CAPE, BSSEE, City & Guilds, Cambridge, GCE, or any other examination you took through the Ministry.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Apply online. The processing fee is paid separately at the MoE Accounts Department before you submit. Takes about <strong>10 minutes</strong>.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start request</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Pay the fee first, then submit this form.</strong> The current processing fee is approximately <strong>$30 BBD per subject</strong> — confirm the exact amount with the Examinations Unit on <strong>(246) 535-0600</strong>. Pay at the MoE Accounts Department and keep the receipt — you'll upload it as part of this form.</p>
        <p class="govbb-text-body" style="margin:0;">Statements are not issued until the fee is paid and the receipt is verified.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your name as it appeared on the examination entry (including maiden / former name if applicable)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your National ID Number, date of birth, and contact details</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The examination body, sitting (e.g. May/June 2018), and subjects</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your CXC candidate / centre number if you have it (helps the search but not required)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A scan or photo of: your government-issued photo ID and your payment receipt</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Examinations Unit verifies your identity and payment.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">They locate your records and prepare the statement.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Statements are normally ready within <strong>10 working days</strong>, delivered by your chosen method.</li>
      </ul>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start request</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call the Examinations Unit on <strong>(246) 535-0600</strong> or email <a class="govbb-link" href="mailto:exams@mes.gov.bb">exams@mes.gov.bb</a>.</p>
    </div>`,

  'applicant-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Use the name and details as they appeared on your examination entry. If your name has changed since (e.g. on marriage), include the former name so the Unit can find your record.</p>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="title">Title</label><div class="govbb-select-wrapper"><select class="govbb-select" id="title" name="title" data-field="title"><option value="">Select a title</option>${TITLES.map(t=>`<option value="${t}"${GovBB.D['title']===t?' selected':''}>${t}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="surname">Surname (as it appeared on the examination entry)</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="surname" name="surname" data-field="surname" autocomplete="family-name" value="${GovBB.D['surname']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="first-name">First name(s)</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="first-name" name="first-name" data-field="first-name" autocomplete="given-name" value="${GovBB.D['first-name']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="former-name">Maiden or former name (optional)</label><p class="govbb-hint">If your surname has changed since you sat the examination.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="former-name" name="former-name" data-field="former-name" value="${GovBB.D['former-name']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="nid">National ID Number</label><p class="govbb-hint">For example, 050615-0048.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="nid" name="nid" data-field="nid" value="${GovBB.D['nid']||''}" /></div></div>
      ${dateField('dob','Date of birth','For example, 15 6 2005.')}
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="address">Home address</label><textarea class="govbb-textarea" id="address" name="address" data-field="address" rows="3">${GovBB.D['address']||''}</textarea></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="phone">Mobile number</label><p class="govbb-hint">For example, (246) 249 1234.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="tel" id="phone" name="phone" data-field="phone" inputmode="tel" autocomplete="tel" value="${GovBB.D['phone']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="email">Email address</label><div class="govbb-input-wrapper"><input class="govbb-input" type="email" id="email" name="email" data-field="email" inputmode="email" autocomplete="email" value="${GovBB.D['email']||''}" /></div></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'exam-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Examination details</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="exam-body">Examination body</label><div class="govbb-select-wrapper"><select class="govbb-select" id="exam-body" name="exam-body" data-field="exam-body" data-trigger-render="1"><option value="">Select one</option>${EXAM_BODIES.map(b=>`<option value="${b}"${GovBB.D['exam-body']===b?' selected':''}>${b}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      ${GovBB.D['exam-body']==='Other'?`<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);"><label class="govbb-label" for="exam-body-other">Name of examination body</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="exam-body-other" name="exam-body-other" data-field="exam-body-other" value="${GovBB.D['exam-body-other']||''}" /></div></div>`:''}

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="exam-series">Examination series / sitting</label><p class="govbb-hint">For example, "May/June 2018" or "January 2020".</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="exam-series" name="exam-series" data-field="exam-series" value="${GovBB.D['exam-series']||''}" /></div></div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="candidate-no">Candidate number (optional)</label><p class="govbb-hint">A 7-digit number, typically printed on your slip. For example, "1234567". Helps the Unit locate your record faster.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="candidate-no" name="candidate-no" data-field="candidate-no" inputmode="numeric" value="${GovBB.D['candidate-no']||''}" /></div></div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="exam-centre">School or centre where you sat the exam</label><p class="govbb-hint">Type the official name in full.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="exam-centre" name="exam-centre" data-field="exam-centre" value="${GovBB.D['exam-centre']||''}" /></div></div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="subjects">Subjects you want on the statement</label><p class="govbb-hint">List one subject per line — for example: Mathematics, English A, Biology, Chemistry. If you want every subject from this sitting, type "All subjects".</p><textarea class="govbb-textarea" id="subjects" name="subjects" data-field="subjects" rows="5">${GovBB.D['subjects']||''}</textarea></div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="reason">Why do you need the statement?</label><p class="govbb-hint">For example, "job application", "university application", "verification for an overseas employer". The Unit uses this to prioritise urgent requests.</p><textarea class="govbb-textarea" id="reason" name="reason" data-field="reason" rows="3">${GovBB.D['reason']||''}</textarea></div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'delivery': () => {
    const needsAddress = GovBB.D['delivery-method']==='Postal mail'||GovBB.D['delivery-method']==='Courier';
    return `<form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">How would you like to receive the statement?</h1>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">Preferred method</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
        ${DELIVERY_METHODS.map((m,i)=>`<div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="delivery-${i}" name="delivery-method" data-field="delivery-method" value="${m}"${GovBB.D['delivery-method']===m?' checked':''} data-trigger-render="1" /><label class="govbb-radio-item__label" for="delivery-${i}">${m}</label></div>`).join('')}
      </div></fieldset>

      ${needsAddress?`<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);"><label class="govbb-label" for="delivery-address">Full delivery address</label><p class="govbb-hint">${GovBB.D['delivery-method']==='Courier'?'Including a contact phone number for the courier.':'The Examinations Unit will post by registered mail.'}</p><textarea class="govbb-textarea" id="delivery-address" name="delivery-address" data-field="delivery-address" rows="4">${GovBB.D['delivery-address']||''}</textarea></div>`:''}

      <h2 class="govbb-text-h2" style="margin-top:var(--spacing-l);margin-bottom:var(--spacing-s);">Upload your ID and receipt</h2>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Accepted formats: PDF, JPG, PNG. Maximum size: 10 MB per file.</p>
      ${uploadRow('photo-id', 'Government-issued photo ID (required)', 'For example, driver\'s licence, passport, or national ID card.')}
      ${uploadRow('receipt', 'Receipt of payment (required)', 'From the MoE Accounts Department.')}
      ${uploadRow('authority', 'Authorisation letter (optional)', 'Only if you are applying on behalf of someone else.')}

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`;
  },

  'declaration': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Before you submit, please confirm the following.</p>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-visually-hidden">Declaration</legend>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-accurate" name="decl-accurate" data-field="decl-accurate"${GovBB.D['decl-accurate']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-accurate">The information I have given is true and correct to the best of my knowledge.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-paid" name="decl-paid" data-field="decl-paid"${GovBB.D['decl-paid']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-paid">I have paid the processing fee at the MoE Accounts Department and uploaded the receipt.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-id" name="decl-id" data-field="decl-id"${GovBB.D['decl-id']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-id">The photo ID I have uploaded is mine and current.</label></div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue to review</button></div>
    </form>`,

  'check': () => `<div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before submitting</h1>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About you</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Name', applicantName(), 'applicant-details')}
        ${GovBB.summaryRow('Former name', GovBB.D['former-name'] || 'Not provided', 'applicant-details')}
        ${GovBB.summaryRow('National ID', maskNid(GovBB.D['nid']), 'applicant-details')}
        ${GovBB.summaryRow('Date of birth', fmtDate('dob'), 'applicant-details')}
        ${GovBB.summaryRow('Address', GovBB.D['address'], 'applicant-details')}
        ${GovBB.summaryRow('Mobile', formatPhone(GovBB.D['phone']), 'applicant-details')}
        ${GovBB.summaryRow('Email', GovBB.D['email'], 'applicant-details')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Examination</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Examination body', GovBB.D['exam-body']==='Other'?(GovBB.D['exam-body-other']||'Other'):GovBB.D['exam-body'], 'exam-details')}
        ${GovBB.summaryRow('Series / sitting', GovBB.D['exam-series'], 'exam-details')}
        ${GovBB.summaryRow('Candidate number', GovBB.D['candidate-no'] || 'Not provided', 'exam-details')}
        ${GovBB.summaryRow('Centre', GovBB.D['exam-centre'], 'exam-details')}
        ${GovBB.summaryRow('Subjects', GovBB.D['subjects'], 'exam-details')}
        ${GovBB.summaryRow('Reason', GovBB.D['reason'], 'exam-details')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Delivery</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Method', GovBB.D['delivery-method'], 'delivery')}
        ${(GovBB.D['delivery-method']==='Postal mail'||GovBB.D['delivery-method']==='Courier')?GovBB.summaryRow('Delivery address', GovBB.D['delivery-address'], 'delivery'):''}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Uploads</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${[{key:'photo-id',label:'Photo ID'},{key:'receipt',label:'Payment receipt'},{key:'authority',label:'Authorisation letter'}].map(function(d){var f=GovBB.D['upload-'+d.key];return GovBB.summaryRow(d.label, f?escapeHtml(f.name)+' ('+formatBytes(f.size)+')':'Not uploaded', 'delivery');}).join('')}
      </dl>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="if(this.disabled)return;this.disabled=true;this.textContent='Submitting…';next();">Submit request</button></div>
    </div>`,

  'confirmation': () => {
    if (!window.__refNumber) {
      const refYear = new Date().getFullYear();
      const refNum = String(Math.floor(Math.random() * 1000000)).padStart(6, '0');
      window.__refNumber = `ERS-${refYear}-${refNum}`;
    }
    const ref = window.__refNumber;
    if(document.title.indexOf('Error: ')===0)document.title=document.title.substring('Error: '.length);
    document.title='Request submitted — '+FORM_NAME;
    return `<div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Request submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${ref}</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Examinations Unit verifies your identity and payment.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">They locate your record and prepare the statement.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Statements are normally ready within <strong>10 working days</strong>, delivered by your chosen method.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">We've sent a copy of your request to ${GovBB.D['email']||'the address you provided'}.</li>
      </ul>
      <div style="display:flex;gap:var(--spacing-m);flex-wrap:wrap;margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="window.print()">Print this page</button>
        <a class="govbb-btn--link" href="../forms.html">Return to all forms</a>
      </div>
    </div>`;
  }
};

function validate(pageId){
  const D=GovBB.D,errors=[];
  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/,NID_RE=/^\d{6}-\d{4}$/;
  function req(id,msg){if(!D[id]||String(D[id]).trim()==='')errors.push({id:id,msg:msg});}
  function reqNid(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!NID_RE.test(v))errors.push({id:id,msg:label+' must be in the format 110915-0048'});}
  function reqPhone(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}var digits=v.replace(/[\s\-()+]/g,'');if(!/^\d{7,15}$/.test(digits))errors.push({id:id,msg:label+' must contain 7 to 15 digits'});}
  function reqEmail(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!EMAIL_RE.test(v))errors.push({id:id,msg:label+' must be in the format you@example.com'});}
  function reqDate(prefix,label){const d=D[prefix+'-day'],m=D[prefix+'-month'],y=D[prefix+'-year'];if(!d||!m||!y){errors.push({id:prefix+'-day',msg:label+' — enter a complete date.'});return null;}const dt=parseDate(prefix);if(dt===false){errors.push({id:prefix+'-day',msg:label+' — enter a real date.'});return null;}return dt;}

  if(pageId==='applicant-details'){
    req('title','Select a title');
    req('surname','Enter your surname');
    req('first-name','Enter your first name');
    reqNid('nid','National ID Number','Enter your National ID Number');
    const dob=reqDate('dob','Date of birth');
    if(dob){const today=new Date();today.setHours(0,0,0,0);if(dob>=today)errors.push({id:'dob-day',msg:'Date of birth must be in the past.'});}
    req('address','Enter your home address');
    reqPhone('phone','Mobile number','Enter your mobile number');
    reqEmail('email','Email address','Enter your email address');
  }
  if(pageId==='exam-details'){
    req('exam-body','Select an examination body');
    if(D['exam-body']==='Other')req('exam-body-other','Enter the name of the examination body');
    req('exam-series','Enter the examination series or sitting');
    req('exam-centre','Enter the school or centre');
    var s=(D['subjects']||'').trim();
    if(!s)errors.push({id:'subjects',msg:'List the subjects you want on the statement'});
    else if(s.length<3)errors.push({id:'subjects',msg:'List the subjects in more detail — for example, "Mathematics, English A, Biology"'});
    var r=(D['reason']||'').trim();
    if(!r)errors.push({id:'reason',msg:'Briefly say why you need the statement'});
    else if(r.length<10)errors.push({id:'reason',msg:'Add more detail — even a short note helps the Unit prioritise.'});
  }
  if(pageId==='delivery'){
    if(!D['delivery-method'])errors.push({id:'delivery-0',msg:'Choose a delivery method'});
    if(D['delivery-method']==='Postal mail'||D['delivery-method']==='Courier')req('delivery-address','Enter the full delivery address');
    if(!D['upload-photo-id'])errors.push({id:'upload-photo-id',msg:'Upload your government-issued photo ID'});
    if(!D['upload-receipt'])errors.push({id:'upload-receipt',msg:'Upload your payment receipt'});
  }
  if(pageId==='declaration'){
    ['accurate','paid','id'].forEach(function(k){if(!D['decl-'+k])errors.push({id:'decl-'+k,msg:'Tick the box to confirm'});});
  }
  return errors;
}

GovBB.init({formName:FORM_NAME,flow:FLOW,pages:PAGES,validate:validate});
</script>
</body>
</html>

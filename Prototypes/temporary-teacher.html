<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  var app = document.getElementById('app');
  var h1 = app.querySelector('h1');
  if (h1) { h1.insertAdjacentHTML('afterend', html); }
  else { app.insertAdjacentHTML('afterbegin', html); }
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
/* ───────── Global nav shortcuts ───────── */
function next() { GovBB.next(); }
function back() { GovBB.back(); }
function nav(p)  { GovBB.nav(p); }

/* ───────── Upload handlers ───────── */
function handleUpload(key, input) {
  const file = input.files && input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    alert('File is larger than 10 MB. Please choose a smaller file.');
    input.value = '';
    return;
  }
  GovBB.D['upload-' + key] = { name: file.name, size: file.size, type: file.type };
  GovBB.render();
}
function removeUpload(key) {
  delete GovBB.D['upload-' + key];
  GovBB.render();
}
function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / (1024 * 1024)).toFixed(1) + ' MB';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* ───────── Form configuration ───────── */
const FORM_NAME = 'Application for the post of temporary teacher';
const CAPTION = 'Ministry of Education Transformation';

const MARITAL_STATUS = ['Single', 'Married', 'In a civil union', 'Divorced', 'Widowed', 'Separated', 'Prefer not to say'];

const CITIZENSHIP_OPTIONS = [
  'Barbadian (born or naturalised)',
  'CARICOM citizen',
  'Commonwealth citizen',
  'Other'
];

const BIRTH_COUNTRIES = [
  'Barbados',
  'Antigua and Barbuda',
  'Bahamas',
  'Belize',
  'Dominica',
  'Grenada',
  'Guyana',
  'Jamaica',
  'Saint Kitts and Nevis',
  'Saint Lucia',
  'Saint Vincent and the Grenadines',
  'Suriname',
  'Trinidad and Tobago',
  'Canada',
  'India',
  'Nigeria',
  'United Kingdom',
  'United States',
  'Other'
];

/* Maximum row counts for each repeating section. Generous enough to cover
   realistic applicants without becoming unwieldy. */
const MAX_EDUCATION = 6;
const MAX_QUALIFICATIONS = 8;
const MAX_WORK = 7;

/* ───────── Flow ───────── */
const FLOW = [
  'start',
  'personal-details',
  'personal-contact',
  'personal-background',
  'education-count',
  'education-data',
  'qualifications-count',
  'qualifications-data',
  'work-yesno',
  'work-count',
  'work-data',
  'skills-and-extras',
  'references',
  'documents',
  'declaration',
  'check',
  'confirmation'
];

/* ───────── Helpers ───────── */
function caption() {
  return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">' + CAPTION + '</p>';
}

function applicantFullName() {
  return [GovBB.D['first-name'], GovBB.D['other-names'], GovBB.D['last-name']].filter(Boolean).join(' ');
}

function maskNid(nid) {
  if (!nid) return '';
  var m = String(nid).trim().match(/^(\d{6})-(\d{4})$/);
  return m ? '••••••-' + m[2] : String(nid).trim();
}

function maskNis(nis) {
  if (!nis) return '';
  var digits = String(nis).replace(/[^\d]/g, '');
  if (digits.length < 4) return '••••';
  return '••••' + digits.slice(-4);
}

function formatPhone(p) {
  if (!p) return '';
  var digits = String(p).replace(/[^\d]/g, '');
  if (digits.length === 10 && digits.indexOf('246') === 0) {
    return '(246) ' + digits.substring(3, 6) + ' ' + digits.substring(6);
  }
  if (digits.length === 11 && digits.indexOf('1246') === 0) {
    return '+1 (246) ' + digits.substring(4, 7) + ' ' + digits.substring(7);
  }
  return String(p).trim();
}

function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function parseDate(prefix) {
  const d = parseInt(GovBB.D[prefix + '-day'], 10);
  const m = parseInt(GovBB.D[prefix + '-month'], 10);
  const y = parseInt(GovBB.D[prefix + '-year'], 10);
  if (!d || !m || !y) return null;
  if (d < 1 || d > 31 || m < 1 || m > 12 || y < 1900 || y > 2100) return false;
  const dt = new Date(y, m - 1, d);
  if (dt.getFullYear() !== y || dt.getMonth() !== m - 1 || dt.getDate() !== d) return false;
  return dt;
}

function countOf(key, max) {
  const n = parseInt(GovBB.D[key], 10);
  if (isNaN(n) || n < 1) return 1;
  if (n > max) return max;
  return n;
}

function educationCount() { return countOf('education-count', MAX_EDUCATION); }
function qualCount()      { return countOf('qual-count', MAX_QUALIFICATIONS); }
function workCount()      { return countOf('work-count', MAX_WORK); }

/* Clear ghost data when a repeating section's count is reduced or the
   user has answered "No" to an entire optional section. */
function purgeRepeatable(prefix, fields, fromIndex, toIndex) {
  for (var i = fromIndex; i <= toIndex; i++) {
    fields.forEach(function(f) { delete GovBB.D[prefix + '-' + i + '-' + f]; });
  }
}

const EDU_FIELDS  = ['name', 'country', 'start-day', 'start-month', 'start-year', 'end-day', 'end-month', 'end-year'];
const QUAL_FIELDS = ['subject', 'body', 'year', 'level'];
const WORK_FIELDS = ['employer', 'from-day', 'from-month', 'from-year', 'to-day', 'to-month', 'to-year', 'current', 'position', 'duties'];

/* ───────── Date field renderer ───────── */
function dateField(prefix, legend, hint, opts) {
  opts = opts || {};
  return `
    <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
      <legend class="govbb-fieldset__legend">${legend}</legend>
      ${hint ? `<p class="govbb-hint">${hint}</p>` : ''}
      <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
        <div class="govbb-date-input__part">
          <label class="govbb-date-input__label" for="${prefix}-day">Day</label>
          <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div>
        </div>
        <div class="govbb-date-input__part">
          <label class="govbb-date-input__label" for="${prefix}-month">Month</label>
          <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div>
        </div>
        <div class="govbb-date-input__part">
          <label class="govbb-date-input__label" for="${prefix}-year">Year</label>
          <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div>
        </div>
      </div>
    </fieldset>`;
}

/* ───────── Document upload row renderer ───────── */
function uploadRow(key, label, hint) {
  var file = GovBB.D['upload-' + key];
  if (file) {
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);border-left:4px solid var(--color-green-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);">
        <div style="min-width:0;">
          <p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>
          ${hint ? `<p class="govbb-hint" style="margin:0;">${hint}</p>` : ''}
          <p class="govbb-text-body" style="margin:0;font-size:var(--font-size-caption);color:var(--color-mid-grey-00);word-break:break-all;"><span aria-hidden="true">✓ </span>${escapeHtml(file.name)} (${formatBytes(file.size)})</p>
        </div>
        <button type="button" class="govbb-btn--link" style="flex-shrink:0;" onclick="removeUpload('${key}')">Remove<span class="govbb-visually-hidden"> ${label}</span></button>
      </div>`;
  }
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);">
      <div style="min-width:0;flex:1;">
        <p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>
        ${hint ? `<p class="govbb-hint" style="margin:0;">${hint}</p>` : ''}
      </div>
      <label for="upload-${key}" class="govbb-btn--secondary" style="flex-shrink:0;cursor:pointer;margin:0;">Upload file</label>
      <input type="file" id="upload-${key}" accept=".pdf,.jpg,.jpeg,.png" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleUpload('${key}', this)" />
    </div>`;
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);">
        <ol class="govbb-breadcrumbs__list">
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li>
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Jobs and careers</a></li>
        </ol>
      </nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Apply for a temporary teacher post</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 16 March 2026</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Apply for a temporary teaching post with the Ministry of Education Transformation.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Apply online. There is no application fee. This form has <strong>15 steps</strong> and takes about <strong>25 to 30 minutes</strong> — gather your information and documents first.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Before applying, read the <a href="#" class="govbb-link">temporary teacher post description</a> for the duties, pay band, and probationary period.</p>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>This form is for the temporary teacher post only.</strong> Permanent teaching posts, school administration posts, and supply teaching arrangements are recruited through different processes — call the Ministry on +1 (246) 535-0700 if you are not sure which to apply for.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your National ID Number, NIS number (if you have one), date of birth, and contact details</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your education history — institutions attended, with dates</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your qualifications — subjects, examining bodies, dates, and levels</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your work history — employers, positions, and dates</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Two referees — name, occupation, address, phone, and email for each. <strong>Avoid family members</strong> — choose people who know your work, such as a former employer, principal, or university tutor.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Documents to upload (PDF, JPG, or PNG — up to 10 MB each):
          <ul style="list-style:circle;padding-left:var(--spacing-m);margin-top:var(--spacing-xs);">
            <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A copy of your certificates, diplomas, or transcripts</li>
            <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Two testimonials (signed character references)</li>
          </ul>
        </li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">The Ministry's recruitment team will review your application. Shortlisted candidates are contacted for an interview within <strong>6 weeks</strong>. If you are not shortlisted you will still be notified by email.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call the Ministry of Education Transformation on <strong>+1 (246) 535-0700</strong> if you need help completing this form.</p>
    </div>`,

  /* ── Personal details ── */
  'personal-details': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="first-name">First name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="first-name" name="first-name" data-field="first-name" autocomplete="given-name" value="${GovBB.D['first-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="last-name">Last name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="last-name" name="last-name" data-field="last-name" autocomplete="family-name" value="${GovBB.D['last-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="other-names">Other names (optional)</label>
        <p class="govbb-hint">Middle names or initials, if any.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="other-names" name="other-names" data-field="other-names" autocomplete="additional-name" value="${GovBB.D['other-names']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="nid">National ID Number</label>
        <p class="govbb-hint">From your national ID card. For example, 110915-0048.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="nid" name="nid" data-field="nid" value="${GovBB.D['nid']||''}" />

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="nis-no">NIS number (optional)</label>
        <p class="govbb-hint">Your National Insurance Scheme number — usually 8 to 12 digits. <strong>If you have one, please provide it</strong> — leaving it blank will delay your payroll set-up if you are appointed. If you don't have one yet, contact the NIS office on +1 (246) 467-4500 to register.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="nis-no" name="nis-no" data-field="nis-no" inputmode="numeric" value="${GovBB.D['nis-no']||''}" />
        </div>
      </div>

      ${dateField('dob', 'Date of birth', 'For example, 15 6 1990.')}

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">

        <p class="govbb-hint">As recorded on your National Registration Card.</p>

          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="gender-male" name="gender" data-field="gender" value="Male"${GovBB.D['gender']==='Male'?' checked':''} />

          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="gender-female" name="gender" data-field="gender" value="Female"${GovBB.D['gender']==='Female'?' checked':''} />
            <label class="govbb-radio-item__label" for="gender-female">Female</label>
          </div>
        </div>
      </fieldset>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Personal contact ── */
  'personal-contact': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">How to reach you</h1>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);border-bottom:1px solid var(--color-grey-00);padding-bottom:var(--spacing-s);">Address</h2>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="address-line1">Address line 1</label>
        <p class="govbb-hint">House number and street name.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="address-line1" name="address-line1" data-field="address-line1" autocomplete="address-line1" value="${GovBB.D['address-line1']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="address-line2">Address line 2 (optional)</label>
        <p class="govbb-hint">Area or village.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="address-line2" name="address-line2" data-field="address-line2" autocomplete="address-line2" value="${GovBB.D['address-line2']||''}" />
        </div>
      </div>

  'work-count': () => `

          ${Array.from({length: MAX_WORK}, (_, i) => i + 1).map(n=>`
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="work-count-${n}" name="work-count" data-field="work-count" value="${n}"${String(GovBB.D['work-count'])===String(n)?' checked':''} />

          </div>`).join('')}
        </div>
      </fieldset>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">

        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Work data ── */
  'work-data': () => {
    const count = workCount();
    purgeRepeatable('work', WORK_FIELDS, count + 1, MAX_WORK);

    /* Ghost "To" date cleanup: when "I am still in this role" is ticked,
       any previously-typed To-date data is purged so it can't sneak into
       a submission with both current:true and a stale to-year. */
    for (let g = 1; g <= count; g++) {
      if (GovBB.D['work-' + g + '-current']) {
        ['to-day','to-month','to-year'].forEach(function(f){
          delete GovBB.D['work-' + g + '-' + f];
        });
      }
    }

    let sections = '';
    for (let i = 1; i <= count; i++) {
      const current = GovBB.D['work-' + i + '-current'];
      sections += `
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-l);border-top:2px solid var(--color-grey-00);padding-top:var(--spacing-m);">
        <legend class="govbb-fieldset__legend govbb-text-h2" style="padding:0 var(--spacing-s);">Role ${i}</legend>

        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="work-${i}-employer">Name of employer</label>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="work-${i}-employer" name="work-${i}-employer" data-field="work-${i}-employer" autocomplete="organization" value="${GovBB.D['work-'+i+'-employer']||''}" />
          </div>
        </div>

        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="work-${i}-position">Position held</label>
          <p class="govbb-hint">Your job title. For example, "Teaching Assistant", "Sales Associate".</p>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="work-${i}-position" name="work-${i}-position" data-field="work-${i}-position" autocomplete="organization-title" value="${GovBB.D['work-'+i+'-position']||''}" />
          </div>
        </div>

        ${dateField('work-'+i+'-from', 'From', 'When you started this role.')}

        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-m);">
          <input class="govbb-checkbox" type="checkbox" id="work-${i}-current" name="work-${i}-current" data-field="work-${i}-current"${current?' checked':''} data-trigger-render="1" />
          <label class="govbb-checkbox-item__label" for="work-${i}-current">I am still in this role</label>
        </div>

        ${!current ? dateField('work-'+i+'-to', 'To', 'When you left this role.') : ''}

        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="work-${i}-duties">Brief description of duties</label>
          <p class="govbb-hint">Two or three sentences. What were your main responsibilities?</p>
          <textarea class="govbb-textarea" id="work-${i}-duties" name="work-${i}-duties" data-field="work-${i}-duties" rows="4" style="width:100%;">${GovBB.D['work-'+i+'-duties']||''}</textarea>
        </div>
      </fieldset>`;
    }

    return `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">${count === 1 ? 'About the role' : 'About the roles'}</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Fill in the details for ${count === 1 ? 'the role' : 'each of the ' + count + ' roles'} you listed.</p>

      ${sections}

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const NID_RE = /^\d{6}-\d{4}$/;

  function req(id, msg) {
    if (!D[id] || String(D[id]).trim() === '') errors.push({ id: id, msg: msg });
  }
  function reqMinLetters(id, msg, min) {
    var v = (D[id] || '').trim();
    if (!v) { errors.push({ id: id, msg: msg + ' (required)' }); return; }
    if ((v.match(/[A-Za-z]/g) || []).length < min) {
      errors.push({ id: id, msg: msg });
    }
  }
  function reqNid(id, label, emptyMsg) {
    const v = (D[id] || '').trim();
    if (!v) { errors.push({ id: id, msg: emptyMsg }); return; }
    if (!NID_RE.test(v)) errors.push({ id: id, msg: label + ' must be in the format 110915-0048' });
  }
  function reqPhone(id, label, required, emptyMsg) {
    const v = (D[id] || '').trim();
    if (!v) { if (required) errors.push({ id: id, msg: emptyMsg }); return; }
    const digits = v.replace(/[\s\-()+]/g, '');
    if (!/^\d{7,15}$/.test(digits)) errors.push({ id: id, msg: label + ' must contain 7 to 15 digits, for example (246) 249 1234' });
  }
  function reqEmail(id, label, emptyMsg) {
    const v = (D[id] || '').trim();
    if (!v) { errors.push({ id: id, msg: emptyMsg }); return; }
    if (!EMAIL_RE.test(v)) errors.push({ id: id, msg: label + ' must be in the format you@example.com' });
  }
  function reqDate(prefix, label) {
    const dayV = D[prefix + '-day'], monV = D[prefix + '-month'], yrV = D[prefix + '-year'];
    if (!dayV || !monV || !yrV) {
      errors.push({ id: prefix + '-day', msg: label + ' — enter a complete date.' });
      return null;
    }
    const dt = parseDate(prefix);
    if (dt === false) {
      errors.push({ id: prefix + '-day', msg: label + ' — enter a real date, for example 15 6 2020.' });
      return null;
    }
    return dt;
  }

  if (pageId === 'personal-details') {
    req('first-name', 'Enter your first name');
    req('last-name', 'Enter your last name');
    reqNid('nid', 'National ID Number', 'Enter your National ID Number');
    /* NIS is optional. If entered, must be 8-12 digits. Applicants who
       have not yet registered with NIS can leave this blank and follow
       the start-page guidance to contact NIS first. */
    var nis = (D['nis-no'] || '').trim();
    if (nis && !/^\d{8,12}$/.test(nis.replace(/[\s\-]/g, ''))) {
      errors.push({ id: 'nis-no', msg: 'NIS number must be 8 to 12 digits, or leave it blank if you don\'t have one yet' });
    }
    const dob = reqDate('dob', 'Date of birth');
    if (dob) {
      const today = new Date(); today.setHours(0,0,0,0);
      const age = today.getFullYear() - dob.getFullYear() - ((today.getMonth() < dob.getMonth() || (today.getMonth() === dob.getMonth() && today.getDate() < dob.getDate())) ? 1 : 0);
      if (dob >= today) {
        errors.push({ id: 'dob-day', msg: 'Date of birth must be in the past.' });
      } else if (age < 18) {
        errors.push({ id: 'dob-day', msg: 'You must be at least 18 years old to apply.' });
      } else if (age > 80) {
        errors.push({ id: 'dob-day', msg: 'Date of birth — check the year. The age calculated from this date is over 80.' });
      }
    }
    if (!D['gender']) errors.push({ id: 'gender-male', msg: 'Select your sex' });
  }

  if (pageId === 'personal-contact') {
    req('address-line1', 'Enter your address');
    req('parish', 'Select your parish');
    /* At least one phone (cell or home) required. */
    var hasPhone = ['tel-cell','tel-home'].some(function(k){ return (D[k]||'').trim(); });
    if (!hasPhone) {
      errors.push({ id: 'tel-cell', msg: 'Enter at least one phone number (cell or home).' });
    }
    reqPhone('tel-cell', 'Cell phone', false);
    reqPhone('tel-home', 'Home phone', false);
    reqEmail('email', 'Email address', 'Enter your email address');
  }

  if (pageId === 'personal-background') {
    req('birth-city', 'Enter the city you were born in');
    req('birth-country', 'Select the country you were born in');
    if (D['birth-country'] === 'Other') req('birth-country-other', 'Specify the country');
    req('citizenship', 'Select your citizenship');
    if (D['citizenship'] === 'Other') req('citizenship-other', 'Specify your citizenship');
    var yrs = (D['years-in-barbados'] || '').trim();
    if (!yrs) {
      errors.push({ id: 'years-in-barbados', msg: 'Enter the number of years you have lived in Barbados (0 if abroad).' });
    } else if (!/^\d{1,3}$/.test(yrs) || parseInt(yrs, 10) > 120) {
      errors.push({ id: 'years-in-barbados', msg: 'Enter a whole number of years between 0 and 120.' });
    } else {
      /* Cross-field: years in Barbados cannot exceed the applicant's age. */
      var dobParsed = parseDate('dob');
      if (dobParsed) {
        var today2 = new Date();
        var ageNow = today2.getFullYear() - dobParsed.getFullYear() - ((today2.getMonth() < dobParsed.getMonth() || (today2.getMonth() === dobParsed.getMonth() && today2.getDate() < dobParsed.getDate())) ? 1 : 0);
        if (parseInt(yrs, 10) > ageNow) {
          errors.push({ id: 'years-in-barbados', msg: 'Years in Barbados (' + yrs + ') cannot be greater than your age (' + ageNow + '). Check the number.' });
        }
      }
    }
  }

  if (pageId === 'education-count') {
    if (!D['education-count']) errors.push({ id: 'education-count-1', msg: 'Choose how many institutions you are listing.' });
  }

  if (pageId === 'education-data') {
    const count = educationCount();
    const today = new Date();
    const fiveYearsAhead = new Date(today.getFullYear() + 5, today.getMonth(), today.getDate());
    for (let i = 1; i <= count; i++) {
      reqMinLetters('edu-' + i + '-name',    'Institution ' + i + ' — enter the institution name in letters', 3);
      req('edu-' + i + '-country',  'Institution ' + i + ' — enter the country');
      const start = reqDate('edu-' + i + '-start', 'Institution ' + i + ' start date');
      const end   = reqDate('edu-' + i + '-end',   'Institution ' + i + ' end date');
      if (start && end && start > end) {
        errors.push({ id: 'edu-' + i + '-end-day', msg: 'Institution ' + i + ' — end date must be on or after the start date.' });
      }
      /* Future start dates allowed for "expected" — but cap at 5 years
         ahead to catch year typos. */
      if (start && start > fiveYearsAhead) {
        errors.push({ id: 'edu-' + i + '-start-day', msg: 'Institution ' + i + ' — start date is too far in the future.' });
      }
      /* End date can also be in the future (for in-progress education) but
         must also stay within the 5-year window. */
      if (end && end > fiveYearsAhead) {
        errors.push({ id: 'edu-' + i + '-end-day', msg: 'Institution ' + i + ' — end date is too far in the future. Check the year.' });
      }
    }
  }

  if (pageId === 'qualifications-count') {
    if (!D['qual-count']) errors.push({ id: 'qual-count-1', msg: 'Choose how many qualifications you are listing.' });
  }

  if (pageId === 'qualifications-data') {
    const count = qualCount();
    const thisYear = new Date().getFullYear();
    for (let i = 1; i <= count; i++) {
      reqMinLetters('qual-' + i + '-subject', 'Qualification ' + i + ' — enter the subject in letters', 2);
      req('qual-' + i + '-body',    'Qualification ' + i + ' — enter the examining body');
      var yr = (D['qual-' + i + '-year'] || '').trim();
      if (!yr) {
        errors.push({ id: 'qual-' + i + '-year', msg: 'Qualification ' + i + ' — enter the year passed.' });
      } else if (!/^\d{4}$/.test(yr) || parseInt(yr, 10) < 1950 || parseInt(yr, 10) > thisYear + 5) {
        errors.push({ id: 'qual-' + i + '-year', msg: 'Qualification ' + i + ' — year must be 4 digits between 1950 and ' + (thisYear + 5) + '.' });
      }
      req('qual-' + i + '-level',   'Qualification ' + i + ' — enter the level or grade');
    }
  }

  if (pageId === 'work-yesno') {
    if (!D['has-work']) errors.push({ id: 'has-work-yes', msg: 'Select yes or no — do you have work experience to list?' });
  }

  if (pageId === 'work-count') {
    if (!D['work-count']) errors.push({ id: 'work-count-1', msg: 'Choose how many roles you are listing.' });
  }

  if (pageId === 'work-data') {
    const count = workCount();
    const todayW = new Date(); todayW.setHours(0,0,0,0);
    for (let i = 1; i <= count; i++) {
      reqMinLetters('work-' + i + '-employer', 'Role ' + i + ' — enter the employer name in letters', 2);
      reqMinLetters('work-' + i + '-position', 'Role ' + i + ' — enter the position in letters', 2);
      const from = reqDate('work-' + i + '-from', 'Role ' + i + ' start date');
      /* From date cannot be in the future — a job that hasn't started yet
         isn't work experience. */
      if (from && from > todayW) {
        errors.push({ id: 'work-' + i + '-from-day', msg: 'Role ' + i + ' — start date cannot be in the future. Check the year.' });
      }
      let to = null;
      if (!D['work-' + i + '-current']) {
        to = reqDate('work-' + i + '-to', 'Role ' + i + ' end date');
        if (from && to && from > to) {
          errors.push({ id: 'work-' + i + '-to-day', msg: 'Role ' + i + ' — end date must be on or after the start date.' });
        }
        if (to && to > todayW) {
          errors.push({ id: 'work-' + i + '-to-day', msg: 'Role ' + i + ' — end date cannot be in the future. If you are still in this role, tick "I am still in this role".' });
        }
      }
      var duties = (D['work-' + i + '-duties'] || '').trim();
      if (!duties) {
        errors.push({ id: 'work-' + i + '-duties', msg: 'Role ' + i + ' — briefly describe your duties.' });
      } else if (duties.length < 20) {
        errors.push({ id: 'work-' + i + '-duties', msg: 'Role ' + i + ' — add more detail about your duties (at least one full sentence).' });
      }
    }
  }

  /* skills-and-extras is entirely optional — no validation. */

  if (pageId === 'references') {
    for (let i = 1; i <= 2; i++) {
      req('ref-' + i + '-name',       'Referee ' + i + ' — enter the full name');
      req('ref-' + i + '-occupation', 'Referee ' + i + ' — enter the occupation or profession');
      req('ref-' + i + '-address',    'Referee ' + i + ' — enter the address');
      reqPhone('ref-' + i + '-phone', 'Referee ' + i + ' contact number', true, 'Referee ' + i + ' — enter a contact number');
      reqEmail('ref-' + i + '-email', 'Referee ' + i + ' email',          'Referee ' + i + ' — enter an email address');
    }
    /* Referees must be different people — check email AND phone. */
    var em1 = (D['ref-1-email'] || '').trim().toLowerCase();
    var em2 = (D['ref-2-email'] || '').trim().toLowerCase();
    if (em1 && em2 && em1 === em2) {
      errors.push({ id: 'ref-2-email', msg: 'Referee 2 must be a different person from Referee 1 — the email addresses are the same.' });
    }
    var ph1 = (D['ref-1-phone'] || '').replace(/[^\d]/g, '');
    var ph2 = (D['ref-2-phone'] || '').replace(/[^\d]/g, '');
    if (ph1 && ph2 && ph1 === ph2 && em1 !== em2) {
      /* Phone match but different emails — could be a shared office line.
         Soft warning via the error summary, but allow continuation by
         flagging on ref-2 only (lets the user override by changing). */
      errors.push({ id: 'ref-2-phone', msg: 'Referee 2 has the same phone number as Referee 1. If this is correct (a shared office line), check the phone number is right; otherwise enter a different number.' });
    }
  }

  if (pageId === 'documents') {
    ['certificates', 'testimonial-1', 'testimonial-2'].forEach(function(k){
      if (!D['upload-' + k]) {
        errors.push({ id: 'upload-' + k, msg: 'Upload the ' + (k === 'certificates' ? 'certificates / diplomas / transcripts' : ('testimonial ' + k.slice(-1))) + '.' });
      }
    });
    /* Same-file warning: testimonials should come from two different
       people. If both testimonial files have the same name AND size,
       almost always a user error. */
    var t1 = D['upload-testimonial-1'];
    var t2 = D['upload-testimonial-2'];
    if (t1 && t2 && t1.name === t2.name && t1.size === t2.size) {
      errors.push({ id: 'upload-testimonial-2', msg: 'Testimonial 1 and Testimonial 2 look like the same file. Testimonials should be from two different people — upload a second, different testimonial.' });
    }
  }

  if (pageId === 'declaration') {
    if (!D['decl-accurate']) errors.push({ id: 'decl-accurate', msg: 'Tick the box to confirm the information is true and correct' });
    if (!D['decl-referees']) errors.push({ id: 'decl-referees', msg: 'Tick the box to confirm you have informed your referees' });
    if (!D['decl-verify'])   errors.push({ id: 'decl-verify',   msg: 'Tick the box to agree the Ministry may verify your qualifications and work history' });
    if (!D['decl-false'])    errors.push({ id: 'decl-false',    msg: 'Tick the box to confirm you understand the consequences of false information' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  /* Dynamic flow: skip work-count + work-data if the user has no work
     experience, and purge any persisted work data so it can't leak into
     a submission. */
  getFlow: function() {
    if (GovBB.D['has-work'] === 'No') {
      /* Purge work data on the spot. */
      for (var i = 1; i <= MAX_WORK; i++) {
        WORK_FIELDS.forEach(function(f) { delete GovBB.D['work-' + i + '-' + f]; });
      }
      delete GovBB.D['work-count'];
      return FLOW.filter(function(p) { return p !== 'work-count' && p !== 'work-data'; });
    }
    return FLOW;
  },
  pages: PAGES,
  validate: validate
});
</script>

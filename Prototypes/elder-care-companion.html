<script src="../assets/govbb-framework.js"></script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = 'Elder Care Companion Application';

const FLOW = [
  'start',
  'applicant-details',
  'contact',
  'living-situation',
  'health-wellbeing',
  'companion-preferences',
  'referral',
  'emergency-contact',
  'declaration',
  'check',
  'confirmation'
];

/* ───────── Custom styled select (matches design system) ───────── */
function styledSelect(id, label, options, opts) {
  opts = opts || {};
  const val = GovBB.D[id] || '';
  const hint = opts.hint
    ? `<p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">${opts.hint}</p>`
    : '';
  const triggerAttr = opts.triggerRender ? ' data-trigger-render="1"' : '';
  const placeholder = opts.placeholder || 'Select one';
  let ops = `<option value="">${placeholder}</option>`;
  options.forEach(o => {
    const v = typeof o === 'object' ? o.value : o;
    const l = typeof o === 'object' ? o.label : o;
    ops += `<option value="${v}"${val === v ? ' selected' : ''}>${l}</option>`;
  });
  return `
    <div class="field-group flex flex-col gap-xs w-full items-start">
      <label for="${id}" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">${label}</label>
      ${hint}
      <div class="relative flex w-full rounded-sm border-2 border-bb-black-00 bg-bb-white-00 overflow-hidden hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
        <select id="${id}" name="${id}" data-field="${id}"${triggerAttr}
          class="w-full min-w-0 p-s outline-none bg-transparent appearance-none cursor-pointer text-[1.25rem] leading-normal">
          ${ops}
        </select>
        <div class="flex items-center justify-center w-14 shrink-0 bg-[#f0f0f0] border-l-2 border-bb-black-00 pointer-events-none" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>
    </div>`;
}

/* ───────── Helpers ───────── */
function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function companionDaysSummary() {
  const days = [
    ['pref-mon', 'Mondays'],
    ['pref-tue', 'Tuesdays'],
    ['pref-wed', 'Wednesdays'],
    ['pref-thu', 'Thursdays'],
    ['pref-fri', 'Fridays']
  ];
  const selected = days.filter(d => GovBB.D[d[0]]).map(d => d[1]);
  return selected.length ? selected.join(', ') : '';
}

function allDeclChecked() {
  return GovBB.D['decl-accurate'] && GovBB.D['decl-consent'] &&
         GovBB.D['decl-changes'] && GovBB.D['decl-visit'];
}

/* ───────── Previous + Continue button group ───────── */
const PREV_BTN_CLS = 'relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c8cdd4] active:bg-[#b0b5bc] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100 focus-visible:rounded-sm';

function btnGroup(continueLabel) {
  return `<div class="mt-8 flex gap-4 items-center flex-wrap">
    <button type="button" onclick="back()" class="${PREV_BTN_CLS}">Previous</button>
    <button type="button" onclick="next()" class="${GovBB.BTN_CLS}">${continueLabel || 'Continue'}</button>
  </div>`;
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div class="space-y-6">
      <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00">Ministry of People Empowerment and Elder Affairs</p>
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Elder Care Companion Application</h1>
      <hr class="border-bb-grey-00">

      <p class="text-[1.25rem] leading-normal">Apply for a regular home companion if you are an older person who would benefit from company, conversation, and light support at home.</p>
      <p class="text-[1.25rem] leading-normal">A companion will visit you at home on agreed days to spend time with you. This is not a medical or nursing service.</p>
      <p class="text-[1.25rem] leading-normal">Most people finish this form in about <strong>10 minutes</strong>.</p>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">What you'll need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem] leading-normal">
          <li>National Registration Number (NRN)</li>
          <li>Your doctor's name</li>
          <li>Emergency contact details</li>
          <li>Details of how often you'd like a companion to visit</li>
        </ul>
      </div>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">Contact us</h2>
        <p class="text-[1.25rem] leading-normal">Call <strong>+1 (246) 467-4900</strong> if you need help completing this form.</p>
      </div>

      ${GovBB.startBtn('Start application')}
    </div>`,

  /* ── About you ── */
  'applicant-details': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">About you</h1>
      <div class="space-y-8">
        ${GovBB.textField('fullname', 'Full name')}
        ${GovBB.dateField('dob', 'Date of birth')}
        ${GovBB.textField('nrn', 'National Registration Number', {
          hint: 'Your 11-digit NRN, for example 110915-0048.',
          placeholder: '110915-0048'
        })}
        ${styledSelect('gender', 'Gender', ['Male', 'Female', 'Prefer not to say'], { placeholder: 'Select one' })}
        ${styledSelect('marital-status', 'Marital status', ['Single', 'Married', 'Common-law', 'Widowed', 'Divorced', 'Separated'], { placeholder: 'Select one' })}
        ${styledSelect('parish', 'Parish', GovBB.PARISHES, { placeholder: 'Select a parish' })}
        ${btnGroup()}
      </div>
    </form>`,

  /* ── Contact details ── */
  'contact': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your contact details</h1>
      <div class="space-y-8">
        ${GovBB.textField('address-line1', 'Address line 1')}
        ${GovBB.textField('address-line2', 'Address line 2 (optional)')}
        ${GovBB.textField('address-postal', 'Postal code (optional)', {
          hint: 'For example, BB11000.',
          placeholder: 'BB11000'
        })}
        ${GovBB.telField('phone-cell', 'Mobile number', {
          hint: '246 249-1234.',
          placeholder: '246 249-1234'
        })}
        ${GovBB.telField('phone-home', 'Home phone number (optional).', {
          placeholder: '246 433-1234'
        })}
        ${GovBB.emailField('email', 'Email address (optional).')}
        ${btnGroup()}
      </div>
    </form>`,

  /* ── Living situation ── */
  'living-situation': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your living situation</h1>
      <div class="space-y-8">

        <div class="space-y-4">
          ${GovBB.radioGroup('lives-alone', 'Do you live alone?', ['Yes', 'No'])}
          <div data-show-when-name="lives-alone" data-show-when-value="No" style="display:${GovBB.D['lives-alone'] === 'No' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textField('household-members', 'Who else lives with you?', {
              hint: 'For example: adult child, spouse.'
            })}
          </div>
        </div>

        <div class="space-y-4">
          ${GovBB.radioGroup('housing-type', 'What type of home do you live in?', ['House', 'Apartment or flat', 'Rented room', 'Government housing', 'Other'])}
          <div data-show-when-name="housing-type" data-show-when-value="Other" style="display:${GovBB.D['housing-type'] === 'Other' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textField('housing-other', 'Please describe your housing')}
          </div>
        </div>

        ${GovBB.radioGroup('feels-isolated', 'Do you sometimes feel lonely or isolated?', ['Yes', 'Sometimes', 'No'])}
        ${GovBB.textareaField('daily-life', 'Tell us a little about your typical day', {
          hint: 'For example, what you enjoy doing, any challenges you face.',
          rows: 3
        })}
        ${btnGroup()}
      </div>
    </form>`,

  /* ── Health and wellbeing ── */
  'health-wellbeing': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your health and wellbeing</h1>
      <div class="space-y-8">

        ${GovBB.radioGroup('mobility', 'How would you describe your mobility?', [
          'Fully mobile', 'Mobile with aid', 'Wheelchair user', 'Mostly stays indoors', 'Bedbound'
        ])}

        <div class="space-y-4">
          ${GovBB.radioGroup('chronic-conditions', 'Do you have any ongoing health conditions?', ['Yes', 'No'])}
          <div data-show-when-name="chronic-conditions" data-show-when-value="Yes" style="display:${GovBB.D['chronic-conditions'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('chronic-conditions-details', 'Please describe', {
              hint: 'For example: diabetes, hypertension, arthritis.',
              rows: 3
            })}
          </div>
        </div>

        <div class="space-y-4">
          ${GovBB.radioGroup('cognitive', 'Do you have any memory or cognitive difficulties?', ['Yes', 'No'])}
          <div data-show-when-name="cognitive" data-show-when-value="Yes" style="display:${GovBB.D['cognitive'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('cognitive-details', 'Please describe', { rows: 2 })}
          </div>
        </div>

        ${GovBB.radioGroup('mental-health', 'Have you been feeling anxious, low, or depressed recently?', ['Yes', 'Sometimes', 'No'], {
          hint: 'A companion can offer a friendly ear, but this service is not a substitute for professional mental health support.'
        })}

        <div class="space-y-4">
          ${GovBB.radioGroup('care-package', 'Do you currently receive any other care or support services?', ['Yes', 'No'])}
          <div data-show-when-name="care-package" data-show-when-value="Yes" style="display:${GovBB.D['care-package'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('care-package-details', 'What services do you receive?', { rows: 2 })}
          </div>
        </div>

        ${btnGroup()}
      </div>
    </form>`,

  /* ── Companion preferences ── */
  'companion-preferences': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">About your companion visits</h1>
      <div class="space-y-8">

        ${GovBB.radioGroup('visit-frequency', 'How often would you like a companion to visit?', [
          'Once a week', 'Twice a week', 'Three times a week', 'As often as possible'
        ])}

        <div class="space-y-4">
          <p class="text-[1.25rem] leading-normal font-bold text-bb-black-00">Which days work best for you? (choose all that apply)</p>
          ${GovBB.checkboxItem('pref-mon', 'Mondays')}
          ${GovBB.checkboxItem('pref-tue', 'Tuesdays')}
          ${GovBB.checkboxItem('pref-wed', 'Wednesdays')}
          ${GovBB.checkboxItem('pref-thu', 'Thursdays')}
          ${GovBB.checkboxItem('pref-fri', 'Fridays')}
        </div>

        ${GovBB.radioGroup('visit-duration', 'How long would you like each visit to be?', [
          'About 1 hour', 'About 2 hours', 'About 3 hours', 'Flexible'
        ])}

        ${GovBB.textareaField('companion-activities', 'What would you enjoy doing with a companion?', {
          hint: 'For example: conversation, reading, board games, walking, watching TV, cooking together.',
          rows: 3
        })}

        ${GovBB.radioGroup('companion-gender', 'Do you have a preference for your companion\'s gender?', [
          'No preference', 'Female companion preferred', 'Male companion preferred'
        ])}

        ${btnGroup()}
      </div>
    </form>`,

  /* ── Referral ── */
  'referral': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">How you heard about this programme</h1>
      <div class="space-y-8">

        ${styledSelect('referral-source', 'How did you find out about this programme?', [
          'My doctor or nurse',
          'A social worker',
          'A family member or friend',
          'The Ministry of People Empowerment and Elder Affairs',
          'Polyclinic or health centre',
          'Radio or TV',
          'Newspaper or flyer',
          'Other'

          ${GovBB.textField('referral-other', 'Please tell us how you heard about this programme')}
        </div>

        ${GovBB.radioGroup('referral-gp', 'Has your doctor recommended this programme?', [
          'Yes', 'No', 'I have not spoken to my doctor about it'

        ${GovBB.textField('gp-name', 'Your doctor or polyclinic', {

          placeholder: '246 249-1234'

        ${btnGroup()}
      </div>

  /* ── Emergency contact ── */
  'emergency-contact': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Emergency contact</h1>
      <p class="text-[1.25rem] leading-normal mb-8">This is the person we will call in an emergency. They do not need to be your carer.</p>

      <div class="space-y-8">
        ${GovBB.textField('emerg-fullname', 'Full name')}

          'Spouse', 'Partner', 'Son', 'Daughter', 'Sibling', 'Aunt', 'Uncle', 'Friend', 'Neighbour', 'Social worker', 'Other'

          ${GovBB.textField('emerg-relationship-other', 'Please describe their relationship to you')}

          hint: '246 249-1234.',

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'applicant-details') {
    if (!D['fullname'] || !D['fullname'].trim()) errors.push({ id: 'fullname', msg: 'Enter your full name' });
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    } else {
      const day = parseInt(D['dob-day'], 10), month = parseInt(D['dob-month'], 10), year = parseInt(D['dob-year'], 10);
      const parsed = new Date(year, month - 1, day);
      if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a real date, for example 15 06 1945' });
      } else if (parsed >= new Date()) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – The date of birth must be in the past' });
      }
    }
    if (!D['nrn'] || !D['nrn'].trim()) errors.push({ id: 'nrn', msg: 'Enter your National Registration Number' });
    if (!D['gender'])         errors.push({ id: 'gender', msg: 'Select your gender' });
    if (!D['marital-status']) errors.push({ id: 'marital-status', msg: 'Select your marital status' });
    if (!D['parish'])         errors.push({ id: 'parish', msg: 'Select your parish' });
  }

  if (pageId === 'contact') {
    if (!D['address-line1'] || !D['address-line1'].trim()) errors.push({ id: 'address-line1', msg: 'Enter your address' });
    if (!D['phone-cell'] || !D['phone-cell'].trim()) errors.push({ id: 'phone-cell', msg: 'Enter a mobile number' });
  }

  if (pageId === 'living-situation') {
    if (!D['lives-alone']) errors.push({ id: 'lives-alone', msg: 'Select yes or no – Do you live alone?' });
    if (D['lives-alone'] === 'No' && (!D['household-members'] || !D['household-members'].trim()))
      errors.push({ id: 'household-members', msg: 'Tell us who else lives with you' });
    if (!D['housing-type']) errors.push({ id: 'housing-type', msg: 'Select what type of home you live in' });
    if (D['housing-type'] === 'Other' && (!D['housing-other'] || !D['housing-other'].trim()))
      errors.push({ id: 'housing-other', msg: 'Describe your housing' });
    if (!D['feels-isolated']) errors.push({ id: 'feels-isolated', msg: 'Select an option – Do you sometimes feel lonely or isolated?' });
  }

  if (pageId === 'health-wellbeing') {
    if (!D['mobility']) errors.push({ id: 'mobility', msg: 'Select how you would describe your mobility' });
    if (!D['chronic-conditions']) errors.push({ id: 'chronic-conditions', msg: 'Select yes or no – Do you have any ongoing health conditions?' });
    if (D['chronic-conditions'] === 'Yes' && (!D['chronic-conditions-details'] || !D['chronic-conditions-details'].trim()))
      errors.push({ id: 'chronic-conditions-details', msg: 'Describe your health conditions' });
    if (!D['cognitive']) errors.push({ id: 'cognitive', msg: 'Select yes or no – Do you have any memory or cognitive difficulties?' });
    if (D['cognitive'] === 'Yes' && (!D['cognitive-details'] || !D['cognitive-details'].trim()))
      errors.push({ id: 'cognitive-details', msg: 'Describe the cognitive difficulties' });
    if (!D['mental-health']) errors.push({ id: 'mental-health', msg: 'Select an option – Have you been feeling anxious, low, or depressed recently?' });
    if (!D['care-package']) errors.push({ id: 'care-package', msg: 'Select yes or no – Do you currently receive any other care or support services?' });
    if (D['care-package'] === 'Yes' && (!D['care-package-details'] || !D['care-package-details'].trim()))
      errors.push({ id: 'care-package-details', msg: 'Describe the care services you receive' });
  }

  if (pageId === 'companion-preferences') {
    if (!D['visit-frequency']) errors.push({ id: 'visit-frequency', msg: 'Select how often you would like a companion to visit' });
    if (!D['visit-duration'])  errors.push({ id: 'visit-duration',  msg: 'Select how long you would like each visit to be' });
    if (!D['companion-gender']) errors.push({ id: 'companion-gender', msg: 'Select your companion gender preference' });
  }

  if (pageId === 'referral') {
    if (!D['referral-source']) errors.push({ id: 'referral-source', msg: 'Select how you heard about this programme' });
    if (D['referral-source'] === 'Other' && (!D['referral-other'] || !D['referral-other'].trim()))
      errors.push({ id: 'referral-other', msg: 'Tell us how you heard about this programme' });
    if (!D['referral-gp']) errors.push({ id: 'referral-gp', msg: 'Select yes or no – Has your doctor recommended this programme?' });
    if (!D['gp-name'] || !D['gp-name'].trim()) errors.push({ id: 'gp-name', msg: 'Enter your doctor or polyclinic name' });
  }

  if (pageId === 'emergency-contact') {
    if (!D['emerg-fullname'] || !D['emerg-fullname'].trim()) errors.push({ id: 'emerg-fullname', msg: 'Enter the emergency contact\'s full name' });
    if (!D['emerg-relationship']) errors.push({ id: 'emerg-relationship', msg: 'Select their relationship to you' });
    if (D['emerg-relationship'] === 'Other' && (!D['emerg-relationship-other'] || !D['emerg-relationship-other'].trim()))
      errors.push({ id: 'emerg-relationship-other', msg: 'Describe their relationship to you' });
    if (!D['emerg-phone'] || !D['emerg-phone'].trim()) errors.push({ id: 'emerg-phone', msg: 'Enter a phone number for the emergency contact' });
  }

  if (pageId === 'declaration') {
    if (!allDeclChecked())
      errors.push({ id: 'decl-accurate', msg: 'You must confirm all four statements before submitting' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  getFlow: function() { return FLOW; },
  pages: PAGES,
  validate: validate
});

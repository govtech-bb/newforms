<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
</script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = 'Elder Care Companion Application';

const FLOW = [
  'start',
  'applicant-details',
  'contact',
  'living-situation',
  'health-wellbeing',
  'companion-preferences',
  'referral',
  'emergency-contact',
  'declaration',
  'check',
  'confirmation'
];

/* ───────── Helpers ───────── */
function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function companionDaysSummary() {
  const days = [
    ['pref-mon', 'Mondays'],
    ['pref-tue', 'Tuesdays'],
    ['pref-wed', 'Wednesdays'],
    ['pref-thu', 'Thursdays'],
    ['pref-fri', 'Fridays']
  ];
  const selected = days.filter(d => GovBB.D[d[0]]).map(d => d[1]);
  return selected.length ? selected.join(', ') : '';
}

function allDeclChecked() {
  return GovBB.D['decl-accurate'] && GovBB.D['decl-consent'] &&
         GovBB.D['decl-changes'] && GovBB.D['decl-visit'];
}

/* ───────── Summary row override ───────── */
GovBB.summaryRow = function(label, value, changeTo) {
  var changeLink = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+changeLink+'</div></div>';
};

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Referral</h2>
      <dl style="margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('How you heard about the programme', GovBB.D['referral-source'] === 'Other' ? (GovBB.D['referral-other'] || 'Other') : (GovBB.D['referral-source'] || ''), 'referral')}
        ${GovBB.summaryRow('Doctor recommended?', GovBB.D['referral-gp'] || '', 'referral')}
        ${GovBB.summaryRow('Doctor or polyclinic', GovBB.D['gp-name'] || '', 'referral')}
        ${GovBB.summaryRow("Doctor's phone", GovBB.D['gp-phone'] || '', 'referral')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Emergency contact</h2>
      <dl style="margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Full name', GovBB.D['emerg-fullname'] || '', 'emergency-contact')}
        ${GovBB.summaryRow('Relationship', GovBB.D['emerg-relationship'] === 'Other' ? (GovBB.D['emerg-relationship-other'] || 'Other') : (GovBB.D['emerg-relationship'] || ''), 'emergency-contact')}
        ${GovBB.summaryRow('Phone number', GovBB.D['emerg-phone'] || '', 'emergency-contact')}
        ${GovBB.summaryRow('Alternative phone', GovBB.D['emerg-phone-alt'] || '', 'emergency-contact')}
        ${GovBB.summaryRow('Email', GovBB.D['emerg-email'] || '', 'emergency-contact')}
      </dl>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit application</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </div>`,

  /* ── Confirmation ── */
  'confirmation': () => {
    const ref = window.__refNumber || ('ECCA-' + Math.random().toString(36).substring(2,8).toUpperCase());
    window.__refNumber = ref;
    return `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Application submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number: <strong>${ref}</strong></p>
      </div>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">We will review your application and contact you within <strong>10 working days</strong> to arrange a home assessment.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">If you need to speak to someone sooner, call <strong>+1 (246) 467-4900</strong>.</p>

      <div style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="window.print()">Print this page</button>
      </div>
    </div>`;
  }

};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'applicant-details') {
    if (!D['fullname'] || !D['fullname'].trim()) errors.push({ id: 'fullname', msg: 'Enter your full name' });
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    } else {
      const day = parseInt(D['dob-day'], 10), month = parseInt(D['dob-month'], 10), year = parseInt(D['dob-year'], 10);
      const parsed = new Date(year, month - 1, day);
      if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a real date, for example 15 06 1945' });
      } else if (parsed >= new Date()) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – The date of birth must be in the past' });
      }
    }
    if (!D['nrn'] || !D['nrn'].trim()) errors.push({ id: 'nrn', msg: 'Enter your National Registration Number' });
    if (!D['gender'])         errors.push({ id: 'gender', msg: 'Select your gender' });
    if (!D['marital-status']) errors.push({ id: 'marital-status', msg: 'Select your marital status' });
    if (!D['parish'])         errors.push({ id: 'parish', msg: 'Select your parish' });
  }

  if (pageId === 'contact') {
    if (!D['address-line1'] || !D['address-line1'].trim()) errors.push({ id: 'address-line1', msg: 'Enter your address' });
    if (!D['phone-cell'] || !D['phone-cell'].trim()) errors.push({ id: 'phone-cell', msg: 'Enter a mobile number' });
  }

  if (pageId === 'living-situation') {
    if (!D['lives-alone']) errors.push({ id: 'lives-alone', msg: 'Select yes or no – Do you live alone?' });
    if (D['lives-alone'] === 'No' && (!D['household-members'] || !D['household-members'].trim()))
      errors.push({ id: 'household-members', msg: 'Tell us who else lives with you' });
    if (!D['housing-type']) errors.push({ id: 'housing-type', msg: 'Select what type of home you live in' });
    if (D['housing-type'] === 'Other' && (!D['housing-other'] || !D['housing-other'].trim()))
      errors.push({ id: 'housing-other', msg: 'Describe your housing' });
    if (!D['feels-isolated']) errors.push({ id: 'feels-isolated', msg: 'Select an option – Do you sometimes feel lonely or isolated?' });
  }

  if (pageId === 'health-wellbeing') {
    if (!D['mobility']) errors.push({ id: 'mobility', msg: 'Select how you would describe your mobility' });
    if (!D['chronic-conditions']) errors.push({ id: 'chronic-conditions', msg: 'Select yes or no – Do you have any ongoing health conditions?' });
    if (D['chronic-conditions'] === 'Yes' && (!D['chronic-conditions-details'] || !D['chronic-conditions-details'].trim()))
      errors.push({ id: 'chronic-conditions-details', msg: 'Describe your health conditions' });
    if (!D['cognitive']) errors.push({ id: 'cognitive', msg: 'Select yes or no – Do you have any memory or cognitive difficulties?' });
    if (D['cognitive'] === 'Yes' && (!D['cognitive-details'] || !D['cognitive-details'].trim()))
      errors.push({ id: 'cognitive-details', msg: 'Describe the cognitive difficulties' });
    if (!D['mental-health']) errors.push({ id: 'mental-health', msg: 'Select an option – Have you been feeling anxious, low, or depressed recently?' });
    if (!D['care-package']) errors.push({ id: 'care-package', msg: 'Select yes or no – Do you currently receive any other care or support services?' });
    if (D['care-package'] === 'Yes' && (!D['care-package-details'] || !D['care-package-details'].trim()))
      errors.push({ id: 'care-package-details', msg: 'Describe the care services you receive' });
  }

  if (pageId === 'companion-preferences') {
    if (!D['visit-frequency']) errors.push({ id: 'visit-frequency', msg: 'Select how often you would like a companion to visit' });
    if (!D['visit-duration'])  errors.push({ id: 'visit-duration',  msg: 'Select how long you would like each visit to be' });
    if (!D['companion-gender']) errors.push({ id: 'companion-gender', msg: 'Select your companion gender preference' });
  }

  if (pageId === 'referral') {
    if (!D['referral-source']) errors.push({ id: 'referral-source', msg: 'Select how you heard about this programme' });
    if (D['referral-source'] === 'Other' && (!D['referral-other'] || !D['referral-other'].trim()))
      errors.push({ id: 'referral-other', msg: 'Tell us how you heard about this programme' });
    if (!D['referral-gp']) errors.push({ id: 'referral-gp', msg: 'Select yes or no – Has your doctor recommended this programme?' });
    if (!D['gp-name'] || !D['gp-name'].trim()) errors.push({ id: 'gp-name', msg: 'Enter your doctor or polyclinic name' });
  }

  if (pageId === 'emergency-contact') {
    if (!D['emerg-fullname'] || !D['emerg-fullname'].trim()) errors.push({ id: 'emerg-fullname', msg: "Enter the emergency contact's full name" });
    if (!D['emerg-relationship']) errors.push({ id: 'emerg-relationship', msg: 'Select their relationship to you' });
    if (D['emerg-relationship'] === 'Other' && (!D['emerg-relationship-other'] || !D['emerg-relationship-other'].trim()))
      errors.push({ id: 'emerg-relationship-other', msg: 'Describe their relationship to you' });
    if (!D['emerg-phone'] || !D['emerg-phone'].trim()) errors.push({ id: 'emerg-phone', msg: 'Enter a phone number for the emergency contact' });
  }

  if (pageId === 'declaration') {
    if (!allDeclChecked())
      errors.push({ id: 'decl-accurate', msg: 'You must confirm all four statements before submitting' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  getFlow: function() { return FLOW; },
  pages: PAGES,
  validate: validate
});
</script>
</body>
</html>

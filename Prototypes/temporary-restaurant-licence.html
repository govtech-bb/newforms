<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
  if (document.title.indexOf('Error: ') === 0) document.title = document.title.slice(7);
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  var app = document.getElementById('app');
  var h1 = app.querySelector('h1');
  if (h1) { h1.insertAdjacentHTML('afterend', html); } else { app.insertAdjacentHTML('afterbegin', html); }
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) {
      var anchor = group.querySelector('.govbb-hint') || group.querySelector('.govbb-label') || group.querySelector('legend');
      if (anchor) anchor.insertAdjacentElement('afterend', msg);
      else group.insertBefore(msg, group.firstChild);
    }
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);white-space:pre-wrap;">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = 'Application for a Licence to Operate a Temporary Restaurant';
const SERVICE_NAME = 'Apply for a licence to operate a temporary restaurant';

const FLOW = [
  'start',
  'applicant-details',
  'event-details',
  'food-details',
  'documents',
  'check',
  'declaration',
  'confirmation'
];

/* The nine polyclinics. Source: govtech-bb/find-a-polyclinic. */
const POLYCLINICS = [
  'Branford Taitt Polyclinic',
  'David Thompson Health & Social Services Complex',
  'Edgar Cochrane Polyclinic',
  'Eunice Gibson Polyclinic',
  'Frederick Miller Polyclinic',
  'Maurice Byer Polyclinic',
  'Randal Phillips Polyclinic',
  'Sir Winston Scott Polyclinic',
  'St. Philip Polyclinic'
];

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* ───────── Helpers ───────── */
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function val(id) { return escapeHtml(GovBB.D[id] || ''); }

function caption() {
  return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">' + SERVICE_NAME + '</p>';
}

function textField(id, label, opts) {
  opts = opts || {};
  var hint = opts.hint ? '<p class="govbb-hint">' + opts.hint + '</p>' : '';
  var type = opts.type || 'text';
  var im = opts.inputmode ? ' inputmode="' + opts.inputmode + '"' : '';
  return '<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">'
    + '<label class="govbb-label" for="' + id + '">' + label + '</label>' + hint
    + '<div class="govbb-input-wrapper"><input class="govbb-input" type="' + type + '" id="' + id + '" name="' + id + '" data-field="' + id + '"' + im + ' value="' + val(id) + '" /></div></div>';
}

function textareaField(id, label, opts) {
  opts = opts || {};
  var hint = opts.hint ? '<p class="govbb-hint">' + opts.hint + '</p>' : '';
  return '<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">'
    + '<label class="govbb-label" for="' + id + '">' + label + '</label>' + hint
    + '<textarea class="govbb-textarea" id="' + id + '" name="' + id + '" data-field="' + id + '" rows="' + (opts.rows || 4) + '" style="width:100%;">' + val(id) + '</textarea></div>';
}

function selectField(id, label, options, opts) {
  opts = opts || {};
  var hint = opts.hint ? '<p class="govbb-hint">' + opts.hint + '</p>' : '';
  var tr = opts.trigger ? ' data-trigger-render="1"' : '';
  var ops = '<option value="">' + (opts.placeholder || 'Select an option') + '</option>'
    + options.map(function (o) { return '<option value="' + escapeHtml(o) + '"' + (GovBB.D[id] === o ? ' selected' : '') + '>' + escapeHtml(o) + '</option>'; }).join('');
  return '<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">'
    + '<label class="govbb-label" for="' + id + '">' + label + '</label>' + hint
    + '<div class="govbb-select-wrapper"><select class="govbb-select" id="' + id + '" name="' + id + '" data-field="' + id + '"' + tr + '>' + ops + '</select>'
    + '<span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>';
}

function radioGroup(name, legend, labels, opts) {
  opts = opts || {};
  var hint = opts.hint ? '<p class="govbb-hint">' + opts.hint + '</p>' : '';
  var tr = opts.trigger ? ' data-trigger-render="1"' : '';
  var items = labels.map(function (l, i) {
    var id = name + '-' + i;
    var checked = GovBB.D[name] === l ? ' checked' : '';
    return '<div class="govbb-radio-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-radio" type="radio" id="' + id + '" name="' + name + '" data-field="' + name + '" value="' + escapeHtml(l) + '"' + checked + tr + ' /><label class="govbb-radio-item__label" for="' + id + '">' + l + '</label></div>';
  }).join('');
  return '<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">' + legend + '</legend>' + hint
    + '<div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">' + items + '</div></fieldset>';
}

function dateField(prefix, legend, hint) {
  hint = hint || 'For example, 27 6 2025.';
  function part(suffix, label, wide) {
    return '<div class="govbb-date-input__part"><label class="govbb-date-input__label" for="' + prefix + '-' + suffix + '">' + label + '</label>'
      + '<div class="govbb-date-input-wrapper' + (wide ? ' govbb-date-input-wrapper--year' : '') + '"><input class="govbb-date-input" type="text" id="' + prefix + '-' + suffix + '" name="' + prefix + '-' + suffix + '" data-field="' + prefix + '-' + suffix + '" inputmode="numeric" value="' + val(prefix + '-' + suffix) + '" /></div></div>';
  }
  return '<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">' + legend + '</legend><p class="govbb-hint">' + hint + '</p>'
    + '<div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">' + part('day', 'Day') + part('month', 'Month') + part('year', 'Year', true) + '</div></fieldset>';
}

function conditional(name, showValue, inner) {
  var show = GovBB.D[name] === showValue;
  return '<div data-show-when-name="' + name + '" data-show-when-value="' + showValue + '" style="display:' + (show ? 'block' : 'none') + ';padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);margin-bottom:var(--spacing-m);">' + inner + '</div>';
}

function btns(label) {
  return '<div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">' + (label || 'Continue') + '</button></div>';
}

function fmtDate(prefix) {
  var d = GovBB.D[prefix + '-day'], m = GovBB.D[prefix + '-month'], y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}
function fmtAddress(prefix) {
  return [GovBB.D[prefix + '-line1'], GovBB.D[prefix + '-line2'], GovBB.D[prefix + '-parish']].filter(Boolean).join(', ');
}

/* ───────── File upload (optional documents) ───────── */
function formatBytes(n) { if (n < 1024) return n + ' B'; if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB'; return (n / (1024 * 1024)).toFixed(1) + ' MB'; }
function handleUpload(key, input) { var file = input.files && input.files[0]; if (!file) return; if (file.size > 10 * 1024 * 1024) { alert('File is larger than 10 MB.'); input.value = ''; return; } GovBB.D['upload-' + key] = { name: file.name, size: file.size, type: file.type }; GovBB.render(); }
function removeUpload(key) { delete GovBB.D['upload-' + key]; GovBB.render(); }
function uploadRow(key, label, hint, optional) {
  var file = GovBB.D['upload-' + key];
  if (file) {
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);border-left:4px solid var(--color-green-00);background:var(--color-white-00);margin-bottom:var(--spacing-m);"><div style="min-width:0;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}${optional ? ' (optional)' : ''}</p>${hint ? `<p class="govbb-hint" style="margin:0;">${hint}</p>` : ''}<p class="govbb-text-body" style="margin:0;font-size:var(--font-size-caption);color:var(--color-mid-grey-00);word-break:break-all;"><span aria-hidden="true">✓ </span>${escapeHtml(file.name)} (${formatBytes(file.size)})</p></div><button type="button" class="govbb-btn--link" style="flex-shrink:0;" onclick="removeUpload('${key}')">Remove<span class="govbb-visually-hidden"> ${label}</span></button></div>`;
  }
  return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);background:var(--color-white-00);margin-bottom:var(--spacing-m);"><div style="min-width:0;flex:1;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}${optional ? ' (optional)' : ''}</p>${hint ? `<p class="govbb-hint" style="margin:0;">${hint}</p>` : ''}</div><label for="upload-${key}" class="govbb-btn--secondary" style="flex-shrink:0;cursor:pointer;margin:0;">Upload file</label><input type="file" id="upload-${key}" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleUpload('${key}', this)" /></div>`;
}

/* ───────── Pages ───────── */
const PAGES = {

  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);">
        <ol class="govbb-breadcrumbs__list">
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li>
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Business and trade</a></li>
        </ol>
      </nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Apply for a licence to operate a temporary restaurant</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Last updated on May 2025</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-m);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Use this service to apply to the Medical Officer of Health for a licence to operate a temporary restaurant — for example, to sell or serve food at an event.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Licences are issued under the <strong>Health Services (Restaurant) Regulations, 1969</strong>. Apply to the polyclinic for the area where the event will be held.</p>

      <div style="border-left:4px solid var(--color-blue-40);background:var(--color-blue-10);padding:var(--spacing-s) var(--spacing-m);margin-bottom:var(--spacing-l);">
        <p class="govbb-text-body" style="margin:0;">Apply at least <strong>two weeks</strong> before your event.</p>
      </div>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start now</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your name, address, contact numbers and email address</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The name and address of the event</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The dates the temporary restaurant will operate</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The types of food you will serve and where you will get them</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The organiser's details, if the event is organised by someone else</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A copy of your food business licence and staff medical certificates, if you have them (optional — you can also bring these to the polyclinic)</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">The Environmental Health team at the polyclinic you choose will review your application and may arrange an inspection before issuing the licence. Apply in good time before your event.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Contact the Environmental Health Department, Ministry of Health and Wellness, or the polyclinic for the area where your event will be held, if you need help with your application.</p>
      <ul style="list-style:none;padding:0;margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Telephone: <a href="tel:+12465363800" class="govbb-link">1 (246) 536-3800</a></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Email: <a href="mailto:info@health.gov.bb" class="govbb-link">info@health.gov.bb</a></li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Frank Walcott Building, Culloden Road, St. Michael</li>
      </ul>
    </div>`,

  'applicant-details': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your details</h1>

      ${textField('applicant-first-name', 'First name')}
      ${textField('applicant-middle-name', 'Middle name (optional)')}
      ${textField('applicant-surname', 'Last name')}
      ${textField('applicant-line1', 'Address line 1')}
      ${textField('applicant-line2', 'Address line 2 (optional)')}
      ${selectField('applicant-parish', 'Parish', GovBB.PARISHES, { placeholder: 'Select a parish' })}

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Enter at least one phone number so we can contact you.</p>
      ${textField('phone-home', 'Home telephone', { type: 'tel', inputmode: 'tel', hint: 'For example, (246) 433 1234.' })}
      ${textField('phone-cell', 'Mobile number', { type: 'tel', inputmode: 'tel', hint: 'For example, (246) 249 1234.' })}
      ${textField('phone-work', 'Work telephone', { type: 'tel', inputmode: 'tel' })}
      ${textField('email', 'Email address', { type: 'email', inputmode: 'email', hint: 'We will use this to contact you about your application. For example, you@example.com.' })}

      ${btns()}
    </form>`,

  'event-details': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About the event</h1>

      ${textField('event-name', 'Name of event')}
      ${textField('event-line1', 'Event address line 1')}
      ${textField('event-line2', 'Event address line 2 (optional)')}
      ${selectField('event-parish', 'Parish of event', GovBB.PARISHES, { placeholder: 'Select a parish' })}

      ${dateField('event-from', 'Start date', 'The first day the temporary restaurant will operate. You must apply at least two weeks before this date. For example, 27 6 2025.')}
      ${dateField('event-to', 'End date', 'The last day the temporary restaurant will operate.')}

      ${selectField('polyclinic', 'Which polyclinic are you applying to?', POLYCLINICS, { placeholder: 'Select a polyclinic', hint: 'Choose the polyclinic for the area where the event will be held. The Medical Officer of Health there will process your application.' })}

      ${btns()}
    </form>`,

  'food-details': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Food and event organiser</h1>

      ${textareaField('food-type', 'Type of foods and source', { rows: 4, hint: 'List the types of food you will serve and where you will get them from. For example, "Fish cakes and rotis — fish from Oistins market; flour and oil from a wholesaler".' })}

      ${radioGroup('organiser-different', 'Is the event organised by someone other than you?', ['Yes', 'No'], { trigger: true })}
      ${conditional('organiser-different', 'Yes',
        textField('organiser-name', "Organiser's name") +
        '<p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Give a phone number or an email for the organiser.</p>' +
        textField('organiser-phone', "Organiser's phone number", { type: 'tel', inputmode: 'tel', hint: 'For example, (246) 249 1234.' }) +
        textField('organiser-email', "Organiser's email address", { type: 'email', inputmode: 'email', hint: 'For example, organiser@example.com.' })
      )}

      ${btns()}
    </form>`,

  'documents': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Supporting documents</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">These documents are optional. You can upload them now if you have them, or bring them to the polyclinic.</p>

      ${uploadRow('food-licence', 'Food business licence', 'Upload a copy of your valid food business licence, if you have one. PDF, JPG or PNG.', true)}

      ${uploadRow('medical-certs', 'Staff medical certificates', 'You can upload staff medical certificates as a single PDF, JPG or PNG.', true)}
      <div style="border-left:4px solid var(--color-blue-40);background:var(--color-blue-10);padding:var(--spacing-s) var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin:0;">All staff must have their medical certificates with them during the event, whether or not you upload them here.</p>
      </div>

      ${btns()}
    </form>`,

  'check': () => `
    <div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers</h1>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Applicant</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Full name', [GovBB.D['applicant-first-name'], GovBB.D['applicant-middle-name'], GovBB.D['applicant-surname']].filter(Boolean).join(' '), 'applicant-details')}
        ${GovBB.summaryRow('Address', fmtAddress('applicant'), 'applicant-details')}
        ${GovBB.summaryRow('Mobile', GovBB.D['phone-cell'] || '', 'applicant-details')}
        ${GovBB.summaryRow('Home phone', GovBB.D['phone-home'] || 'Not provided', 'applicant-details')}
        ${GovBB.summaryRow('Work phone', GovBB.D['phone-work'] || 'Not provided', 'applicant-details')}
        ${GovBB.summaryRow('Email', GovBB.D['email'] || '', 'applicant-details')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Event</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Name of event', GovBB.D['event-name'] || '', 'event-details')}
        ${GovBB.summaryRow('Address of event', fmtAddress('event'), 'event-details')}
        ${GovBB.summaryRow('Operating from', fmtDate('event-from'), 'event-details')}
        ${GovBB.summaryRow('Operating to', fmtDate('event-to'), 'event-details')}

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function reqText(id, msg) { if (!D[id] || !String(D[id]).trim()) errors.push({ id: id, msg: msg }); }
  function reqPhone(id, label, required) {
    var v = (D[id] || '').trim();
    if (!v) { if (required) errors.push({ id: id, msg: 'Enter ' + label }); return; }
    var digits = v.replace(/[\s\-()+]/g, '');
    if (!/^\d{7,15}$/.test(digits)) errors.push({ id: id, msg: 'Enter ' + label + ' using 7 to 15 digits, for example (246) 249 1234' });
  }
  /* Returns a Date if complete + real, else pushes an error and returns null. */
  function reqDate(prefix, label) {
    var d = D[prefix + '-day'], m = D[prefix + '-month'], y = D[prefix + '-year'];
    if (!d || !m || !y) { errors.push({ id: prefix + '-day', msg: label + ' – Enter a complete date' }); return null; }
    var day = parseInt(d, 10), month = parseInt(m, 10), year = parseInt(y, 10);
    var parsed = new Date(year, month - 1, day);
    if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
      errors.push({ id: prefix + '-day', msg: label + ' – Enter a real date, for example 27 6 2025' }); return null;
    }
    var today = new Date(); today.setHours(0, 0, 0, 0);
    if (parsed < today) { errors.push({ id: prefix + '-day', msg: label + ' – Enter a date that is today or in the future' }); return null; }
    return parsed;
  }

  if (pageId === 'applicant-details') {
    reqText('applicant-first-name', 'Enter your first name');
    reqText('applicant-surname', 'Enter your last name');
    reqText('applicant-line1', 'Enter your address');
    reqText('applicant-parish', 'Select your parish');
    reqPhone('phone-home', 'a home telephone number', false);
    reqPhone('phone-cell', 'a mobile number', false);
    reqPhone('phone-work', 'a work telephone number', false);
    if (!(D['phone-home'] || '').trim() && !(D['phone-cell'] || '').trim() && !(D['phone-work'] || '').trim())
      errors.push({ id: 'phone-home', msg: 'Enter at least one phone number — home, mobile, or work' });
    var email = (D['email'] || '').trim();
    if (!email) errors.push({ id: 'email', msg: 'Enter your email address' });
    else if (!EMAIL_RE.test(email)) errors.push({ id: 'email', msg: 'Enter an email address in the format you@example.com' });
  }

  if (pageId === 'event-details') {
    reqText('event-name', 'Enter the name of the event');
    reqText('event-line1', 'Enter the address of the event');
    reqText('event-parish', 'Select the parish of the event');
    var from = reqDate('event-from', 'Start date');
    var to = reqDate('event-to', 'End date');
    if (from) {
      var minStart = new Date(); minStart.setHours(0, 0, 0, 0); minStart.setDate(minStart.getDate() + 14);
      if (from < minStart) errors.push({ id: 'event-from-day', msg: 'Start date – You must apply at least two weeks (14 days) before the event' });
    }
    if (from && to && to < from) errors.push({ id: 'event-to-day', msg: 'The end date must be the same as or after the start date' });
    reqText('polyclinic', 'Select the polyclinic you are applying to');
  }

  if (pageId === 'food-details') {
    reqText('food-type', 'Enter the types of food and where you will get them');
    if (!D['organiser-different']) errors.push({ id: 'organiser-different-0', msg: 'Select yes or no' });
    if (D['organiser-different'] === 'Yes') {
      reqText('organiser-name', "Enter the organiser's name");
      reqPhone('organiser-phone', "the organiser's phone number", false);
      var oEmail = (D['organiser-email'] || '').trim();
      if (oEmail && !EMAIL_RE.test(oEmail)) errors.push({ id: 'organiser-email', msg: "Enter the organiser's email in the format you@example.com" });
      if (!(D['organiser-phone'] || '').trim() && !oEmail) errors.push({ id: 'organiser-phone', msg: 'Enter a phone number or email for the organiser' });
    }
  }

  if (pageId === 'declaration') {
    if (!D['declare-agree']) errors.push({ id: 'declare-agree', msg: 'Tick the box to declare the information is true' });
  }

  return errors;
}

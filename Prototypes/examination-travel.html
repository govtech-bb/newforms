<!DOCTYPE html>
<html lang="en">

<body class="govbb-page">
<div class="govbb-official-banner"><div class="govbb-container govbb-official-banner__inner"><div class="govbb-official-banner__crest"><img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" /></div><div class="govbb-official-banner__text"><span>Official government website</span></div></div></div>
<header class="govbb-header"><div class="govbb-container govbb-header__inner"><a href="/" aria-label="Go to the alpha.gov.bb homepage"><img class="govbb-header__logo" src="../dist/assets/images/govbb-logo.svg" alt="GovBB" /></a></div></header>

  <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-label="alpha status banner" aria-live="polite"><div class="govbb-container"><p>This page is in <a class="govbb-link govbb-link--secondary" href="#">Alpha</a>. Your feedback helps us improve.</p></div></div>

</main>
<footer class="govbb-footer"><div class="govbb-container govbb-footer__inner"><nav class="govbb-footer__nav" aria-label="Footer"><a class="govbb-footer__link" href="#">Home</a><a class="govbb-footer__link" href="#">Privacy</a><a class="govbb-footer__link" href="#">Terms &amp; Conditions</a><a class="govbb-footer__link" href="#">Accessibility</a></nav><hr class="govbb-footer__divider" aria-hidden="true" /><div class="govbb-footer__end"><img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" /><p class="govbb-footer__copy">© 2025 Government of Barbados</p></div></div></footer>

<script>
GovBB.clearErrors=function(){var s=document.getElementById('error-summary');if(s)s.remove();document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});};
GovBB.showErrors=function(errors){GovBB.clearErrors();if(!errors||!errors.length)return;var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>';});html+='</ul></div>';var app=document.getElementById('app');var h1=app.querySelector('h1');if(h1)h1.insertAdjacentHTML('afterend',html);else app.insertAdjacentHTML('afterbegin',html);document.getElementById('error-summary').focus();errors.forEach(function(e){var el=document.getElementById(e.id);if(!el)return;var errId='err-'+e.id;el.setAttribute('aria-invalid','true');el.setAttribute('aria-describedby',errId);var msg=document.createElement('p');msg.className='govbb-error-message';msg.id=errId;msg.textContent=e.msg;var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;if(group)group.appendChild(msg);});if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;};
GovBB.summaryRow=function(label,value,changeTo){var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';};
</script>
<script>
function next(){GovBB.next();}function back(){GovBB.back();}function nav(p){GovBB.nav(p);}

const FORM_NAME='Claim examination travel expenses';
const CAPTION='Ministry of Educational Transformation';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const PURPOSES=['Invigilation','Marking session','Exam centre setup','Paper collection','Paper return','Other (describe in field)'];
const SCHOOLS_AND_CENTRES=['Alexandra School','Alleyne School','Christ Church Foundation School','Coleridge & Parry School','Combermere School','Daryll Jordan Secondary','Deighton Griffith Secondary','Ellerslie Secondary','Frederick Smith Secondary','Grantley Adams Memorial Secondary','Harrison College','Lester Vaughan School','Parkinson Memorial Secondary','Princess Margaret Secondary','Queen\'s College','Springer Memorial Secondary','St. George Secondary','St. James Secondary','St. Leonard\'s Boys\' Secondary','St. Lucy Secondary','St. Michael School','The Lodge School','CXC Local Registrar Office','Ministry of Educational Transformation HQ','Other (type the centre name)'];
const MAX_TRIPS=10;

const FLOW=['start','claimant-details','travel-period','trips','receipts','declaration','check','confirmation'];

function caption(){return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+CAPTION+'</p>';}
function maskNid(nid){if(!nid)return '';var m=String(nid).trim().match(/^(\d{6})-(\d{4})$/);return m?'••••••-'+m[2]:String(nid).trim();}
function formatPhone(p){if(!p)return '';var digits=String(p).replace(/[^\d]/g,'');if(digits.length===10&&digits.indexOf('246')===0)return '(246) '+digits.substring(3,6)+' '+digits.substring(6);return String(p).trim();}
function fmtDate(prefix){const d=GovBB.D[prefix+'-day'],m=GovBB.D[prefix+'-month'],y=GovBB.D[prefix+'-year'];if(!d&&!m&&!y)return '';return [d,m,y].filter(Boolean).join(' / ');}
function parseDate(prefix){const d=parseInt(GovBB.D[prefix+'-day'],10),m=parseInt(GovBB.D[prefix+'-month'],10),y=parseInt(GovBB.D[prefix+'-year'],10);if(!d||!m||!y)return null;if(d<1||d>31||m<1||m>12||y<2020||y>2100)return false;const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return false;return dt;}
function claimantName(){return [GovBB.D['first-name'],GovBB.D['surname']].filter(Boolean).join(' ');}
function tripCount(){const n=parseInt(GovBB.D['trip-count'],10);if(isNaN(n)||n<1)return 1;if(n>MAX_TRIPS)return MAX_TRIPS;return n;}
function monthIndex(name){return MONTHS.indexOf(name);}
/* Sum amounts in cents to avoid float artefacts, then format */
function tripTotalCents(){var sum=0;for(let i=1;i<=tripCount();i++){var raw=String(GovBB.D['trip-'+i+'-amount']||'').replace(/,/g,'').trim();if(!raw)continue;var m=raw.match(/^(\d+)(?:\.(\d{1,2}))?$/);if(!m)continue;var dollars=parseInt(m[1],10);var cents=m[2]?parseInt((m[2]+'00').slice(0,2),10):0;sum+=dollars*100+cents;}return sum;}
function tripTotalDisplay(){var c=tripTotalCents();return '$'+Math.floor(c/100).toLocaleString()+'.'+String(c%100).padStart(2,'0');}

function handleUpload(key,input){const file=input.files&&input.files[0];if(!file)return;if(file.size>10*1024*1024){alert('File is larger than 10 MB.');input.value='';return;}GovBB.D['upload-'+key]={name:file.name,size:file.size,type:file.type};GovBB.render();}
function removeUpload(key){delete GovBB.D['upload-'+key];GovBB.render();}
function formatBytes(n){if(n<1024)return n+' B';if(n<1024*1024)return (n/1024).toFixed(1)+' KB';return (n/(1024*1024)).toFixed(1)+' MB';}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uploadRow(key,label,hint){var file=GovBB.D['upload-'+key];if(file){return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);border-left:4px solid var(--color-green-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}<p class="govbb-text-body" style="margin:0;font-size:var(--font-size-caption);color:var(--color-mid-grey-00);word-break:break-all;"><span aria-hidden="true">✓ </span>${escapeHtml(file.name)} (${formatBytes(file.size)})</p></div><button type="button" class="govbb-btn--link" style="flex-shrink:0;" onclick="removeUpload('${key}')">Remove<span class="govbb-visually-hidden"> ${label}</span></button></div>`;}return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;flex:1;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}</div><label for="upload-${key}" class="govbb-btn--secondary" style="flex-shrink:0;cursor:pointer;margin:0;">Upload file</label><input type="file" id="upload-${key}" accept=".pdf,.jpg,.jpeg,.png" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleUpload('${key}', this)" /></div>`;}
function dateField(prefix,legend,hint){return `<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">${legend}</legend>${hint?`<p class="govbb-hint">${hint}</p>`:''}<div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;"><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-day">Day</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-month">Month</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-year">Year</label><div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div></div></div></fieldset>`;}
function parseTripDate(prefix){const d=parseInt(GovBB.D[prefix+'-day'],10),m=parseInt(GovBB.D[prefix+'-month'],10),y=parseInt(GovBB.D[prefix+'-year'],10);if(!d||!m||!y)return null;if(d<1||d>31||m<1||m>12||y<2020||y>2100)return false;const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return false;return dt;}
function fmtTripDate(prefix){const d=GovBB.D[prefix+'-day'],m=GovBB.D[prefix+'-month'],y=GovBB.D[prefix+'-year'];if(!d&&!m&&!y)return '';return [d,m,y].filter(Boolean).join(' / ');}

const PAGES = {
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);"><ol class="govbb-breadcrumbs__list"><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Teachers and educators</a></li></ol></nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Claim examination travel expenses</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 29 May 2026</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">For teachers and exam-centre staff to claim reimbursement for travel made on official examination business.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Submit your claim online. No fee. Takes about <strong>10 to 15 minutes</strong> depending on how many trips you are claiming for.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start claim</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Submit one claim per month.</strong> The form covers a single travel period (one month). Make a separate claim for each month you are claiming.</p>
      </div>

      <div style="border-left:4px solid var(--color-blue-40);padding:var(--spacing-s) var(--spacing-m);background:var(--color-blue-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>How you'll be paid.</strong> Reimbursement is paid through your school's payroll account on file — there is no banking section in this form. If your bank details have changed, contact your school's bursar before submitting.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your name, National ID Number, school/centre, and contact details</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The month and year of the travel</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">For each trip: date, from and to, the exam-related purpose, and the amount</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Receipts (where applicable) — scans or photos</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">The Exams Officer reviews and signs off your claim, then the Deputy Permanent Secretary and Account Officer approve payment. Expect reimbursement within <strong>6 weeks</strong>.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start claim</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call <strong>+1 (246) 535-1284</strong> or email <a href="mailto:mist.forms@barbados.gov.bb" class="govbb-link">mist.forms@barbados.gov.bb</a> if you need help.</p>
    </div>`,

  'claimant-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="surname">Surname</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="surname" name="surname" data-field="surname" autocomplete="family-name" value="${GovBB.D['surname']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="first-name">First name(s)</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="first-name" name="first-name" data-field="first-name" autocomplete="given-name" value="${GovBB.D['first-name']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="nid">National ID Number</label><p class="govbb-hint">For example, 110915-0048.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="nid" name="nid" data-field="nid" value="${GovBB.D['nid']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="school-centre">School or exam centre</label><p class="govbb-hint">Start typing to see suggestions, or type the official name in full.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="school-centre" name="school-centre" data-field="school-centre" list="centres-list" value="${GovBB.D['school-centre']||''}" /></div><datalist id="centres-list">${SCHOOLS_AND_CENTRES.map(s=>`<option value="${s}">`).join('')}</datalist></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="address">Home address</label><textarea class="govbb-textarea" id="address" name="address" data-field="address" rows="3">${GovBB.D['address']||''}</textarea></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="phone">Mobile number</label><p class="govbb-hint">For example, (246) 249 1234.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="tel" id="phone" name="phone" data-field="phone" inputmode="tel" autocomplete="tel" value="${GovBB.D['phone']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="email">Email address</label><div class="govbb-input-wrapper"><input class="govbb-input" type="email" id="email" name="email" data-field="email" inputmode="email" autocomplete="email" value="${GovBB.D['email']||''}" /></div></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'travel-period': () => {
    const thisYear = new Date().getFullYear();
    const validYears = [thisYear-1, thisYear];
    return `<form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Travel period</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Each claim covers one month. Choose the month and year of your travel — you can only claim for travel that has already happened.</p>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="travel-month">Month</label><div class="govbb-select-wrapper"><select class="govbb-select" id="travel-month" name="travel-month" data-field="travel-month"><option value="">Select a month</option>${MONTHS.map(m=>`<option value="${m}"${GovBB.D['travel-month']===m?' selected':''}>${m}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">Year</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
        ${validYears.map((y,i)=>`<div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="travel-year-${i}" name="travel-year" data-field="travel-year" value="${y}"${String(GovBB.D['travel-year'])===String(y)?' checked':''} /><label class="govbb-radio-item__label" for="travel-year-${i}">${y}</label></div>`).join('')}
      </div></fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`;
  },

  'trips': () => {
    const count = tripCount();
    const prevCount = parseInt(GovBB.D['_prev-trip-count'],10);
    const showShrinkWarn = !isNaN(prevCount) && count < prevCount;
    GovBB.D['_prev-trip-count'] = count;
    for (let i = count + 1; i <= MAX_TRIPS; i++) {
      ['day','month','year','from','to','purpose','purpose-other','amount'].forEach(f=>delete GovBB.D['trip-'+i+'-'+f]);
    }
    let sections = '';
    for (let i = 1; i <= count; i++) {
      const purpose = GovBB.D['trip-'+i+'-purpose'];
      sections += `
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-l);border-top:2px solid var(--color-grey-00);padding-top:var(--spacing-m);">
        <legend class="govbb-fieldset__legend govbb-text-h2" style="padding:0 var(--spacing-s);">Trip ${i}</legend>
        ${dateField('trip-'+i,'Date of the trip','Must fall within the travel month and year you chose. For example, 15 5 '+(new Date().getFullYear())+'.')}
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="trip-${i}-from">From</label><p class="govbb-hint">For example, "Harrison College", "Home (Bridgetown)".</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="trip-${i}-from" name="trip-${i}-from" data-field="trip-${i}-from" value="${GovBB.D['trip-'+i+'-from']||''}" /></div></div>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="trip-${i}-to">To</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="trip-${i}-to" name="trip-${i}-to" data-field="trip-${i}-to" value="${GovBB.D['trip-'+i+'-to']||''}" /></div></div>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="trip-${i}-purpose">Purpose</label><div class="govbb-select-wrapper"><select class="govbb-select" id="trip-${i}-purpose" name="trip-${i}-purpose" data-field="trip-${i}-purpose" data-trigger-render="1"><option value="">Select a purpose</option>${PURPOSES.map(p=>`<option value="${p}"${purpose===p?' selected':''}>${p}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
        ${purpose==='Other (describe in field)'?`<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);"><label class="govbb-label" for="trip-${i}-purpose-other">Describe the purpose</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="trip-${i}-purpose-other" name="trip-${i}-purpose-other" data-field="trip-${i}-purpose-other" value="${GovBB.D['trip-'+i+'-purpose-other']||''}" /></div></div>`:''}
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="trip-${i}-amount">Amount claimed ($BBD)</label><p class="govbb-hint">Mileage or fare for this trip. Use the published Civil Service mileage rate.</p><div class="govbb-input-wrapper" style="max-width:10rem;"><input class="govbb-input" type="text" id="trip-${i}-amount" name="trip-${i}-amount" data-field="trip-${i}-amount" data-trigger-render="1" inputmode="decimal" value="${GovBB.D['trip-'+i+'-amount']||''}" /></div></div>
      </fieldset>`;
    }
    return `<form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">${count===1?'Your trip':'Your trips ('+count+')'}</h1>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">Number of trips this month</legend><p class="govbb-hint">If you have more than ${MAX_TRIPS} trips, submit them across multiple monthly claims.</p>
        <div style="display:flex;flex-wrap:wrap;gap:var(--spacing-xs);">
          ${Array.from({length:MAX_TRIPS},(_,i)=>i+1).map(n=>`<div class="govbb-radio-item" style="margin-right:var(--spacing-s);"><input class="govbb-radio" type="radio" id="trip-count-${n}" name="trip-count" data-field="trip-count" value="${n}"${String(GovBB.D['trip-count'])===String(n)?' checked':''} data-trigger-render="1" /><label class="govbb-radio-item__label" for="trip-count-${n}">${n}</label></div>`).join('')}
        </div>
      </fieldset>
      ${showShrinkWarn?`<div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);"><p class="govbb-text-body" style="margin:0;"><strong>Reducing the number of trips discards data for the trips removed.</strong> Continue only if you are sure.</p></div>`:''}
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);background:var(--color-grey-10);padding:var(--spacing-s) var(--spacing-m);border-left:4px solid var(--color-blue-40);"><strong>Running total: ${tripTotalDisplay()}</strong> across ${count} ${count===1?'trip':'trips'} for ${GovBB.D['travel-month']||''} ${GovBB.D['travel-year']||''}.</p>
      ${sections}
      <p class="govbb-text-body" style="margin-top:var(--spacing-m);"><strong>Total claimed: ${tripTotalDisplay()}</strong></p>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`;
  },

  'receipts': () => `${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Supporting receipts</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);"><strong>Mileage claims do not need a receipt.</strong> For any trip where you are claiming taxi fares, ferry tickets, parking, or other receipted expenses, upload the receipt here.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Accepted formats: PDF, JPG, PNG. Maximum size: 10 MB per file. Skip if all your trips are mileage-only.</p>
      ${uploadRow('receipts-1', 'Receipt 1 (optional)', '')}
      ${uploadRow('receipts-2', 'Receipt 2 (optional)', '')}
      ${uploadRow('receipts-3', 'Receipt 3 (optional)', '')}
      ${uploadRow('receipts-4', 'Receipt 4 (optional)', '')}
      ${uploadRow('receipts-5', 'Receipt 5 (optional)', '')}
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>`,

  'declaration': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Before you submit, please confirm the following.</p>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-visually-hidden">Declaration</legend>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-official" name="decl-official" data-field="decl-official"${GovBB.D['decl-official']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-official">I certify the trips above were undertaken on official examination business.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-receipts" name="decl-receipts" data-field="decl-receipts"${GovBB.D['decl-receipts']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-receipts">For any trip where I am claiming a receipted expense (taxi, ferry, parking), I have uploaded the receipt. Mileage-only claims do not need a receipt.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-accurate" name="decl-accurate" data-field="decl-accurate"${GovBB.D['decl-accurate']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-accurate">The amounts I have claimed are accurate and match the published mileage rate.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-false" name="decl-false" data-field="decl-false"${GovBB.D['decl-false']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-false">I understand that providing false information may result in the claim being refused or recovered.</label></div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue to review</button></div>
    </form>`,

  'check': () => {
    const count = tripCount();
    let tripRows = '';
    for (let i = 1; i <= count; i++) {
      var bits = [];
      bits.push(fmtTripDate('trip-'+i)||'No date');
      bits.push((GovBB.D['trip-'+i+'-from']||'?')+' → '+(GovBB.D['trip-'+i+'-to']||'?'));
      var p = GovBB.D['trip-'+i+'-purpose'];
      bits.push(p==='Other (describe in field)'?(GovBB.D['trip-'+i+'-purpose-other']||'Other'):(p||'No purpose'));
      var amt=parseFloat(String(GovBB.D['trip-'+i+'-amount']||'').replace(/,/g,''));
      bits.push(isNaN(amt)?'$0.00':'$'+amt.toFixed(2));
      tripRows += GovBB.summaryRow('Trip '+i, bits.join(' · '), 'trips');
    }
    return `<div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before submitting</h1>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About you</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Name', claimantName(), 'claimant-details')}
        ${GovBB.summaryRow('National ID', maskNid(GovBB.D['nid']), 'claimant-details')}
        ${GovBB.summaryRow('School or centre', GovBB.D['school-centre'], 'claimant-details')}
        ${GovBB.summaryRow('Address', GovBB.D['address'], 'claimant-details')}
        ${GovBB.summaryRow('Mobile', formatPhone(GovBB.D['phone']), 'claimant-details')}
        ${GovBB.summaryRow('Email', GovBB.D['email'], 'claimant-details')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Travel period</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Month', GovBB.D['travel-month'], 'travel-period')}
        ${GovBB.summaryRow('Year', GovBB.D['travel-year'], 'travel-period')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Trips (${count})</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${tripRows}
        ${GovBB.summaryRow('Total claimed', tripTotalDisplay(), null)}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Receipts</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${[1,2,3,4,5].map(function(n){var f=GovBB.D['upload-receipts-'+n];return GovBB.summaryRow('Receipt '+n, f?escapeHtml(f.name)+' ('+formatBytes(f.size)+')':'Not uploaded', 'receipts');}).join('')}
      </dl>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="if(this.disabled)return;this.disabled=true;this.textContent='Submitting…';next();">Submit claim</button></div>
    </div>`;
  },

  'confirmation': () => {
    window.__refNumber=window.__refNumber||('ETF-'+Math.random().toString(36).substring(2,8).toUpperCase());
    if(document.title.indexOf('Error: ')===0)document.title=document.title.substring('Error: '.length);
    document.title='Claim submitted — '+FORM_NAME;
    return `<div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Claim submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${window.__refNumber}</p>
      </div>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Total claimed: <strong>${tripTotalDisplay()}</strong> for ${GovBB.D['travel-month']||''} ${GovBB.D['travel-year']||''}.</p>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Exams Officer at your centre reviews and signs off your claim.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Deputy Permanent Secretary and Account Officer approve payment.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Reimbursement is paid into your school's payroll account on file within <strong>6 weeks</strong>.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">We've sent a copy of your claim to ${GovBB.D['email']||'the address you provided'}.</li>
      </ul>
      <div style="display:flex;gap:var(--spacing-m);flex-wrap:wrap;margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="window.print()">Print this page</button>
        <a class="govbb-btn--link" href="../forms.html">Return to all forms</a>
      </div>
    </div>`;
  }
};

function validate(pageId){
  const D=GovBB.D,errors=[];
  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/,NID_RE=/^\d{6}-\d{4}$/;
  function req(id,msg){if(!D[id]||String(D[id]).trim()==='')errors.push({id:id,msg:msg});}
  function reqMinLetters(id,msg,min){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:msg});return;}if((v.match(/[A-Za-z]/g)||[]).length<min)errors.push({id:id,msg:msg});}
  function reqNid(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!NID_RE.test(v))errors.push({id:id,msg:label+' must be in the format 110915-0048'});}
  function reqPhone(id,label,required,emptyMsg){var v=(D[id]||'').trim();if(!v){if(required)errors.push({id:id,msg:emptyMsg});return;}var digits=v.replace(/[\s\-()+]/g,'');if(!/^\d{7,15}$/.test(digits))errors.push({id:id,msg:label+' must contain 7 to 15 digits'});}
  function reqEmail(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!EMAIL_RE.test(v))errors.push({id:id,msg:label+' must be in the format you@example.com'});}

  if(pageId==='claimant-details'){
    req('surname','Enter your surname');
    req('first-name','Enter your first name');
    reqNid('nid','National ID Number','Enter your National ID Number');
    reqMinLetters('school-centre','Enter the school or centre name in letters',3);
    req('address','Enter your home address');
    reqPhone('phone','Mobile number',true,'Enter your mobile number');
    reqEmail('email','Email address','Enter your email address');
  }
  if(pageId==='travel-period'){
    req('travel-month','Select the month of travel');
    if(!D['travel-year'])errors.push({id:'travel-year-0',msg:'Select the year of travel'});
  }
  if(pageId==='trips'){
    if(!D['trip-count'])errors.push({id:'trip-count-1',msg:'Choose how many trips you are claiming for'});
    const claimMonthIdx = monthIndex(D['travel-month']);
    const claimYear = parseInt(D['travel-year'],10);
    for(let i=1;i<=tripCount();i++){
      /* Per-trip structured date */
      const dayV=D['trip-'+i+'-day'],monV=D['trip-'+i+'-month'],yrV=D['trip-'+i+'-year'];
      if(!dayV||!monV||!yrV){errors.push({id:'trip-'+i+'-day',msg:'Trip '+i+' — enter a complete date'});}
      else{
        const dt=parseTripDate('trip-'+i);
        if(dt===false){errors.push({id:'trip-'+i+'-day',msg:'Trip '+i+' — enter a real date'});}
        else if(dt){
          /* Cross-validate against the claim period */
          if(claimMonthIdx>=0 && !isNaN(claimYear)){
            if(dt.getMonth()!==claimMonthIdx || dt.getFullYear()!==claimYear){
              errors.push({id:'trip-'+i+'-day',msg:'Trip '+i+' — date must be in '+D['travel-month']+' '+claimYear+' (the period you chose). Either change the date or go back and change the claim period.'});
            }
          }
          /* No future dates */
          const today=new Date();today.setHours(0,0,0,0);
          if(dt>today)errors.push({id:'trip-'+i+'-day',msg:'Trip '+i+' — date is in the future. You can only claim for trips that have already happened.'});
        }
      }
      req('trip-'+i+'-from','Trip '+i+' — enter where you travelled from');
      req('trip-'+i+'-to','Trip '+i+' — enter where you travelled to');
      if(!D['trip-'+i+'-purpose'])errors.push({id:'trip-'+i+'-purpose',msg:'Trip '+i+' — select the purpose'});
      else if(D['trip-'+i+'-purpose']==='Other (describe in field)')req('trip-'+i+'-purpose-other','Trip '+i+' — describe the purpose');
      var amt=(D['trip-'+i+'-amount']||'').trim();
      if(!amt){errors.push({id:'trip-'+i+'-amount',msg:'Trip '+i+' — enter the amount claimed'});}
      else if(!/^\d+(\.\d{1,2})?$/.test(amt.replace(/,/g,''))){errors.push({id:'trip-'+i+'-amount',msg:'Trip '+i+' — amount must be a number, for example 25 or 25.50'});}
      else{var amtN=parseFloat(amt.replace(/,/g,''));if(amtN<=0)errors.push({id:'trip-'+i+'-amount',msg:'Trip '+i+' — amount must be more than $0'});else if(amtN>1000)errors.push({id:'trip-'+i+'-amount',msg:'Trip '+i+' — amount over $1,000 is unusual. Check the value.'});}
    }
  }
  if(pageId==='declaration'){
    ['official','receipts','accurate','false'].forEach(function(k){if(!D['decl-'+k])errors.push({id:'decl-'+k,msg:'Tick the box to confirm'});});
  }
  return errors;
}

GovBB.init({formName:FORM_NAME,flow:FLOW,pages:PAGES,validate:validate});
</script>

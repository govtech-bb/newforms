<div class="govbb-official-banner"><div class="govbb-container govbb-official-banner__inner"><div class="govbb-official-banner__crest"><img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" /></div><div class="govbb-official-banner__text"><span>Official government website</span></div></div></div>

<main class="govbb-page__main">

<script>
GovBB.clearErrors=function(){var s=document.getElementById('error-summary');if(s)s.remove();document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});};
GovBB.showErrors=function(errors){GovBB.clearErrors();if(!errors||!errors.length)return;var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>';});html+='</ul></div>';var app=document.getElementById('app');var h1=app.querySelector('h1');if(h1)h1.insertAdjacentHTML('afterend',html);else app.insertAdjacentHTML('afterbegin',html);document.getElementById('error-summary').focus();errors.forEach(function(e){var el=document.getElementById(e.id);if(!el)return;var errId='err-'+e.id;el.setAttribute('aria-invalid','true');el.setAttribute('aria-describedby',errId);var msg=document.createElement('p');msg.className='govbb-error-message';msg.id=errId;msg.textContent=e.msg;var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;if(group)group.appendChild(msg);});if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;};
GovBB.summaryRow=function(label,value,changeTo){var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';};
</script>
<script>
function next(){GovBB.next();}function back(){GovBB.back();}function nav(p){GovBB.nav(p);}

const FORM_NAME='Apply for a bursary for private special education';
const CAPTION='Ministry of Educational Transformation';
const TITLES=['Mr','Mrs','Miss','Ms','Dr','Rev'];
const ACCOUNT_TYPES=['Savings','Chequing'];
const BANKS=['Republic Bank','First Caribbean International Bank','RBC Royal Bank','Scotiabank','Barbados National Bank','City of Bridgetown Credit Union','Barbados Public Workers Credit Union','Teachers Credit Union','Other'];
const EMPLOYMENT=['Employed full-time','Employed part-time','Self-employed','Unemployed','Retired','Other'];

const FLOW=['start','child-details','child-needs','parent-details','household','provider-details','documents','banking','declaration','check','confirmation'];

function caption(){return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+CAPTION+'</p>';}
function maskNid(nid){if(!nid)return '';var m=String(nid).trim().match(/^(\d{6})-(\d{4})$/);return m?'••••••-'+m[2]:String(nid).trim();}
function maskAccount(num){if(!num)return '';const digits=String(num).replace(/[\s\-]/g,'');if(digits.length<=4)return digits;return '••••••'+digits.slice(-4);}
function formatPhone(p){if(!p)return '';var digits=String(p).replace(/[^\d]/g,'');if(digits.length===10&&digits.indexOf('246')===0)return '(246) '+digits.substring(3,6)+' '+digits.substring(6);return String(p).trim();}
function fmtDate(prefix){const d=GovBB.D[prefix+'-day'],m=GovBB.D[prefix+'-month'],y=GovBB.D[prefix+'-year'];if(!d&&!m&&!y)return '';return [d,m,y].filter(Boolean).join(' / ');}
function parseDate(prefix){const d=parseInt(GovBB.D[prefix+'-day'],10),m=parseInt(GovBB.D[prefix+'-month'],10),y=parseInt(GovBB.D[prefix+'-year'],10);if(!d||!m||!y)return null;if(d<1||d>31||m<1||m>12||y<1990||y>2100)return false;const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return false;return dt;}
function childName(){return [GovBB.D['child-first'],GovBB.D['child-other'],GovBB.D['child-surname']].filter(Boolean).join(' ');}
function parentName(){return [GovBB.D['parent-title'],GovBB.D['parent-first'],GovBB.D['parent-last']].filter(Boolean).join(' ');}

function handleUpload(key,input){const file=input.files&&input.files[0];if(!file)return;if(file.size>10*1024*1024){alert('File is larger than 10 MB.');input.value='';return;}GovBB.D['upload-'+key]={name:file.name,size:file.size,type:file.type};GovBB.render();}
function removeUpload(key){delete GovBB.D['upload-'+key];GovBB.render();}
function formatBytes(n){if(n<1024)return n+' B';if(n<1024*1024)return (n/1024).toFixed(1)+' KB';return (n/(1024*1024)).toFixed(1)+' MB';}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uploadRow(key,label,hint){var file=GovBB.D['upload-'+key];if(file){return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);border-left:4px solid var(--color-green-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}<p class="govbb-text-body" style="margin:0;font-size:var(--font-size-caption);color:var(--color-mid-grey-00);word-break:break-all;"><span aria-hidden="true">✓ </span>${escapeHtml(file.name)} (${formatBytes(file.size)})</p></div><button type="button" class="govbb-btn--link" style="flex-shrink:0;" onclick="removeUpload('${key}')">Remove<span class="govbb-visually-hidden"> ${label}</span></button></div>`;}return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;flex:1;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}</div><label for="upload-${key}" class="govbb-btn--secondary" style="flex-shrink:0;cursor:pointer;margin:0;">Upload file</label><input type="file" id="upload-${key}" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleUpload('${key}', this)" /></div>`;}

function dateField(prefix,legend,hint){return `<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">${legend}</legend>${hint?`<p class="govbb-hint">${hint}</p>`:''}<div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;"><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-day">Day</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-month">Month</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-year">Year</label><div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div></div></div></fieldset>`;}

const PAGES = {
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);"><ol class="govbb-breadcrumbs__list"><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Education and schooling</a></li></ol></nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Apply for a special education bursary</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 29 May 2026</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">If your child has additional learning needs that cannot be met in a government school, you can apply for a bursary towards their education at a private special-education provider in Barbados.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">The bursary covers part of the annual fees — the exact amount is decided case-by-case by the Bursary Committee based on your child's needs and your household circumstances. It is paid each school year, and you must reapply every year your child continues in the placement.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Apply online. No application fee. Takes about <strong>20 to 30 minutes</strong> once you have your documents — gather them first.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>The bursary is means-tested and discretionary.</strong> Approval depends on your child's needs, the provider's suitability, and your household circumstances. Apply early — assessment can take up to 8 weeks.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Who can apply</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">You can apply if:</p>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your child is a Barbadian citizen or legally resident in Barbados</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your child has a documented diagnosis or assessed special education need</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A government-school placement is not suitable for your child's needs</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A private special-education provider in Barbados has agreed to take your child</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your child's full name, date of birth, and National ID Number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your contact details, employment, and monthly household income (you'll choose an income band)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The name, address, and annual fees of the private provider</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your bank or credit union account details</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Documents you'll upload</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Accepted formats: PDF, JPG, PNG, DOC — up to 10 MB each.</p>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Your letter</strong> explaining the need for the bursary</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>A medical or educational evaluation</strong> describing your child's diagnosis or needs</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>The provider's acceptance letter</strong> confirming your child has been offered a place</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Proof of income for the past 3 months (optional but speeds up the assessment)</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">A bursary officer reviews your application and may call you for additional information. Your application is then presented to the Bursary Committee. Decisions take up to <strong>8 weeks</strong>.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">If approved, the bursary is normally paid directly to the provider on your behalf. In some cases — for example, where the provider invoices you first — it can instead be paid into your bank account. The officer will discuss this with you before any payment is made.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call the Special Education Section on <strong>+1 (246) 535-0760</strong> or email <a href="mailto:specialed@mes.gov.bb" class="govbb-link">specialed@mes.gov.bb</a> if you need help.</p>
    </div>`,

  'child-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About your child</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="child-first">First name</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-first" name="child-first" data-field="child-first" value="${GovBB.D['child-first']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="child-other">Other names (optional)</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-other" name="child-other" data-field="child-other" value="${GovBB.D['child-other']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="child-surname">Surname</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-surname" name="child-surname" data-field="child-surname" value="${GovBB.D['child-surname']||''}" /></div></div>
      ${dateField('child-dob','Date of birth','For example, 15 6 2014.')}
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">Sex</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-xs);"><div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="child-gender-m" name="child-gender" data-field="child-gender" value="Male"${GovBB.D['child-gender']==='Male'?' checked':''} /><label class="govbb-radio-item__label" for="child-gender-m">Male</label></div><div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="child-gender-f" name="child-gender" data-field="child-gender" value="Female"${GovBB.D['child-gender']==='Female'?' checked':''} /><label class="govbb-radio-item__label" for="child-gender-f">Female</label></div></div></fieldset>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="child-nid">National ID Number</label><p class="govbb-hint">For example, 140615-0048.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-nid" name="child-nid" data-field="child-nid" value="${GovBB.D['child-nid']||''}" /></div></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'child-needs': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your child's needs</h1>
      <div style="border-left:4px solid var(--color-blue-40);padding:var(--spacing-s) var(--spacing-m);background:var(--color-blue-10);margin-bottom:var(--spacing-m);"><p class="govbb-text-body"><strong>Sensitive information.</strong> What you write here is shared only with the Special Education Section and the Bursary Committee. It's used to assess whether the proposed placement is the right fit.</p></div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="diagnosis-summary">Diagnosis or assessed needs</label><p class="govbb-hint">In your own words. For example, "Autism spectrum (Level 1)", "Severe dyslexia", "Cerebral palsy with communication difficulties". You will upload the formal evaluation later.</p><textarea class="govbb-textarea" id="diagnosis-summary" name="diagnosis-summary" data-field="diagnosis-summary" rows="3">${GovBB.D['diagnosis-summary']||''}</textarea></div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="current-school">Current school or programme (if any)</label><p class="govbb-hint">If your child is currently in a school or programme, name it. Otherwise leave blank.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="current-school" name="current-school" data-field="current-school" value="${GovBB.D['current-school']||''}" /></div></div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="why-private">Why a private provider is needed</label><p class="govbb-hint">Briefly explain why a government-school placement is not suitable for your child. Be specific — for example, "the local school cannot provide a 1:1 aide" or "speech therapy is not available locally".</p><textarea class="govbb-textarea" id="why-private" name="why-private" data-field="why-private" rows="5">${GovBB.D['why-private']||''}</textarea></div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'parent-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you (parent or guardian)</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parent-title">Title</label><div class="govbb-select-wrapper"><select class="govbb-select" id="parent-title" name="parent-title" data-field="parent-title"><option value="">Select a title</option>${TITLES.map(t=>`<option value="${t}"${GovBB.D['parent-title']===t?' selected':''}>${t}</option>`).join('')}</select><span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parent-first">First name</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="parent-first" name="parent-first" data-field="parent-first" autocomplete="given-name" value="${GovBB.D['parent-first']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parent-last">Last name</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="parent-last" name="parent-last" data-field="parent-last" autocomplete="family-name" value="${GovBB.D['parent-last']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parent-nid">Your National ID Number</label><p class="govbb-hint">For example, 110915-0048.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="parent-nid" name="parent-nid" data-field="parent-nid" value="${GovBB.D['parent-nid']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="parent-relationship">Relationship to the child</label><p class="govbb-hint">For example, "Mother", "Father", "Legal guardian".</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="parent-relationship" name="parent-relationship" data-field="parent-relationship" value="${GovBB.D['parent-relationship']||''}" /></div></div>

function validate(pageId){
  const D=GovBB.D,errors=[];
  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/,NID_RE=/^\d{6}-\d{4}$/;
  function req(id,msg){if(!D[id]||String(D[id]).trim()==='')errors.push({id:id,msg:msg});}
  function reqMinLetters(id,msg,min){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:msg});return;}if((v.match(/[A-Za-z]/g)||[]).length<min)errors.push({id:id,msg:msg});}
  function reqNid(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!NID_RE.test(v))errors.push({id:id,msg:label+' must be in the format 110915-0048'});}
  function reqPhone(id,label,required,emptyMsg){var v=(D[id]||'').trim();if(!v){if(required)errors.push({id:id,msg:emptyMsg});return;}var digits=v.replace(/[\s\-()+]/g,'');if(!/^\d{7,15}$/.test(digits))errors.push({id:id,msg:label+' must contain 7 to 15 digits'});}
  function reqEmail(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!EMAIL_RE.test(v))errors.push({id:id,msg:label+' must be in the format you@example.com'});}
  function reqDate(prefix,label){const dayV=D[prefix+'-day'],monV=D[prefix+'-month'],yrV=D[prefix+'-year'];if(!dayV||!monV||!yrV){errors.push({id:prefix+'-day',msg:label+' — enter a complete date.'});return null;}const dt=parseDate(prefix);if(dt===false){errors.push({id:prefix+'-day',msg:label+' — enter a real date.'});return null;}return dt;}
  function reqInt(id,label,min,max){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:label+' — enter a whole number'});return;}if(!/^\d+$/.test(v)){errors.push({id:id,msg:label+' — must be a whole number'});return;}var n=parseInt(v,10);if(min!=null&&n<min)errors.push({id:id,msg:label+' — must be at least '+min});if(max!=null&&n>max)errors.push({id:id,msg:label+' — looks unusually high'});}
  function reqMoney(id,label,max){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:label+' — enter an amount'});return;}if(!/^\d+(\.\d{1,2})?$/.test(v)){errors.push({id:id,msg:label+' — must be a number, for example 12000 or 12000.00'});return;}var n=parseFloat(v);if(max&&n>max)errors.push({id:id,msg:label+' — looks unusually high. Check the value.'});}

  if(pageId==='child-details'){
    req('child-first','Enter your child\'s first name');req('child-surname','Enter your child\'s surname');
    const dob=reqDate('child-dob','Date of birth');
    if(dob){const today=new Date();today.setHours(0,0,0,0);const age=today.getFullYear()-dob.getFullYear();if(dob>=today)errors.push({id:'child-dob-day',msg:'Date of birth must be in the past.'});else if(age<2||age>22)errors.push({id:'child-dob-day',msg:'Date of birth — children for special education bursary are usually 2 to 22.'});}
    if(!D['child-gender'])errors.push({id:'child-gender-m',msg:'Select your child\'s sex'});
    reqNid('child-nid','National ID Number','Enter your child\'s National ID Number');
  }
  if(pageId==='child-needs'){
    var diag=(D['diagnosis-summary']||'').trim();
    if(!diag)errors.push({id:'diagnosis-summary',msg:'Describe your child\'s diagnosis or needs'});
    else if(diag.length<15)errors.push({id:'diagnosis-summary',msg:'Add more detail about your child\'s diagnosis or needs'});
    var why=(D['why-private']||'').trim();
    if(!why)errors.push({id:'why-private',msg:'Explain why a private provider is needed'});
    else if(why.length<40)errors.push({id:'why-private',msg:'Add more detail — the Committee needs enough context to assess.'});
  }
  if(pageId==='parent-details'){
    req('parent-title','Select a title');req('parent-first','Enter your first name');req('parent-last','Enter your last name');
    reqNid('parent-nid','National ID Number','Enter your National ID Number');
    req('parent-relationship','Enter your relationship to the child');
    req('parent-address','Enter your home address');
    reqPhone('parent-phone','Phone number',true,'Enter a phone number');
    reqEmail('parent-email','Email address','Enter your email address');
    /* Cross-field: parent NID != child NID (no claiming for yourself) */
    var pNid=(D['parent-nid']||'').trim(),cNid=(D['child-nid']||'').trim();
    if(pNid&&cNid&&pNid===cNid)errors.push({id:'parent-nid',msg:'Your National ID Number cannot be the same as the child\'s.'});
  }
  if(pageId==='household'){
    reqInt('household-size','People in household',1,30);
    reqInt('dependants-count','Dependent children',1,20);
    req('employment-status','Select your employment status');
    if(D['employment-status']==='Other')req('employment-other','Specify your employment status');
    if(!D['income-band'])errors.push({id:'income-band-0',msg:'Choose an income band (or Prefer not to say)'});
    if(!D['other-support'])errors.push({id:'other-support-yes',msg:'Select yes or no — other government support?'});
    if(D['other-support']==='Yes'){
      var det=(D['other-support-details']||'').trim();
      if(!det)errors.push({id:'other-support-details',msg:'Describe the other government support you receive'});
      else if(det.length<15)errors.push({id:'other-support-details',msg:'Add more detail about the other support'});
    } else if(D['other-support']==='No'){
      delete D['other-support-details'];
    }
  }
  if(pageId==='provider-details'){
    reqMinLetters('provider-name','Enter the provider\'s name in letters',3);
    req('provider-address','Enter the provider\'s address');
    reqPhone('provider-phone','Provider phone',true,'Enter the provider\'s phone number');
    reqMoney('annual-fees','Annual fees',200000);
    const sd=reqDate('start-date','Expected start date');
    if(sd){const today=new Date();today.setHours(0,0,0,0);const twoYearsAhead=new Date(today.getFullYear()+2,today.getMonth(),today.getDate());if(sd>twoYearsAhead)errors.push({id:'start-date-day',msg:'Expected start date is too far in the future. Check the year.'});}
  }
  if(pageId==='documents'){
    ['parent-letter','evaluation','acceptance'].forEach(function(k){if(!D['upload-'+k])errors.push({id:'upload-'+k,msg:'Upload the '+(k==='parent-letter'?'parent letter':(k==='evaluation'?'medical or educational evaluation':"provider's acceptance letter"))});});
  }
  if(pageId==='banking'){
    req('bank-name','Select your bank or credit union');
    if(D['bank-name']==='Other')req('bank-name-other','Enter the name of your bank');
    req('bank-branch','Enter the branch');
    var acct=(D['account-no']||'').trim();if(!acct){errors.push({id:'account-no',msg:'Enter your account number'});}else if(!/^\d{6,16}$/.test(acct.replace(/[\s\-]/g,''))){errors.push({id:'account-no',msg:'Account number must be 6 to 16 digits'});}
    if(!D['account-type'])errors.push({id:'account-type-0',msg:'Select an account type'});
    req('account-name','Enter the name on the account');
  }
  if(pageId==='declaration'){
    ['accurate','discretion','verify','changes','false'].forEach(function(k){if(!D['decl-'+k])errors.push({id:'decl-'+k,msg:'Tick the box to confirm'});});
  }
  return errors;
}

GovBB.init({formName:FORM_NAME,flow:FLOW,pages:PAGES,validate:validate});
</script>

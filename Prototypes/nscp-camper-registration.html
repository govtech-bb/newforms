/* ───────── Custom styled select (matches design system screenshot) ───────── */
function styledSelect(id, label, options, opts) {
  opts = opts || {};
  const val = GovBB.D[id] || '';
  const hint = opts.hint
    ? `<p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">${opts.hint}</p>`
    : '';
  const triggerAttr = opts.triggerRender ? ' data-trigger-render="1"' : '';
  const placeholder = opts.placeholder || 'Select one';
  let ops = `<option value="">${placeholder}</option>`;
  options.forEach(o => {
    const v = typeof o === 'object' ? o.value : o;
    const l = typeof o === 'object' ? o.label : o;
    ops += `<option value="${v}"${val === v ? ' selected' : ''}>${l}</option>`;
  });
  return `
    <div class="field-group flex flex-col gap-xs w-full items-start">
      <label for="${id}" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">${label}</label>
      ${hint}
      <div class="relative flex w-full rounded-sm border-2 border-bb-black-00 bg-bb-white-00 overflow-hidden hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
        <select id="${id}" name="${id}" data-field="${id}"${triggerAttr}
          class="w-full min-w-0 p-s outline-none bg-transparent appearance-none cursor-pointer text-[1.25rem] leading-normal">
          ${ops}
        </select>
        <div class="flex items-center justify-center w-14 shrink-0 bg-[#f0f0f0] border-l-2 border-bb-black-00 pointer-events-none" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>
    </div>`;
}

/* ───────── Helpers ───────── */
function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '—';
  return [d, m, y].filter(Boolean).join(' / ');
}

function camperFullName() {
  return GovBB.D['camper-fullname'] || '—';
}

function guardianFullName() {
  return GovBB.D['guardian-fullname'] || '—';
}

function emergencyFullName() {
  return GovBB.D['emerg-fullname'] || '—';
}

function curriculumSummary() {
  const topics = [
    ['curriculum-arts',        'Arts &amp; Culture'],
    ['curriculum-innovation',  'Innovation'],
    ['curriculum-youth',       'Youth Empowerment'],
    ['curriculum-health',      'Health &amp; Fitness'],
    ['curriculum-self',        'Self-Management Tools'],
    ['curriculum-finance',     'Financial Literacy'],
    ['curriculum-agriculture', 'Agriculture']
  ];
  const selected = topics.filter(t => GovBB.D[t[0]]).map(t => t[1]);
  return selected.length ? selected.join(', ') : '—';
}

function conductAllChecked() {
  return GovBB.D['conduct-1'] && GovBB.D['conduct-2'] && GovBB.D['conduct-3'] &&
         GovBB.D['conduct-4'] && GovBB.D['conduct-5'] && GovBB.D['conduct-6'];
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div class="space-y-6">
      <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00">Ministry of Youth, Sports and Community Empowerment</p>
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">National Summer Camp Programme 2025</h1>
      <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">Last updated: May 2025</p>
      <hr class="border-bb-grey-00">

      <p class="text-[1.25rem] leading-normal">Register your child for the National Summer Camp Programme running from <strong>21 July to 22 August 2025</strong>. The camp is open to children aged <strong>4 to 15 years</strong>.</p>
      <p class="text-[1.25rem] leading-normal">Most people finish this form in about <strong>10 minutes</strong>.</p>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">What you'll need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem] leading-normal">
          <li>Your child's National ID Number (NRN) — found on their national ID card. For example, 110915-0048.</li>
          <li>Your child's date of birth</li>
          <li>Details of any illnesses, medications, disabilities, or allergies your child has</li>
          <li>Your contact details (address, phone, email)</li>
          <li>Emergency contact details and your child's doctor or polyclinic</li>
        </ul>
      </div>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">Contact us</h2>
        <p class="text-[1.25rem] leading-normal">Call <strong>+1 (246) 535-3835</strong> or email <a href="mailto:mysce.youthprojects@barbados.gov.bb" class="${GovBB.LINK_CLS}">mysce.youthprojects@barbados.gov.bb</a> if you need help.</p>
      </div>

      ${GovBB.startBtn('Start registration')}
    </div>`,

  /* ── Tell us about your child ── */

    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Tell us about your child</h1>
      <div class="space-y-8">
        ${GovBB.textField('camper-fullname', 'Full name')}
        ${GovBB.dateField('dob', 'Date of birth')}
        ${GovBB.textField('nid', 'National ID Number', {
          hint: 'You can find this on your child\'s national ID card. For example, 110915-0048.',
          placeholder: '110915-0048'
        })}
        ${GovBB.radioGroup('gender', 'Gender', ['Male', 'Female'])}
        ${styledSelect('religion', 'Religion', ['Christian', 'Islam', 'Rastafarianism', 'Hindu', 'Other'], {
          placeholder: 'Select a religion'
        })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Medical & health information ── */
  'camper-health': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-4">Your child's medical &amp; health information</h1>
      <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-8">Answer all questions below. If your child takes medication at camp, you must also complete a Medication Authorisation Form before camp starts.</p>
      <div class="space-y-8">

        <div class="space-y-4">

          </div>
        </div>

        <div class="space-y-4">
          ${GovBB.radioGroup('medication', 'Is your child on any medication?', ['Yes', 'No'])}
          <div data-show-when-name="medication" data-show-when-value="Yes" style="display:${GovBB.D['medication'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('medication-details', 'What is the medication and dosage?', {

              rows: 3
            })}
          </div>
        </div>

        <div class="space-y-4">
          ${GovBB.radioGroup('disability', 'Does your child have a disability?', ['Yes', 'No'])}
          <div data-show-when-name="disability" data-show-when-value="Yes" style="display:${GovBB.D['disability'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('disability-details', 'Please describe the disability', { rows: 3 })}

        </div>

          ${GovBB.radioGroup('allergies', 'Does your child have any allergies?', ['Yes', 'No'])}

            ${GovBB.textareaField('allergies-details', 'Please describe the allergies', { rows: 3 })}

        </div>

          hint: 'For example: Dr. Adams, Glebe Polyclinic.'
        })}

        ${btnGroup()}
      </div>
    </form>`,

  /* ── Camp + curriculum + activities + photo permission ── */

    const venueOptions = parish && CAMP_VENUES[parish] ? CAMP_VENUES[parish] : [];

    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Choose a camp</h1>

      <div class="space-y-8">
        ${styledSelect('camp-parish', 'Parish of camp', GovBB.PARISHES, {
          placeholder: 'Select a parish',
          triggerRender: true

        <div class="space-y-6">
          <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-s">Topics that interest your child</h2>

          ${GovBB.checkboxItem('curriculum-health',      'Health &amp; Fitness')}
          ${GovBB.checkboxItem('curriculum-self',        'Self-Management Tools <span class="font-normal text-bb-mid-grey-00">(includes health &amp; wellness, self-care, religious knowledge, ethics, etiquette)</span>')}
          ${GovBB.checkboxItem('curriculum-finance',     'Financial Literacy')}
          ${GovBB.checkboxItem('curriculum-agriculture', 'Agriculture')}
        </div>

        <div class="space-y-6">
          <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-s">Activities</h2>

/* ───────── Previous + Continue button group ───────── */
const PREV_BTN_CLS = 'relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c8cdd4] active:bg-[#b0b5bc] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100 focus-visible:rounded-sm';

function btnGroup(continueLabel) {
  return `<div class="mt-8 flex gap-4 items-center flex-wrap">
    <button type="button" onclick="back()" class="${PREV_BTN_CLS}">Previous</button>
    <button type="button" onclick="next()" class="${GovBB.BTN_CLS}">${continueLabel || 'Continue'}</button>
  </div>`;
}

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'camper-details') {
    if (!D['camper-fullname'] || !D['camper-fullname'].trim()) errors.push({ id: 'camper-fullname', msg: 'Enter your child\'s full name' });
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year'])
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    if (!D['nid'] || !D['nid'].trim())  errors.push({ id: 'nid', msg: 'Enter your child\'s National ID Number' });
    if (!D['gender'])                   errors.push({ id: 'gender', msg: 'Select your child\'s gender' });
    if (!D['religion'])                 errors.push({ id: 'religion', msg: 'Select your child\'s religion' });
  }

  if (pageId === 'camper-health') {
    if (!D['illness'])  errors.push({ id: 'illness', msg: 'Select yes or no – Does your child have any illness?' });
    if (D['illness'] === 'Yes' && (!D['illness-details'] || !D['illness-details'].trim()))
      errors.push({ id: 'illness-details', msg: 'Illness details – Describe the illness or illnesses' });
    if (!D['medication'])  errors.push({ id: 'medication', msg: 'Select yes or no – Is your child on any medication?' });
    if (D['medication'] === 'Yes' && (!D['medication-details'] || !D['medication-details'].trim()))
      errors.push({ id: 'medication-details', msg: 'Medication details – Enter the name and dosage' });
    if (!D['disability'])  errors.push({ id: 'disability', msg: 'Select yes or no – Does your child have a disability?' });
    if (D['disability'] === 'Yes' && (!D['disability-details'] || !D['disability-details'].trim()))
      errors.push({ id: 'disability-details', msg: 'Disability details – Describe the disability' });
    if (!D['allergies'])  errors.push({ id: 'allergies', msg: 'Select yes or no – Does your child have any allergies?' });
    if (D['allergies'] === 'Yes' && (!D['allergies-details'] || !D['allergies-details'].trim()))
      errors.push({ id: 'allergies-details', msg: 'Allergy details – Describe the allergies' });
    if (!D['doctor-name'] || !D['doctor-name'].trim())
      errors.push({ id: 'doctor-name', msg: 'Enter your child\'s doctor or polyclinic' });
  }

  if (pageId === 'camp') {
    if (!D['camp-parish'])  errors.push({ id: 'camp-parish', msg: 'Select the parish of the camp' });
    if (!D['camp-name'])    errors.push({ id: 'camp-name',   msg: 'Select the name of the camp' });
    const anyTopic = D['curriculum-arts'] || D['curriculum-innovation'] || D['curriculum-youth'] ||
                     D['curriculum-health'] || D['curriculum-self'] || D['curriculum-finance'] || D['curriculum-agriculture'];
    if (!anyTopic) errors.push({ id: 'curriculum-arts', msg: 'Choose at least one topic that interests your child' });
    if (!D['activity-exemptions'] || !D['activity-exemptions'].trim())
      errors.push({ id: 'activity-exemptions', msg: 'Enter any activity exemptions, or write "None"' });
    if (!D['photo-permission']) errors.push({ id: 'photo-permission', msg: 'Select yes or no for photo and video permission' });
  }

  if (pageId === 'nutrition') {
    if (!D['meals-provided'])  errors.push({ id: 'meals-provided', msg: 'Select yes or no for camp meals' });
    if (!D['dietary'])          errors.push({ id: 'dietary', msg: 'Select a dietary option' });
    if (D['dietary'] === 'Other' && (!D['dietary-other'] || !D['dietary-other'].trim()))
      errors.push({ id: 'dietary-other', msg: 'Dietary restrictions – Describe the dietary restriction' });
  }

  if (pageId === 'guardian-name') {
    if (!D['guardian-fullname'] || !D['guardian-fullname'].trim()) errors.push({ id: 'guardian-fullname', msg: 'Enter your full name' });
    if (!D['guardian-relationship']) errors.push({ id: 'guardian-relationship', msg: 'Select your relationship to the camper' });
    if (D['guardian-relationship'] === 'Other' && (!D['guardian-relationship-other'] || !D['guardian-relationship-other'].trim()))
      errors.push({ id: 'guardian-relationship-other', msg: 'Describe your relationship to the camper' });
    if (!D['guardian-is-emergency']) errors.push({ id: 'guardian-is-emergency', msg: 'Select yes or no — are you the emergency contact?' });
  }

  if (pageId === 'guardian-contact') {
    if (!D['address-line1'] || !D['address-line1'].trim()) errors.push({ id: 'address-line1', msg: 'Enter your address' });
    if (!D['address-parish'])  errors.push({ id: 'address-parish', msg: 'Select your parish' });
    if (!D['phone-cell'] || !D['phone-cell'].trim())       errors.push({ id: 'phone-cell', msg: 'Enter a mobile number' });
    if (!D['contact-email'] || !D['contact-email'].trim()) errors.push({ id: 'contact-email', msg: 'Enter your email address' });
    else if (!D['contact-email'].includes('@'))             errors.push({ id: 'contact-email', msg: 'Email address – Enter a valid email address' });
    if (!D['employer'] || !D['employer'].trim())           errors.push({ id: 'employer', msg: 'Enter your employer or business name' });
  }


  if (pageId === 'emergency-contact') {
    if (!D['emerg-fullname'] || !D['emerg-fullname'].trim()) errors.push({ id: 'emerg-fullname', msg: 'Enter the emergency contact\'s full name' });
    if (!D['emerg-relationship']) errors.push({ id: 'emerg-relationship', msg: 'Select the emergency contact\'s relationship to the camper' });
    if (D['emerg-relationship'] === 'Other' && (!D['emerg-relationship-other'] || !D['emerg-relationship-other'].trim()))
      errors.push({ id: 'emerg-relationship-other', msg: 'Describe their relationship to the camper' });
    if (!D['emerg-phone'] || !D['emerg-phone'].trim()) errors.push({ id: 'emerg-phone', msg: 'Enter an emergency phone number' });
  }


  if (pageId === 'conduct') {
    if (!conductAllChecked())
      errors.push({ id: 'conduct-1', msg: 'You must agree to all six items in the conduct agreement before continuing' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  getFlow: function() {
    if (GovBB.D['guardian-is-emergency'] === 'Yes') {
      return FLOW.filter(p => p !== 'emergency-contact');
    }
    return FLOW;
  },
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    if (name === 'guardian-is-emergency') GovBB.render();
  }
});
</script>

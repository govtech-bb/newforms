<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>

/* ───────── Document upload handlers ───────── */
function handleUpload(key, input) {
  const file = input.files && input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    alert('File is larger than 10 MB. Please choose a smaller file.');
    input.value = '';
    return;
  }
  GovBB.D['upload-' + key] = { name: file.name, size: file.size, type: file.type };
  GovBB.render();
}
function removeUpload(key) {
  delete GovBB.D['upload-' + key];
  GovBB.render();
}
function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / (1024 * 1024)).toFixed(1) + ' MB';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* ───────── Helpers ───────── */
function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  /* Email — simple but real: local@domain.tld with no spaces. Not RFC-perfect
     but rejects "a@", "@", and "noatsign". */
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  /* label is the field title in sentence case, e.g. "National ID Number".
     emptyMsg is the message used when the field is empty (full sentence). */
  function reqIdNumber(id, label, emptyMsg) {
    const v = (D[id] || '').trim();
    if (!v) { errors.push({ id: id, msg: emptyMsg }); return; }
    if (!/^\d{6}-\d{4}$/.test(v)) {
      errors.push({ id: id, msg: label + ' must be in the format 110915-0048' });
    }
  }
  function reqPhone(id, label, required, emptyMsg) {
    const v = (D[id] || '').trim();
    if (!v) {
      if (required) errors.push({ id: id, msg: emptyMsg });
      return;
    }
    const digits = v.replace(/[\s\-()+]/g, '');
    if (!/^\d{7,15}$/.test(digits)) {
      errors.push({ id: id, msg: label + ' must contain 7 to 15 digits, for example (246) 249 1234' });
    }
  }
  function reqEmail(id, label, required, emptyMsg) {
    const v = (D[id] || '').trim();
    if (!v) {
      if (required) errors.push({ id: id, msg: emptyMsg });
      return;
    }
    if (!EMAIL_RE.test(v)) {
      errors.push({ id: id, msg: label + ' must be in the format you@example.com' });
    }
  }

  if (pageId === 'camper-details') {
    if (!D['camper-fullname'] || !D['camper-fullname'].trim()) errors.push({ id: 'camper-fullname', msg: 'Enter your child\'s full name' });
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    } else {
      const day = parseInt(D['dob-day'], 10), month = parseInt(D['dob-month'], 10), year = parseInt(D['dob-year'], 10);
      const parsed = new Date(year, month - 1, day);
      if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a real date, for example 15 6 2017' });
      } else if (parsed >= new Date()) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – The date of birth must be in the past' });
      } else {
        const today = new Date();
        let age = today.getFullYear() - year;
        if (today.getMonth() < month - 1 || (today.getMonth() === month - 1 && today.getDate() < day)) age--;
        if (age < 4 || age > 15) {
          errors.push({ id: 'dob-day', msg: 'Date of birth – Your child must be between 4 and 15 years old to register' });
        }
      }
    }
    reqIdNumber('nid', 'National ID Number', 'Enter your child\'s National ID Number');
    if (!D['gender'])                   errors.push({ id: 'gender-male', msg: 'Select your child\'s sex' });
    /* Religion is optional. If "Other" chosen, the description is required. */
    if (D['religion'] === 'Other' && (!D['religion-other'] || !D['religion-other'].trim()))
      errors.push({ id: 'religion-other', msg: 'Religion – Describe your child\'s religion' });
  }

  if (pageId === 'camper-health') {
    if (!D['illness'])  errors.push({ id: 'illness-yes', msg: 'Select yes or no – Does your child have any illness?' });
    if (D['illness'] === 'Yes' && (!D['illness-details'] || !D['illness-details'].trim()))
      errors.push({ id: 'illness-details', msg: 'Illness details – Describe the illness or illnesses' });
    if (!D['medication'])  errors.push({ id: 'medication-yes', msg: 'Select yes or no – Is your child on any medication?' });
    if (D['medication'] === 'Yes') {
      if (!D['medication-details'] || !D['medication-details'].trim())
        errors.push({ id: 'medication-details', msg: 'Medication details – Enter the name and dosage' });
      if (!D['upload-medication-auth'])
        errors.push({ id: 'upload-medication-auth', msg: 'Upload the signed Medication Authorisation Form' });
    }
    if (!D['disability'])  errors.push({ id: 'disability-yes', msg: 'Select yes or no – Does your child have a disability?' });
    if (D['disability'] === 'Yes' && (!D['disability-details'] || !D['disability-details'].trim()))
      errors.push({ id: 'disability-details', msg: 'Disability details – Describe the disability' });
    if (!D['allergies'])  errors.push({ id: 'allergies-yes', msg: 'Select yes or no – Does your child have any allergies?' });
    if (D['allergies'] === 'Yes' && (!D['allergies-details'] || !D['allergies-details'].trim()))
      errors.push({ id: 'allergies-details', msg: 'Allergy details – Describe the allergies' });
    if (!D['doctor-clinic'] || !D['doctor-clinic'].trim())
      errors.push({ id: 'doctor-clinic', msg: 'Enter the clinic or polyclinic where your child receives medical care' });
  }

  if (pageId === 'camp') {
    if (!D['camp-parish'])  errors.push({ id: 'camp-parish', msg: 'Select the parish of the camp' });
    if (!D['camp-name'])    errors.push({ id: 'camp-name',   msg: 'Select the name of the camp' });
    const anyTopic = D['curriculum-arts'] || D['curriculum-innovation'] || D['curriculum-youth'] ||
                     D['curriculum-health'] || D['curriculum-self'] || D['curriculum-finance'] || D['curriculum-agriculture'];
    if (!anyTopic) errors.push({ id: 'curriculum-arts', msg: 'Choose at least one topic that interests your child' });
    if (!D['has-activity-exemptions'])
      errors.push({ id: 'has-activity-exemptions-no', msg: 'Tell us whether your child should be exempt from any activities' });
    if (D['has-activity-exemptions'] === 'Yes' && (!D['activity-exemptions'] || !D['activity-exemptions'].trim()))
      errors.push({ id: 'activity-exemptions', msg: 'Describe the activities your child should not take part in' });
    if (!D['photo-permission']) errors.push({ id: 'photo-permission-yes', msg: 'Select yes or no for photo and video permission' });
  }

  if (pageId === 'nutrition') {
    if (!D['meals-provided'])  errors.push({ id: 'meals-provided-yes', msg: 'Select yes or no for camp meals' });
    if (!D['dietary'])          errors.push({ id: 'dietary', msg: 'Select a dietary option' });
    if (D['dietary'] === 'Other' && (!D['dietary-other'] || !D['dietary-other'].trim()))
      errors.push({ id: 'dietary-other', msg: 'Dietary restrictions – Describe the dietary restriction' });
  }

  if (pageId === 'guardian-name') {
    if (!D['guardian-fullname'] || !D['guardian-fullname'].trim()) errors.push({ id: 'guardian-fullname', msg: 'Enter your full name' });
    if (!D['guardian-relationship']) errors.push({ id: 'guardian-relationship', msg: 'Select your relationship to the camper' });
    if (D['guardian-relationship'] === 'Other' && (!D['guardian-relationship-other'] || !D['guardian-relationship-other'].trim()))
      errors.push({ id: 'guardian-relationship-other', msg: 'Describe your relationship to the camper' });
    if (!D['guardian-is-emergency']) errors.push({ id: 'guardian-is-emergency-yes', msg: 'Select yes or no: are you the emergency contact?' });
  }

  if (pageId === 'guardian-contact') {
    if (!D['address-line1'] || !D['address-line1'].trim()) errors.push({ id: 'address-line1', msg: 'Enter your address' });
    if (!D['address-parish'])  errors.push({ id: 'address-parish', msg: 'Select your parish' });
    reqPhone('phone-cell', 'Mobile number', true, 'Enter a mobile number');
    reqPhone('phone-home', 'Home phone number', false);
    reqPhone('phone-work', 'Work phone number', false);
    reqEmail('contact-email', 'Email address', true, 'Enter your email address');
    /* Employer is optional. */
  }

  if (pageId === 'emergency-contact') {
    if (!D['emerg-fullname'] || !D['emerg-fullname'].trim()) errors.push({ id: 'emerg-fullname', msg: 'Enter the emergency contact\'s full name' });
    if (!D['emerg-relationship']) errors.push({ id: 'emerg-relationship', msg: 'Select the emergency contact\'s relationship to the camper' });
    if (D['emerg-relationship'] === 'Other' && (!D['emerg-relationship-other'] || !D['emerg-relationship-other'].trim()))
      errors.push({ id: 'emerg-relationship-other', msg: 'Describe their relationship to the camper' });
    reqPhone('emerg-phone', 'Emergency phone number', true, 'Enter an emergency phone number');
  }

  if (pageId === 'conduct') {
    const items = [
      { id: 'conduct-1', label: 'treat everyone with respect' },
      { id: 'conduct-2', label: 'understand harassment is not allowed' },
      { id: 'conduct-3', label: 'treat camp facilities with respect' },
      { id: 'conduct-4', label: 'not use offensive language' },
      { id: 'conduct-5', label: 'not take part in risky activities' },
      { id: 'conduct-6', label: 'follow camp rules and staff directions' }
    ];
    items.forEach(item => {
      if (!D[item.id]) errors.push({ id: item.id, msg: 'Tick the box to agree: ' + item.label });
    });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  getFlow: function() {
    if (GovBB.D['guardian-is-emergency'] === 'Yes') {
      return FLOW.filter(p => p !== 'emergency-contact');
    }
    return FLOW;
  },
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    if (name === 'guardian-is-emergency' || name === 'has-activity-exemptions') GovBB.render();
  }
});
</script>
</body>
</html>

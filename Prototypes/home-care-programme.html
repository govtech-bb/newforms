<script src="../assets/govbb-framework.js"></script>
<script>
/* ───────── Form configuration ───────── */
const FORM_NAME = 'Home Care Programme Application';

const FLOW = [
  'start',
  'applicant-details',
  'applicant-contact',
  'health-status',
  'care-needs',
  'household',
  'physician',
  'emergency-contact',
  'declaration',
  'check',
  'confirmation'
];

/* ───────── Emergency contact relationships ───────── */
const EMERG_RELATIONSHIPS = [
  'Mother', 'Father', 'Spouse', 'Partner', 'Son', 'Daughter',
  'Sibling', 'Aunt', 'Uncle', 'Friend', 'Social worker', 'Other'
];

/* ───────── Custom styled select (matches design system) ───────── */
function styledSelect(id, label, options, opts) {
  opts = opts || {};
  const val = GovBB.D[id] || '';
  const hint = opts.hint
    ? `<p class="text-[1.25rem] leading-normal text-bb-mid-grey-00">${opts.hint}</p>`
    : '';
  const triggerAttr = opts.triggerRender ? ' data-trigger-render="1"' : '';
  const placeholder = opts.placeholder || 'Select one';
  let ops = `<option value="">${placeholder}</option>`;
  options.forEach(o => {
    const v = typeof o === 'object' ? o.value : o;
    const l = typeof o === 'object' ? o.label : o;
    ops += `<option value="${v}"${val === v ? ' selected' : ''}>${l}</option>`;
  });
  return `
    <div class="field-group flex flex-col gap-xs w-full items-start">
      <label for="${id}" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">${label}</label>
      ${hint}
      <div class="relative flex w-full rounded-sm border-2 border-bb-black-00 bg-bb-white-00 overflow-hidden hover:shadow-form-hover focus-within:ring-4 focus-within:ring-bb-teal-100">
        <select id="${id}" name="${id}" data-field="${id}"${triggerAttr}
          class="w-full min-w-0 p-s outline-none bg-transparent appearance-none cursor-pointer text-[1.25rem] leading-normal">
          ${ops}
        </select>
        <div class="flex items-center justify-center w-14 shrink-0 bg-[#f0f0f0] border-l-2 border-bb-black-00 pointer-events-none" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>
    </div>`;
}

/* ───────── Helpers ───────── */
const PREV_BTN_CLS = 'relative inline-flex items-center justify-center gap-2 text-[20px] whitespace-nowrap transition-[background-color,box-shadow] duration-200 outline-none bg-bb-grey-00 text-bb-black-00 hover:bg-[#c8cdd4] active:bg-[#b0b5bc] px-xm py-s rounded-sm leading-[1.7] focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-offset-1 focus-visible:ring-bb-teal-100 focus-visible:rounded-sm';

function btnGroup(continueLabel) {
  return `<div class="mt-8 flex gap-4 items-center flex-wrap">
    <button type="button" onclick="back()" class="${PREV_BTN_CLS}">Previous</button>
    <button type="button" onclick="next()" class="${GovBB.BTN_CLS}">${continueLabel || 'Continue'}</button>
  </div>`;
}

function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function careSummary() {
  const types = [
    ['care-personal',      'Personal care'],
    ['care-mobility',      'Mobility assistance'],
    ['care-meals',         'Meal preparation and feeding'],
    ['care-housekeeping',  'Housekeeping'],
    ['care-medication',    'Medication reminders and administration'],
    ['care-nursing',       'Nursing care'],
    ['care-transport',     'Transport to medical appointments'],
    ['care-companionship', 'Companionship and social support']
  ];
  const selected = types.filter(t => GovBB.D[t[0]]).map(t => t[1]);
  return selected.length ? selected.join(', ') : '';
}

function declarationAllChecked() {
  return GovBB.D['decl-accurate'] && GovBB.D['decl-consent'] && GovBB.D['decl-changes'];
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div class="space-y-6">
      <p class="border-bb-blue-40 border-l-4 py-xs pl-s text-bb-mid-grey-00">Ministry of People Empowerment and Elder Affairs</p>
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Home Care Programme</h1>
      <hr class="border-bb-grey-00">

      <p class="text-[1.25rem] leading-normal">Apply for home care assistance if you or someone you care for needs support at home due to age, illness, or disability.</p>
      <p class="text-[1.25rem] leading-normal">Most people finish this form in about <strong>15 minutes</strong>.</p>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">What you'll need</h2>
        <ul class="list-disc pl-6 space-y-2 text-[1.25rem] leading-normal">
          <li>NRN (National Registration Number), for example 110915-0048</li>
          <li>Details of your medical conditions and care needs</li>
          <li>Doctor or polyclinic name</li>
          <li>Emergency contact details</li>
        </ul>
      </div>

      <div class="space-y-3">
        <h2 class="font-bold text-[1.5rem]">Contact us</h2>
        <p class="text-[1.25rem] leading-normal">Call <strong>+1 (246) 467-4900</strong> if you need help completing this form.</p>
      </div>

      ${GovBB.startBtn('Start application')}
    </div>`,

  /* ── About the applicant ── */
  'applicant-details': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">About the applicant</h1>
      <div class="space-y-8">
        ${GovBB.textField('applicant-fullname', 'Full name')}
        ${GovBB.dateField('dob', 'Date of birth')}
        ${GovBB.textField('nrn', 'National Registration Number (NRN)', {
          hint: 'Your 11-digit National Registration Number, for example 110915-0048.',
          placeholder: '110915-0048'
        })}
        ${styledSelect('gender', 'Gender', ['Male', 'Female', 'Prefer not to say'], {
          placeholder: 'Select one'
        })}
        ${styledSelect('marital-status', 'Marital status', ['Single', 'Married', 'Common-law', 'Widowed', 'Divorced', 'Separated'], {
          placeholder: 'Select one'
        })}
        ${GovBB.continueBtn()}
      </div>
    </form>`,

  /* ── Contact details ── */
  'applicant-contact': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Contact details</h1>
      <div class="space-y-8">

        <div class="space-y-6">
          <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-s">Address</h2>
          ${GovBB.textField('address-line1', 'Address line 1')}
          ${GovBB.textField('address-line2', 'Address line 2 (optional)')}
          ${styledSelect('address-parish', 'Parish', GovBB.PARISHES, { placeholder: 'Select a parish' })}
          ${GovBB.textField('address-postal', 'Postal code (optional)', {
            hint: 'For example, BB11000.',
            placeholder: 'BB11000'
          })}
        </div>

        <div class="space-y-6">
          <h2 class="font-bold text-[1.5rem] border-b border-bb-grey-00 pb-s">Contact</h2>
          ${GovBB.telField('phone-cell', 'Mobile number', {
            hint: 'For example, 246 249-1234.',
            placeholder: '246 249-1234'
          })}
          ${GovBB.telField('phone-home', 'Home phone (optional)', {
            placeholder: '246 249-1234'
          })}
          ${GovBB.emailField('email', 'Email address (optional)')}
        </div>

        ${btnGroup()}
      </div>
    </form>`,

  /* ── Health and mobility ── */
  'health-status': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your health and mobility</h1>
      <div class="space-y-8">

        ${GovBB.radioGroup('mobility', 'How would you describe your mobility?', [
          'Fully mobile',
          'Mobile with aid (e.g. walking stick, walker)',
          'Wheelchair user',
          'Bedbound'
        ])}

        <div class="space-y-4">
          ${GovBB.radioGroup('chronic-conditions', 'Do you have any chronic or long-term health conditions?', ['Yes', 'No'], {
            hint: 'e.g. diabetes, hypertension, heart disease, COPD'
          })}
          <div data-show-when-name="chronic-conditions" data-show-when-value="Yes" style="display:${GovBB.D['chronic-conditions'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('chronic-conditions-details', 'Please describe your conditions', { rows: 3 })}
          </div>
        </div>

        <div class="space-y-4">
          ${GovBB.radioGroup('medications', 'Are you currently on any prescribed medications?', ['Yes', 'No'])}
          <div data-show-when-name="medications" data-show-when-value="Yes" style="display:${GovBB.D['medications'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('medications-details', 'What medications are you taking?', { rows: 3 })}
          </div>
        </div>

        <div class="space-y-4">
          ${GovBB.radioGroup('cognitive', 'Do you have any cognitive or memory difficulties?', ['Yes', 'No'], {
            hint: 'e.g. dementia, Alzheimer\'s'
          })}
          <div data-show-when-name="cognitive" data-show-when-value="Yes" style="display:${GovBB.D['cognitive'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('cognitive-details', 'Please describe the difficulties', { rows: 3 })}
          </div>
        </div>

        <div class="space-y-4">
          ${GovBB.radioGroup('mental-health', 'Do you have any mental health conditions?', ['Yes', 'No'])}
          <div data-show-when-name="mental-health" data-show-when-value="Yes" style="display:${GovBB.D['mental-health'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('mental-health-details', 'Please describe your mental health conditions', { rows: 3 })}
          </div>
        </div>

        <div class="space-y-4">
          ${GovBB.radioGroup('disability', 'Do you have a disability?', ['Yes', 'No'])}
          <div data-show-when-name="disability" data-show-when-value="Yes" style="display:${GovBB.D['disability'] === 'Yes' ? '' : 'none'}; padding-left: 1rem; border-left: 4px solid var(--color-blue-40);">
            ${GovBB.textareaField('disability-details', 'Please describe the disability', { rows: 3 })}
          </div>
        </div>

        ${btnGroup()}
      </div>
    </form>`,

  /* ── Care needs ── */
  'care-needs': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-4">What kind of help do you need?</h1>
      <p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mb-8">Select all the types of assistance you are applying for.</p>
      <div class="space-y-8">

        <div class="space-y-4">
          ${GovBB.checkboxItem('care-personal',      'Personal care &mdash; bathing, dressing, grooming')}
          ${GovBB.checkboxItem('care-mobility',      'Mobility assistance &mdash; help moving around the home')}
          ${GovBB.checkboxItem('care-meals',         'Meal preparation and feeding')}
          ${GovBB.checkboxItem('care-housekeeping',  'Housekeeping &mdash; cleaning, laundry')}
          ${GovBB.checkboxItem('care-medication',    'Medication reminders and administration')}
          ${GovBB.checkboxItem('care-nursing',       'Nursing care &mdash; wound dressing, catheter care, injections')}
          ${GovBB.checkboxItem('care-transport',     'Transport to medical appointments')}
          ${GovBB.checkboxItem('care-companionship', 'Companionship and social support')}
        </div>

        ${GovBB.radioGroup('care-frequency', 'How often do you need assistance?', [
          'Daily',
          'Several times a week',
          'Once a week',
          'Occasionally'
        ])}

        ${GovBB.textareaField('care-other', 'Is there anything else you need help with? (optional)', { rows: 3 })}

        ${btnGroup()}
      </div>
    </form>`,

  /* ── Living situation ── */
  'household': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your living situation</h1>
      <div class="space-y-8">

          ${GovBB.radioGroup('lives-alone', 'Do you live alone?', ['Yes', 'No'])}

              hint: 'For example: spouse, adult child, carer.'

        <div class="space-y-4">
          ${GovBB.radioGroup('has-carer', 'Do you currently have someone who helps care for you at home?', ['Yes', 'No'])}

        ${btnGroup()}
      </div>

  /* ── Doctor or polyclinic ── */

      ${GovBB.caption()}

        ${GovBB.textField('gp-address', 'Address or location (optional)')}

          placeholder: '246 249-1234'
        })}
        ${GovBB.telField('emerg-phone-alt', 'Alternative phone number (optional)', {
          placeholder: '246 249-1234'
        })}
        ${btnGroup()}
      </div>
    </form>`,

  /* ── Declaration ── */
  'declaration': () => `
    <form novalidate>
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Declaration</h1>
      <p class="text-[1.25rem] leading-normal mb-8">By submitting this form, you confirm that the information provided is true and accurate to the best of your knowledge. You understand that false information may result in the withdrawal of services.</p>
      <div class="space-y-6 mb-8">
        ${GovBB.checkboxItem('decl-accurate', 'I confirm the information I have given is accurate.')}
        ${GovBB.checkboxItem('decl-consent',  'I consent to my information being used to assess my application and arrange care services.')}
        ${GovBB.checkboxItem('decl-changes',  'I will inform the programme if my circumstances change.')}
      </div>
      ${btnGroup('Submit application')}
    </form>`,

  /* ── Check your answers ── */
  'check': () => `
    <div>
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers</h1>

      <div class="space-y-10">

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">About the applicant</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Full name', GovBB.D['applicant-fullname'] || '', 'applicant-details')}
            ${GovBB.summaryRow('Date of birth', fmtDate('dob'), 'applicant-details')}
            ${GovBB.summaryRow('NRN', GovBB.D['nrn'] || '', 'applicant-details')}
            ${GovBB.summaryRow('Gender', GovBB.D['gender'] || '', 'applicant-details')}
            ${GovBB.summaryRow('Marital status', GovBB.D['marital-status'] || '', 'applicant-details')}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Contact details</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Address', [GovBB.D['address-line1'], GovBB.D['address-line2'], GovBB.D['address-parish'], GovBB.D['address-postal']].filter(Boolean).join(', ') || '', 'applicant-contact')}
            ${GovBB.summaryRow('Mobile', GovBB.D['phone-cell'] || '', 'applicant-contact')}
            ${GovBB.summaryRow('Home phone', GovBB.D['phone-home'] || '', 'applicant-contact')}
            ${GovBB.summaryRow('Email', GovBB.D['email'] || '', 'applicant-contact')}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Health and mobility</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Mobility', GovBB.D['mobility'] || '', 'health-status')}
            ${GovBB.summaryRow('Chronic conditions?', GovBB.D['chronic-conditions'] || '', 'health-status')}
            ${GovBB.D['chronic-conditions'] === 'Yes' ? GovBB.summaryRow('Condition details', GovBB.D['chronic-conditions-details'] || '', 'health-status') : ''}
            ${GovBB.summaryRow('On medications?', GovBB.D['medications'] || '', 'health-status')}
            ${GovBB.D['medications'] === 'Yes' ? GovBB.summaryRow('Medication details', GovBB.D['medications-details'] || '', 'health-status') : ''}
            ${GovBB.summaryRow('Cognitive difficulties?', GovBB.D['cognitive'] || '', 'health-status')}
            ${GovBB.D['cognitive'] === 'Yes' ? GovBB.summaryRow('Cognitive details', GovBB.D['cognitive-details'] || '', 'health-status') : ''}
            ${GovBB.summaryRow('Mental health conditions?', GovBB.D['mental-health'] || '', 'health-status')}
            ${GovBB.D['mental-health'] === 'Yes' ? GovBB.summaryRow('Mental health details', GovBB.D['mental-health-details'] || '', 'health-status') : ''}
            ${GovBB.summaryRow('Has disability?', GovBB.D['disability'] || '', 'health-status')}
            ${GovBB.D['disability'] === 'Yes' ? GovBB.summaryRow('Disability details', GovBB.D['disability-details'] || '', 'health-status') : ''}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Care needs</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Types of care needed', careSummary(), 'care-needs')}
            ${GovBB.summaryRow('Frequency needed', GovBB.D['care-frequency'] || '', 'care-needs')}
            ${GovBB.D['care-other'] ? GovBB.summaryRow('Other needs', GovBB.D['care-other'] || '', 'care-needs') : ''}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Living situation</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Lives alone?', GovBB.D['lives-alone'] || '', 'household')}
            ${GovBB.D['lives-alone'] === 'No' ? GovBB.summaryRow('Other household members', GovBB.D['household-members'] || '', 'household') : ''}
            ${GovBB.summaryRow('Has carer at home?', GovBB.D['has-carer'] || '', 'household')}
            ${GovBB.D['has-carer'] === 'Yes' ? GovBB.summaryRow('Carer name', GovBB.D['carer-name'] || '', 'household') : ''}
            ${GovBB.D['has-carer'] === 'Yes' ? GovBB.summaryRow('Carer phone', GovBB.D['carer-phone'] || '', 'household') : ''}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Doctor or polyclinic</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Doctor or polyclinic', GovBB.D['gp-name'] || '', 'physician')}
            ${GovBB.D['gp-address'] ? GovBB.summaryRow('Address', GovBB.D['gp-address'] || '', 'physician') : ''}
            ${GovBB.D['gp-phone'] ? GovBB.summaryRow('Phone', GovBB.D['gp-phone'] || '', 'physician') : ''}
            ${GovBB.summaryRow('Referred by health professional?', GovBB.D['gp-referred'] || '', 'physician')}
          </dl>
        </div>

        <div>
          <h2 class="font-bold text-[1.5rem] mb-4">Emergency contact</h2>
          <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
            ${GovBB.summaryRow('Full name', GovBB.D['emerg-fullname'] || '', 'emergency-contact')}
            ${GovBB.summaryRow('Relationship', GovBB.D['emerg-relationship'] === 'Other' ? (GovBB.D['emerg-relationship-other'] || 'Other') : (GovBB.D['emerg-relationship'] || ''), 'emergency-contact')}
            ${GovBB.summaryRow('Phone', GovBB.D['emerg-phone'] || '', 'emergency-contact')}
            ${GovBB.D['emerg-phone-alt'] ? GovBB.summaryRow('Alternative phone', GovBB.D['emerg-phone-alt'] || '', 'emergency-contact') : ''}
          </dl>
        </div>

      </div>

      <div class="mt-10">
        <p class="text-[1.25rem] leading-normal mb-6">By submitting this application you confirm that the information you have given is correct and that you agree to the declaration.</p>
        ${btnGroup('Submit application')}
      </div>
    </div>`,

  /* ── Confirmation ── */
  'confirmation': () => {
    const ref = window.__refNumber || ('HCP-' + Math.random().toString(36).substring(2,8).toUpperCase());
    window.__refNumber = ref;
    return `
    <div class="space-y-8">
      <div class="bg-bb-teal-00 text-bb-white-00 p-8 rounded-sm space-y-4">
        <h1 class="font-bold text-[3.5rem] leading-[1.15]">Application submitted</h1>
        <p class="text-[1.25rem]">Your reference number</p>
        <p class="text-[2rem] font-bold">${ref}</p>
      </div>

      <h2 class="font-bold text-[1.5rem]">What happens next</h2>
      <ul class="list-disc pl-6 space-y-3 text-[1.25rem] leading-normal">
        <li>We will contact you within <strong>10 working days</strong> to arrange an assessment visit.</li>
        <li>Keep your reference number safe. You may need it if you contact us about your application.</li>
        <li>If your circumstances change urgently, call <strong>+1 (246) 467-4900</strong> as soon as possible.</li>
      </ul>

      <div class="mt-6">
        <button type="button" onclick="window.print()" class="${GovBB.BTN_CLS}">Print or save this page</button>
      </div>
    </div>`;
  }

};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'applicant-details') {
    if (!D['applicant-fullname'] || !D['applicant-fullname'].trim())
      errors.push({ id: 'applicant-fullname', msg: 'Enter the applicant\'s full name' });
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) {
      errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a complete date of birth' });
    } else {
      const day = parseInt(D['dob-day'], 10);
      const month = parseInt(D['dob-month'], 10);
      const year = parseInt(D['dob-year'], 10);
      const parsed = new Date(year, month - 1, day);
      if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – Enter a real date, for example 15 06 1950' });
      } else if (parsed >= new Date()) {
        errors.push({ id: 'dob-day', msg: 'Date of birth – The date of birth must be in the past' });
      }
    }
    if (!D['nrn'] || !D['nrn'].trim())
      errors.push({ id: 'nrn', msg: 'Enter your National Registration Number' });
    if (!D['gender'])
      errors.push({ id: 'gender', msg: 'Select a gender' });
    if (!D['marital-status'])
      errors.push({ id: 'marital-status', msg: 'Select a marital status' });
  }

  if (pageId === 'applicant-contact') {
    if (!D['address-line1'] || !D['address-line1'].trim())
      errors.push({ id: 'address-line1', msg: 'Enter your address' });
    if (!D['address-parish'])
      errors.push({ id: 'address-parish', msg: 'Select your parish' });
    if (!D['phone-cell'] || !D['phone-cell'].trim())
      errors.push({ id: 'phone-cell', msg: 'Enter a mobile number' });
  }

  if (pageId === 'health-status') {
    if (!D['mobility'])
      errors.push({ id: 'mobility', msg: 'Select your level of mobility' });
    if (!D['chronic-conditions'])
      errors.push({ id: 'chronic-conditions', msg: 'Select yes or no – Do you have any chronic or long-term health conditions?' });
    if (D['chronic-conditions'] === 'Yes' && (!D['chronic-conditions-details'] || !D['chronic-conditions-details'].trim()))
      errors.push({ id: 'chronic-conditions-details', msg: 'Conditions – Describe your chronic or long-term conditions' });
    if (!D['medications'])
      errors.push({ id: 'medications', msg: 'Select yes or no – Are you currently on any prescribed medications?' });
    if (D['medications'] === 'Yes' && (!D['medications-details'] || !D['medications-details'].trim()))
      errors.push({ id: 'medications-details', msg: 'Medications – Enter your medications' });
    if (!D['cognitive'])
      errors.push({ id: 'cognitive', msg: 'Select yes or no – Do you have any cognitive or memory difficulties?' });
    if (D['cognitive'] === 'Yes' && (!D['cognitive-details'] || !D['cognitive-details'].trim()))
      errors.push({ id: 'cognitive-details', msg: 'Cognitive difficulties – Describe the difficulties' });
    if (!D['mental-health'])
      errors.push({ id: 'mental-health', msg: 'Select yes or no – Do you have any mental health conditions?' });
    if (D['mental-health'] === 'Yes' && (!D['mental-health-details'] || !D['mental-health-details'].trim()))
      errors.push({ id: 'mental-health-details', msg: 'Mental health – Describe your mental health conditions' });
    if (!D['disability'])
      errors.push({ id: 'disability', msg: 'Select yes or no – Do you have a disability?' });
    if (D['disability'] === 'Yes' && (!D['disability-details'] || !D['disability-details'].trim()))
      errors.push({ id: 'disability-details', msg: 'Disability – Describe the disability' });
  }

  if (pageId === 'care-needs') {
    const anycare = D['care-personal'] || D['care-mobility'] || D['care-meals'] ||
                    D['care-housekeeping'] || D['care-medication'] || D['care-nursing'] ||
                    D['care-transport'] || D['care-companionship'];
    if (!anycare)
      errors.push({ id: 'care-personal', msg: 'Select at least one type of care you need' });
    if (!D['care-frequency'])
      errors.push({ id: 'care-frequency', msg: 'Select how often you need assistance' });
  }

  if (pageId === 'household') {
    if (!D['lives-alone'])
      errors.push({ id: 'lives-alone', msg: 'Select yes or no – Do you live alone?' });
    if (D['lives-alone'] === 'No' && (!D['household-members'] || !D['household-members'].trim()))
      errors.push({ id: 'household-members', msg: 'Tell us who else lives with you' });
    if (!D['has-carer'])
      errors.push({ id: 'has-carer', msg: 'Select yes or no – Do you have a carer at home?' });
    if (D['has-carer'] === 'Yes' && (!D['carer-name'] || !D['carer-name'].trim()))
      errors.push({ id: 'carer-name', msg: 'Enter the carer\'s full name' });
    if (D['has-carer'] === 'Yes' && (!D['carer-phone'] || !D['carer-phone'].trim()))
      errors.push({ id: 'carer-phone', msg: 'Enter the carer\'s phone number' });
  }

  if (pageId === 'physician') {
    if (!D['gp-name'] || !D['gp-name'].trim())
      errors.push({ id: 'gp-name', msg: 'Enter your doctor or polyclinic name' });
    if (!D['gp-referred'])
      errors.push({ id: 'gp-referred', msg: 'Select yes or no – Were you referred by a health professional?' });
  }

  if (pageId === 'emergency-contact') {
    if (!D['emerg-fullname'] || !D['emerg-fullname'].trim())
      errors.push({ id: 'emerg-fullname', msg: 'Enter the emergency contact\'s full name' });
    if (!D['emerg-relationship'])
      errors.push({ id: 'emerg-relationship', msg: 'Select the emergency contact\'s relationship to the applicant' });
    if (D['emerg-relationship'] === 'Other' && (!D['emerg-relationship-other'] || !D['emerg-relationship-other'].trim()))
      errors.push({ id: 'emerg-relationship-other', msg: 'Describe the relationship to the applicant' });
    if (!D['emerg-phone'] || !D['emerg-phone'].trim())
      errors.push({ id: 'emerg-phone', msg: 'Enter an emergency phone number' });
  }

  if (pageId === 'declaration') {
    if (!declarationAllChecked())
      errors.push({ id: 'decl-accurate', msg: 'You must agree to all three items in the declaration before submitting' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate
});
</script>

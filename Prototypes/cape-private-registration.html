<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register as a CAPE private candidate – Ministry of Educational Transformation</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>
<body class="govbb-page">
<div class="govbb-official-banner"><div class="govbb-container govbb-official-banner__inner"><div class="govbb-official-banner__crest"><img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" /></div><div class="govbb-official-banner__text"><span>Official government website</span></div></div></div>
<header class="govbb-header"><div class="govbb-container govbb-header__inner"><a href="/" aria-label="Go to the alpha.gov.bb homepage"><img class="govbb-header__logo" src="../dist/assets/images/govbb-logo.svg" alt="GovBB" /></a></div></header>
<main class="govbb-page__main">
  <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-label="alpha status banner" aria-live="polite"><div class="govbb-container"><p>This page is in <a class="govbb-link govbb-link--secondary" href="#">Alpha</a>. Your feedback helps us improve.</p></div></div>
  <div class="govbb-container"><div id="app" style="padding-block: var(--spacing-l); max-width: 48rem;"></div></div>
</main>
<footer class="govbb-footer"><div class="govbb-container govbb-footer__inner"><nav class="govbb-footer__nav" aria-label="Footer"><a class="govbb-footer__link" href="#">Home</a><a class="govbb-footer__link" href="#">Privacy</a><a class="govbb-footer__link" href="#">Terms &amp; Conditions</a><a class="govbb-footer__link" href="#">Accessibility</a></nav><hr class="govbb-footer__divider" aria-hidden="true" /><div class="govbb-footer__end"><img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" /><p class="govbb-footer__copy">© 2025 Government of Barbados</p></div></div></footer>

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors=function(){var s=document.getElementById('error-summary');if(s)s.remove();document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});};
GovBB.showErrors=function(errors){GovBB.clearErrors();if(!errors||!errors.length)return;var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>';});html+='</ul></div>';var app=document.getElementById('app');var h1=app.querySelector('h1');if(h1)h1.insertAdjacentHTML('afterend',html);else app.insertAdjacentHTML('afterbegin',html);document.getElementById('error-summary').focus();errors.forEach(function(e){var el=document.getElementById(e.id);if(!el)return;var errId='err-'+e.id;el.setAttribute('aria-invalid','true');el.setAttribute('aria-describedby',errId);var msg=document.createElement('p');msg.className='govbb-error-message';msg.id=errId;msg.textContent=e.msg;var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;if(group)group.appendChild(msg);});if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;};
GovBB.summaryRow=function(label,value,changeTo){var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';};
</script>
<script>
function next(){GovBB.next();}function back(){GovBB.back();}function nav(p){GovBB.nav(p);}

const FORM_NAME='Register as a CAPE private candidate';
const CAPTION='Ministry of Educational Transformation';
const MAX_SUBJECTS=10;
const CAPE_SUBJECTS=['Accounting','Agricultural Science','Applied Mathematics','Biology','Caribbean Studies','Chemistry','Communication Studies','Computer Science','Economics','Environmental Science','French','Geography','History','Information Technology','Law','Literatures in English','Management of Business','Performing Arts','Physical Education and Sport','Physics','Pure Mathematics','Sociology','Spanish','Tourism','Visual Arts'];

const FLOW=['start','student-info','subject-count','subjects-data','declaration','check','confirmation'];

function caption(){return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+CAPTION+'</p>';}
function maskNid(nid){if(!nid)return '';var m=String(nid).trim().match(/^(\d{6})-(\d{4})$/);return m?'••••••-'+m[2]:String(nid).trim();}
function formatPhone(p){if(!p)return '';var digits=String(p).replace(/[^\d]/g,'');if(digits.length===10&&digits.indexOf('246')===0)return '(246) '+digits.substring(3,6)+' '+digits.substring(6);return String(p).trim();}
function fmtDate(prefix){const d=GovBB.D[prefix+'-day'],m=GovBB.D[prefix+'-month'],y=GovBB.D[prefix+'-year'];if(!d&&!m&&!y)return '';return [d,m,y].filter(Boolean).join(' / ');}
function parseDate(prefix){const d=parseInt(GovBB.D[prefix+'-day'],10),m=parseInt(GovBB.D[prefix+'-month'],10),y=parseInt(GovBB.D[prefix+'-year'],10);if(!d||!m||!y)return null;if(d<1||d>31||m<1||m>12||y<1990||y>2100)return false;const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return false;return dt;}
function countOf(key,max){const n=parseInt(GovBB.D[key],10);if(isNaN(n)||n<1)return 1;if(n>max)return max;return n;}
function subjectCount(){return countOf('subject-count',MAX_SUBJECTS);}
function dateField(prefix,legend,hint){return `<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">${legend}</legend>${hint?`<p class="govbb-hint">${hint}</p>`:''}<div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;"><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-day">Day</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-month">Month</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-year">Year</label><div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div></div></div></fieldset>`;}

const PAGES = {
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);"><ol class="govbb-breadcrumbs__list"><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li><li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Examinations</a></li></ol></nav>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">May/June sitting</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Register as a CAPE private candidate</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 29 May 2026</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Register for the May/June CAPE examination as a private candidate (not registered through a school).</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Register online. Takes about <strong>10 to 20 minutes</strong>.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start registration</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);"><strong>CXC charges a fee for each subject entry.</strong> A subject + unit combination counts as one entry. You will be told the total amount due — and how to pay — after you submit this registration. Fees are set by CXC and can be checked on the <a href="https://www.cxc.org" class="govbb-link" target="_blank" rel="noopener">CXC fees schedule</a>.</p>
        <p class="govbb-text-body" style="margin-bottom:0;"><strong>Registration deadlines are set by CXC each year</strong> — late registration is not accepted. Check the CXC website for this year's deadline before you start.</p>
      </div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Absolutely no alternative arrangements will be made for clashes.</strong> Check ALL timetables before registering so you do not have any subject clashes with other Examination Boards.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your full name, date of birth, sex, and National ID Number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your home address, telephone, and email address</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A list of subjects you want to register for, with the unit (1 or 2) for each</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If repeating a subject for which an SBA was required, your <strong>previous registration number</strong></li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">The CXC Local Registrar reviews your registration and confirms your candidate number and the fees due. You will then be told how to pay.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Closer to the exam date, the Registrar will send you your timetable and the address of the exam centre you have been assigned to.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start registration</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call the CXC Local Registrar on <strong>+1 (246) 535-0600</strong> or email <a href="mailto:cxc.local.registrar@mes.gov.bb" class="govbb-link">cxc.local.registrar@mes.gov.bb</a> if you need help.</p>
    </div>`,

  'student-info': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="first-name">First name</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="first-name" name="first-name" data-field="first-name" autocomplete="given-name" value="${GovBB.D['first-name']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="last-name">Last name</label><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="last-name" name="last-name" data-field="last-name" autocomplete="family-name" value="${GovBB.D['last-name']||''}" /></div></div>
      ${dateField('dob','Date of birth','For example, 15 6 2003.')}
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">Sex</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-xs);"><div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="gender-m" name="gender" data-field="gender" value="Male"${GovBB.D['gender']==='Male'?' checked':''} /><label class="govbb-radio-item__label" for="gender-m">Male</label></div><div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="gender-f" name="gender" data-field="gender" value="Female"${GovBB.D['gender']==='Female'?' checked':''} /><label class="govbb-radio-item__label" for="gender-f">Female</label></div></div></fieldset>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="nid">National ID Number</label><p class="govbb-hint">For example, 030615-0048.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="nid" name="nid" data-field="nid" value="${GovBB.D['nid']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="address">Home address</label><textarea class="govbb-textarea" id="address" name="address" data-field="address" rows="3">${GovBB.D['address']||''}</textarea></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="telephone">Telephone number</label><p class="govbb-hint">For example, (246) 249 1234.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="tel" id="telephone" name="telephone" data-field="telephone" inputmode="tel" value="${GovBB.D['telephone']||''}" /></div></div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="email">Email address</label><div class="govbb-input-wrapper"><input class="govbb-input" type="email" id="email" name="email" data-field="email" inputmode="email" value="${GovBB.D['email']||''}" /></div></div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'subject-count': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">How many subjects?</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">A subject + unit combination counts as one entry. If you are taking both Unit 1 and Unit 2 of Pure Mathematics, that's 2 entries.</p>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">Number of entries (up to ${MAX_SUBJECTS})</legend><div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
        ${Array.from({length:MAX_SUBJECTS},(_,i)=>i+1).map(n=>`<div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="subject-count-${n}" name="subject-count" data-field="subject-count" value="${n}"${String(GovBB.D['subject-count'])===String(n)?' checked':''} /><label class="govbb-radio-item__label" for="subject-count-${n}">${n}</label></div>`).join('')}
      </div></fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`,

  'subjects-data': () => {
    const count = subjectCount();
    for (let i = count + 1; i <= MAX_SUBJECTS; i++) {
      ['name','unit','alternative','resit','prev-reg'].forEach(f=>delete GovBB.D['subj-'+i+'-'+f]);
    }
    let sections = '';
    for (let i = 1; i <= count; i++) {
      const isResit = GovBB.D['subj-'+i+'-resit'];
      sections += `
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-l);border-top:2px solid var(--color-grey-00);padding-top:var(--spacing-m);">
        <legend class="govbb-fieldset__legend govbb-text-h2" style="padding:0 var(--spacing-s);">Entry ${i}</legend>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="subj-${i}-name">Subject</label>
          <div class="govbb-select-wrapper">
            <select class="govbb-select" id="subj-${i}-name" name="subj-${i}-name" data-field="subj-${i}-name">
              <option value="">Select a subject</option>
              ${CAPE_SUBJECTS.map(s=>`<option value="${s}"${GovBB.D['subj-'+i+'-name']===s?' selected':''}>${s}</option>`).join('')}
            </select>
            <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
          </div>
        </div>
        <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
          <legend class="govbb-fieldset__legend">Unit</legend>
          <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
            <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="subj-${i}-unit-1" name="subj-${i}-unit" data-field="subj-${i}-unit" value="Unit 1"${GovBB.D['subj-'+i+'-unit']==='Unit 1'?' checked':''} /><label class="govbb-radio-item__label" for="subj-${i}-unit-1">Unit 1</label></div>
            <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="subj-${i}-unit-2" name="subj-${i}-unit" data-field="subj-${i}-unit" value="Unit 2"${GovBB.D['subj-'+i+'-unit']==='Unit 2'?' checked':''} /><label class="govbb-radio-item__label" for="subj-${i}-unit-2">Unit 2</label></div>
          </div>
        </fieldset>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="subj-${i}-alternative" name="subj-${i}-alternative" data-field="subj-${i}-alternative"${GovBB.D['subj-'+i+'-alternative']?' checked':''} /><label class="govbb-checkbox-item__label" for="subj-${i}-alternative">Alternative paper</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-m);"><input class="govbb-checkbox" type="checkbox" id="subj-${i}-resit" name="subj-${i}-resit" data-field="subj-${i}-resit"${GovBB.D['subj-'+i+'-resit']?' checked':''} data-trigger-render="1" /><label class="govbb-checkbox-item__label" for="subj-${i}-resit">Resit (I have sat this unit before)</label></div>
        ${isResit?`
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);">
          <label class="govbb-label" for="subj-${i}-prev-reg">Previous registration number</label>
          <p class="govbb-hint">Required if SBA was involved.</p>
          <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="subj-${i}-prev-reg" name="subj-${i}-prev-reg" data-field="subj-${i}-prev-reg" value="${GovBB.D['subj-'+i+'-prev-reg']||''}" /></div>
        </div>`:''}
      </fieldset>`;
    }
    return `<form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">${count===1?'About the entry':'About your entries'}</h1>
      ${sections}
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue</button></div>
    </form>`;
  },

  'declaration': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-visually-hidden">Declaration</legend>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-accurate" name="decl-accurate" data-field="decl-accurate"${GovBB.D['decl-accurate']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-accurate">The information I have given is true and correct.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-timetables" name="decl-timetables" data-field="decl-timetables"${GovBB.D['decl-timetables']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-timetables">I have checked ALL timetables and confirmed there are no clashes.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-name-change" name="decl-name-change" data-field="decl-name-change"${GovBB.D['decl-name-change']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-name-change">I will inform the CXC Local Registrar of any name changes.</label></div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Continue to review</button></div>
    </form>`,

  'check': () => {
    const count = subjectCount();
    let subjectRows = '';
    for (let i = 1; i <= count; i++) {
      var flags = [];
      if (GovBB.D['subj-'+i+'-alternative']) flags.push('Alternative');
      if (GovBB.D['subj-'+i+'-resit']) flags.push('Resit');
      var v = (GovBB.D['subj-'+i+'-name'] || '') + (GovBB.D['subj-'+i+'-unit'] ? ' — ' + GovBB.D['subj-'+i+'-unit'] : '');
      if (flags.length) v += ' (' + flags.join(', ') + ')';
      subjectRows += GovBB.summaryRow('Entry ' + i, v, 'subjects-data');
      if (GovBB.D['subj-'+i+'-resit']) {
        subjectRows += GovBB.summaryRow('Entry ' + i + ' — previous reg.', GovBB.D['subj-'+i+'-prev-reg'] || 'Not provided', 'subjects-data');
      }
    }
    return `<div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before submitting</h1>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About you</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Name', [GovBB.D['first-name'],GovBB.D['last-name']].filter(Boolean).join(' '), 'student-info')}
        ${GovBB.summaryRow('Date of birth', fmtDate('dob'), 'student-info')}
        ${GovBB.summaryRow('Sex', GovBB.D['gender'], 'student-info')}
        ${GovBB.summaryRow('National ID', maskNid(GovBB.D['nid']), 'student-info')}
        ${GovBB.summaryRow('Address', GovBB.D['address'], 'student-info')}
        ${GovBB.summaryRow('Telephone', formatPhone(GovBB.D['telephone']), 'student-info')}
        ${GovBB.summaryRow('Email', GovBB.D['email'], 'student-info')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Entries (${count})</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">${subjectRows}</dl>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);"><button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button><button type="button" class="govbb-btn" onclick="next()">Submit registration</button></div>
    </div>`;
  },

  'confirmation': () => {
    window.__refNumber=window.__refNumber||('CAPE-'+Math.random().toString(36).substring(2,8).toUpperCase());
    if(document.title.indexOf('Error: ')===0)document.title=document.title.substring('Error: '.length);
    const count = subjectCount();
    return `<div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Registration submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${window.__refNumber}</p>
      </div>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">You have registered for <strong>${count} ${count===1?'entry':'entries'}</strong>.</p>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The CXC Local Registrar will confirm your candidate number.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Inform the Registrar of any name changes.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">We'll email a copy of your registration to ${GovBB.D['email']||'the address you provided'}.</li>
      </ul>
    </div>`;
  }
};

function validate(pageId){
  const D=GovBB.D,errors=[];
  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/,NID_RE=/^\d{6}-\d{4}$/;
  function req(id,msg){if(!D[id]||String(D[id]).trim()==='')errors.push({id:id,msg:msg});}
  function reqNid(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!NID_RE.test(v))errors.push({id:id,msg:label+' must be in the format 110915-0048'});}
  function reqPhone(id,label,required,emptyMsg){var v=(D[id]||'').trim();if(!v){if(required)errors.push({id:id,msg:emptyMsg});return;}var digits=v.replace(/[\s\-()+]/g,'');if(!/^\d{7,15}$/.test(digits))errors.push({id:id,msg:label+' must contain 7 to 15 digits'});}
  function reqEmail(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!EMAIL_RE.test(v))errors.push({id:id,msg:label+' must be in the format you@example.com'});}
  function reqDate(prefix,label){const dayV=D[prefix+'-day'],monV=D[prefix+'-month'],yrV=D[prefix+'-year'];if(!dayV||!monV||!yrV){errors.push({id:prefix+'-day',msg:label+' — enter a complete date.'});return null;}const dt=parseDate(prefix);if(dt===false){errors.push({id:prefix+'-day',msg:label+' — enter a real date.'});return null;}return dt;}

  if(pageId==='student-info'){
    req('first-name','Enter your first name');req('last-name','Enter your last name');
    const dob=reqDate('dob','Date of birth');
    if(dob){const today=new Date();today.setHours(0,0,0,0);const age=today.getFullYear()-dob.getFullYear();if(dob>=today)errors.push({id:'dob-day',msg:'Date of birth must be in the past.'});else if(age<15||age>80)errors.push({id:'dob-day',msg:'Date of birth — CAPE candidates are usually 15 or older.'});}
    if(!D['gender'])errors.push({id:'gender-m',msg:'Select your sex'});
    reqNid('nid','National ID Number','Enter your National ID Number');
    req('address','Enter your home address');
    reqPhone('telephone','Telephone',true,'Enter a telephone number');
    reqEmail('email','Email address','Enter your email address');
  }
  if(pageId==='subject-count'){if(!D['subject-count'])errors.push({id:'subject-count-1',msg:'Choose how many entries'});}
  if(pageId==='subjects-data'){
    const seen={};
    for(let i=1;i<=subjectCount();i++){
      const s=D['subj-'+i+'-name'];
      const u=D['subj-'+i+'-unit'];
      if(!s)errors.push({id:'subj-'+i+'-name',msg:'Entry '+i+' — select a subject'});
      if(!u)errors.push({id:'subj-'+i+'-unit-1',msg:'Entry '+i+' — select a unit (Unit 1 or Unit 2)'});
      if(s&&u){
        const key=s+'|'+u;
        if(seen[key])errors.push({id:'subj-'+i+'-name',msg:'Entry '+i+' — same subject and unit as Entry '+seen[key]+'. Each entry must be a different subject + unit.'});
        else seen[key]=i;
      }
      if(D['subj-'+i+'-resit']&&(!D['subj-'+i+'-prev-reg']||!D['subj-'+i+'-prev-reg'].trim())){
        errors.push({id:'subj-'+i+'-prev-reg',msg:'Entry '+i+' — enter your previous registration number'});
      }
    }
  }
  if(pageId==='declaration'){
    if(!D['decl-accurate'])errors.push({id:'decl-accurate',msg:'Tick the box to confirm the information is true and correct'});
    if(!D['decl-timetables'])errors.push({id:'decl-timetables',msg:'Tick the box to confirm you have checked timetables for clashes'});
    if(!D['decl-name-change'])errors.push({id:'decl-name-change',msg:'Tick the box to confirm you will inform the Registrar of name changes'});
  }
  return errors;
}

GovBB.init({formName:FORM_NAME,flow:FLOW,pages:PAGES,validate:validate});
</script>
</body>
</html>

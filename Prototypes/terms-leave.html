<!DOCTYPE html>

<body class="govbb-page">

    </div>
  </div>
</footer>

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  var app = document.getElementById('app');
  var h1 = app.querySelector('h1');
  if (h1) { h1.insertAdjacentHTML('afterend', html); }
  else { app.insertAdjacentHTML('afterbegin', html); }
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
/* ───────── Global nav shortcuts ───────── */
function next() { GovBB.next(); }
function back() { GovBB.back(); }
function nav(p)  { GovBB.nav(p); }

/* ───────── Form configuration ───────── */
const FORM_NAME = 'Application for term\'s leave';
const CAPTION = 'Ministry of Educational Transformation';

/* ───────── Flow ───────── */
const FLOW = [
  'start',
  'applicant-details',
  'applicant-contact',
  'leave-details',
  'reason',
  'declaration',
  'check',
  'confirmation'
];

/* ───────── Helpers ───────── */
function caption() {
  return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">' + CAPTION + '</p>';
}

function applicantFullName() {
  return [GovBB.D['first-name'], GovBB.D['last-name']].filter(Boolean).join(' ');
}

function maskNid(nid) {
  if (!nid) return '';
  var v = String(nid).trim();
  /* Format NNNNNN-NNNN -> ••••••-NNNN, last 4 visible. */
  var m = v.match(/^(\d{6})-(\d{4})$/);
  if (m) return '••••••-' + m[2];
  return v;
}

function formatPhone(p) {
  if (!p) return '';
  var digits = String(p).replace(/[^\d]/g, '');
  /* Barbados format: (246) NNN NNNN (3+4 digits after the country/area code). */
  if (digits.length === 10 && digits.indexOf('246') === 0) {
    return '(246) ' + digits.substring(3, 6) + ' ' + digits.substring(6);
  }
  if (digits.length === 11 && digits.indexOf('1246') === 0) {
    return '+1 (246) ' + digits.substring(4, 7) + ' ' + digits.substring(7);
  }
  /* Fallback: just return the user's input as-is. */
  return String(p).trim();
}

function fmtDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function parseDate(prefix) {
  const d = parseInt(GovBB.D[prefix + '-day'], 10);
  const m = parseInt(GovBB.D[prefix + '-month'], 10);
  const y = parseInt(GovBB.D[prefix + '-year'], 10);
  if (!d || !m || !y) return null;
  if (d < 1 || d > 31 || m < 1 || m > 12 || y < 1990 || y > 2100) return false;
  const dt = new Date(y, m - 1, d);
  if (dt.getFullYear() !== y || dt.getMonth() !== m - 1 || dt.getDate() !== d) return false;
  return dt;
}

/* ───────── Date field renderer ───────── */
function dateField(prefix, legend, hint) {
  return `
    <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
      <legend class="govbb-fieldset__legend">${legend}</legend>
      <p class="govbb-hint">${hint}</p>
      <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
        <div class="govbb-date-input__part">
          <label class="govbb-date-input__label" for="${prefix}-day">Day</label>
          <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div>
        </div>
        <div class="govbb-date-input__part">
          <label class="govbb-date-input__label" for="${prefix}-month">Month</label>
          <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div>
        </div>
        <div class="govbb-date-input__part">
          <label class="govbb-date-input__label" for="${prefix}-year">Year</label>
          <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div>
        </div>
      </div>
    </fieldset>`;
}

/* ───────── Pages ───────── */
const PAGES = {

  /* ── Start ── */
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);">
        <ol class="govbb-breadcrumbs__list">
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li>
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Teachers and educators</a></li>
        </ol>
      </nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Apply for term's leave</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 16 April 2025</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">If you are a teacher at a public school in Barbados, use this form to apply for term's leave. Your Principal will review the application before it goes to the Ministry.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Apply online. Filling in the form takes about <strong>10 minutes</strong> once you have your information to hand — gather it first.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>This form is for term's leave only.</strong> If you need <strong>maternity</strong>, <strong>sick</strong>, or <strong>sabbatical</strong> leave, those are different processes — call the Ministry on +1 (246) 535-0700 to be directed to the right form.</p>
      </div>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Before you apply, read the <a href="#" class="govbb-link">Term's Leave Policy</a> for information on length of leave, salary, and what happens to your post while you are away. If you are not sure whether you qualify, call the Ministry on <strong>+1 (246) 535-0700</strong>.</p>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);"><strong>Note on dates:</strong> term's leave duration is calculated from your normal teaching days. Public holidays and school breaks within the leave period do not extend it.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your National ID Number, school name, and post (your job title — for example, "Assistant Teacher", "Head of Department")</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your contact details — phone and email</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The start and end dates of the leave you are requesting</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If you have been granted term's leave before — the dates of that previous leave</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A short reason for your application</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Your Principal will review your application and recommend it (or not) to the Ministry. The Ministry then makes the final decision. You will be contacted with the outcome within <strong>15 working days</strong>.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call the Ministry of Educational Transformation on <strong>+1 (246) 535-0700</strong> if you need help completing this form.</p>
    </div>`,

  /* ── Applicant details ── */
  'applicant-details': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="school">School</label>
        <p class="govbb-hint">The official name of the school where you currently teach. Type it in full — for example, "Combermere School", not "Combermere". We use this to route your application to the right Principal.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="school" name="school" data-field="school" value="${GovBB.D['school']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="first-name">First name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="first-name" name="first-name" data-field="first-name" autocomplete="given-name" value="${GovBB.D['first-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="last-name">Last name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="last-name" name="last-name" data-field="last-name" autocomplete="family-name" value="${GovBB.D['last-name']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="nid">National ID Number</label>
        <p class="govbb-hint">From your national ID card. For example, 110915-0048.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="nid" name="nid" data-field="nid" value="${GovBB.D['nid']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="post">Your post</label>
        <p class="govbb-hint">Your job title or position at the school. For example, "Assistant Teacher", "Senior Teacher", "Head of Department".</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="post" name="post" data-field="post" autocomplete="organization-title" value="${GovBB.D['post']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Applicant contact ── */
  'applicant-contact': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">How to reach you</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">We use these to contact you about the outcome of your application.</p>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="contact-no">Contact number</label>
        <p class="govbb-hint">A number we can reach you on during working hours. For example, (246) 249 1234.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="tel" id="contact-no" name="contact-no" data-field="contact-no" inputmode="tel" autocomplete="tel" value="${GovBB.D['contact-no']||''}" />
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="email">Email address</label>
        <p class="govbb-hint">We'll send a copy of your application here. For example, you@example.com.</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="email" id="email" name="email" data-field="email" inputmode="email" autocomplete="email" value="${GovBB.D['email']||''}" />
        </div>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Leave details ── */
  'leave-details': () => {
    const previouslyYes = GovBB.D['previously-granted'] === 'Yes';
    /* Clear any persisted previous-leave data if the user is no longer
       answering "Yes", so it cannot leak into a submission. */
    if (!previouslyYes) {
      ['prev-start-day','prev-start-month','prev-start-year','prev-end-day','prev-end-month','prev-end-year'].forEach(function(k){
        delete GovBB.D[k];
      });
    }
    return `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your leave dates</h1>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);border-bottom:1px solid var(--color-grey-00);padding-bottom:var(--spacing-s);">The leave you are requesting</h2>

      ${dateField('start', 'Start date', 'The first day of your requested leave. For example, 8 9 2025.')}
      ${dateField('end',   'End date',   'The last day of your requested leave. For example, 12 12 2025.')}

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);border-bottom:1px solid var(--color-grey-00);padding-bottom:var(--spacing-s);">Previous term's leave</h2>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Have you previously been granted term's leave?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="previously-granted-yes" name="previously-granted" data-field="previously-granted" value="Yes"${previouslyYes ? ' checked' : ''} data-trigger-render="1" />
            <label class="govbb-radio-item__label" for="previously-granted-yes">Yes</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="previously-granted-no" name="previously-granted" data-field="previously-granted" value="No"${GovBB.D['previously-granted'] === 'No' ? ' checked' : ''} data-trigger-render="1" />
            <label class="govbb-radio-item__label" for="previously-granted-no">No</label>
          </div>
        </div>
      </fieldset>

      ${previouslyYes ? `
      <div style="padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Enter the dates of the most recent term's leave you were granted.</p>
        ${dateField('prev-start', 'Previous leave — start date', 'The first day of your last term\'s leave.')}
        ${dateField('prev-end',   'Previous leave — end date',   'The last day of your last term\'s leave.')}
      </div>` : ''}

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;
  },

  /* ── Reason ── */
  'reason': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Reason for your application</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Briefly explain why you are requesting term's leave. For example: study or further qualification, medical treatment, family or personal circumstances, or another reason. Your Principal will use this to consider your application.</p>

      <div style="border-left:4px solid var(--color-blue-40);padding:var(--spacing-s) var(--spacing-m);background:var(--color-blue-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Your reason is confidential.</strong> It is shared only with your Principal and the Ministry HR team to consider your application.</p>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="reason-text">Your reason</label>
        <p class="govbb-hint">A few sentences is enough. You do not need to share more than you are comfortable with.</p>
        <textarea class="govbb-textarea" id="reason-text" name="reason-text" data-field="reason-text" rows="6" style="width:100%;">${GovBB.D['reason-text']||''}</textarea>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  /* ── Declaration ── */
  'declaration': () => `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Before you submit, please confirm the following.</p>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-visually-hidden">Declaration</legend>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
          <input class="govbb-checkbox" type="checkbox" id="decl-accurate" name="decl-accurate" data-field="decl-accurate"${GovBB.D['decl-accurate']?' checked':''} />
          <label class="govbb-checkbox-item__label" for="decl-accurate">The information I have given on this form is true and correct to the best of my knowledge.</label>
        </div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
          <input class="govbb-checkbox" type="checkbox" id="decl-review" name="decl-review" data-field="decl-review"${GovBB.D['decl-review']?' checked':''} />
          <label class="govbb-checkbox-item__label" for="decl-review">I understand my application will be reviewed by my Principal and then by the Ministry, and that approval is not guaranteed.</label>
        </div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
          <input class="govbb-checkbox" type="checkbox" id="decl-false" name="decl-false" data-field="decl-false"${GovBB.D['decl-false']?' checked':''} />
          <label class="govbb-checkbox-item__label" for="decl-false">I understand that providing false or misleading information may lead to my application being refused and may have employment consequences.</label>
        </div>
      </fieldset>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue to review</button>
      </div>
    </form>`,

  /* ── Check your answers ── */
  'check': () => {
    const previouslyYes = GovBB.D['previously-granted'] === 'Yes';
    return `
    <div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before submitting</h1>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About you</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('School',             GovBB.D['school'],         'applicant-details')}
        ${GovBB.summaryRow('Name',               applicantFullName(),       'applicant-details')}
        ${GovBB.summaryRow('National ID Number', maskNid(GovBB.D['nid']),   'applicant-details')}
        ${GovBB.summaryRow('Post',               GovBB.D['post'],           'applicant-details')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact details</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Contact number',     formatPhone(GovBB.D['contact-no']), 'applicant-contact')}
        ${GovBB.summaryRow('Email',              GovBB.D['email'],          'applicant-contact')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Leave dates</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Start date',         fmtDate('start'),          'leave-details')}
        ${GovBB.summaryRow('End date',           fmtDate('end'),            'leave-details')}
        ${GovBB.summaryRow('Previously granted', GovBB.D['previously-granted'], 'leave-details')}
        ${previouslyYes ? GovBB.summaryRow('Previous start', fmtDate('prev-start'), 'leave-details') : ''}
        ${previouslyYes ? GovBB.summaryRow('Previous end',   fmtDate('prev-end'),   'leave-details') : ''}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Reason</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Reason for leave',   GovBB.D['reason-text'],    'reason')}
      </dl>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">By submitting this form you confirm that the information you have given is true and correct.</p>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Submit application</button>
      </div>
    </div>`;
  },

  /* ── Confirmation ── */
  'confirmation': () => {
    window.__refNumber = window.__refNumber || ('TL-' + Math.random().toString(36).substring(2, 8).toUpperCase());
    if (document.title.indexOf('Error: ') === 0) {
      document.title = document.title.substring('Error: '.length);
    }
    return `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Application submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${window.__refNumber}</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your application will be sent to the Principal of <strong>${GovBB.D['school'] || 'your school'}</strong> for review.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Principal will recommend (or not) and pass your application to the Ministry.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">You will be contacted with the outcome within <strong>15 working days</strong>.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">We'll email a copy of your application to ${GovBB.D['email'] || 'the address you provided'} once it has been processed.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If you do not hear from us within 15 working days, call <strong>+1 (246) 535-0700</strong>.</li>
      </ul>

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Keep your reference number — you will need it to follow up on your application.</p>
    </div>`;
  }
};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const NID_RE = /^\d{6}-\d{4}$/;

  function req(id, msg) {
    if (!D[id] || String(D[id]).trim() === '') errors.push({ id: id, msg: msg });
  }
  function reqNid(id, label, emptyMsg) {
    const v = (D[id] || '').trim();
    if (!v) { errors.push({ id: id, msg: emptyMsg }); return; }
    if (!NID_RE.test(v)) errors.push({ id: id, msg: label + ' must be in the format 110915-0048' });
  }
  function reqPhone(id, label, required, emptyMsg) {
    const v = (D[id] || '').trim();
    if (!v) { if (required) errors.push({ id: id, msg: emptyMsg }); return; }
    const digits = v.replace(/[\s\-()+]/g, '');
    if (!/^\d{7,15}$/.test(digits)) errors.push({ id: id, msg: label + ' must contain 7 to 15 digits, for example (246) 249 1234' });
  }
  function reqEmail(id, label, emptyMsg) {
    const v = (D[id] || '').trim();
    if (!v) { errors.push({ id: id, msg: emptyMsg }); return; }
    if (!EMAIL_RE.test(v)) errors.push({ id: id, msg: label + ' must be in the format you@example.com' });
  }
  function reqDate(prefix, label) {
    const dayV = D[prefix + '-day'], monV = D[prefix + '-month'], yrV = D[prefix + '-year'];
    if (!dayV || !monV || !yrV) {
      errors.push({ id: prefix + '-day', msg: label + ' — enter a complete date.' });
      return null;
    }
    const dt = parseDate(prefix);
    if (dt === false) {
      errors.push({ id: prefix + '-day', msg: label + ' — enter a real date, for example 15 6 2025.' });
      return null;
    }
    return dt;
  }

  if (pageId === 'applicant-details') {
    /* School and post must contain at least a few letters — rejects pure
       punctuation, numbers, or single-emoji entries that would break
       downstream routing. */
    var school = (D['school'] || '').trim();
    if (!school) {
      errors.push({ id: 'school', msg: 'Enter the official name of your school' });
    } else if ((school.match(/[A-Za-z]/g) || []).length < 3) {
      errors.push({ id: 'school', msg: 'Enter the official name of your school in letters (for example, "Combermere School")' });
    }
    req('first-name', 'Enter your first name');
    req('last-name', 'Enter your last name');
    reqNid('nid', 'National ID Number', 'Enter your National ID Number');
    var post = (D['post'] || '').trim();
    if (!post) {
      errors.push({ id: 'post', msg: 'Enter your post (job title or position)' });
    } else if ((post.match(/[A-Za-z]/g) || []).length < 2) {
      errors.push({ id: 'post', msg: 'Enter your post in letters (for example, "Assistant Teacher")' });
    }
  }

  if (pageId === 'applicant-contact') {
    reqPhone('contact-no', 'Contact number', true, 'Enter a contact number');
    reqEmail('email', 'Email address', 'Enter your email address');
  }

  if (pageId === 'leave-details') {
    const start = reqDate('start', 'Start date');
    const end   = reqDate('end',   'End date');
    if (start && end) {
      if (start > end) {
        errors.push({ id: 'end-day', msg: 'End date must be on or after the start date.' });
      } else if (start.getTime() === end.getTime()) {
        /* Term's leave is a multi-week category; a same-day claim almost
           always means a date-entry error. */
        errors.push({ id: 'end-day', msg: 'Term\'s leave must be for more than one day. Check your start and end dates.' });
      } else {
        /* Upper bound on duration: 365 days. Term's leave is typically one
           or two terms (~13-26 weeks); anything over a year is almost
           certainly a typo or the wrong form. */
        const days = Math.round((end.getTime() - start.getTime()) / (1000 * 60 * 60 * 24));
        if (days > 365) {
          errors.push({ id: 'end-day', msg: 'Term\'s leave cannot be longer than one year. For longer absences, call the Ministry.' });
        }
      }
    }
    if (start) {
      const today = new Date(); today.setHours(0,0,0,0);
      const thirtyDaysAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
      if (start < thirtyDaysAgo) {
        errors.push({ id: 'start-day', msg: 'Start date cannot be more than 30 days in the past.' });
      }
      /* Cap how far ahead the leave can start. 18 months is generous — most
         term's-leave applications are made for the next term or two. */
      const eighteenMonthsAhead = new Date(today.getFullYear(), today.getMonth() + 18, today.getDate());
      if (start > eighteenMonthsAhead) {
        errors.push({ id: 'start-day', msg: 'Start date is too far in the future. Term\'s leave can only be requested up to 18 months ahead — check the year.' });
      }
    }
    if (!D['previously-granted']) {
      errors.push({ id: 'previously-granted-yes', msg: 'Select yes or no — have you previously been granted term\'s leave?' });
    }
    if (D['previously-granted'] === 'Yes') {
      const prevStart = reqDate('prev-start', 'Previous leave start');
      const prevEnd   = reqDate('prev-end',   'Previous leave end');
      if (prevStart && prevEnd && prevStart > prevEnd) {
        errors.push({ id: 'prev-end-day', msg: 'Previous leave end date must be on or after the previous start date.' });
      }
      if (prevEnd && start && prevEnd >= start) {
        errors.push({ id: 'prev-end-day', msg: 'Your previous leave must have ended before this new leave begins.' });
      }
    }
  }

  if (pageId === 'reason') {
    var reason = (D['reason-text'] || '').trim();
    if (!reason) {
      errors.push({ id: 'reason-text', msg: 'Briefly explain why you are requesting term\'s leave' });
    } else if (reason.length < 20) {
      errors.push({ id: 'reason-text', msg: 'Add more detail — your Principal needs enough context to consider the application. Aim for at least one full sentence.' });
    }
  }

  if (pageId === 'declaration') {
    if (!D['decl-accurate']) errors.push({ id: 'decl-accurate', msg: 'Tick the box to confirm the information is true and correct' });
    if (!D['decl-review'])   errors.push({ id: 'decl-review',   msg: 'Tick the box to confirm you understand your application will be reviewed' });
    if (!D['decl-false'])    errors.push({ id: 'decl-false',    msg: 'Tick the box to confirm you understand the consequences of false information' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    /* previously-granted radio triggers conditional reveal of previous dates,
       handled by data-trigger-render="1" on the input event. */
  }
});
</script>
</body>
</html>

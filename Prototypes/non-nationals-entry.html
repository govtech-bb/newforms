<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Non-Nationals secondary school entry – Ministry of Educational Transformation</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>
<body class="govbb-page">

<div class="govbb-official-banner">
  <div class="govbb-container govbb-official-banner__inner">
    <div class="govbb-official-banner__crest"><img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" /></div>
    <div class="govbb-official-banner__text"><span>Official government website</span></div>
  </div>
</div>

<header class="govbb-header">
  <div class="govbb-container govbb-header__inner">
    <a href="/" aria-label="Go to the alpha.gov.bb homepage"><img class="govbb-header__logo" src="../dist/assets/images/govbb-logo.svg" alt="GovBB" /></a>
  </div>
</header>

<main class="govbb-page__main">
  <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-label="alpha status banner" aria-live="polite">

    </nav>
    <hr class="govbb-footer__divider" aria-hidden="true" />
    <div class="govbb-footer__end"><img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" /><p class="govbb-footer__copy">© 2025 Government of Barbados</p></div>
  </div>
</footer>

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors=function(){var s=document.getElementById('error-summary');if(s)s.remove();document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});};
GovBB.showErrors=function(errors){GovBB.clearErrors();if(!errors||!errors.length)return;var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>';});html+='</ul></div>';var app=document.getElementById('app');var h1=app.querySelector('h1');if(h1)h1.insertAdjacentHTML('afterend',html);else app.insertAdjacentHTML('afterbegin',html);document.getElementById('error-summary').focus();errors.forEach(function(e){var el=document.getElementById(e.id);if(!el)return;var errId='err-'+e.id;el.setAttribute('aria-invalid','true');el.setAttribute('aria-describedby',errId);var msg=document.createElement('p');msg.className='govbb-error-message';msg.id=errId;msg.textContent=e.msg;var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;if(group)group.appendChild(msg);});if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;};
GovBB.summaryRow=function(label,value,changeTo){var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';};
</script>
<script>
function next(){GovBB.next();}function back(){GovBB.back();}function nav(p){GovBB.nav(p);}

const FORM_NAME='Application for non-nationals to enter government secondary schools';
const CAPTION='Ministry of Educational Transformation';
const TITLES=['Mr','Mrs','Miss','Ms','Dr','Rev'];
const CARICOM=['Antigua and Barbuda','Bahamas','Belize','Dominica','Grenada','Guyana','Haiti','Jamaica','Saint Kitts and Nevis','Saint Lucia','Saint Vincent and the Grenadines','Suriname','Trinidad and Tobago'];
const OTHER_COUNTRIES=['Canada','China','India','Nigeria','Philippines','United Kingdom','United States','Venezuela','Other'];
const BIRTH_COUNTRIES=['Barbados', ...CARICOM, ...OTHER_COUNTRIES];
const STATUS_OPTIONS=['Citizen','Permanent resident','Work permit holder','Student visa','Asylum / refugee status','Other'];

const FLOW=['start','child-details','guardian-details','documents','declaration','check','confirmation'];

function caption(){return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+CAPTION+'</p>';}
function fmtDate(prefix){const d=GovBB.D[prefix+'-day'],m=GovBB.D[prefix+'-month'],y=GovBB.D[prefix+'-year'];if(!d&&!m&&!y)return '';return [d,m,y].filter(Boolean).join(' / ');}
function parseDate(prefix){const d=parseInt(GovBB.D[prefix+'-day'],10),m=parseInt(GovBB.D[prefix+'-month'],10),y=parseInt(GovBB.D[prefix+'-year'],10);if(!d||!m||!y)return null;if(d<1||d>31||m<1||m>12||y<1990||y>2100)return false;const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return false;return dt;}
function formatPhone(p){if(!p)return '';var digits=String(p).replace(/[^\d]/g,'');if(digits.length===10&&digits.indexOf('246')===0)return '(246) '+digits.substring(3,6)+' '+digits.substring(6);return String(p).trim();}
function childName(){return [GovBB.D['child-first'],GovBB.D['child-other'],GovBB.D['child-surname']].filter(Boolean).join(' ');}
function guardianName(){return [GovBB.D['guardian-title'],GovBB.D['guardian-first'],GovBB.D['guardian-last']].filter(Boolean).join(' ');}
function isCaricomNational(){return CARICOM.indexOf(GovBB.D['child-country'])!==-1;}

function handleUpload(key,input){const file=input.files&&input.files[0];if(!file)return;if(file.size>10*1024*1024){alert('File is larger than 10 MB.');input.value='';return;}GovBB.D['upload-'+key]={name:file.name,size:file.size,type:file.type};GovBB.render();}
function removeUpload(key){delete GovBB.D['upload-'+key];GovBB.render();}
function formatBytes(n){if(n<1024)return n+' B';if(n<1024*1024)return (n/1024).toFixed(1)+' KB';return (n/(1024*1024)).toFixed(1)+' MB';}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function uploadRow(key,label,hint){var file=GovBB.D['upload-'+key];if(file){return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);border-left:4px solid var(--color-green-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}<p class="govbb-text-body" style="margin:0;font-size:var(--font-size-caption);color:var(--color-mid-grey-00);word-break:break-all;"><span aria-hidden="true">✓ </span>${escapeHtml(file.name)} (${formatBytes(file.size)})</p></div><button type="button" class="govbb-btn--link" style="flex-shrink:0;" onclick="removeUpload('${key}')">Remove<span class="govbb-visually-hidden"> ${label}</span></button></div>`;}return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;flex:1;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}</div><label for="upload-${key}" class="govbb-btn--secondary" style="flex-shrink:0;cursor:pointer;margin:0;">Upload file</label><input type="file" id="upload-${key}" accept=".pdf,.jpg,.jpeg,.png" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleUpload('${key}', this)" /></div>`;}

function dateField(prefix,legend,hint){return `<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">${legend}</legend>${hint?`<p class="govbb-hint">${hint}</p>`:''}<div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;"><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-day">Day</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-month">Month</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-year">Year</label><div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div></div></div></fieldset>`;}

const PAGES = {
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);">
        <ol class="govbb-breadcrumbs__list">
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li>
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Education and schooling</a></li>
        </ol>
      </nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Non-national child — secondary school application</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 14 June 2025</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">For a non-national child — or a child born outside Barbados — to attend a government secondary school.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Apply online. No application fee. Takes about <strong>10 minutes</strong> — gather your documents first.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>Refugee, asylum, or stateless status?</strong> Those cases need a different process — contact the Ministry directly on <strong>+1 (246) 535-0700</strong>.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your child's full name, date of birth, and country of birth</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The name of the school your child currently attends</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your contact details and immigration status in Barbados</li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Documents to upload</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">PDF, JPG, or PNG. Up to 10 MB each.</p>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>All applicants:</strong> a copy of your child's birth certificate.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>If you are a CARICOM national:</strong> a copy of the <em>parent's</em> immigration status certificate.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>If you are any other non-national:</strong> a copy of the <em>child's</em> immigration status certificate.</li>
      </ul>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">If you can't upload, submit physical copies to the school you want your child to attend.</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">The Ministry will review your application and the documents. You will be contacted by the school within <strong>4 weeks</strong>.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call the Ministry of Educational Transformation on <strong>+1 (246) 535-0700</strong> if you need help.</p>
    </div>`,

  'child-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About the child</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="child-first">First name</label>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-first" name="child-first" data-field="child-first" value="${GovBB.D['child-first']||''}" /></div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="child-surname">Surname</label>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-surname" name="child-surname" data-field="child-surname" value="${GovBB.D['child-surname']||''}" /></div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="child-other">Other names (optional)</label>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-other" name="child-other" data-field="child-other" value="${GovBB.D['child-other']||''}" /></div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="child-country">Country of birth</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="child-country" name="child-country" data-field="child-country" data-trigger-render="1">
            <option value="">Select a country</option>
            ${BIRTH_COUNTRIES.map(c=>`<option value="${c}"${GovBB.D['child-country']===c?' selected':''}>${c}</option>`).join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
        ${isCaricomNational() ? `<p class="govbb-text-body" style="margin-top:var(--spacing-xs);color:var(--color-mid-grey-00);"><strong>This is a CARICOM country.</strong> You will need to upload your immigration status certificate (parent's).</p>` : ''}
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="child-school">Name of present school</label>
        <p class="govbb-hint">The school your child currently attends. Type the official name in full.</p>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-school" name="child-school" data-field="child-school" value="${GovBB.D['child-school']||''}" /></div>
      </div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Sex</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="child-gender-m" name="child-gender" data-field="child-gender" value="Male"${GovBB.D['child-gender']==='Male'?' checked':''} /><label class="govbb-radio-item__label" for="child-gender-m">Male</label></div>
          <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="child-gender-f" name="child-gender" data-field="child-gender" value="Female"${GovBB.D['child-gender']==='Female'?' checked':''} /><label class="govbb-radio-item__label" for="child-gender-f">Female</label></div>
        </div>
      </fieldset>

      ${dateField('child-dob','Date of birth','For example, 15 6 2013.')}

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'guardian-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you (parent or guardian)</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="guardian-title">Title</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="guardian-title" name="guardian-title" data-field="guardian-title">
            <option value="">Select a title</option>
            ${TITLES.map(t=>`<option value="${t}"${GovBB.D['guardian-title']===t?' selected':''}>${t}</option>`).join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="guardian-first">First name</label>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="guardian-first" name="guardian-first" data-field="guardian-first" value="${GovBB.D['guardian-first']||''}" /></div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="guardian-last">Last name</label>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="guardian-last" name="guardian-last" data-field="guardian-last" value="${GovBB.D['guardian-last']||''}" /></div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="guardian-address">Address in Barbados</label>
        <textarea class="govbb-textarea" id="guardian-address" name="guardian-address" data-field="guardian-address" rows="2">${GovBB.D['guardian-address']||''}</textarea>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="guardian-phone">Contact number</label>
        <p class="govbb-hint">For example, (246) 249 1234.</p>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="tel" id="guardian-phone" name="guardian-phone" data-field="guardian-phone" inputmode="tel" value="${GovBB.D['guardian-phone']||''}" /></div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="guardian-email">Email address</label>
        <p class="govbb-hint">We'll send updates here.</p>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="email" id="guardian-email" name="guardian-email" data-field="guardian-email" inputmode="email" value="${GovBB.D['guardian-email']||''}" /></div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="guardian-country">Your country of birth</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="guardian-country" name="guardian-country" data-field="guardian-country">
            <option value="">Select a country</option>
            ${BIRTH_COUNTRIES.map(c=>`<option value="${c}"${GovBB.D['guardian-country']===c?' selected':''}>${c}</option>`).join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="guardian-status">Your immigration status in Barbados</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="guardian-status" name="guardian-status" data-field="guardian-status" data-trigger-render="1">
            <option value="">Select one</option>
            ${STATUS_OPTIONS.map(s=>`<option value="${s}"${GovBB.D['guardian-status']===s?' selected':''}>${s}</option>`).join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>

      ${GovBB.D['guardian-status']==='Other' ? `
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);">
        <label class="govbb-label" for="guardian-status-other">Please specify your status</label>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="guardian-status-other" name="guardian-status-other" data-field="guardian-status-other" value="${GovBB.D['guardian-status-other']||''}" /></div>
      </div>` : ''}

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'documents': () => {
    const caricom = isCaricomNational();
    const isBarbados = GovBB.D['child-country'] === 'Barbados';
    const docs = [
      { key: 'birth-cert', label: 'Child\'s birth certificate', hint: 'A copy of your child\'s birth certificate. All applicants must provide this.', required: true }
    ];
    if (!isBarbados) {
      if (caricom) {
        docs.push({ key: 'parent-immigration', label: 'Parent\'s immigration status certificate', hint: 'CARICOM nationals must provide the parent\'s immigration status certificate for Barbados.', required: true });
      } else {
        docs.push({ key: 'child-immigration', label: 'Child\'s immigration status certificate', hint: 'Non-CARICOM nationals must provide the child\'s immigration status certificate for Barbados.', required: true });
      }
    }
    const uploaded = docs.filter(d => !!GovBB.D['upload-'+d.key]).length;

    return `${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Upload your documents</h1>
      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>If you cannot upload documents online,</strong> submit physical copies to the school in person. Your application will be paused until the documents are received.</p>
      </div>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Upload clear scans or photos of each document. Accepted formats: PDF, JPG, PNG. Maximum size: 10 MB per file.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);" aria-live="polite"><strong>${uploaded} of ${docs.length} documents uploaded.</strong></p>
      <div style="margin-bottom:var(--spacing-l);">
        ${docs.map(d => uploadRow(d.key, d.label, d.hint)).join('')}
      </div>

      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-m);">
        <input class="govbb-checkbox" type="checkbox" id="submit-physical" name="submit-physical" data-field="submit-physical"${GovBB.D['submit-physical']?' checked':''} />
        <label class="govbb-checkbox-item__label" for="submit-physical">I will submit physical copies of any missing documents to the school in person.</label>
      </div>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>`;
  },

  'declaration': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-visually-hidden">Declaration</legend>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-accurate" name="decl-accurate" data-field="decl-accurate"${GovBB.D['decl-accurate']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-accurate">The information I have given is true and correct.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-docs" name="decl-docs" data-field="decl-docs"${GovBB.D['decl-docs']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-docs">I have uploaded the required documents, or will submit physical copies to the school.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-false" name="decl-false" data-field="decl-false"${GovBB.D['decl-false']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-false">I understand that providing false information may result in my application being refused.</label></div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue to review</button>
      </div>
    </form>`,

  'check': () => `
    <div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before submitting</h1>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">The child</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Name', childName(), 'child-details')}
        ${GovBB.summaryRow('Country of birth', GovBB.D['child-country'], 'child-details')}
        ${GovBB.summaryRow('Present school', GovBB.D['child-school'], 'child-details')}
        ${GovBB.summaryRow('Sex', GovBB.D['child-gender'], 'child-details')}
        ${GovBB.summaryRow('Date of birth', fmtDate('child-dob'), 'child-details')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Parent or guardian</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Name', guardianName(), 'guardian-details')}
        ${GovBB.summaryRow('Address', GovBB.D['guardian-address'], 'guardian-details')}
        ${GovBB.summaryRow('Phone', formatPhone(GovBB.D['guardian-phone']), 'guardian-details')}
        ${GovBB.summaryRow('Email', GovBB.D['guardian-email'], 'guardian-details')}
        ${GovBB.summaryRow('Country of birth', GovBB.D['guardian-country'], 'guardian-details')}
        ${GovBB.summaryRow('Status', GovBB.D['guardian-status']==='Other'?(GovBB.D['guardian-status-other']||'Other'):GovBB.D['guardian-status'], 'guardian-details')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Documents</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${['birth-cert','parent-immigration','child-immigration'].map(k=>{var f=GovBB.D['upload-'+k];if(!f)return '';return GovBB.summaryRow(k==='birth-cert'?'Birth certificate':(k==='parent-immigration'?'Parent\'s immigration status':'Child\'s immigration status'), escapeHtml(f.name)+' ('+formatBytes(f.size)+')', 'documents');}).join('')}
        ${GovBB.D['submit-physical']?GovBB.summaryRow('Submitting physical copies','Yes — to the school in person','documents'):''}
      </dl>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Submit application</button>
      </div>
    </div>`,

  'confirmation': () => {
    window.__refNumber=window.__refNumber||('NN-'+Math.random().toString(36).substring(2,8).toUpperCase());
    if(document.title.indexOf('Error: ')===0) document.title=document.title.substring('Error: '.length);
    return `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Application submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${window.__refNumber}</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Ministry will review your application and the documents.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">You will be contacted by the school within <strong>4 weeks</strong>.</li>
        ${GovBB.D['submit-physical']?'<li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Take physical copies of any missing documents to the school as soon as possible to avoid delays.</li>':''}
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">We'll email a copy of your application to ${GovBB.D['guardian-email']||'the address you provided'}.</li>
      </ul>
    </div>`;
  }
};

function validate(pageId){
  const D=GovBB.D,errors=[];
  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  function req(id,msg){if(!D[id]||String(D[id]).trim()==='')errors.push({id:id,msg:msg});}
  function reqPhone(id,label,required,emptyMsg){var v=(D[id]||'').trim();if(!v){if(required)errors.push({id:id,msg:emptyMsg});return;}var digits=v.replace(/[\s\-()+]/g,'');if(!/^\d{7,15}$/.test(digits))errors.push({id:id,msg:label+' must contain 7 to 15 digits, for example (246) 249 1234'});}
  function reqEmail(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!EMAIL_RE.test(v))errors.push({id:id,msg:label+' must be in the format you@example.com'});}
  function reqDate(prefix,label){const dayV=D[prefix+'-day'],monV=D[prefix+'-month'],yrV=D[prefix+'-year'];if(!dayV||!monV||!yrV){errors.push({id:prefix+'-day',msg:label+' — enter a complete date.'});return null;}const dt=parseDate(prefix);if(dt===false){errors.push({id:prefix+'-day',msg:label+' — enter a real date, for example 15 6 2013.'});return null;}return dt;}

  if(pageId==='child-details'){
    req('child-first','Enter the child\'s first name');
    req('child-surname','Enter the child\'s surname');
    req('child-country','Select the country of birth');
    req('child-school','Enter the present school name');
    if(!D['child-gender'])errors.push({id:'child-gender-m',msg:'Select the child\'s sex'});
    const dob=reqDate('child-dob','Date of birth');
    if(dob){const today=new Date();today.setHours(0,0,0,0);const age=today.getFullYear()-dob.getFullYear()-((today.getMonth()<dob.getMonth()||(today.getMonth()===dob.getMonth()&&today.getDate()<dob.getDate()))?1:0);if(dob>=today)errors.push({id:'child-dob-day',msg:'Date of birth must be in the past.'});else if(age<10||age>17)errors.push({id:'child-dob-day',msg:'Date of birth — secondary school children are usually 10 to 17. Check the year.'});}
  }
  if(pageId==='guardian-details'){
    req('guardian-title','Select a title');
    req('guardian-first','Enter your first name');
    req('guardian-last','Enter your last name');
    req('guardian-address','Enter your address');
    reqPhone('guardian-phone','Contact number',true,'Enter a contact number');
    reqEmail('guardian-email','Email address','Enter your email address');
    req('guardian-country','Select your country of birth');
    req('guardian-status','Select your immigration status');
    if(D['guardian-status']==='Other')req('guardian-status-other','Specify your status');
  }
  if(pageId==='documents'){
    if(!D['upload-birth-cert']&&!D['submit-physical'])errors.push({id:'upload-birth-cert',msg:'Upload the birth certificate or tick the box to confirm you will submit physical copies.'});
    if(GovBB.D['child-country']!=='Barbados'){
      if(isCaricomNational()){
        if(!D['upload-parent-immigration']&&!D['submit-physical'])errors.push({id:'upload-parent-immigration',msg:'Upload the parent\'s immigration status certificate or tick the box to confirm you will submit physical copies.'});
      } else {
        if(!D['upload-child-immigration']&&!D['submit-physical'])errors.push({id:'upload-child-immigration',msg:'Upload the child\'s immigration status certificate or tick the box to confirm you will submit physical copies.'});
      }
    }
  }
  if(pageId==='declaration'){
    if(!D['decl-accurate'])errors.push({id:'decl-accurate',msg:'Tick the box to confirm the information is true and correct'});
    if(!D['decl-docs'])errors.push({id:'decl-docs',msg:'Tick the box to confirm the documents'});
    if(!D['decl-false'])errors.push({id:'decl-false',msg:'Tick the box to confirm you understand the consequences'});
  }
  return errors;
}

GovBB.init({formName:FORM_NAME,flow:FLOW,pages:PAGES,validate:validate});
</script>

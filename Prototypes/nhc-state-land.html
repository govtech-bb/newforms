<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary'); if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
  if (document.title.indexOf('Error: ') === 0) document.title = document.title.slice(7);
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors(); if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  var app = document.getElementById('app'); var h1 = app.querySelector('h1');
  if (h1) h1.insertAdjacentHTML('afterend', html); else app.insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id); if (!el) return;
    var errId = 'err-'+e.id; el.setAttribute('aria-invalid','true'); el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p'); msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) { var anchor = group.querySelector('.govbb-hint')||group.querySelector('.govbb-label')||group.querySelector('legend'); if (anchor) anchor.insertAdjacentElement('afterend', msg); else group.insertBefore(msg, group.firstChild); }
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);white-space:pre-wrap;">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};

function fmtDate(iso){ if(!iso) return ''; var p=String(iso).split('-'); if(p.length!==3) return iso; var m=['January','February','March','April','May','June','July','August','September','October','November','December']; var d=parseInt(p[2],10),mm=parseInt(p[1],10); if(!d||!mm) return iso; return d+' '+(m[mm-1]||'')+' '+p[0]; }

/* Human-readable duration between two ISO (YYYY-MM-DD) dates. Parses parts
   manually to avoid UTC/local timezone day-shift. Returns '' if invalid. */
function durationText(s,e){
  if(!s||!e) return '';
  var sp=String(s).split('-'), ep=String(e).split('-');
  if(sp.length!==3||ep.length!==3) return '';
  var a=new Date(+sp[0],+sp[1]-1,+sp[2]), b=new Date(+ep[0],+ep[1]-1,+ep[2]);
  if(isNaN(a)||isNaN(b)||b<a) return '';
  // Count whole months by advancing from the start, clamping the day to the
  // end of each target month (so 31 Jan + 1 month = 28 Feb, never overflows).
  var anchor=a.getDate();
  function addMonths(n){ var y=a.getFullYear(), m=a.getMonth()+n, last=new Date(y,m+1,0).getDate(); return new Date(y,m,Math.min(anchor,last)); }
  var months=0; while(addMonths(months+1)<=b) months++;
  var days=Math.round((b-addMonths(months))/86400000);
  var years=Math.floor(months/12); months=months%12;
  var parts=[];
  if(years) parts.push(years+(years===1?' year':' years'));
  if(months) parts.push(months+(months===1?' month':' months'));
  if(days) parts.push(days+(days===1?' day':' days'));
  if(!parts.length) return 'Same day';
  return parts.join(', ');
}

/* Recompute the read-only duration on the land-use page when a date changes. */
function updateDuration(){
  var s=(document.getElementById('start-date')||{}).value||'';
  var e=(document.getElementById('end-date')||{}).value||'';
  var el=document.getElementById('duration'); if(!el) return;
  var txt=durationText(s,e);
  el.textContent = txt || (s&&e ? 'End date must be on or after the start date' : 'Enter your start and end dates to see the duration');
}

  var D=GovBB.D;
  var at=(document.querySelector('input[name="applicant-type"]:checked')||{}).value||'';
  var res=(document.querySelector('input[name="is-resident"]:checked')||{}).value||'';
  var reg=(document.querySelector('input[name="is-registered"]:checked')||{}).value||'';
  D['applicant-type']=at; D['is-resident']=res; D['is-registered']=reg;

  // Notices are informational only — overseas / international applicants can
  // still apply, so they never hide the Continue button.
  show('notice-resident',isInd&&res==='No');
  show('notice-registered',isOrg&&reg==='No');
}

/* Land-use page: toggle the address vs description blocks in place when the
   "does the land have an address?" radio changes (no full re-render → no jump). */

    const nrnBlock = `<div class="govbb-form-group" style="margin-bottom:var(--spacing-m);"><label class="govbb-label" for="nrn">National Registration Number</label><p class="govbb-hint">You can find this on your national ID card. For example, 870315-1234.</p><div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="nrn" name="nrn" data-field="nrn" inputmode="numeric" maxlength="11" placeholder="870315-1234" value="${val('nrn')}" oninput="var v=this.value.replace(/[^0-9]/g,'').slice(0,10); if(v.length>6) v=v.slice(0,6)+'-'+v.slice(6); this.value=v;" /></div></div>`;
    return `
      <form novalidate>
        ${caption()}
        <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your details</h1>
        ${isOrg ? textField('org-name','Name of organisation or company') : ''}
        ${textField('first-name', isOrg ? 'Contact person first name' : 'First name')}
        ${textField('middle-name', 'Middle name (optional)')}
        ${textField('last-name', isOrg ? 'Contact person last name' : 'Last name')}
        ${isOrg ? '' : (isIntlInd ? textField('passport-id','Passport or national ID number',{hint:'Enter the number shown on your passport or national identity document.'}) : nrnBlock)}
        ${isOrg ? '' : radioField('gender','Gender',['Male','Female'])}
        ${isIntlInd ? selectField('country','Country',COUNTRIES,{placeholder:'Select a country',hint:'The country where you live.'}) : selectField('parish','Parish',GovBB.PARISHES,{placeholder:'Select a parish'})}
        ${textareaField('address','Address',{hint: isIntlInd ? 'Your full postal address.' : 'Street address and village or district.'})}
        ${textField('phone','Telephone number',{type:'tel',inputmode:'tel',hint:'For example, (246) 535 1234.'})}
        ${textField('cell','Mobile number (optional)',{type:'tel',inputmode:'tel'})}
        ${textField('email','Email address',{type:'email',inputmode:'email',hint:'We will use this to send you a confirmation.'})}
        ${btns()}
      </form>`;
  },

  'land-use': () => {
    const D = GovBB.D;
    const hasAddr = D['land-has-address'];
    return `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Details of the land you want to use</h1>
      ${selectField('land-parish','In which parish is the land?',GovBB.PARISHES,{placeholder:'Select a parish'})}

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <fieldset class="govbb-fieldset"><legend class="govbb-fieldset__legend govbb-label">Does the land have a street address?</legend>
          <p class="govbb-hint">Many state land parcels are undeveloped and have no formal address.</p>
          <div style="display:flex;flex-direction:column;gap:var(--spacing-s);">
            <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="land-has-address" name="land-has-address" value="Yes" data-field="land-has-address" onchange="landAddr()"${hasAddr==='Yes'?' checked':''} /><label class="govbb-radio-item__label" for="land-has-address">Yes, it has a street address</label></div>
            <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="land-has-address-no" name="land-has-address" value="No" data-field="land-has-address" onchange="landAddr()"${hasAddr==='No'?' checked':''} /><label class="govbb-radio-item__label" for="land-has-address-no">No, it is undeveloped or has no address</label></div>
          </div>
        </fieldset>
      </div>

      <div id="land-dev" style="${hasAddr==='Yes'?'':'display:none;'}">
        ${textareaField('land-address','Address of the land',{hint:'Include the street, and the lot or building number if there is one.'})}
      </div>
      <div id="land-undev" style="${hasAddr==='No'?'':'display:none;'}">
        ${textareaField('land-description','Describe where the land is',{hint:'Describe the location as precisely as you can — for example, nearby landmarks, roads or directions.'})}
      </div>

      ${textField('gps-coordinates','GPS coordinates (optional)',{hint:'For example, 13.1132° N, 59.5988° W.'})}
      ${textField('land-map-link','Google Maps link or pin (optional)',{hint:'Paste a Google Maps link or dropped pin if you have one.'})}

      ${textareaField('proposed-activities','What do you plan to do on the land?',{hint:'Describe your proposed activities.'})}
      ${textField('start-date','Start date',{type:'date',onchange:'updateDuration()'})}
      ${textField('end-date','End date',{type:'date',onchange:'updateDuration()'})}
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <p class="govbb-label" style="margin-bottom:var(--spacing-xs);">Duration</p>
        <p class="govbb-text-body" id="duration" style="margin:0;color:var(--color-mid-grey-00);">${durationText(GovBB.D['start-date'],GovBB.D['end-date']) || 'Enter your start and end dates to see the duration'}</p>
        <p class="govbb-hint" style="margin-top:var(--spacing-xs);">Calculated automatically from your start and end dates.</p>
      </div>
      ${btns()}
    </form>`;
  },

  'check': () => {
    const D = GovBB.D;
    const isOrg = D['applicant-type'] === 'Organisation';
    const isIntlInd = !isOrg && D['is-resident'] === 'No';
    return `
    <div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before sending your application</h1>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About the applicant</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${GovBB.summaryRow('Applying as', isOrg ? 'Organisation or company' : 'Individual', 'eligibility')}
        ${isOrg ? GovBB.summaryRow('Registered in Barbados', D['is-registered'], 'eligibility') : GovBB.summaryRow('Barbadian citizen or permanent resident', D['is-resident'], 'eligibility')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Your details</h2>
      <dl style="margin-bottom:var(--spacing-m);">
        ${isOrg ? GovBB.summaryRow('Organisation or company name', D['org-name'], 'applicant-details') : ''}
        ${GovBB.summaryRow(isOrg ? 'Contact first name' : 'First name', D['first-name'], 'applicant-details')}
        ${D['middle-name'] ? GovBB.summaryRow('Middle name', D['middle-name'], 'applicant-details') : ''}
        ${GovBB.summaryRow(isOrg ? 'Contact last name' : 'Last name', D['last-name'], 'applicant-details')}
        ${isOrg ? '' : (isIntlInd ? GovBB.summaryRow('Passport or national ID number', D['passport-id'], 'applicant-details') : GovBB.summaryRow('National Registration Number', D['nrn'], 'applicant-details'))}
        ${isOrg ? '' : GovBB.summaryRow('Gender', D['gender'], 'applicant-details')}
        ${isIntlInd ? GovBB.summaryRow('Country', D['country'], 'applicant-details') : GovBB.summaryRow('Parish', D['parish'], 'applicant-details')}
        ${GovBB.summaryRow('Address', D['address'], 'applicant-details')}
        ${GovBB.summaryRow('Telephone number', D['phone'], 'applicant-details')}
        ${D['cell'] ? GovBB.summaryRow('Mobile number', D['cell'], 'applicant-details') : ''}
        ${GovBB.summaryRow('Email address', D['email'], 'applicant-details')}
      </dl>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Land use details</h2>
      <dl style="margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Parish', D['land-parish'], 'land-use')}
        ${D['land-has-address']==='Yes' ? GovBB.summaryRow('Address of the land', D['land-address'], 'land-use') : GovBB.summaryRow('Location description', D['land-description'], 'land-use')}
        ${D['gps-coordinates'] ? GovBB.summaryRow('GPS coordinates', D['gps-coordinates'], 'land-use') : ''}
        ${D['land-map-link'] ? GovBB.summaryRow('Google Maps link', D['land-map-link'], 'land-use') : ''}
        ${GovBB.summaryRow('Planned activities', D['proposed-activities'], 'land-use')}
        ${GovBB.summaryRow('Start date', fmtDate(D['start-date']), 'land-use')}
        ${GovBB.summaryRow('End date', fmtDate(D['end-date']), 'land-use')}
        ${GovBB.summaryRow('Duration', durationText(D['start-date'],D['end-date']))}
      </dl>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue to declaration</button>
      </div>
    </div>`;
  },

  'declaration': () => {
    const d = new Date();
    const date = String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
    return `
    <form novalidate>
      ${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
      <div style="margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Applicant's name:</strong> ${escapeHtml([GovBB.D['first-name'],GovBB.D['middle-name'],GovBB.D['last-name']].filter(Boolean).join(' ') || '—')}</p>
        <p class="govbb-text-body"><strong>Date:</strong> ${date}</p>
      </div>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-visually-hidden">Declaration</legend>
        <div class="govbb-checkbox-item" style="align-items:flex-start;gap:var(--spacing-s);">
          <input class="govbb-checkbox" type="checkbox" id="decl-agree" name="decl-agree" data-field="decl-agree"${GovBB.D['decl-agree']?' checked':''} />
          <label class="govbb-checkbox-item__label" for="decl-agree">I hereby certify that the information provided is true and correct to the best of my knowledge.</label>
        </div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Submit application</button>
      </div>
    </form>`;
  },

  'confirmation': () => {
    window.__refNumber = window.__refNumber || ('SLU-' + Math.random().toString(36).substring(2,8).toUpperCase());
    if (document.title.indexOf('Error: ') === 0) document.title = document.title.substring('Error: '.length);
    return `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Application submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${window.__refNumber}</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Your requested usage period</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">${fmtDate(GovBB.D['start-date'])} to ${fmtDate(GovBB.D['end-date'])}${durationText(GovBB.D['start-date'],GovBB.D['end-date']) ? ' (<strong>'+durationText(GovBB.D['start-date'],GovBB.D['end-date'])+'</strong>)' : ''}</p>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Ministry of Housing, Lands and Maintenance will review your application and contact you within <strong>10 working days</strong>.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A confirmation will be sent to <strong>${escapeHtml(GovBB.D['email']||'the email address you gave us')}</strong>.</li>
      </ul>
      <p style="margin-bottom:var(--spacing-m);"><a class="govbb-link" href="#" onclick="event.preventDefault();GovBB.D={};window.__refNumber=null;GovBB.nav('start');">Start another application</a></p>
    </div>`;
  }
};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D; const errors = []; const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  function req(id,msg){ if(!D[id]||!String(D[id]).trim()) errors.push({id:id,msg:msg}); }
  function phoneOk(v){ return /^\d{7,15}$/.test(String(v).replace(/[\s\-()+]/g,'')); }

  if (pageId === 'eligibility') {
    if (!D['applicant-type']) errors.push({id:'applicant-type',msg:'Tell us whether you are applying as an individual or for an organisation or company'});
    else if (D['applicant-type']==='Individual') {
      if (!D['is-resident']) errors.push({id:'is-resident',msg:'Tell us whether you are a Barbadian citizen or permanent resident'});
    } else if (D['applicant-type']==='Organisation') {
      if (!D['is-registered']) errors.push({id:'is-registered',msg:'Tell us whether your organisation or company is registered in Barbados'});
    }
  }

  if (pageId === 'applicant-details') {
    var isOrg = D['applicant-type']==='Organisation';
    var isIntlInd = !isOrg && D['is-resident']==='No';
    if (isOrg) req('org-name','Enter the name of your organisation or company');
    req('first-name', isOrg ? 'Enter the contact person first name' : 'Enter your first name');
    req('last-name', isOrg ? 'Enter the contact person last name' : 'Enter your last name');
    if (!isOrg) {
      if (isIntlInd) {
        req('passport-id','Enter your passport or national ID number');
      } else {
        var nrn=(D['nrn']||'').trim(); var nrnDigits=nrn.replace(/\D/g,'');
        if (!nrn) errors.push({id:'nrn',msg:'Enter your National Registration Number'});
        else if (nrnDigits.length!==10) errors.push({id:'nrn',msg:'Enter a valid National Registration Number, for example 870315-1234'});
      }
      if (!D['gender']) errors.push({id:'gender',msg:'Select your gender'});
    }
    if (isIntlInd) req('country','Enter the country where you live');
    else if (!D['parish']) errors.push({id:'parish',msg:'Select your parish'});
    req('address','Enter your address');
    var ph=(D['phone']||'').trim(); if(!ph) errors.push({id:'phone',msg:'Enter your telephone number'}); else if(!phoneOk(ph)) errors.push({id:'phone',msg:'Enter a telephone number using 7 to 15 digits'});
    var cell=(D['cell']||'').trim(); if(cell && !phoneOk(cell)) errors.push({id:'cell',msg:'Enter a mobile number using 7 to 15 digits'});
    var em=(D['email']||'').trim(); if(!em) errors.push({id:'email',msg:'Enter your email address'}); else if(!EMAIL_RE.test(em)) errors.push({id:'email',msg:'Enter a valid email address, for example name@example.com'});
  }

  if (pageId === 'land-use') {
    if (!D['land-parish']) errors.push({id:'land-parish',msg:'Select the parish where the land is'});
    if (!D['land-has-address']) errors.push({id:'land-has-address',msg:'Tell us whether the land has a street address'});
    else if (D['land-has-address']==='Yes') req('land-address','Enter the address of the land');
    else if (D['land-has-address']==='No') req('land-description','Describe where the land is');
    req('proposed-activities','Describe what you plan to do on the land');
    var today=(function(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
    if (!D['start-date']) errors.push({id:'start-date',msg:'Enter the start date'});
    else if (D['start-date'] < today) errors.push({id:'start-date',msg:'The start date cannot be in the past'});
    if (!D['end-date']) errors.push({id:'end-date',msg:'Enter the end date'});
    else if (D['start-date'] && D['end-date'] < D['start-date']) errors.push({id:'end-date',msg:'The end date must be the same as or after the start date'});
  }

  if (pageId === 'declaration') {
    if (!D['decl-agree']) errors.push({id:'decl-agree',msg:'You must agree to the declaration to continue'});
  }
  return errors;
}

GovBB.init({ formName: FORM_NAME, getFlow: function(){ return FLOW; }, pages: PAGES, validate: validate });
</script>

<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary'); if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors(); if (!errors||!errors.length) return;
  var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>';});
  html+='</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin',html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el=document.getElementById(e.id); if(!el)return;
    var errId='err-'+e.id; el.setAttribute('aria-invalid','true'); el.setAttribute('aria-describedby',errId);
    var msg=document.createElement('p'); msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if(group)group.appendChild(msg);
  });
  if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;
};
GovBB.summaryRow = function(label,value,changeTo){
  var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>
<script>
const FORM_NAME = 'Claim for Unemployment Benefit';

const REASON_OPTIONS = [
  'Redundancy', 'Retrenchment', 'Expiry of contract', 'Closure of business',
  'Resignation due to constructive dismissal', 'End of seasonal employment', 'Other'
];

function getEmploymentRows() {
  return GovBB.D['employment-rows'] || [];
}
function saveEmploymentRows(rows) { GovBB.D['employment-rows'] = rows; }

function addEmploymentRow() {
  var rows = getEmploymentRows();
  rows.push({ employer: '', address: '', dateStarted: '', dateEnded: '', occupation: '', reason: '' });
  saveEmploymentRows(rows);
  GovBB.render();
}
function removeEmploymentRow(i) {
  var rows = getEmploymentRows();
  rows.splice(i, 1);
  saveEmploymentRows(rows);
  GovBB.render();
}
function updateEmpRow(i, field, value) {
  var rows = getEmploymentRows();
  rows[i][field] = value;
  saveEmploymentRows(rows);
}

function renderEmploymentRows() {
  var rows = getEmploymentRows();
  if (!rows.length) return '<p class="govbb-text-body" style="color:var(--color-mid-grey-00);">No additional employers added yet.</p>';
  return rows.map(function(row, i) {
    return `<div style="border-left:4px solid var(--color-blue-40);padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--spacing-s);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);">Employer ${i + 1}</p>
        <button type="button" class="govbb-btn--link" onclick="removeEmploymentRow(${i})" style="color:var(--color-error);">Remove</button>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="emp-row-${i}-employer">Employer name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="emp-row-${i}-employer" value="${row.employer||''}" oninput="updateEmpRow(${i},'employer',this.value)">
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="emp-row-${i}-address">Employer address</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="emp-row-${i}-address" value="${row.address||''}" oninput="updateEmpRow(${i},'address',this.value)">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <div class="govbb-form-group">
          <label class="govbb-label" for="emp-row-${i}-dateStarted">Date started</label>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="emp-row-${i}-dateStarted" placeholder="DD/MM/YYYY" value="${row.dateStarted||''}" oninput="updateEmpRow(${i},'dateStarted',this.value)">
          </div>
        </div>
        <div class="govbb-form-group">
          <label class="govbb-label" for="emp-row-${i}-dateEnded">Date ended</label>
          <div class="govbb-input-wrapper">
            <input class="govbb-input" type="text" id="emp-row-${i}-dateEnded" placeholder="DD/MM/YYYY" value="${row.dateEnded||''}" oninput="updateEmpRow(${i},'dateEnded',this.value)">
          </div>
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="emp-row-${i}-occupation">Occupation</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="emp-row-${i}-occupation" value="${row.occupation||''}" oninput="updateEmpRow(${i},'occupation',this.value)">
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="emp-row-${i}-reason">Reason for leaving</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="emp-row-${i}-reason" value="${row.reason||''}" oninput="updateEmpRow(${i},'reason',this.value)">
        </div>
      </div>
    </div>`;
  }).join('');
}

const PAGES = {
  'start': () => `
    <div>

      <div style="border-left:4px solid var(--color-yellow-00);padding:var(--spacing-m);background:var(--color-yellow-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">Before you start</p>
        <p class="govbb-text-body">You must have a Termination of Services Certificate from your employer. You cannot submit this claim without one.</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you will need</h2>
      <ul style="padding-left:var(--spacing-m);margin-bottom:var(--spacing-l);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your Termination of Services Certificate</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your NIS number and National Registration Number</li>

        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your employment history for the last 52 weeks</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your bank account details (if you want direct deposit)</li>
      </ul>
      ${GovBB.startBtn()}
    </div>`,

  'applicant-details': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your personal details</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="surname">Surname</label>

          <input class="govbb-input" type="text" id="surname" name="surname" data-field="surname" value="${GovBB.D['surname']||''}" />
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="first-name">First name</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="first-name" name="first-name" data-field="first-name" value="${GovBB.D['first-name']||''}" />
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="middle-name">Middle name(s)</label>
        <p class="govbb-hint">Optional</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="middle-name" name="middle-name" data-field="middle-name" value="${GovBB.D['middle-name']||''}" />
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="nis-number">NIS number</label>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">

        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="nrn" name="nrn" data-field="nrn" value="${GovBB.D['nrn']||''}" />
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="street-address">Street address</label>

          <input class="govbb-input" type="text" id="street-address" name="street-address" data-field="street-address" value="${GovBB.D['street-address']||''}" />

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="district">District</label>

        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="district" name="district" data-field="district" value="${GovBB.D['district']||''}" />
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="parish">Parish</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="parish" name="parish" data-field="parish">
            <option value="">Select one</option>
            ${GovBB.PARISHES.map(o=>`<option value="${o}"${GovBB.D['parish']===o?' selected':''}>` + o + '</option>').join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="postal-code">Postal code</label>
        <p class="govbb-hint">For example, BB11000</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="postal-code" name="postal-code" data-field="postal-code" value="${GovBB.D['postal-code']||''}" />
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="telephone">Telephone number</label>
        <p class="govbb-hint">Include area code</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="tel" id="telephone" name="telephone" data-field="telephone" placeholder="246-555-1234" value="${GovBB.D['telephone']||''}" />

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'eligibility': () => {
    var D = GovBB.D;
    var showB1name = D['b1'] === 'Yes';
    var showB2name = D['b2'] === 'Yes';
    var b6No = D['b6'] === 'No';
    return `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your eligibility</h1>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">B1. Are you currently receiving any other NIS benefit?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="b1-yes" name="b1" data-field="b1" value="Yes"${D['b1']==='Yes'?' checked':''} />
            <label class="govbb-radio-item__label" for="b1-yes">Yes</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="b1-no" name="b1" data-field="b1" value="No"${D['b1']==='No'?' checked':''} />
            <label class="govbb-radio-item__label" for="b1-no">No</label>
          </div>
        </div>
      </fieldset>
      ${showB1name ? `
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="b1-benefit-name">Name of benefit you are receiving</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="b1-benefit-name" name="b1-benefit-name" data-field="b1-benefit-name" value="${D['b1-benefit-name']||''}" />
        </div>
      </div>` : ''}
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">B2. Have you received any NIS benefit in the last 52 weeks?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="b2-yes" name="b2" data-field="b2" value="Yes"${D['b2']==='Yes'?' checked':''} />
            <label class="govbb-radio-item__label" for="b2-yes">Yes</label>
          </div>
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="b2-no" name="b2" data-field="b2" value="No"${D['b2']==='No'?' checked':''} />
            <label class="govbb-radio-item__label" for="b2-no">No</label>
          </div>
        </div>
      </fieldset>
      ${showB2name ? `
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="b2-benefit-name">Name of benefit you received</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="b2-benefit-name" name="b2-benefit-name" data-field="b2-benefit-name" value="${D['b2-benefit-name']||''}" />
        </div>
      </div>` : ''}
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">B3. Are you available for and seeking work?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="b3-yes" name="b3" data-field="b3" value="Yes"${D['b3']==='Yes'?' checked':''} />
            <label class="govbb-radio-item__label" for="b3-yes">Yes</label>
          </div>

            <input class="govbb-radio" type="radio" id="b3-no" name="b3" data-field="b3" value="No"${D['b3']==='No'?' checked':''} />
            <label class="govbb-radio-item__label" for="b3-no">No</label>
          </div>

      </fieldset>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">B4. Are you capable of working?</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item">

          <div class="govbb-radio-item">
            <input class="govbb-radio" type="radio" id="b4-no" name="b4" data-field="b4" value="No"${D['b4']==='No'?' checked':''} />
            <label class="govbb-radio-item__label" for="b4-no">No</label>

        <legend class="govbb-fieldset__legend">B6. Did you lose your job through no fault of your own?</legend>

            <input class="govbb-radio" type="radio" id="b6-yes" name="b6" data-field="b6" value="Yes"${D['b6']==='Yes'?' checked':''} />

      ${b6No ? `

        <p class="govbb-text-body">Unemployment benefit is for people who lost their job through no fault of their own. NIS will review your claim and contact you if more information is needed.</p>
      </div>` : ''}
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>

  'employment-history': () => {
    var D = GovBB.D;
    var pilWeeks = parseInt(D['pil-weeks']) || 0;
    var showPilDates = pilWeeks > 0;
    var showReasonOther = D['reason-unemployment'] === 'Other';
    return `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Your last job</h1>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="last-employer-name">Name of last employer</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="last-employer-name" name="last-employer-name" data-field="last-employer-name" value="${D['last-employer-name']||''}" />
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="last-employer-address">Employer's address</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="last-employer-address" name="last-employer-address" data-field="last-employer-address" value="${D['last-employer-address']||''}" />
        </div>
      </div>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="occupation">Your occupation or job title</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="occupation" name="occupation" data-field="occupation" value="${D['occupation']||''}" />
        </div>
      </div>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Date you started this job</legend>
        <p class="govbb-hint">For example, 27 03 2007</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="date-commenced-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="date-commenced-day" name="date-commenced-day" data-field="date-commenced-day" inputmode="numeric" value="${D['date-commenced-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="date-commenced-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="date-commenced-month" name="date-commenced-month" data-field="date-commenced-month" inputmode="numeric" value="${D['date-commenced-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="date-commenced-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="date-commenced-year" name="date-commenced-year" data-field="date-commenced-year" inputmode="numeric" value="${D['date-commenced-year']||''}" /></div>
          </div>
        </div>
      </fieldset>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Last day you worked</legend>
        <p class="govbb-hint">For example, 27 03 2007</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-work-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="last-day-work-day" name="last-day-work-day" data-field="last-day-work-day" inputmode="numeric" value="${D['last-day-work-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-work-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="last-day-work-month" name="last-day-work-month" data-field="last-day-work-month" inputmode="numeric" value="${D['last-day-work-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-work-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="last-day-work-year" name="last-day-work-year" data-field="last-day-work-year" inputmode="numeric" value="${D['last-day-work-year']||''}" /></div>
          </div>
        </div>
      </fieldset>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Last day for which you were paid</legend>
        <p class="govbb-hint">For example, 27 03 2007</p>
        <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-paid-day">Day</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="last-day-paid-day" name="last-day-paid-day" data-field="last-day-paid-day" inputmode="numeric" value="${D['last-day-paid-day']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-paid-month">Month</label>
            <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="last-day-paid-month" name="last-day-paid-month" data-field="last-day-paid-month" inputmode="numeric" value="${D['last-day-paid-month']||''}" /></div>
          </div>
          <div class="govbb-date-input__part">
            <label class="govbb-date-input__label" for="last-day-paid-year">Year</label>
            <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="last-day-paid-year" name="last-day-paid-year" data-field="last-day-paid-year" inputmode="numeric" value="${D['last-day-paid-year']||''}" /></div>
          </div>
        </div>
      </fieldset>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="pil-weeks">Payment in lieu of notice — number of weeks</label>
        <p class="govbb-hint">Enter 0 if you did not receive payment in lieu of notice</p>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="pil-weeks" name="pil-weeks" data-field="pil-weeks" inputmode="numeric" value="${D['pil-weeks']||''}" />
        </div>
      </div>
      ${showPilDates ? `
      <div style="border-left:4px solid var(--color-blue-40);padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-s);">Payment in lieu of notice dates</p>
        <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
          <legend class="govbb-fieldset__legend">Payment in lieu — from date</legend>
          <p class="govbb-hint">For example, 27 03 2007</p>
          <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="pil-from-day">Day</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="pil-from-day" name="pil-from-day" data-field="pil-from-day" inputmode="numeric" value="${D['pil-from-day']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="pil-from-month">Month</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="pil-from-month" name="pil-from-month" data-field="pil-from-month" inputmode="numeric" value="${D['pil-from-month']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="pil-from-year">Year</label>
              <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="pil-from-year" name="pil-from-year" data-field="pil-from-year" inputmode="numeric" value="${D['pil-from-year']||''}" /></div>
            </div>
          </div>
        </fieldset>
        <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
          <legend class="govbb-fieldset__legend">Payment in lieu — to date</legend>
          <p class="govbb-hint">For example, 27 03 2007</p>
          <div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;">
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="pil-to-day">Day</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="pil-to-day" name="pil-to-day" data-field="pil-to-day" inputmode="numeric" value="${D['pil-to-day']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="pil-to-month">Month</label>
              <div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="pil-to-month" name="pil-to-month" data-field="pil-to-month" inputmode="numeric" value="${D['pil-to-month']||''}" /></div>
            </div>
            <div class="govbb-date-input__part">
              <label class="govbb-date-input__label" for="pil-to-year">Year</label>
              <div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="pil-to-year" name="pil-to-year" data-field="pil-to-year" inputmode="numeric" value="${D['pil-to-year']||''}" /></div>
            </div>
          </div>
        </fieldset>
      </div>` : ''}
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="reason-unemployment">Reason for unemployment</label>
        <div class="govbb-select-wrapper">
          <select class="govbb-select" id="reason-unemployment" name="reason-unemployment" data-field="reason-unemployment">
            <option value="">Select one</option>
            ${REASON_OPTIONS.map(o=>`<option value="${o}"${D['reason-unemployment']===o?' selected':''}>` + o + '</option>').join('')}
          </select>
          <span class="govbb-select__chevron" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg></span>
        </div>
      </div>
      ${showReasonOther ? `
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="reason-unemployment-other">Please describe the reason</label>
        <div class="govbb-input-wrapper">
          <input class="govbb-input" type="text" id="reason-unemployment-other" name="reason-unemployment-other" data-field="reason-unemployment-other" value="${D['reason-unemployment-other']||''}" />
        </div>
      </div>` : ''}
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;
  },

  'other-employment': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Other employment in the last 52 weeks</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-m);">Add details of any other employers you worked for in the 52 weeks before you became unemployed.</p>
      ${renderEmploymentRows()}
      <button type="button" class="govbb-btn--secondary" onclick="addEmploymentRow()">Add another employer</button>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'declaration': () => `
    <form novalidate>
      <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
      <p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">National Insurance Scheme</p>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Applicant's name:</strong> ${[GovBB.D['first-name'], GovBB.D['middle-name'], GovBB.D['surname']].filter(Boolean).join(' ') || '—'}</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);"><strong>Date:</strong> ${(function(){ var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); })()}</p>
      <div style="border-left:4px solid var(--color-blue-40);padding:var(--spacing-m);background:var(--color-blue-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">I declare that the information provided is true and correct. I understand that NIS may verify the information with my employer(s). I will report any change in my circumstances that may affect my entitlement to benefit.</p>
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);color:var(--color-error);">Warning: Giving false information may result in prosecution and repayment of any benefit received.</p>
      </div>
      <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">
        <input class="govbb-checkbox" type="checkbox" id="declaration-agree" name="declaration-agree" data-field="declaration-agree"${GovBB.D['declaration-agree']?' checked':''} />
        <label class="govbb-checkbox-item__label" for="declaration-agree">I confirm that the information I have given is true and complete to the best of my knowledge.</label>
      </div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn" onclick="next()">Submit claim</button>
        <button type="button" class="govbb-btn--link" onclick="back()">Back</button>
      </div>
    </form>`,

  'check': () => {
    var D = GovBB.D;
    var pilWeeks = parseInt(D['pil-weeks']) || 0;
    var rows = getEmploymentRows();
    var empHistHtml = rows.length ? rows.map(function(row, i) {
      return GovBB.summaryRow('Employer ' + (i+1), [row.employer, row.dateStarted + ' – ' + row.dateEnded].filter(Boolean).join(', '), 'other-employment');
    }).join('') : GovBB.summaryRow('Other employers', 'None added', 'other-employment');
    return `
    <a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>
    <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers</h1>
    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Personal details</h2>
    <dl style="margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Surname', D['surname'], 'applicant-details')}
      ${GovBB.summaryRow('First name', D['first-name'], 'applicant-details')}
      ${GovBB.summaryRow('NIS number', D['nis-number'], 'applicant-details')}
      ${GovBB.summaryRow('NRN', D['nrn'], 'applicant-details')}
      ${GovBB.summaryRow('Address', [D['street-address'], D['parish'], D['postal-code']].filter(Boolean).join(', '), 'applicant-details')}
      ${GovBB.summaryRow('Telephone', D['telephone'], 'applicant-details')}
    </dl>
    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Eligibility</h2>
    <dl style="margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Currently receiving benefit', D['b1'], 'eligibility')}
      ${GovBB.summaryRow('Available for work', D['b3'], 'eligibility')}
      ${GovBB.summaryRow('Capable of working', D['b4'], 'eligibility')}
      ${GovBB.summaryRow('Registered at Employment Bureau', D['b5'], 'eligibility')}
      ${GovBB.summaryRow('Lost job through no fault of own', D['b6'], 'eligibility')}
    </dl>
    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Last employer</h2>
    <dl style="margin-bottom:var(--spacing-m);">
      ${GovBB.summaryRow('Employer name', D['last-employer-name'], 'employment-history')}
      ${GovBB.summaryRow('Occupation', D['occupation'], 'employment-history')}
      ${GovBB.summaryRow('Date started', [D['date-commenced-day'], D['date-commenced-month'], D['date-commenced-year']].filter(Boolean).join('/'), 'employment-history')}
      ${GovBB.summaryRow('Last day worked', [D['last-day-work-day'], D['last-day-work-month'], D['last-day-work-year']].filter(Boolean).join('/'), 'employment-history')}
      ${GovBB.summaryRow('Reason for unemployment', D['reason-unemployment'] === 'Other' ? D['reason-unemployment-other'] : D['reason-unemployment'], 'employment-history')}
      ${pilWeeks > 0 ? GovBB.summaryRow('Payment in lieu (weeks)', String(pilWeeks), 'employment-history') : ''}
    </dl>
    <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Other employment (last 52 weeks)</h2>
    <dl style="margin-bottom:var(--spacing-m);">${empHistHtml}</dl>
    <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
      <button type="button" class="govbb-btn" onclick="next()">Submit Claim</button>
    </div>`;
  },

  'confirmation': () => `
    <div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Claim submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Reference: <strong>${window.__refNumber || 'UB-' + Math.random().toString(36).substring(2, 8).toUpperCase()}</strong></p>
      </div>
      <div style="border-left:4px solid var(--color-yellow-00);padding:var(--spacing-m);background:var(--color-yellow-10);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body" style="font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-xs);">You must attend an interview</p>
        <p class="govbb-text-body">We will contact you within 5 working days to arrange an interview at the NIS office. Bring your Termination Certificate, ID, and this reference number.</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What to bring to your interview</h2>
      <ul style="padding-left:var(--spacing-m);margin-bottom:var(--spacing-l);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Termination of Services Certificate from your employer</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">National ID card or passport</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your NIS card or number</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Bank account details (if you want direct deposit)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">This reference number: <strong>${window.__refNumber || 'UB-XXXXXX'}</strong></li>
      </ul>
      <p class="govbb-text-body"><a href="#" onclick="GovBB.nav('start')" class="govbb-link">Return to start</a></p>
    </div>`
};

function validate(pageId) {
  var D = GovBB.D;
  var errors = [];
  if (pageId === 'applicant-details') {
    if (!D['surname']) errors.push({ id: 'surname', msg: 'Surname – Enter your surname' });
    if (!D['first-name']) errors.push({ id: 'first-name', msg: 'First name – Enter your first name' });
    if (!D['nis-number']) errors.push({ id: 'nis-number', msg: 'NIS number – Enter your NIS number' });
    if (!D['nrn']) errors.push({ id: 'nrn', msg: 'NRN – Enter your National Registration Number' });
    if (!D['street-address']) errors.push({ id: 'street-address', msg: 'Street address – Enter your street address' });
    if (!D['parish']) errors.push({ id: 'parish', msg: 'Parish – Select your parish' });
    if (!D['telephone']) errors.push({ id: 'telephone', msg: 'Telephone – Enter your telephone number' });
  }
  if (pageId === 'eligibility') {
    ['b1','b2','b3','b4','b5','b6'].forEach(function(q) {
      if (!D[q]) errors.push({ id: q + '-yes', msg: q.toUpperCase() + ' – Please select Yes or No' });
    });
  }
  if (pageId === 'employment-history') {
    if (!D['last-employer-name']) errors.push({ id: 'last-employer-name', msg: 'Employer name – Enter your last employer\'s name' });
    if (!D['occupation']) errors.push({ id: 'occupation', msg: 'Occupation – Enter your occupation' });
    if (!D['last-day-work-day'] || !D['last-day-work-month'] || !D['last-day-work-year']) errors.push({ id: 'last-day-work-day', msg: 'Last day worked – Enter the date you last worked' });
    if (!D['reason-unemployment']) errors.push({ id: 'reason-unemployment', msg: 'Reason – Select the reason for unemployment' });
  }
  if (pageId === 'declaration') {
    if (!D['declaration-agree']) errors.push({ id: 'declaration-agree', msg: 'Declaration – You must confirm the declaration to continue' });
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: ['start','applicant-details','eligibility','employment-history','other-employment','declaration','check','confirmation'],
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name) {
    if (['b1','b2','b6','reason-unemployment'].indexOf(name) !== -1) GovBB.render();
  }
});
</script>
</body>
</html>

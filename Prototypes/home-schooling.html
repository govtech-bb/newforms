<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply to home-school your child – Ministry of Education Transformation</title>
  <link rel="stylesheet" href="../dist/styles.css">
</head>
<body class="govbb-page">

<div class="govbb-official-banner"><div class="govbb-container govbb-official-banner__inner"><div class="govbb-official-banner__crest"><img class="govbb-official-banner__icon" src="../dist/assets/images/govbb-creast.svg" alt="" /></div><div class="govbb-official-banner__text"><span>Official government website</span></div></div></div>

<header class="govbb-header"><div class="govbb-container govbb-header__inner"><a href="/" aria-label="Go to the alpha.gov.bb homepage"><img class="govbb-header__logo" src="../dist/assets/images/govbb-logo.svg" alt="GovBB" /></a></div></header>

<main class="govbb-page__main">
  <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-label="alpha status banner" aria-live="polite"><div class="govbb-container"><p>This page is in <a class="govbb-link govbb-link--secondary" href="#">Alpha</a>. Your feedback helps us improve.</p></div></div>
  <div class="govbb-container"><div id="app" style="padding-block: var(--spacing-l); max-width: 48rem;"></div></div>
</main>

<footer class="govbb-footer"><div class="govbb-container govbb-footer__inner"><nav class="govbb-footer__nav" aria-label="Footer"><a class="govbb-footer__link" href="#">Home</a><a class="govbb-footer__link" href="#">Privacy</a><a class="govbb-footer__link" href="#">Terms &amp; Conditions</a><a class="govbb-footer__link" href="#">Accessibility</a></nav><hr class="govbb-footer__divider" aria-hidden="true" /><div class="govbb-footer__end"><img class="govbb-footer__coat" src="../dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" /><p class="govbb-footer__copy">© 2025 Government of Barbados</p></div></div></footer>

<script src="../assets/govbb-framework.js"></script>
<script>
GovBB.clearErrors=function(){var s=document.getElementById('error-summary');if(s)s.remove();document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});};
GovBB.showErrors=function(errors){GovBB.clearErrors();if(!errors||!errors.length)return;var html='<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';errors.forEach(function(e){html+='<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');return false;">'+e.msg+'</a></li>';});html+='</ul></div>';var app=document.getElementById('app');var h1=app.querySelector('h1');if(h1)h1.insertAdjacentHTML('afterend',html);else app.insertAdjacentHTML('afterbegin',html);document.getElementById('error-summary').focus();errors.forEach(function(e){var el=document.getElementById(e.id);if(!el)return;var errId='err-'+e.id;el.setAttribute('aria-invalid','true');el.setAttribute('aria-describedby',errId);var msg=document.createElement('p');msg.className='govbb-error-message';msg.id=errId;msg.textContent=e.msg;var group=el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;if(group)group.appendChild(msg);});if(!document.title.startsWith('Error:'))document.title='Error: '+document.title;};
GovBB.summaryRow=function(label,value,changeTo){var link=changeTo?'<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>':'';return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';};
</script>
<script>
function next(){GovBB.next();}function back(){GovBB.back();}function nav(p){GovBB.nav(p);}

const FORM_NAME='Apply to home-school your child';
const CAPTION='Ministry of Education Transformation';
const MAX_CHILDREN=5, MAX_TUTORS=4;
const FLOW=['start','applicant-details','children-count','children-data','previous-school','tutors-count','tutors-data','reason','documents','declaration','check','confirmation'];

function caption(){return '<p style="border-left:4px solid var(--color-blue-40);color:var(--color-mid-grey-00);padding:var(--spacing-xs) var(--spacing-s);margin-bottom:var(--spacing-s);">'+CAPTION+'</p>';}
function parseDate(prefix){const d=parseInt(GovBB.D[prefix+'-day'],10),m=parseInt(GovBB.D[prefix+'-month'],10),y=parseInt(GovBB.D[prefix+'-year'],10);if(!d||!m||!y)return null;if(d<1||d>31||m<1||m>12||y<1990||y>2100)return false;const dt=new Date(y,m-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==m-1||dt.getDate()!==d)return false;return dt;}
function fmtDate(prefix){const d=GovBB.D[prefix+'-day'],m=GovBB.D[prefix+'-month'],y=GovBB.D[prefix+'-year'];if(!d&&!m&&!y)return '';return [d,m,y].filter(Boolean).join(' / ');}
function formatPhone(p){if(!p)return '';var digits=String(p).replace(/[^\d]/g,'');if(digits.length===10&&digits.indexOf('246')===0)return '(246) '+digits.substring(3,6)+' '+digits.substring(6);return String(p).trim();}
function countOf(key,max){const n=parseInt(GovBB.D[key],10);if(isNaN(n)||n<1)return 1;if(n>max)return max;return n;}
function childCount(){return countOf('children-count',MAX_CHILDREN);}
function tutorCount(){return countOf('tutors-count',MAX_TUTORS);}

function handleUpload(key,input){const file=input.files&&input.files[0];if(!file)return;if(file.size>10*1024*1024){alert('File is larger than 10 MB.');input.value='';return;}GovBB.D['upload-'+key]={name:file.name,size:file.size,type:file.type};GovBB.render();}
function removeUpload(key){delete GovBB.D['upload-'+key];GovBB.render();}
function formatBytes(n){if(n<1024)return n+' B';if(n<1024*1024)return (n/1024).toFixed(1)+' KB';return (n/(1024*1024)).toFixed(1)+' MB';}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function uploadRow(key,label,hint,optional){var file=GovBB.D['upload-'+key];if(file){return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);border-left:4px solid var(--color-green-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}${optional?' (optional)':''}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}<p class="govbb-text-body" style="margin:0;font-size:var(--font-size-caption);color:var(--color-mid-grey-00);word-break:break-all;"><span aria-hidden="true">✓ </span>${escapeHtml(file.name)} (${formatBytes(file.size)})</p></div><button type="button" class="govbb-btn--link" style="flex-shrink:0;" onclick="removeUpload('${key}')">Remove<span class="govbb-visually-hidden"> ${label}</span></button></div>`;}return `<div style="display:flex;justify-content:space-between;align-items:center;gap:var(--spacing-s);padding:var(--spacing-s) var(--spacing-m);border:2px solid var(--color-grey-00);background:var(--color-white-00);margin-bottom:var(--spacing-s);"><div style="min-width:0;flex:1;"><p class="govbb-text-body" style="margin:0;font-weight:var(--font-weight-bold);">${label}${optional?' (optional)':''}</p>${hint?`<p class="govbb-hint" style="margin:0;">${hint}</p>`:''}</div><label for="upload-${key}" class="govbb-btn--secondary" style="flex-shrink:0;cursor:pointer;margin:0;">Upload file</label><input type="file" id="upload-${key}" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="handleUpload('${key}', this)" /></div>`;}

function dateField(prefix,legend,hint){return `<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);"><legend class="govbb-fieldset__legend">${legend}</legend>${hint?`<p class="govbb-hint">${hint}</p>`:''}<div style="display:flex;gap:var(--spacing-s);align-items:flex-end;flex-wrap:wrap;"><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-day">Day</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-day" name="${prefix}-day" data-field="${prefix}-day" inputmode="numeric" value="${GovBB.D[prefix+'-day']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-month">Month</label><div class="govbb-date-input-wrapper"><input class="govbb-date-input" type="text" id="${prefix}-month" name="${prefix}-month" data-field="${prefix}-month" inputmode="numeric" value="${GovBB.D[prefix+'-month']||''}" /></div></div><div class="govbb-date-input__part"><label class="govbb-date-input__label" for="${prefix}-year">Year</label><div class="govbb-date-input-wrapper govbb-date-input-wrapper--year"><input class="govbb-date-input" type="text" id="${prefix}-year" name="${prefix}-year" data-field="${prefix}-year" inputmode="numeric" value="${GovBB.D[prefix+'-year']||''}" /></div></div></div></fieldset>`;}

const PAGES = {
  'start': () => `
    <div>
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb" style="margin-bottom:var(--spacing-m);">
        <ol class="govbb-breadcrumbs__list">
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Home</a></li>
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="#">Education and schooling</a></li>
        </ol>
      </nav>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-xs);">Apply to home-school your child</h1>
      <p class="govbb-text-body" style="color:var(--color-mid-grey-00);margin-bottom:var(--spacing-xs);">Last updated on 14 June 2025</p>
      <hr style="border:none;border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-s);">

      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Use this form to apply for permission to home-school your child in Barbados. Permission must be granted by the Permanent Secretary, Ministry of Education Transformation.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Apply online. There is no application fee. Takes about <strong>20 minutes</strong> — gather your documents and tutor information first. You can include up to <strong>5 children and 4 tutors</strong> on one application.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <div style="border-left:4px solid var(--color-yellow-100);padding:var(--spacing-s) var(--spacing-m);background:var(--color-yellow-40);margin-bottom:var(--spacing-m);">
        <p class="govbb-text-body"><strong>An interview is required.</strong> After you submit, the Ministry will arrange an interview with you before written permission is granted. You will also be expected to provide regular progress information for each child.</p>
      </div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What you'll need</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your contact details and residency status</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Each child's full name and date of birth (up to 5 children)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Details of the previous school each child attended, if any</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Names and qualifications of the tutors who will teach (up to 4 tutors)</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A clear reason for choosing to home-school</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If you are not following the National Curriculum, a copy of your curriculum. The National Curriculum is at <a href="https://www.mes.gov.bb" class="govbb-link">www.mes.gov.bb</a>.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Documents to upload (PDF, JPG, PNG, DOC — up to 10 MB each):
          <ul style="list-style:circle;padding-left:var(--spacing-m);margin-top:var(--spacing-xs);">
            <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">A timetable including English, Mathematics, Science, Social Studies, and Physical Activity</li>
            <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Your curriculum (only if not following the National Curriculum)</li>
            <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Certified copies of qualifications for each tutor</li>
            <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Each child's previous progress report or report card (if available)</li>
          </ul>
        </li>
      </ul>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">The Administrative Officer in the Nursery and Primary Section will review your application and call you to arrange an interview within <strong>3 weeks</strong>. The interview helps the Ministry decide whether to grant permission.</p>

      <div style="margin-bottom:var(--spacing-l);"><button type="button" class="govbb-btn" onclick="next()">Start application</button></div>

      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact us</h2>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Call the Administrative Officer, Nursery and Primary Section on <strong>+1 (246) 535-0760</strong> if you need help.</p>
    </div>`,

  'applicant-details': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">About you</h1>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="applicant-name">Full name</label>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="applicant-name" name="applicant-name" data-field="applicant-name" value="${GovBB.D['applicant-name']||''}" /></div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="applicant-address">Address</label>
        <textarea class="govbb-textarea" id="applicant-address" name="applicant-address" data-field="applicant-address" rows="3">${GovBB.D['applicant-address']||''}</textarea>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="applicant-phone">Contact number</label>
        <p class="govbb-hint">For example, (246) 249 1234.</p>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="tel" id="applicant-phone" name="applicant-phone" data-field="applicant-phone" inputmode="tel" value="${GovBB.D['applicant-phone']||''}" /></div>
      </div>

      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="applicant-email">Email address</label>
        <p class="govbb-hint">For example, you@example.com.</p>
        <div class="govbb-input-wrapper"><input class="govbb-input" type="email" id="applicant-email" name="applicant-email" data-field="applicant-email" inputmode="email" value="${GovBB.D['applicant-email']||''}" /></div>
      </div>

      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Your residency status in Barbados</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="residency-resident" name="residency" data-field="residency" value="Resident"${GovBB.D['residency']==='Resident'?' checked':''} /><label class="govbb-radio-item__label" for="residency-resident">Resident</label></div>
          <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="residency-non" name="residency" data-field="residency" value="Non-resident"${GovBB.D['residency']==='Non-resident'?' checked':''} /><label class="govbb-radio-item__label" for="residency-non">Non-resident</label></div>
        </div>
      </fieldset>

      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'children-count': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">How many children?</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">You can include up to <strong>${MAX_CHILDREN}</strong> children on one application.</p>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Number of children to be home-schooled</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          ${Array.from({length:MAX_CHILDREN},(_,i)=>i+1).map(n=>`<div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="children-count-${n}" name="children-count" data-field="children-count" value="${n}"${String(GovBB.D['children-count'])===String(n)?' checked':''} /><label class="govbb-radio-item__label" for="children-count-${n}">${n} ${n===1?'child':'children'}</label></div>`).join('')}
        </div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'children-data': () => {
    const count = childCount();
    for (let i = count + 1; i <= MAX_CHILDREN; i++) {
      ['name','dob-day','dob-month','dob-year'].forEach(f=>delete GovBB.D['child-'+i+'-'+f]);
    }
    let sections = '';
    for (let i = 1; i <= count; i++) {
      sections += `
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-l);border-top:2px solid var(--color-grey-00);padding-top:var(--spacing-m);">
        <legend class="govbb-fieldset__legend govbb-text-h2" style="padding:0 var(--spacing-s);">Child ${i}</legend>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="child-${i}-name">Full name</label>
          <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="child-${i}-name" name="child-${i}-name" data-field="child-${i}-name" value="${GovBB.D['child-'+i+'-name']||''}" /></div>
        </div>
        ${dateField('child-'+i+'-dob', 'Date of birth', 'For example, 15 6 2014.')}
      </fieldset>`;
    }
    return `<form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">${count===1?'About the child':'About the children'}</h1>
      ${sections}
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;
  },

  'previous-school': () => {
    /* Ghost data cleanup: when "Previously in school?" is anything other
       than Yes, purge any previously-entered school name/address so they
       can't leak into the submission. */
    if (GovBB.D['prev-school'] !== 'Yes') {
      delete GovBB.D['prev-school-name'];
      delete GovBB.D['prev-school-address'];
    }
    return `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Previous school</h1>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">${childCount()===1?'Was your child previously in school?':'Were any of your children previously in school?'}</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="prev-school-yes" name="prev-school" data-field="prev-school" value="Yes"${GovBB.D['prev-school']==='Yes'?' checked':''} data-trigger-render="1" /><label class="govbb-radio-item__label" for="prev-school-yes">Yes</label></div>
          <div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="prev-school-no" name="prev-school" data-field="prev-school" value="No"${GovBB.D['prev-school']==='No'?' checked':''} data-trigger-render="1" /><label class="govbb-radio-item__label" for="prev-school-no">No</label></div>
        </div>
      </fieldset>
      ${GovBB.D['prev-school']==='Yes'?`
      <div style="padding-left:var(--spacing-m);border-left:4px solid var(--color-blue-40);margin-bottom:var(--spacing-m);">
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="prev-school-name">Name of school</label>
          <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="prev-school-name" name="prev-school-name" data-field="prev-school-name" value="${GovBB.D['prev-school-name']||''}" /></div>
        </div>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="prev-school-address">Address of school</label>
          <textarea class="govbb-textarea" id="prev-school-address" name="prev-school-address" data-field="prev-school-address" rows="2">${GovBB.D['prev-school-address']||''}</textarea>
        </div>
      </div>`:''}
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;
  },

  'tutors-count': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Who will teach the children?</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">List up to <strong>${MAX_TUTORS}</strong> tutors who will be involved in teaching. Each tutor's qualifications must be uploaded on the documents step.</p>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-fieldset__legend">Number of tutors</legend>
        <div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">
          ${Array.from({length:MAX_TUTORS},(_,i)=>i+1).map(n=>`<div class="govbb-radio-item"><input class="govbb-radio" type="radio" id="tutors-count-${n}" name="tutors-count" data-field="tutors-count" value="${n}"${String(GovBB.D['tutors-count'])===String(n)?' checked':''} /><label class="govbb-radio-item__label" for="tutors-count-${n}">${n} ${n===1?'tutor':'tutors'}</label></div>`).join('')}
        </div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'tutors-data': () => {
    const count = tutorCount();
    for (let i = count + 1; i <= MAX_TUTORS; i++) {
      ['name','qualifications'].forEach(f=>delete GovBB.D['tutor-'+i+'-'+f]);
    }
    let sections = '';
    for (let i = 1; i <= count; i++) {
      sections += `
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-l);border-top:2px solid var(--color-grey-00);padding-top:var(--spacing-m);">
        <legend class="govbb-fieldset__legend govbb-text-h2" style="padding:0 var(--spacing-s);">Tutor ${i}</legend>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="tutor-${i}-name">Full name</label>
          <div class="govbb-input-wrapper"><input class="govbb-input" type="text" id="tutor-${i}-name" name="tutor-${i}-name" data-field="tutor-${i}-name" value="${GovBB.D['tutor-'+i+'-name']||''}" /></div>
        </div>
        <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
          <label class="govbb-label" for="tutor-${i}-qualifications">List of qualifications</label>
          <p class="govbb-hint">For example, "BSc Education, University of the West Indies, 2015". You will upload certified copies on the documents step.</p>
          <textarea class="govbb-textarea" id="tutor-${i}-qualifications" name="tutor-${i}-qualifications" data-field="tutor-${i}-qualifications" rows="3">${GovBB.D['tutor-'+i+'-qualifications']||''}</textarea>
        </div>
      </fieldset>`;
    }
    return `<form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">${count===1?'About the tutor':'About the tutors'}</h1>
      ${sections}
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`;
  },

  'reason': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Why do you want to home-school?</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">The Permanent Secretary needs to understand your reason for home-schooling. Be honest and specific. This is used to assess your application and prepare for the interview.</p>
      <div class="govbb-form-group" style="margin-bottom:var(--spacing-m);">
        <label class="govbb-label" for="reason-text">Your reason</label>
        <p class="govbb-hint">A short paragraph is enough. You can also mention any plans for socialisation, sports, and out-of-home learning.</p>
        <textarea class="govbb-textarea" id="reason-text" name="reason-text" data-field="reason-text" rows="6">${GovBB.D['reason-text']||''}</textarea>
      </div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>
    </form>`,

  'documents': () => {
    const docs = [
      { key:'timetable', label:'Timetable', hint:'Must include English, Mathematics, Science, Social Studies, and a session of Physical Activity.', required:true },
      { key:'curriculum', label:'Curriculum (if not National Curriculum)', hint:'Only required if you are not following the National Curriculum.', required:false }
    ];
    const tutorDocs = [];
    for (let i = 1; i <= tutorCount(); i++) {
      tutorDocs.push({ key:'tutor-'+i+'-cert', label:'Tutor '+i+' — certified qualifications', hint:'Certified copy of the tutor\'s qualifications. If the tutor has multiple certificates, combine them into a single PDF before uploading. Certification is verified at the interview.', required:true });
    }
    const progressDocs = [];
    for (let i = 1; i <= childCount(); i++) {
      progressDocs.push({ key:'child-'+i+'-progress', label:'Child '+i+' — previous progress report', hint:'Last report card or progress report from previous school, if available.', required:false });
    }
    const all = [...docs, ...tutorDocs, ...progressDocs];
    const requiredCount = all.filter(d=>d.required).length;
    const uploaded = all.filter(d=>!!GovBB.D['upload-'+d.key]).length;

    return `${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Upload your documents</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-s);">Upload clear scans or photos. Accepted formats: PDF, JPG, PNG, DOC. Maximum size: 10 MB per file.</p>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);" aria-live="polite"><strong>${uploaded} of ${all.length} documents uploaded</strong> (${requiredCount} required, ${all.length - requiredCount} optional).</p>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Required: curriculum and timetable</h2>
      <div style="margin-bottom:var(--spacing-l);">${docs.map(d=>uploadRow(d.key, d.label, d.hint, !d.required)).join('')}</div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Required: tutor qualifications</h2>
      <div style="margin-bottom:var(--spacing-l);">${tutorDocs.map(d=>uploadRow(d.key, d.label, d.hint, !d.required)).join('')}</div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Optional: previous progress reports</h2>
      <div style="margin-bottom:var(--spacing-l);">${progressDocs.map(d=>uploadRow(d.key, d.label, d.hint, !d.required)).join('')}</div>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue</button>
      </div>`;
  },

  'declaration': () => `
    <form novalidate>${caption()}
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Declaration</h1>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Before submitting, please confirm the following.</p>
      <fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">
        <legend class="govbb-visually-hidden">Declaration</legend>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-accurate" name="decl-accurate" data-field="decl-accurate"${GovBB.D['decl-accurate']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-accurate">The information I have given is true and correct.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-interview" name="decl-interview" data-field="decl-interview"${GovBB.D['decl-interview']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-interview">I understand that the Ministry will arrange an interview before written permission is granted.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-monitoring" name="decl-monitoring" data-field="decl-monitoring"${GovBB.D['decl-monitoring']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-monitoring">I agree to provide the Ministry with regular progress information for each child.</label></div>
        <div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);"><input class="govbb-checkbox" type="checkbox" id="decl-false" name="decl-false" data-field="decl-false"${GovBB.D['decl-false']?' checked':''} /><label class="govbb-checkbox-item__label" for="decl-false">I understand that providing false information may result in my application being refused.</label></div>
      </fieldset>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Continue to review</button>
      </div>
    </form>`,

  'check': () => {
    const cc = childCount(), tc = tutorCount();
    let childRows='';
    for (let i=1;i<=cc;i++) {
      childRows+=`<h3 class="govbb-text-h3" style="margin-bottom:var(--spacing-s);">Child ${i}</h3><dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">${GovBB.summaryRow('Name', GovBB.D['child-'+i+'-name'], 'children-data')}${GovBB.summaryRow('Date of birth', fmtDate('child-'+i+'-dob'), 'children-data')}</dl>`;
    }
    let tutorRows='';
    for (let i=1;i<=tc;i++) {
      tutorRows+=`<h3 class="govbb-text-h3" style="margin-bottom:var(--spacing-s);">Tutor ${i}</h3><dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">${GovBB.summaryRow('Name', GovBB.D['tutor-'+i+'-name'], 'tutors-data')}${GovBB.summaryRow('Qualifications', GovBB.D['tutor-'+i+'-qualifications'], 'tutors-data')}</dl>`;
    }
    return `<div>
      <h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-m);">Check your answers before submitting</h1>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About you</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Name', GovBB.D['applicant-name'], 'applicant-details')}
        ${GovBB.summaryRow('Address', GovBB.D['applicant-address'], 'applicant-details')}
        ${GovBB.summaryRow('Phone', formatPhone(GovBB.D['applicant-phone']), 'applicant-details')}
        ${GovBB.summaryRow('Email', GovBB.D['applicant-email'], 'applicant-details')}
        ${GovBB.summaryRow('Residency status', GovBB.D['residency'], 'applicant-details')}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Children (${cc})</h2>${childRows}
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Previous school</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">
        ${GovBB.summaryRow('Previously in school?', GovBB.D['prev-school'], 'previous-school')}
        ${GovBB.D['prev-school']==='Yes'?GovBB.summaryRow('School name', GovBB.D['prev-school-name'], 'previous-school'):''}
        ${GovBB.D['prev-school']==='Yes'?GovBB.summaryRow('School address', GovBB.D['prev-school-address'], 'previous-school'):''}
      </dl>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Tutors (${tc})</h2>${tutorRows}
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Reason for home-schooling</h2>
      <dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">${GovBB.summaryRow('Reason', GovBB.D['reason-text'], 'reason')}</dl>
      <p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">By submitting this form you agree to attend an interview before written permission is granted.</p>
      <div class="govbb-btn-group" style="margin-top:var(--spacing-l);">
        <button type="button" class="govbb-btn--secondary" onclick="back()">Previous</button>
        <button type="button" class="govbb-btn" onclick="next()">Submit application</button>
      </div>
    </div>`;
  },

  'confirmation': () => {
    window.__refNumber=window.__refNumber||('HS-'+Math.random().toString(36).substring(2,8).toUpperCase());
    if(document.title.indexOf('Error: ')===0)document.title=document.title.substring('Error: '.length);
    return `<div>
      <div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">
        <h1 class="govbb-text-h1" style="color:var(--color-green-00);">Application submitted</h1>
        <p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number</p>
        <p style="font-size:var(--font-size-h2);font-weight:var(--font-weight-bold);">${window.__refNumber}</p>
      </div>
      <h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">What happens next</h2>
      <ul style="list-style:disc;padding-left:var(--spacing-m);margin-bottom:var(--spacing-m);">
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">The Administrative Officer in the Nursery and Primary Section will review your application.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">You will be contacted within <strong>3 weeks</strong> to arrange an interview.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">Written permission is granted (or refused) after the interview, by the Permanent Secretary.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">We'll email a copy of your application to ${GovBB.D['applicant-email']||'the address you provided'} once it has been processed.</li>
        <li class="govbb-text-body" style="margin-bottom:var(--spacing-xs);">If you do not hear from us, call <strong>+1 (246) 535-0760</strong>.</li>
      </ul>
    </div>`;
  }
};

function validate(pageId){
  const D=GovBB.D,errors=[];
  const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  function req(id,msg){if(!D[id]||String(D[id]).trim()==='')errors.push({id:id,msg:msg});}
  function reqPhone(id,label,required,emptyMsg){var v=(D[id]||'').trim();if(!v){if(required)errors.push({id:id,msg:emptyMsg});return;}var digits=v.replace(/[\s\-()+]/g,'');if(!/^\d{7,15}$/.test(digits))errors.push({id:id,msg:label+' must contain 7 to 15 digits'});}
  function reqEmail(id,label,emptyMsg){var v=(D[id]||'').trim();if(!v){errors.push({id:id,msg:emptyMsg});return;}if(!EMAIL_RE.test(v))errors.push({id:id,msg:label+' must be in the format you@example.com'});}
  function reqDate(prefix,label){const dayV=D[prefix+'-day'],monV=D[prefix+'-month'],yrV=D[prefix+'-year'];if(!dayV||!monV||!yrV){errors.push({id:prefix+'-day',msg:label+' — enter a complete date.'});return null;}const dt=parseDate(prefix);if(dt===false){errors.push({id:prefix+'-day',msg:label+' — enter a real date.'});return null;}return dt;}

  if(pageId==='applicant-details'){
    req('applicant-name','Enter your full name');
    req('applicant-address','Enter your address');
    reqPhone('applicant-phone','Contact number',true,'Enter a contact number');
    reqEmail('applicant-email','Email address','Enter your email address');
    if(!D['residency'])errors.push({id:'residency-resident',msg:'Select your residency status'});
  }
  if(pageId==='children-count'){if(!D['children-count'])errors.push({id:'children-count-1',msg:'Choose how many children'});}
  if(pageId==='children-data'){
    for(let i=1;i<=childCount();i++){
      req('child-'+i+'-name','Child '+i+' — enter the full name');
      const dob=reqDate('child-'+i+'-dob','Child '+i+' date of birth');
      if(dob){const today=new Date();today.setHours(0,0,0,0);const age=today.getFullYear()-dob.getFullYear();if(dob>=today)errors.push({id:'child-'+i+'-dob-day',msg:'Child '+i+' — date of birth must be in the past.'});else if(age<3||age>18)errors.push({id:'child-'+i+'-dob-day',msg:'Child '+i+' — children for home-schooling are usually 3 to 18.'});}
    }
  }
  if(pageId==='previous-school'){
    if(!D['prev-school'])errors.push({id:'prev-school-yes',msg:'Select yes or no'});
    if(D['prev-school']==='Yes'){req('prev-school-name','Enter the name of the previous school');req('prev-school-address','Enter the address of the previous school');}
  }
  if(pageId==='tutors-count'){if(!D['tutors-count'])errors.push({id:'tutors-count-1',msg:'Choose how many tutors'});}
  if(pageId==='tutors-data'){
    for(let i=1;i<=tutorCount();i++){
      req('tutor-'+i+'-name','Tutor '+i+' — enter the full name');
      var q=(D['tutor-'+i+'-qualifications']||'').trim();
      if(!q)errors.push({id:'tutor-'+i+'-qualifications',msg:'Tutor '+i+' — list the qualifications'});
      else if(q.length<15)errors.push({id:'tutor-'+i+'-qualifications',msg:'Tutor '+i+' — add more detail about qualifications'});
    }
  }
  if(pageId==='reason'){
    var r=(D['reason-text']||'').trim();
    if(!r)errors.push({id:'reason-text',msg:'Briefly explain why you want to home-school'});
    else if(r.length<30)errors.push({id:'reason-text',msg:'Add more detail — the Permanent Secretary needs enough context to consider the application.'});
  }
  if(pageId==='documents'){
    if(!D['upload-timetable'])errors.push({id:'upload-timetable',msg:'Upload the timetable'});
    for(let i=1;i<=tutorCount();i++){
      if(!D['upload-tutor-'+i+'-cert'])errors.push({id:'upload-tutor-'+i+'-cert',msg:'Upload certified qualifications for Tutor '+i});
    }
  }
  if(pageId==='declaration'){
    if(!D['decl-accurate'])errors.push({id:'decl-accurate',msg:'Tick the box to confirm the information is true and correct'});
    if(!D['decl-interview'])errors.push({id:'decl-interview',msg:'Tick the box to confirm you understand the interview requirement'});
    if(!D['decl-monitoring'])errors.push({id:'decl-monitoring',msg:'Tick the box to confirm you agree to provide progress information'});
    if(!D['decl-false'])errors.push({id:'decl-false',msg:'Tick the box to confirm you understand the consequences'});
  }
  return errors;
}

GovBB.init({formName:FORM_NAME,flow:FLOW,pages:PAGES,validate:validate});
</script>
</body>

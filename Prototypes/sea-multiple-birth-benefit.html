</footer>

<script src="../assets/govbb-framework.js"></script>
<script>
/* ───────── Helpers ───────── */
function styledSelect(id, label, options, opts) {
  opts = opts || {};
  var val = GovBB.D[id] || '';
  var hint = opts.hint ? '<p class="text-[1.25rem] leading-normal text-bb-mid-grey-00 mt-xs">' + esc(opts.hint) + '</p>' : '';
  var trigger = opts.triggerRender ? ' data-trigger-render="1"' : '';
  var ops = '<option value="">Select one</option>';
  options.forEach(function (o) {
    var v = (typeof o === 'object') ? o.value : o;
    var l = (typeof o === 'object') ? o.label : o;
    ops += '<option value="' + esc(v) + '"' + (val === v ? ' selected' : '') + '>' + esc(l) + '</option>';
  });
  return '<div class="field-group flex flex-col gap-xs w-full items-start">' +
    '<label for="' + id + '" class="block text-[1.25rem] leading-normal font-bold text-bb-black-00">' + esc(label) + '</label>' +
    hint +
    '<div class="' + GovBB.INPUT_WRAP_CLS + '">' +
      '<select id="' + id + '" name="' + id + '" data-field="' + id + '"' + trigger + ' class="' + GovBB.INPUT_CLS + ' cursor-pointer">' + ops + '</select>' +
    '</div>' +
  '</div>';
}

function btnGroup(back, nextLabel) {
  var backHtml = back
    ? '<a href="#" onclick="back();return false;" class="' + GovBB.LINK_CLS + ' text-[1.25rem] flex items-center gap-1">&#8592; Back</a>'
    : '';
  return '<div class="mt-8 flex flex-col gap-4 sm:flex-row sm:items-center">' +
    '<button type="button" onclick="next()" class="' + GovBB.BTN_CLS + '">' + esc(nextLabel || 'Continue') + '</button>' +
    backHtml +
  '</div>';
}

function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ───────── Global nav shortcuts ───────── */
function next() { GovBB.next(); }
function back() { GovBB.back(); }
function nav(p)  { GovBB.nav(p); }

/* ───────── Constants ───────── */
var CAPTION = 'Social Empowerment Agency';

var BANKS = [
  'Barbados National Bank',
  'First Caribbean International Bank',
  'Republic Bank',
  'RBC Royal Bank',
  'Scotiabank',
  'Sagicor Bank',
  'Massy United Insurance',
  'City of Bridgetown Credit Union',
  'Barbados Public Workers Credit Union',
  'Teachers Credit Union',
  'Police Cooperative Credit Union',
  'Other'
];

/* ───────── Flow ───────── */
var FLOW = [
  'start',
  'applicant-details',
  'applicant-contact',
  'children-info',
  'children-data',
  'banking',
  'documents',
  'declaration',
  'check',
  'confirmation'
];

/* ───────── Child count helper ───────── */
function childCount() {
  var bt = GovBB.D['birth-type'] || '';
  if (bt.indexOf('Triplets') !== -1) return 3;
  return 2; // default to twins
}

/* ───────── Child block renderer ───────── */
function renderChildBlock(i) {
  return '<div class="space-y-6 border-l-4 border-bb-blue-40 pl-s">' +
    '<h2 class="text-[1.5rem] font-bold text-bb-black-00">Child ' + i + '</h2>' +
    GovBB.textField('child-' + i + '-name', 'Full name') +
    GovBB.textField('child-' + i + '-id', 'National ID Number', { hint: 'Leave blank if not yet issued.' }) +
    GovBB.dateField('child-' + i + '-dob', 'Date of birth') +
    styledSelect('child-' + i + '-sex', 'Sex', ['Male', 'Female']) +
    GovBB.textField('child-' + i + '-school', 'Nursery or school attending', { hint: 'Write "Not yet enrolled" if applicable.' }) +
  '</div>';
}

/* ───────── Summary helpers ───────── */
function dob(prefix) {
  var d = GovBB.D[prefix + '-day'] || '';
  var m = GovBB.D[prefix + '-month'] || '';
  var y = GovBB.D[prefix + '-year'] || '';
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function childSummaryRows(i) {
  return GovBB.summaryRow('Full name', GovBB.D['child-' + i + '-name'], 'children-data') +
    GovBB.summaryRow('Date of birth', dob('child-' + i + '-dob'), 'children-data') +
    GovBB.summaryRow('Sex', GovBB.D['child-' + i + '-sex'], 'children-data') +
    GovBB.summaryRow('National ID Number', GovBB.D['child-' + i + '-id'] || 'Not provided', 'children-data') +
    GovBB.summaryRow('Nursery or school', GovBB.D['child-' + i + '-school'], 'children-data');
}

/* ───────── Pages ───────── */
var PAGES = {

  /* ── START ── */
  'start': function () {
    return GovBB.caption(CAPTION) +
      '<h1 class="text-[2rem] font-bold text-bb-black-00 mb-m">Multiple Birth Benefit Application</h1>' +
      '<p class="text-[1.25rem] leading-relaxed mb-s">Apply for the one-time Multiple Birth Benefit if you are the parent or guardian of twins or triplets born in Barbados.</p>' +
      '<p class="text-[1.25rem] leading-relaxed mb-m">This benefit is paid directly to your bank account or credit union account.</p>' +

      '<div class="bg-bb-blue-10 border-l-4 border-bb-blue-40 p-m mb-m">' +
        '<p class="text-[1.25rem] leading-relaxed font-semibold">This is a one-time benefit. You can only apply once per multiple birth.</p>' +
      '</div>' +

      '<p class="text-[1.25rem] leading-relaxed mb-xs"><strong>Time to complete:</strong> About 10 minutes.</p>' +

      '<p class="text-[1.25rem] font-bold text-bb-black-00 mt-m mb-xs">What you will need</p>' +
      '<ul class="list-disc pl-6 space-y-2 text-[1.25rem] leading-relaxed mb-m">' +
        '<li>Your National ID number and date of birth</li>' +
        '<li>The ID numbers and birth certificates for each child</li>' +
        '<li>Your bank or credit union account details</li>' +
        '<li>Nursery or school details for each child</li>' +
      '</ul>' +

      '<p class="text-[1.25rem] leading-relaxed mb-m"><strong>Need help?</strong> Call the Social Empowerment Agency at <a href="tel:+12464675100" class="' + GovBB.LINK_CLS + '">+1 (246) 467-5100</a>.</p>' +

      GovBB.startBtn('Start application');
  },

  /* ── APPLICANT DETAILS ── */
  'applicant-details': function () {
    return GovBB.backLink() +
      GovBB.caption(CAPTION) +
      '<h1 class="text-[2rem] font-bold text-bb-black-00 mb-l">About you</h1>' +
      '<div class="space-y-6">' +
        GovBB.textField('fullname', 'Full name') +
        GovBB.dateField('dob', 'Date of birth') +
        styledSelect('sex', 'Sex', ['Male', 'Female']) +
        GovBB.textField('id-number', 'National ID Number', { hint: 'Your national registration number, for example 110915-0048.' }) +
        GovBB.emailField('email', 'Email address (optional)') +
      '</div>' +
      btnGroup(true, 'Continue');
  },

  /* ── APPLICANT CONTACT ── */
  'applicant-contact': function () {
    return GovBB.backLink() +
      GovBB.caption(CAPTION) +
      '<h1 class="text-[2rem] font-bold text-bb-black-00 mb-l">Your contact details</h1>' +
      '<div class="space-y-6">' +
        GovBB.textField('address', 'Home address') +
        styledSelect('parish', 'Parish', GovBB.PARISHES) +
        GovBB.textField('postal-code', 'Postal code (optional)', { hint: 'For example, BB11000.' }) +
        GovBB.telField('phone', 'Telephone number', { hint: '246 249-1234.' }) +
        GovBB.telField('phone-alt', 'Alternative telephone number (optional)') +
      '</div>' +
      btnGroup(true, 'Continue');
  },

  /* ── CHILDREN INFO ── */
  'children-info': function () {
    return GovBB.backLink() +
      GovBB.caption(CAPTION) +
      '<h1 class="text-[2rem] font-bold text-bb-black-00 mb-l">About the children</h1>' +
      '<div class="space-y-8">' +
        GovBB.radioGroup('relationship', 'What is your relationship to the children?', ['Mother', 'Father', 'Guardian']) +
        GovBB.radioGroup('birth-type', 'How many children were born in this birth?', ['Twins (2 children)', 'Triplets (3 children)']) +
      '</div>' +
      btnGroup(true, 'Continue');
  },

  /* ── CHILDREN DATA ── */
  'children-data': function () {
    var count = childCount();
    var blocks = '';
    for (var i = 1; i <= count; i++) {
      blocks += renderChildBlock(i);
    }
    return GovBB.backLink() +
      GovBB.caption(CAPTION) +
      '<h1 class="text-[2rem] font-bold text-bb-black-00 mb-s">Children\'s details</h1>' +
      '<p class="text-[1.25rem] leading-relaxed mb-l">Enter the details for each child.</p>' +
      '<div class="space-y-10">' + blocks + '</div>' +
      btnGroup(true, 'Continue');
  },

  /* ── BANKING ── */
  'banking': function () {
    var bankVal = GovBB.D['bank-name'] || '';
    var showOther = bankVal === 'Other';
    return GovBB.backLink() +
      GovBB.caption(CAPTION) +
      '<h1 class="text-[2rem] font-bold text-bb-black-00 mb-s">Banking details</h1>' +
      '<p class="text-[1.25rem] leading-relaxed mb-l">The benefit will be paid directly into your account.</p>' +
      '<div class="space-y-6">' +
        styledSelect('bank-name', 'Name of bank or credit union', BANKS, { triggerRender: true }) +
        (showOther ? GovBB.textField('bank-name-other', 'Name of bank or credit union') : '') +
        GovBB.textField('bank-branch', 'Branch', { hint: 'The location where your account was originally opened. For example: Broad Street, Bridgetown.' }) +
        GovBB.textField('bank-account', 'Account number') +
      '</div>' +
      btnGroup(true, 'Continue');
  },

  /* ── DOCUMENTS ── */
  'documents': function () {
    var docsVal = GovBB.D['docs-ready'] || '';
    var showNoNote = docsVal === 'No, I need more time';
    return GovBB.backLink() +
      GovBB.caption(CAPTION) +
      '<h1 class="text-[2rem] font-bold text-bb-black-00 mb-s">Documents you must provide</h1>' +

      '<div class="bg-bb-yellow-40 border-l-4 border-yellow-600 p-m mb-m">' +
        '<p class="text-[1.25rem] font-semibold leading-relaxed">Your application will not be processed without all required documents.</p>' +
      '</div>' +

      '<p class="text-[1.25rem] leading-relaxed mb-m">When you submit this form, you must bring or send certified copies of the following:</p>' +

      '<div class="space-y-4 mb-m">' +
        GovBB.checkboxItem('doc-parent-id', "Parent's or guardian's National Registration Card") +
        GovBB.checkboxItem('doc-birth-cert', 'Birth certificate for each child') +
        GovBB.checkboxItem('doc-child-id', 'National Registration Card for each child') +
        GovBB.checkboxItem('doc-banking', 'Banking details confirmation — bank statement or letter from your bank') +
      '</div>' +

      '<p class="text-[1.25rem] leading-relaxed mb-l">Certified copies can be obtained from a Justice of the Peace, Commissioner of Oaths, or Notary Public.</p>' +

      '<div class="space-y-6">' +
        GovBB.radioGroup('docs-ready', 'Do you have certified copies of all required documents ready?', ['Yes', 'No, I need more time']) +
        (showNoNote ? '<div class="bg-bb-teal-10 border-l-4 border-bb-teal-00 p-m">' +
          '<p class="text-[1.25rem] leading-relaxed">You can save and return to complete this application. However, your application will not be processed until all documents are received.</p>' +
        '</div>' : '') +
      '</div>' +

      btnGroup(true, 'Continue');
  },

  /* ── DECLARATION ── */
  'declaration': function () {
    return GovBB.backLink() +
      GovBB.caption(CAPTION) +
      '<h1 class="text-[2rem] font-bold text-bb-black-00 mb-s">Declaration</h1>' +
      '<p class="text-[1.25rem] leading-relaxed mb-l">By submitting this application, you confirm the following.</p>' +
      '<div class="space-y-6 mb-l">' +
        GovBB.checkboxItem('decl-accurate', 'I declare that the information provided in this application is true and correct to the best of my knowledge.') +
        GovBB.checkboxItem('decl-false', 'I understand that providing false or misleading information may result in disqualification from the benefit and possible legal action.') +
        GovBB.checkboxItem('decl-changes', 'I agree to immediately report any changes in the children\'s circumstances to the Social Empowerment Agency.') +
      '</div>' +
      btnGroup(true, 'Submit application');
  },

  /* ── CHECK YOUR ANSWERS ── */
  'check': function () {
    var count = childCount();

    // Build child sections
    var childSections = '';
    for (var i = 1; i <= count; i++) {
      childSections +=
        '<div class="summary-section">' +
          '<h2 class="text-[1.25rem] font-bold text-bb-black-00 mb-s">Child ' + i + '</h2>' +
          '<dl class="summary-list">' +
            childSummaryRows(i) +
          '</dl>' +
        '</div>';
    }

    return GovBB.backLink() +
      GovBB.caption(CAPTION) +
      '<h1 class="text-[2rem] font-bold text-bb-black-00 mb-l">Check your answers</h1>' +

      '<div class="space-y-8">' +

        '<div class="summary-section">' +
          '<h2 class="text-[1.25rem] font-bold text-bb-black-00 mb-s">About you</h2>' +
          '<dl class="summary-list">' +
            GovBB.summaryRow('Full name', GovBB.D['fullname'], 'applicant-details') +
            GovBB.summaryRow('Date of birth', dob('dob'), 'applicant-details') +
            GovBB.summaryRow('Sex', GovBB.D['sex'], 'applicant-details') +
            GovBB.summaryRow('National ID Number', GovBB.D['id-number'], 'applicant-details') +
            GovBB.summaryRow('Email address', GovBB.D['email'] || 'Not provided', 'applicant-details') +
          '</dl>' +
        '</div>' +

        '<div class="summary-section">' +
          '<h2 class="text-[1.25rem] font-bold text-bb-black-00 mb-s">Contact details</h2>' +
          '<dl class="summary-list">' +
            GovBB.summaryRow('Home address', GovBB.D['address'], 'applicant-contact') +
            GovBB.summaryRow('Parish', GovBB.D['parish'], 'applicant-contact') +
            GovBB.summaryRow('Postal code', GovBB.D['postal-code'] || 'Not provided', 'applicant-contact') +
            GovBB.summaryRow('Telephone number', GovBB.D['phone'], 'applicant-contact') +
            GovBB.summaryRow('Alternative telephone', GovBB.D['phone-alt'] || 'Not provided', 'applicant-contact') +
          '</dl>' +
        '</div>' +

        '<div class="summary-section">' +
          '<h2 class="text-[1.25rem] font-bold text-bb-black-00 mb-s">Children\'s information</h2>' +
          '<dl class="summary-list">' +
            GovBB.summaryRow('Relationship to children', GovBB.D['relationship'], 'children-info') +
            GovBB.summaryRow('Birth type', GovBB.D['birth-type'], 'children-info') +
          '</dl>' +
        '</div>' +

        childSections +

        '<div class="summary-section">' +
          '<h2 class="text-[1.25rem] font-bold text-bb-black-00 mb-s">Banking details</h2>' +
          '<dl class="summary-list">' +
            GovBB.summaryRow('Bank or credit union', GovBB.D['bank-name'] === 'Other' ? (GovBB.D['bank-name-other'] || 'Other') : GovBB.D['bank-name'], 'banking') +
            GovBB.summaryRow('Branch', GovBB.D['bank-branch'], 'banking') +
            GovBB.summaryRow('Account number', GovBB.D['bank-account'], 'banking') +
          '</dl>' +
        '</div>' +

      '</div>' +

      '<div class="mt-8 flex flex-col gap-4 sm:flex-row sm:items-center">' +
        '<button type="button" onclick="next()" class="' + GovBB.BTN_CLS + '">Submit application</button>' +
        '<a href="#" onclick="back();return false;" class="' + GovBB.LINK_CLS + ' text-[1.25rem] flex items-center gap-1">&#8592; Back</a>' +
      '</div>';
  },

  /* ── CONFIRMATION ── */
  'confirmation': function () {
    var ref = window.__refNumber || ('SEA-MBB-' + Math.random().toString(36).substring(2, 8).toUpperCase());
    window.__refNumber = ref;
    return '<div class="border-l-4 border-green-600 pl-m mb-l">' +
        '<h1 class="text-[2rem] font-bold text-green-700 mb-xs">Application submitted</h1>' +
        '<p class="text-[1.25rem] leading-relaxed text-bb-black-00">Your reference number is <strong>' + esc(ref) + '</strong></p>' +
      '</div>' +

      '<p class="text-[1.25rem] leading-relaxed mb-m">We will review your application and verify your documents. We will contact you within <strong>15 working days</strong>.</p>' +

      '<p class="text-[1.25rem] leading-relaxed mb-m">Please bring or send your certified documents to the Social Empowerment Agency office.</p>' +

      '<div class="bg-bb-blue-10 border-l-4 border-bb-blue-40 p-m mb-l">' +
        '<p class="text-[1.25rem] font-bold mb-xs">Social Empowerment Agency</p>' +
        '<p class="text-[1.25rem] leading-relaxed">Telephone: <a href="tel:+12464675100" class="' + GovBB.LINK_CLS + '">+1 (246) 467-5100</a></p>' +
      '</div>' +

      '<div class="mt-m">' +
        '<button type="button" onclick="window.print()" class="' + GovBB.BTN_CLS + '">Print this page</button>' +
      '</div>';
  }

};

/* ───────── Initialise ───────── */
GovBB.init({
  formName: 'Multiple Birth Benefit Application – Social Empowerment Agency',
  flow: FLOW,
  pages: PAGES,
  appElementId: 'app',
  onRadioChange: function (name, value) {
    if (name === 'birth-type' || name === 'docs-ready') {
      GovBB.render();
    }
  },
  validate: function (pageId) {
    var errors = [];
    function req(id, label) {
      if (!GovBB.D[id] || String(GovBB.D[id]).trim() === '') {
        errors.push({ id: id, msg: label + ' is required.' });
      }
    }
    function reqDate(prefix, label) {
      if (!GovBB.D[prefix + '-day'] || !GovBB.D[prefix + '-month'] || !GovBB.D[prefix + '-year']) {
        errors.push({ id: prefix + '-day', msg: label + ' must be a complete date.' });
      }
    }

    if (pageId === 'applicant-details') {
      req('fullname', 'Full name');
      reqDate('dob', 'Date of birth');
      req('sex', 'Sex');
      req('id-number', 'National ID Number');
    }

    if (pageId === 'applicant-contact') {
      req('address', 'Home address');
      req('parish', 'Parish');
      req('phone', 'Telephone number');
    }

    if (pageId === 'children-info') {
      req('relationship', 'Relationship to children');
      req('birth-type', 'Number of children born in this birth');
    }

    if (pageId === 'children-data') {
      var count = childCount();
      for (var i = 1; i <= count; i++) {
        req('child-' + i + '-name', 'Child ' + i + ' full name');
        reqDate('child-' + i + '-dob', 'Child ' + i + ' date of birth');
        req('child-' + i + '-sex', 'Child ' + i + ' sex');
        req('child-' + i + '-school', 'Child ' + i + ' nursery or school');
      }
    }

    if (pageId === 'banking') {
      req('bank-name', 'Bank or credit union');
      if (GovBB.D['bank-name'] === 'Other') {
        req('bank-name-other', 'Name of bank or credit union');
      }
      req('bank-branch', 'Branch');
      req('bank-account', 'Account number');
    }

    if (pageId === 'declaration') {
      if (!GovBB.D['decl-accurate']) errors.push({ id: 'decl-accurate', msg: 'You must confirm the declaration is true and correct.' });
      if (!GovBB.D['decl-false'])   errors.push({ id: 'decl-false',   msg: 'You must confirm you understand the consequences of false information.' });
      if (!GovBB.D['decl-changes']) errors.push({ id: 'decl-changes', msg: 'You must agree to report changes in the children\'s circumstances.' });
    }

    return errors;
  }
});
</script>
</body>
</html>

<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>

/* ───────── Summary helpers ───────── */
function dob(prefix) {
  var d = GovBB.D[prefix + '-day'] || '';
  var m = GovBB.D[prefix + '-month'] || '';
  var y = GovBB.D[prefix + '-year'] || '';
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function dobChild(i) {
  var d = GovBB.D['child-' + i + '-dob-day'] || '';
  var m = GovBB.D['child-' + i + '-dob-month'] || '';
  var y = GovBB.D['child-' + i + '-dob-year'] || '';
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function childSummaryRows(i) {
  return GovBB.summaryRow('Full name', GovBB.D['child-' + i + '-name'], 'children-data') +
    GovBB.summaryRow('Date of birth', dobChild(i), 'children-data') +
    GovBB.summaryRow('Sex', GovBB.D['child-' + i + '-sex'], 'children-data') +
    GovBB.summaryRow('National ID Number', GovBB.D['child-' + i + '-id'] || 'Not provided', 'children-data') +
    GovBB.summaryRow('Nursery or school', GovBB.D['child-' + i + '-school'], 'children-data');

          '<div class="govbb-radio-item">' +
            '<input class="govbb-radio" type="radio" id="birth-type-triplets" name="birth-type" data-field="birth-type" value="Triplets (3 children)"' + (GovBB.D['birth-type'] === 'Triplets (3 children)' ? ' checked' : '') + ' />' +

  /* ── CHILDREN DATA ── */
  'children-data': function () {
    var count = childCount();

      seaCaption() +
      '<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Children\'s details</h1>' +

          '<label class="govbb-label" for="bank-name-other">Name of bank or credit union</label>' +
          '<div class="govbb-input-wrapper">' +
            '<input class="govbb-input" type="text" id="bank-name-other" name="bank-name-other" data-field="bank-name-other" value="' + (GovBB.D['bank-name-other'] || '') + '" />' +

        '<p class="govbb-text-body"><strong>Your application will not be processed without all required documents.</strong></p>' +
      '</div>' +

      '<p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">When you submit this form, you must bring or send certified copies of the following:</p>' +

        '<div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">' +

        '</div>' +
        '<div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">' +
          '<input class="govbb-checkbox" type="checkbox" id="doc-child-id" name="doc-child-id" data-field="doc-child-id"' + (GovBB.D['doc-child-id'] ? ' checked' : '') + ' />' +

      '<fieldset class="govbb-fieldset" style="margin-bottom:var(--spacing-m);">' +
        '<legend class="govbb-fieldset__legend">Do you have certified copies of all required documents ready?</legend>' +
        '<div style="display:flex;flex-direction:column;gap:var(--spacing-xs);">' +
          '<div class="govbb-radio-item">' +
            '<input class="govbb-radio" type="radio" id="docs-ready-yes" name="docs-ready" data-field="docs-ready" value="Yes"' + (docsVal === 'Yes' ? ' checked' : '') + ' data-trigger-render="1" />' +
            '<label class="govbb-radio-item__label" for="docs-ready-yes">Yes</label>' +
          '</div>' +
          '<div class="govbb-radio-item">' +
            '<input class="govbb-radio" type="radio" id="docs-ready-no" name="docs-ready" data-field="docs-ready" value="No, I need more time"' + (docsVal === 'No, I need more time' ? ' checked' : '') + ' data-trigger-render="1" />' +
            '<label class="govbb-radio-item__label" for="docs-ready-no">No, I need more time</label>' +
          '</div>' +
        '</div>' +
      '</fieldset>' +

      (showNoNote ?
        '<div style="border-left:4px solid var(--color-blue-40);padding:var(--spacing-s) var(--spacing-m);background:var(--color-blue-10);margin-bottom:var(--spacing-m);">' +
          '<p class="govbb-text-body">You can save and return to complete this application. However, your application will not be processed until all documents are received.</p>' +
        '</div>'
      : '') +

      '<div class="govbb-btn-group" style="margin-top:var(--spacing-l);">' +
        '<button type="button" class="govbb-btn" onclick="next()">Continue</button>' +
        '<button type="button" class="govbb-btn--link" onclick="back()">Back</button>' +
      '</div>';
  },

  /* ── DECLARATION ── */
  'declaration': function () {
    return '<a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>' +
      seaCaption() +
      '<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-s);">Declaration</h1>' +
      '<p class="govbb-text-body" style="margin-bottom:var(--spacing-l);">By submitting this application, you confirm the following.</p>' +

      '<div style="margin-bottom:var(--spacing-l);">' +
        '<div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">' +
          '<input class="govbb-checkbox" type="checkbox" id="decl-accurate" name="decl-accurate" data-field="decl-accurate"' + (GovBB.D['decl-accurate'] ? ' checked' : '') + ' />' +
          '<label class="govbb-checkbox-item__label" for="decl-accurate">I declare that the information provided in this application is true and correct to the best of my knowledge.</label>' +
        '</div>' +
        '<div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">' +
          '<input class="govbb-checkbox" type="checkbox" id="decl-false" name="decl-false" data-field="decl-false"' + (GovBB.D['decl-false'] ? ' checked' : '') + ' />' +
          '<label class="govbb-checkbox-item__label" for="decl-false">I understand that providing false or misleading information may result in disqualification from the benefit and possible legal action.</label>' +
        '</div>' +
        '<div class="govbb-checkbox-item" style="margin-bottom:var(--spacing-xs);">' +
          '<input class="govbb-checkbox" type="checkbox" id="decl-changes" name="decl-changes" data-field="decl-changes"' + (GovBB.D['decl-changes'] ? ' checked' : '') + ' />' +
          '<label class="govbb-checkbox-item__label" for="decl-changes">I agree to immediately report any changes in the children\'s circumstances to the Social Empowerment Agency.</label>' +
        '</div>' +
      '</div>' +

      '<div class="govbb-btn-group" style="margin-top:var(--spacing-l);">' +
        '<button type="button" class="govbb-btn" onclick="next()">Submit application</button>' +
        '<button type="button" class="govbb-btn--link" onclick="back()">Back</button>' +
      '</div>';
  },

  /* ── CHECK YOUR ANSWERS ── */
  'check': function () {
    var count = childCount();

    var childSections = '';
    for (var i = 1; i <= count; i++) {
      childSections +=
        '<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Child ' + i + '</h2>' +
        '<dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">' +
          childSummaryRows(i) +
        '</dl>';
    }

    return '<a href="#" onclick="back();return false;" class="govbb-link" style="display:inline-block;margin-bottom:var(--spacing-m);">← Back</a>' +
      seaCaption() +
      '<h1 class="govbb-text-h1" style="margin-bottom:var(--spacing-l);">Check your answers</h1>' +

      '<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">About you</h2>' +
      '<dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">' +
        GovBB.summaryRow('Full name', GovBB.D['fullname'], 'applicant-details') +
        GovBB.summaryRow('Date of birth', dob('dob'), 'applicant-details') +
        GovBB.summaryRow('Sex', GovBB.D['sex'], 'applicant-details') +
        GovBB.summaryRow('National ID Number', GovBB.D['id-number'], 'applicant-details') +
        GovBB.summaryRow('Email address', GovBB.D['email'] || 'Not provided', 'applicant-details') +
      '</dl>' +

      '<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Contact details</h2>' +
      '<dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">' +
        GovBB.summaryRow('Home address', GovBB.D['address'], 'applicant-contact') +
        GovBB.summaryRow('Parish', GovBB.D['parish'], 'applicant-contact') +
        GovBB.summaryRow('Postal code', GovBB.D['postal-code'] || 'Not provided', 'applicant-contact') +
        GovBB.summaryRow('Telephone number', GovBB.D['phone'], 'applicant-contact') +
        GovBB.summaryRow('Alternative telephone', GovBB.D['phone-alt'] || 'Not provided', 'applicant-contact') +
      '</dl>' +

      '<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Children\'s information</h2>' +
      '<dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">' +
        GovBB.summaryRow('Relationship to children', GovBB.D['relationship'], 'children-info') +
        GovBB.summaryRow('Birth type', GovBB.D['birth-type'], 'children-info') +
      '</dl>' +

      childSections +

      '<h2 class="govbb-text-h2" style="margin-bottom:var(--spacing-s);">Banking details</h2>' +
      '<dl style="border-top:1px solid var(--color-grey-00);margin-bottom:var(--spacing-l);">' +
        GovBB.summaryRow('Bank or credit union', GovBB.D['bank-name'] === 'Other' ? (GovBB.D['bank-name-other'] || 'Other') : GovBB.D['bank-name'], 'banking') +
        GovBB.summaryRow('Branch', GovBB.D['bank-branch'], 'banking') +
        GovBB.summaryRow('Account number', GovBB.D['bank-account'], 'banking') +
      '</dl>' +

      '<div class="govbb-btn-group" style="margin-top:var(--spacing-l);">' +
        '<button type="button" class="govbb-btn" onclick="next()">Submit application</button>' +
        '<button type="button" class="govbb-btn--link" onclick="back()">Back</button>' +
      '</div>';
  },

  /* ── CONFIRMATION ── */
  'confirmation': function () {
    var ref = window.__refNumber || ('SEA-MBB-' + Math.random().toString(36).substring(2, 8).toUpperCase());
    window.__refNumber = ref;
    return '<div style="border-left:4px solid var(--color-green-00);padding:var(--spacing-m);background:var(--color-green-10);margin-bottom:var(--spacing-l);">' +
        '<h1 class="govbb-text-h1" style="color:var(--color-green-00);">Application submitted</h1>' +
        '<p class="govbb-text-body" style="margin-top:var(--spacing-s);">Your reference number is <strong>' + ref + '</strong></p>' +
      '</div>' +

      '<p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">We will review your application and verify your documents. We will contact you within <strong>15 working days</strong>.</p>' +

      '<p class="govbb-text-body" style="margin-bottom:var(--spacing-m);">Please bring or send your certified documents to the Social Empowerment Agency office.</p>' +

      '<div style="border-left:4px solid var(--color-blue-40);padding:var(--spacing-s) var(--spacing-m);background:var(--color-blue-10);margin-bottom:var(--spacing-l);">' +
        '<p class="govbb-text-body" style="margin-bottom:var(--spacing-xs);"><strong>Social Empowerment Agency</strong></p>' +
        '<p class="govbb-text-body">Telephone: <a href="tel:+12464675100" class="govbb-link">+1 (246) 467-5100</a></p>' +
      '</div>' +

      '<div style="margin-top:var(--spacing-l);">' +
        '<button type="button" class="govbb-btn" onclick="window.print()">Print this page</button>' +
      '</div>';
  }

};

/* ───────── Initialise ───────── */
GovBB.init({
  formName: 'Multiple Birth Benefit Application – Social Empowerment Agency',
  flow: FLOW,
  pages: PAGES,
  appElementId: 'app',
  onRadioChange: function (name, value) {
    if (name === 'birth-type' || name === 'docs-ready') {
      GovBB.render();
    }
  },
  validate: function (pageId) {
    var errors = [];
    function req(id, label) {
      if (!GovBB.D[id] || String(GovBB.D[id]).trim() === '') {
        errors.push({ id: id, msg: label + ' is required.' });
      }
    }
    function reqDate(prefix, label) {
      if (!GovBB.D[prefix + '-day'] || !GovBB.D[prefix + '-month'] || !GovBB.D[prefix + '-year']) {
        errors.push({ id: prefix + '-day', msg: label + ' must be a complete date.' });
      }
    }

    if (pageId === 'applicant-details') {
      req('fullname', 'Full name');
      reqDate('dob', 'Date of birth');
      req('sex', 'Sex');
      req('id-number', 'National ID Number');
    }

    if (pageId === 'applicant-contact') {
      req('address', 'Home address');
      req('parish', 'Parish');
      req('phone', 'Telephone number');
    }

    if (pageId === 'children-info') {
      req('relationship', 'Relationship to children');
      req('birth-type', 'Number of children born in this birth');
    }

    if (pageId === 'children-data') {
      var count = childCount();
      for (var i = 1; i <= count; i++) {
        req('child-' + i + '-name', 'Child ' + i + ' full name');
        reqDate('child-' + i + '-dob', 'Child ' + i + ' date of birth');
        req('child-' + i + '-sex', 'Child ' + i + ' sex');
        req('child-' + i + '-school', 'Child ' + i + ' nursery or school');
      }
    }

    if (pageId === 'banking') {
      req('bank-name', 'Bank or credit union');
      if (GovBB.D['bank-name'] === 'Other') {
        req('bank-name-other', 'Name of bank or credit union');
      }
      req('bank-branch', 'Branch');
      req('bank-account', 'Account number');
    }

    if (pageId === 'declaration') {
      if (!GovBB.D['decl-accurate']) errors.push({ id: 'decl-accurate', msg: 'You must confirm the declaration is true and correct.' });
      if (!GovBB.D['decl-false'])   errors.push({ id: 'decl-false',   msg: 'You must confirm you understand the consequences of false information.' });
      if (!GovBB.D['decl-changes']) errors.push({ id: 'decl-changes', msg: 'You must agree to report changes in the children\'s circumstances.' });
    }

    return errors;
  }
});
</script>

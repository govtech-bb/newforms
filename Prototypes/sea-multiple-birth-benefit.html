<script>
GovBB.clearErrors = function() {
  var s = document.getElementById('error-summary');
  if (s) s.remove();
  document.querySelectorAll('.govbb-error-message').forEach(function(e){e.remove();});
  document.querySelectorAll('[aria-invalid]').forEach(function(el){el.removeAttribute('aria-invalid');el.removeAttribute('aria-describedby');});
};
GovBB.showErrors = function(errors) {
  GovBB.clearErrors();
  if (!errors||!errors.length) return;
  var html = '<div class="govbb-error-summary" role="alert" id="error-summary" tabindex="-1"><h2 class="govbb-error-summary__title">There is a problem</h2><ul class="govbb-error-summary__list">';
  errors.forEach(function(e){ html += '<li><a class="govbb-error-summary__link" href="#'+e.id+'" onclick="GovBB.focusError(\''+e.id+'\');event.preventDefault();">'+e.msg+'</a></li>'; });
  html += '</ul></div>';
  document.getElementById('app').insertAdjacentHTML('afterbegin', html);
  document.getElementById('error-summary').focus();
  errors.forEach(function(e){
    var el = document.getElementById(e.id);
    if (!el) return;
    var errId = 'err-'+e.id;
    el.setAttribute('aria-invalid','true');
    el.setAttribute('aria-describedby',errId);
    var msg = document.createElement('p');
    msg.className='govbb-error-message'; msg.id=errId; msg.textContent=e.msg;
    var group = el.closest('.govbb-form-group')||el.closest('fieldset')||el.parentElement;
    if (group) group.appendChild(msg);
  });
  if (!document.title.startsWith('Error:')) document.title = 'Error: ' + document.title;
};
GovBB.summaryRow = function(label, value, changeTo) {
  var link = changeTo ? '<a href="#" onclick="nav(\''+changeTo+'\');return false;" class="govbb-link" style="font-size:var(--font-size-caption);">Change<span class="govbb-visually-hidden"> '+label+'</span></a>' : '';
  return '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:var(--spacing-xs) var(--spacing-s);padding:var(--spacing-s) 0;border-bottom:1px solid var(--color-grey-00);"><dt style="font-size:var(--font-size-body);font-weight:var(--font-weight-bold);">'+label+'</dt><dd style="font-size:var(--font-size-body);">'+(value||'—')+'</dd><div>'+link+'</div></div>';
};
</script>

/* ───────── Document upload handlers ───────── */
function handleUpload(key, input) {
  var file = input.files && input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    alert('File is larger than 10 MB. Please choose a smaller file.');
    input.value = '';
    return;
  }
  GovBB.D['upload-' + key] = { name: file.name, size: file.size, type: file.type };
  GovBB.render();
}
function removeUpload(key) {
  delete GovBB.D['upload-' + key];
  GovBB.render();
}
function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / (1024 * 1024)).toFixed(1) + ' MB';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

/* ───────── Summary helpers ───────── */
function dob(prefix) {
  var d = GovBB.D[prefix + '-day'] || '';
  var m = GovBB.D[prefix + '-month'] || '';
  var y = GovBB.D[prefix + '-year'] || '';
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function dobChild(i) {
  var d = GovBB.D['child-' + i + '-dob-day'] || '';
  var m = GovBB.D['child-' + i + '-dob-month'] || '';
  var y = GovBB.D['child-' + i + '-dob-year'] || '';
  if (!d && !m && !y) return '';
  return [d, m, y].filter(Boolean).join(' / ');
}

function childSummaryRows(i) {
  return GovBB.summaryRow('Full name', GovBB.D['child-' + i + '-name'], 'children-data') +
    GovBB.summaryRow('Date of birth', dobChild(i), 'children-data') +
    GovBB.summaryRow('Sex', GovBB.D['child-' + i + '-sex'], 'children-data') +

GovBB.init({
  formName: 'Multiple Birth Benefit Application – Social Empowerment Agency',
  flow: FLOW,
  pages: PAGES,
  appElementId: 'app',
  onRadioChange: function (name, value) {
    if (name === 'birth-type') {
      GovBB.render();
    }
  },
  validate: function (pageId) {
    var errors = [];
    function req(id, label) {
      if (!GovBB.D[id] || String(GovBB.D[id]).trim() === '') {
        errors.push({ id: id, msg: label + ' is required.' });
      }
    }
    function parseDate(prefix) {
      var d = parseInt(GovBB.D[prefix + '-day'], 10);
      var m = parseInt(GovBB.D[prefix + '-month'], 10);
      var y = parseInt(GovBB.D[prefix + '-year'], 10);
      if (!d || !m || !y) return null;
      if (d < 1 || d > 31 || m < 1 || m > 12 || y < 1900 || y > 2100) return false;
      var dt = new Date(y, m - 1, d);
      if (dt.getFullYear() !== y || dt.getMonth() !== m - 1 || dt.getDate() !== d) return false;
      return dt;
    }
    function reqDate(prefix, label, opts) {
      opts = opts || {};
      var dayId = prefix + '-day';
      var dayV = GovBB.D[prefix + '-day'];
      var monV = GovBB.D[prefix + '-month'];
      var yrV  = GovBB.D[prefix + '-year'];
      if (!dayV || !monV || !yrV) {
        errors.push({ id: dayId, msg: label + ' must be a complete date.' });
        return;
      }
      var dt = parseDate(prefix);
      if (dt === false) {
        errors.push({ id: dayId, msg: label + ' must be a real date — for example, 27 3 1985.' });
        return;
      }
      if (opts.notFuture && dt > new Date()) {
        errors.push({ id: dayId, msg: label + ' must be in the past.' });
      }
      if (opts.minYear && dt.getFullYear() < opts.minYear) {
        errors.push({ id: dayId, msg: label + ' year looks too far in the past — check the year.' });
      }
    }
    function reqIdNumber(id, label) {
      var v = (GovBB.D[id] || '').trim();
      if (!v) { errors.push({ id: id, msg: label + ' is required.' }); return; }
      if (!/^\d{6}-\d{4}$/.test(v)) {
        errors.push({ id: id, msg: label + ' must be in the format 110915-0048.' });
      }
    }
    function reqPhone(id, label, required) {
      var v = (GovBB.D[id] || '').trim();
      if (!v) {
        if (required) errors.push({ id: id, msg: label + ' is required.' });
        return;
      }
      var digits = v.replace(/[\s\-()+]/g, '');
      if (!/^\d{7,15}$/.test(digits)) {
        errors.push({ id: id, msg: label + ' must contain 7 to 15 digits — for example, 246 249-1234.' });
      }
    }

    if (pageId === 'applicant-details') {
      req('fullname', 'Full name');
      reqDate('dob', 'Date of birth', { notFuture: true, minYear: 1900 });
      req('sex', 'Sex');
      reqIdNumber('id-number', 'National ID Number');
    }

    if (pageId === 'applicant-contact') {
      req('address', 'Home address');
      req('parish', 'Parish');
      reqPhone('phone', 'Telephone number', true);
      reqPhone('phone-alt', 'Alternative telephone number', false);
    }

    if (pageId === 'children-info') {
      req('relationship', 'Relationship to children');
      req('birth-type', 'Number of children born in this birth');
    }

    if (pageId === 'children-data') {
      var count = childCount();
      for (var i = 1; i <= count; i++) {
        req('child-' + i + '-name', 'Child ' + i + ' full name');
        reqDate('child-' + i + '-dob', 'Child ' + i + ' date of birth', { notFuture: true, minYear: 1990 });
        req('child-' + i + '-sex', 'Child ' + i + ' sex');
        if (GovBB.D['child-' + i + '-id']) {
          var cid = String(GovBB.D['child-' + i + '-id']).trim();
          if (cid && !/^\d{6}-\d{4}$/.test(cid)) {
            errors.push({ id: 'child-' + i + '-id', msg: 'Child ' + i + ' National ID Number must be in the format 110915-0048.' });
          }
        }
      }
    }

    if (pageId === 'banking') {
      req('bank-name', 'Bank or credit union');
      if (GovBB.D['bank-name'] === 'Other') {
        req('bank-name-other', 'Name of bank or credit union');
      }
      req('bank-branch', 'Branch');
      var acct = (GovBB.D['bank-account'] || '').trim();
      if (!acct) {
        errors.push({ id: 'bank-account', msg: 'Account number is required.' });
      } else {
        var acctDigits = acct.replace(/[\s\-]/g, '');
        if (!/^\d{6,16}$/.test(acctDigits)) {
          errors.push({ id: 'bank-account', msg: 'Account number must be 6 to 16 digits.' });
        }
      }
    }

    if (pageId === 'documents') {
      var requiredDocs = [
        { key: 'parent-id',  label: "Parent's or guardian's National Registration Card" },
        { key: 'birth-cert', label: 'Birth certificate for each child' },
        { key: 'child-id',   label: "Child's National Registration Card" },
        { key: 'banking',    label: 'Banking details document' }
      ];
      requiredDocs.forEach(function (d) {
        if (!GovBB.D['upload-' + d.key]) {
          errors.push({ id: 'upload-' + d.key, msg: 'Upload your ' + d.label + '.' });
        }
      });
    }

    if (pageId === 'declaration') {
      if (!GovBB.D['decl-accurate']) errors.push({ id: 'decl-accurate', msg: 'You must confirm the declaration is true and correct.' });
      if (!GovBB.D['decl-false'])   errors.push({ id: 'decl-false',   msg: 'You must confirm you understand the consequences of false information.' });
      if (!GovBB.D['decl-changes']) errors.push({ id: 'decl-changes', msg: 'You must agree to report changes in the children\'s circumstances.' });
    }

    return errors;
  }
});
</script>
